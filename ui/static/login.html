<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PoundCake | Login</title>
  <link rel="stylesheet" href="/assets/css/tokens.css">
  <link rel="stylesheet" href="/assets/css/base.css">
  <link rel="stylesheet" href="/assets/css/layout.css">
  <link rel="stylesheet" href="/assets/css/components.css">
  <link rel="stylesheet" href="/assets/css/pages.css">
</head>
<body>
  <main class="login-page" aria-label="PoundCake login">
    <section class="login-shell">
      <header class="login-banner">
        <h1>PoundCake</h1>
        <p>Remediation control plane login</p>
      </header>

      <div class="login-body">
        <div class="login-error" id="login-error"></div>

        <form id="login-form" novalidate>
          <div class="form-field">
            <label for="username">Username</label>
            <input id="username" name="username" type="text" autocomplete="username" required autofocus>
          </div>

          <div class="form-field">
            <label for="password">Password</label>
            <input id="password" name="password" type="password" autocomplete="current-password" required>
          </div>

          <div class="inline-actions mt-4">
            <button class="btn primary" id="login-submit" type="submit">Login</button>
          </div>
        </form>
      </div>
    </section>
  </main>

  <script type="module" src="/assets/js/login.js"></script>
</body>
</html>

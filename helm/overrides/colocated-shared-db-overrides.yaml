# Co-located Bakery + PoundCake example.
# Install Bakery first with release name "bakery", then install PoundCake with release name "poundcake".
# The PoundCake release points at the Bakery-managed MariaDB server.

bakery:
  enabled: true
  client:
    enabled: true

database:
  mode: shared_operator
  sharedOperator:
    serverName: bakery-poundcake-bakery-mariadb
    provisionResources: true

# High Availability overrides for PoundCake
# Merge into /etc/genestack/helm-configs/poundcake/10-main-overrides.yaml
# before running install/install-poundcake-helm.sh.

# Main API deployment (service load balances across pods)
replicaCount: 2

# Worker services
chef:
  enabled: true
  replicaCount: 2

timer:
  enabled: true
  replicaCount: 2

dishwasher:
  enabled: true
  replicaCount: 2

# Expose API with a cloud LB
service:
  type: LoadBalancer
  port: 8080

# Required for multi-replica state coordination
redis:
  enabled: true

# Recommended resilience setting
podDisruptionBudget:
  enabled: true
  minAvailable: 1

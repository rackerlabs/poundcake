# Envoy Gateway overrides for Kronos
# Creates/updates a Gateway listener (HTTPS:443) and an HTTPRoute for PoundCake.
# Copy to /etc/genestack/helm-configs/poundcake/poundcake-helm-overrides.yaml or merge into your active overrides.

gateway:
  enabled: true

  # Set these to your existing Envoy Gateway object.
  gatewayName: "envoy-gateway"
  gatewayNamespace: "envoy-gateway-system"

  listener:
    name: "poundcake-https"
    hostname: "poundcake.api.kronos.cloudmunchers.net"
    port: 443
    protocol: "HTTPS"
    tlsSecretName: "poundcake-gw-tls-secret"
    allowedNamespaces: "All"
    updateIfExists: true

  hostnames:
    - "poundcake.api.kronos.cloudmunchers.net"

  # Optional annotations for the HTTPRoute
  annotations: {}

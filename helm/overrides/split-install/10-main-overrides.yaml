# Split-install main override example.
# Copy to /etc/genestack/helm-configs/poundcake/10-main-overrides.yaml
# Bakery runs in namespace "bakery". PoundCake runs in namespace "rackspace".
# Each release keeps its own MariaDB ownership. This file does not enable shared_operator mode.
# Assumes a Genestack environment with an existing Gateway named "flex-gateway"
# in namespace "envoy-gateway".

gateway:
  enabled: true
  gatewayName: "flex-gateway"
  gatewayNamespace: "envoy-gateway"
  listener:
    name: "poundcake-https"
    hostname: "<poundcake-public-url-host>"
    port: 443
    protocol: "HTTPS"
    tlsSecretName: "poundcake-gw-tls-secret"
  hostnames:
    - "<poundcake-public-url-host>"
  listeners:
    api:
      pathPrefix: /api
    ui:
      pathPrefix: /

bakery:
  gateway:
    enabled: true
    gatewayName: "flex-gateway"
    gatewayNamespace: "envoy-gateway"
    listener:
      name: "bakery-https"
      hostname: "<bakery-public-url-host>"
      port: 443
      protocol: "HTTPS"
      tlsSecretName: "bakery-gw-tls-secret"
    hostnames:
      - "<bakery-public-url-host>"
  auth:
    existingSecret: bakery-hmac
  config:
    activeProvider: rackspace_core
    ticketingDryRun: true
  rackspaceCore:
    existingSecret: bakery-rackspace-core
    verifySsl: false
  client:
    enabled: true
    enforceRemoteBaseUrl: true
    baseUrl: "https://<bakery-public-url-host>"
    auth:
      existingSecret: bakery-hmac

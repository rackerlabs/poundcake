# Optional split-install Git sync parity example.
# Copy to /etc/genestack/helm-configs/poundcake/30-git-sync-overrides.yaml

git:
  enabled: true
  repoUrl: "<git-repo-url>"
  branch: "<git-branch>"
  rulesPath: "<git-alert-rules-path>"
  workflowsPath: "<git-workflows-path>"
  actionsPath: "<git-actions-path>"
  filePerAlert: true
  provider: github
  existingSecret: poundcake-git

# Optional split-install auth parity example.
# Copy to /etc/genestack/helm-configs/poundcake/20-auth-overrides.yaml

auth:
  auth0:
    enabled: true
    shared:
      domain: "<auth0-domain>"
      connection: "<auth0-connection-name>"
    ui:
      enabled: true
      clientId: "<auth0-ui-client-id>"
      callbackUrl: "https://<poundcake-public-url-host>/api/v1/auth/oidc/callback"
      existingSecret: "poundcake-auth0-ui"
    cli:
      enabled: true
      clientId: "<auth0-cli-client-id>"
  azureAd:
    enabled: true
    shared:
      tenant: "<azure-tenant-id>"
    ui:
      enabled: true
      clientId: "<azure-ui-client-id>"
      callbackUrl: "https://<poundcake-public-url-host>/api/v1/auth/oidc/callback"
      existingSecret: "poundcake-azure-ui"
    cli:
      enabled: true
      clientId: "<azure-cli-client-id>"

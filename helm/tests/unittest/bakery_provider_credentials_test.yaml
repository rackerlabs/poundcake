suite: bakery-provider-credentials
templates:
  - templates/bakery-secret.yaml
  - templates/bakery-deployment.yaml
  - templates/bakery-worker-deployment.yaml
  - templates/bakery-required.yaml
tests:
  - it: wires teams and discord existing secrets into bakery api and worker env
    set:
      bakery.enabled: true
      bakery.worker.enabled: true
      bakery.rackspaceCore.existingSecret: bakery-rackspace-core
      bakery.teams.existingSecret: bakery-teams
      bakery.discord.existingSecret: bakery-discord
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: TEAMS_WEBHOOK_URL
            valueFrom:
              secretKeyRef:
                name: bakery-teams
                key: teams-webhook-url
        template: templates/bakery-deployment.yaml
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DISCORD_WEBHOOK_URL
            valueFrom:
              secretKeyRef:
                name: bakery-discord
                key: discord-webhook-url
        template: templates/bakery-deployment.yaml
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: TEAMS_WEBHOOK_URL
            valueFrom:
              secretKeyRef:
                name: bakery-teams
                key: teams-webhook-url
        template: templates/bakery-worker-deployment.yaml
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DISCORD_WEBHOOK_URL
            valueFrom:
              secretKeyRef:
                name: bakery-discord
                key: discord-webhook-url
        template: templates/bakery-worker-deployment.yaml

  - it: renders chart-managed webhook secrets for teams and discord direct values
    set:
      bakery.enabled: true
      bakery.worker.enabled: true
      bakery.rackspaceCore.existingSecret: bakery-rackspace-core
      bakery.teams.webhookUrl: https://teams.example/webhook
      bakery.discord.webhookUrl: https://discord.example/webhook
    asserts:
      - equal:
          path: data["teams-webhook-url"]
          value: aHR0cHM6Ly90ZWFtcy5leGFtcGxlL3dlYmhvb2s=
        template: templates/bakery-secret.yaml
      - equal:
          path: data["discord-webhook-url"]
          value: aHR0cHM6Ly9kaXNjb3JkLmV4YW1wbGUvd2ViaG9vaw==
        template: templates/bakery-secret.yaml
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: TEAMS_WEBHOOK_URL
            valueFrom:
              secretKeyRef:
                name: RELEASE-NAME-poundcake-bakery-secret
                key: teams-webhook-url
        template: templates/bakery-deployment.yaml
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DISCORD_WEBHOOK_URL
            valueFrom:
              secretKeyRef:
                name: RELEASE-NAME-poundcake-bakery-secret
                key: discord-webhook-url
        template: templates/bakery-worker-deployment.yaml

  - it: fails fast when teams is active without a configured secret or webhook
    set:
      bakery.enabled: true
      bakery.config.activeProvider: teams
    asserts:
      - failedTemplate:
          errorMessage: "bakery.teams.existingSecret or bakery.teams.webhookUrl is required when bakery.config.activeProvider=teams. Use install-bakery.sh secret provisioning or reference an existing secret."
        template: templates/bakery-required.yaml

suite: bakery-provider-credentials
templates:
  - templates/bakery-deployment.yaml
  - templates/bakery-worker-deployment.yaml
  - templates/bakery-required.yaml
tests:
  - it: wires teams and discord existing secrets into bakery api and worker env
    set:
      bakery.enabled: true
      bakery.worker.enabled: true
      bakery.rackspaceCore.existingSecret: bakery-rackspace-core
      bakery.teams.existingSecret: bakery-teams
      bakery.discord.existingSecret: bakery-discord
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: TEAMS_WEBHOOK_URL
            valueFrom:
              secretKeyRef:
                name: bakery-teams
                key: teams-webhook-url
                optional: true
        template: templates/bakery-deployment.yaml
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DISCORD_WEBHOOK_URL
            valueFrom:
              secretKeyRef:
                name: bakery-discord
                key: discord-webhook-url
                optional: true
        template: templates/bakery-deployment.yaml
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: TEAMS_WEBHOOK_URL
            valueFrom:
              secretKeyRef:
                name: bakery-teams
                key: teams-webhook-url
                optional: true
        template: templates/bakery-worker-deployment.yaml
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DISCORD_WEBHOOK_URL
            valueFrom:
              secretKeyRef:
                name: bakery-discord
                key: discord-webhook-url
                optional: true
        template: templates/bakery-worker-deployment.yaml

  - it: defaults rackspace core secret wiring to the canonical secret name
    set:
      bakery.enabled: true
      bakery.worker.enabled: true
      bakery.config.activeProvider: rackspace_core
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: RACKSPACE_CORE_URL
            valueFrom:
              secretKeyRef:
                name: bakery-rackspace-core
                key: rackspace-core-url
                optional: true
        template: templates/bakery-deployment.yaml
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: RACKSPACE_CORE_PASSWORD
            valueFrom:
              secretKeyRef:
                name: bakery-rackspace-core
                key: rackspace-core-password
                optional: true
        template: templates/bakery-worker-deployment.yaml

  - it: fails fast when teams direct values are provided
    set:
      bakery.enabled: true
      bakery.teams.webhookUrl: https://teams.example/webhook
    asserts:
      - failedTemplate:
          errorMessage: "Teams direct values are disabled. Use bakery.teams.existingSecret and install-bakery.sh secret provisioning."
        template: templates/bakery-required.yaml

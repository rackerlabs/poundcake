suite: secret
templates:
  - templates/secret.yaml
tests:
  - it: uses provided secret values when explicitly set
    set:
      secrets.dbRootPassword: root-pass
      secrets.dbPassword: db-pass
      secrets.mongoRootPassword: mongo-root
      secrets.mongoPassword: mongo-pass
      secrets.rabbitmqUser: rabbit-user
      secrets.rabbitmqPassword: rabbit-pass
      secrets.st2AuthPassword: st2-pass
    asserts:
      - equal:
          path: stringData.DB_ROOT_PASSWORD
          value: root-pass
        documentIndex: 0
      - equal:
          path: stringData.DB_PASSWORD
          value: db-pass
        documentIndex: 0
      - isNull:
          path: stringData.RABBITMQ_USER
        documentIndex: 0
      - isNull:
          path: stringData.RABBITMQ_PASSWORD
        documentIndex: 0
      - equal:
          path: stringData.MONGO_ROOT_PASSWORD
          value: mongo-root
        documentIndex: 1
      - equal:
          path: stringData.RABBITMQ_USER
          value: rabbit-user
        documentIndex: 1
      - equal:
          path: stringData.RABBITMQ_PASSWORD
          value: rabbit-pass
        documentIndex: 1
      - equal:
          path: stringData.ST2_AUTH_PASSWORD
          value: st2-pass
        documentIndex: 1
      - matchRegex:
          path: stringData.ST2_AUTH_HTPASSWD
          pattern: "^st2admin:\\$2"
        documentIndex: 1

  - it: renders startup marker and apikey secrets
    asserts:
      - equal:
          path: metadata.name
          value: stackstorm-startup-markers
        documentIndex: 2
      - equal:
          path: metadata.name
          value: stackstorm-apikeys
        documentIndex: 3

  - it: auto-generates non-empty passwords when values are blank
    set:
      secrets.dbRootPassword: ""
      secrets.dbPassword: ""
      secrets.mongoRootPassword: ""
      secrets.mongoPassword: ""
      secrets.rabbitmqPassword: ""
      secrets.st2AuthPassword: ""
    asserts:
      - matchRegex:
          path: stringData.DB_ROOT_PASSWORD
          pattern: ".+"
        documentIndex: 0
      - matchRegex:
          path: stringData.DB_PASSWORD
          pattern: ".+"
        documentIndex: 0
      - matchRegex:
          path: stringData.MONGO_ROOT_PASSWORD
          pattern: ".+"
        documentIndex: 1
      - matchRegex:
          path: stringData.ST2_AUTH_PASSWORD
          pattern: ".+"
        documentIndex: 1
      - matchRegex:
          path: stringData.ST2_AUTH_HTPASSWD
          pattern: "^st2admin:\\$2"
        documentIndex: 1

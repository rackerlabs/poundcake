suite: bakery-db-contract
templates:
  - templates/bakery-mariadb.yaml
  - templates/bakery-secret.yaml
  - templates/bakery-deployment.yaml
  - templates/bakery-worker-deployment.yaml
  - templates/bakery-init-job.yaml
  - templates/stackstorm-startup-order-jobs.yaml
tests:
  - it: uses configured bakery database password secret key across api/worker and startup-gated bakery db-init in full mode
    set:
      poundcake.enabled: true
      bakery.enabled: true
      bakery.database.createServer: true
      bakery.database.user.passwordSecret: external-bakery-db-user
      bakery.database.user.passwordSecretKey: db-pass
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DATABASE_PASSWORD
            valueFrom:
              secretKeyRef:
                name: external-bakery-db-user
                key: db-pass
        template: templates/bakery-deployment.yaml
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DATABASE_PASSWORD
            valueFrom:
              secretKeyRef:
                name: external-bakery-db-user
                key: db-pass
        template: templates/bakery-worker-deployment.yaml
      - contains:
          path: spec.template.spec.initContainers[2].env
          content:
            name: DATABASE_PASSWORD
            valueFrom:
              secretKeyRef:
                name: external-bakery-db-user
                key: db-pass
        template: templates/stackstorm-startup-order-jobs.yaml
        documentIndex: 3
      - equal:
          path: spec.passwordSecretKeyRef.name
          value: external-bakery-db-user
        template: templates/bakery-mariadb.yaml
        documentIndex: 3
      - equal:
          path: spec.passwordSecretKeyRef.key
          value: db-pass
        template: templates/bakery-mariadb.yaml
        documentIndex: 3

  - it: renders dedicated bakery mariadb resources and startup-gated bakery db-init in full mode
    set:
      poundcake.enabled: true
      bakery.enabled: true
      bakery.database.createServer: true
      mariadbOperator.enabled: true
    asserts:
      - hasDocuments:
          count: 6
        template: templates/bakery-mariadb.yaml
      - hasDocuments:
          count: 0
        template: templates/bakery-init-job.yaml
      - equal:
          path: metadata.name
          value: poundcake-bakery-db-init
        template: templates/stackstorm-startup-order-jobs.yaml
        documentIndex: 3

  - it: does not render unsupported MariaDB podTemplate field
    set:
      poundcake.enabled: true
      bakery.enabled: true
      bakery.database.createServer: true
      mariadbOperator.enabled: true
    asserts:
      - isNull:
          path: spec.podTemplate
        template: templates/bakery-mariadb.yaml
        documentIndex: 0

  - it: renders standalone bakery-init job only in bakery-only mode
    set:
      poundcake.enabled: false
      bakery.enabled: true
      bakery.database.createServer: true
      mariadbOperator.enabled: true
    asserts:
      - hasDocuments:
          count: 1
        template: templates/bakery-init-job.yaml
      - equal:
          path: metadata.name
          value: RELEASE-NAME-poundcake-bakery-db-init
        template: templates/bakery-init-job.yaml
      - hasDocuments:
          count: 0
        template: templates/stackstorm-startup-order-jobs.yaml

  - it: fails fast when bakery-only database createServer is disabled
    set:
      poundcake.enabled: false
      bakery.enabled: true
      bakery.worker.enabled: false
      bakery.database.createServer: false
    asserts:
      - failedTemplate:
          errorMessage: "bakery.database.createServer=false is not supported. Bakery requires an operator-managed MariaDB server."
        template: templates/bakery-init-job.yaml

  - it: fails fast when mariadb operator is disabled
    set:
      poundcake.enabled: true
      bakery.enabled: true
      bakery.database.createServer: true
      mariadbOperator.enabled: false
    asserts:
      - failedTemplate:
          errorMessage: "bakery.database.createServer=true requires mariadbOperator.enabled=true"
        template: templates/bakery-worker-deployment.yaml

  - it: uses bakery image digest and falls back to global digest when bakery digest is unset
    set:
      poundcake.enabled: true
      bakery.enabled: true
      bakery.database.createServer: true
      bakery.image.repository: ghcr.io/example/poundcake-bakery
      bakery.image.tag: ""
      poundcakeImage.digest: sha256:aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: ghcr.io/example/poundcake-bakery@sha256:aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
        template: templates/bakery-deployment.yaml
      - equal:
          path: spec.template.spec.containers[0].image
          value: ghcr.io/example/poundcake-bakery@sha256:aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
        template: templates/bakery-worker-deployment.yaml
      - equal:
          path: spec.template.spec.initContainers[2].image
          value: ghcr.io/example/poundcake-bakery@sha256:aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
        template: templates/stackstorm-startup-order-jobs.yaml
        documentIndex: 3

  - it: uses digest image reference in bakery-only init job
    set:
      poundcake.enabled: false
      bakery.enabled: true
      bakery.database.createServer: true
      bakery.image.repository: ghcr.io/example/poundcake-bakery
      bakery.image.tag: ""
      poundcakeImage.digest: sha256:aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: ghcr.io/example/poundcake-bakery@sha256:aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
        template: templates/bakery-init-job.yaml

  - it: bakery digest overrides global digest
    set:
      poundcake.enabled: true
      bakery.enabled: true
      bakery.database.createServer: true
      bakery.image.repository: ghcr.io/example/poundcake-bakery
      bakery.image.tag: ""
      poundcakeImage.digest: sha256:bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb
      bakery.image.digest: sha256:cccccccccccccccccccccccccccccccccccccccccccccccccccccccccccccccc
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: ghcr.io/example/poundcake-bakery@sha256:cccccccccccccccccccccccccccccccccccccccccccccccccccccccccccccccc
        template: templates/bakery-deployment.yaml

  - it: falls back to chart appVersion when bakery tag and digests are unset
    set:
      poundcake.enabled: true
      bakery.enabled: true
      bakery.database.createServer: true
      bakery.image.repository: ghcr.io/example/poundcake-bakery
      bakery.image.tag: ""
      bakery.image.digest: ""
      poundcakeImage.digest: ""
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: ghcr.io/example/poundcake-bakery:2.0.126
        template: templates/bakery-deployment.yaml

  - it: reports Bakery version from the deployed Bakery image tag
    set:
      poundcake.enabled: true
      bakery.enabled: true
      bakery.database.createServer: true
      bakery.image.tag: "2.0.999"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: BAKERY_APP_VERSION
            value: "2.0.999"
        template: templates/bakery-deployment.yaml

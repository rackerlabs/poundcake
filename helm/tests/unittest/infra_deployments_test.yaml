suite: infra-deployments
templates:
  - templates/infra-deployments.yaml
tests:
  - it: renders mariadb probes and default writable infra security context
    asserts:
      - equal:
          path: metadata.name
          value: poundcake-mariadb
        documentIndex: 0
      - isNotNull:
          path: spec.template.spec.containers[0].readinessProbe
        documentIndex: 0
      - isNotNull:
          path: spec.template.spec.containers[0].startupProbe
        documentIndex: 0
      - equal:
          path: spec.template.spec.containers[0].securityContext.runAsNonRoot
          value: true
        documentIndex: 0
      - equal:
          path: spec.template.spec.containers[0].securityContext.runAsUser
          value: 1000
        documentIndex: 0
      - equal:
          path: spec.template.spec.containers[0].securityContext.readOnlyRootFilesystem
          value: false
        documentIndex: 0

  - it: applies infra log-streaming labels
    asserts:
      - equal:
          path: spec.template.metadata.labels["poundcake.io/log-group"]
          value: infra
        documentIndex: 0
      - equal:
          path: spec.template.metadata.labels["poundcake.io/log-subgroup"]
          value: data
        documentIndex: 0
      - equal:
          path: spec.template.metadata.labels["poundcake.io/log-role"]
          value: mongodb
        documentIndex: 1

  - it: renders mongodb with writable root filesystem by default
    asserts:
      - equal:
          path: metadata.name
          value: stackstorm-mongodb
        documentIndex: 1
      - equal:
          path: spec.template.spec.containers[0].securityContext.readOnlyRootFilesystem
          value: false
        documentIndex: 1
      - equal:
          path: spec.template.spec.containers[0].securityContext.runAsUser
          value: 1000
        documentIndex: 1

  - it: applies configurable podSecurityContext to infra deployments
    set:
      podSecurityContext.runAsUser: 2001
      podSecurityContext.fsGroup: 2001
    asserts:
      - equal:
          path: spec.template.spec.securityContext.runAsUser
          value: 2001
        documentIndex: 0
      - equal:
          path: spec.template.spec.securityContext.fsGroup
          value: 2001
        documentIndex: 2

  - it: allows overriding mongodb container security context
    set:
      infraSecurityContext.mongodb.readOnlyRootFilesystem: true
      infraSecurityContext.mongodb.runAsUser: 999
    asserts:
      - equal:
          path: spec.template.spec.containers[0].securityContext.readOnlyRootFilesystem
          value: true
        documentIndex: 1
      - equal:
          path: spec.template.spec.containers[0].securityContext.runAsUser
          value: 999
        documentIndex: 1

  - it: does not render pull secrets from poundcakeImage settings
    set:
      poundcakeImage.pullSecrets[0]: ghcr-pull
    asserts:
      - isNull:
          path: spec.template.spec.imagePullSecrets
        documentIndex: 0
      - isNull:
          path: spec.template.spec.imagePullSecrets
        documentIndex: 3

suite: poundcake-workloads
templates:
  - templates/poundcake-workloads.yaml
tests:
  - it: renders all poundcake workloads
    asserts:
      - hasDocuments:
          count: 6
      - equal:
          path: metadata.name
          value: poundcake-api
        documentIndex: 0
      - equal:
          path: metadata.name
          value: poundcake-dishwasher
        documentIndex: 5
      - equal:
          path: metadata.name
          value: poundcake-ui
        documentIndex: 2

  - it: applies log-streaming labels to poundcake pod templates
    asserts:
      - equal:
          path: spec.template.metadata.labels["poundcake.io/log-group"]
          value: poundcake
        documentIndex: 0
      - equal:
          path: spec.template.metadata.labels["poundcake.io/log-subgroup"]
          value: app
        documentIndex: 0
      - equal:
          path: spec.template.metadata.labels["poundcake.io/log-role"]
          value: api
        documentIndex: 0
      - equal:
          path: spec.template.metadata.labels["poundcake.io/log-role"]
          value: worker
        documentIndex: 4

  - it: defaults poundcake workloads to worker nodes
    asserts:
      - equal:
          path: spec.template.spec.nodeSelector["node-role.kubernetes.io/worker"]
          value: worker
        documentIndex: 0
      - equal:
          path: spec.template.spec.nodeSelector["node-role.kubernetes.io/worker"]
          value: worker
        documentIndex: 5

  - it: applies image and interval values to key containers
    set:
      poundcakeImage.repository: custom/poundcake
      poundcakeImage.tag: "2.0.0"
      poundcakeImage.pullPolicy: Always
      config.logLevel: WARNING
      uiImage.repository: custom/poundcake-ui
      uiImage.tag: "2.0.0"
      uiImage.pullPolicy: Always
      uiImage.containerPort: 18080
      intervals.prepInterval: "42"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: custom/poundcake:2.0.0
        documentIndex: 0
      - equal:
          path: spec.template.spec.containers[0].imagePullPolicy
          value: Always
        documentIndex: 0
      - isNotNull:
          path: spec.template.spec.containers[0].readinessProbe
        documentIndex: 0
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.path
          value: /api/v1/ready
        documentIndex: 0
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.timeoutSeconds
          value: 5
        documentIndex: 0
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.failureThreshold
          value: 6
        documentIndex: 0
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.path
          value: /api/v1/live
        documentIndex: 0
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.timeoutSeconds
          value: 5
        documentIndex: 0
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.failureThreshold
          value: 6
        documentIndex: 0
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: POUNDCAKE_LOG_LEVEL
            value: "WARNING"
        documentIndex: 0
      - equal:
          path: spec.template.spec.containers[0].env[7].value
          value: "42"
        documentIndex: 4
      - equal:
          path: spec.template.spec.containers[0].imagePullPolicy
          value: Always
        documentIndex: 4
      - equal:
          path: spec.template.spec.containers[0].image
          value: custom/poundcake-ui:2.0.0
        documentIndex: 2
      - equal:
          path: spec.template.spec.containers[0].imagePullPolicy
          value: Always
        documentIndex: 2
      - equal:
          path: spec.template.spec.containers[0].ports[0].containerPort
          value: 18080
        documentIndex: 2
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.port
          value: 18080
        documentIndex: 2
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.port
          value: 18080
        documentIndex: 2

  - it: applies configured poundcake API readiness initial delay
    set:
      poundcakeApi.readiness.initialDelaySeconds: 9
    asserts:
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.initialDelaySeconds
          value: 9
        documentIndex: 0

  - it: enables release update advisories by default
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: POUNDCAKE_RELEASE_UPDATE_NOTIFICATIONS_ENABLED
            value: "true"
        documentIndex: 0

  - it: wires release update advisory env defaults and registry auth secret
    set:
      releaseUpdateNotifications.enabled: true
      releaseUpdateNotifications.checkIntervalSeconds: 3600
      releaseUpdateNotifications.ociRepository: oci://ghcr.io/example/charts/poundcake
      releaseUpdateNotifications.includePrereleases: true
      releaseUpdateNotifications.registryAuth.existingSecret: poundcake-oci
      releaseUpdateNotifications.registryAuth.secretKeys.username: oci-user
      releaseUpdateNotifications.registryAuth.secretKeys.password: oci-password
      releaseUpdateNotifications.registryAuth.secretKeys.token: oci-token
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: POUNDCAKE_CHART_VERSION
            value: "0.2.109"
        documentIndex: 0
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: POUNDCAKE_RELEASE_UPDATE_NOTIFICATIONS_ENABLED
            value: "true"
        documentIndex: 0
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: POUNDCAKE_RELEASE_UPDATE_NOTIFICATIONS_CHECK_INTERVAL_SECONDS
            value: "3600"
        documentIndex: 0
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: POUNDCAKE_RELEASE_UPDATE_NOTIFICATIONS_OCI_REPOSITORY
            value: oci://ghcr.io/example/charts/poundcake
        documentIndex: 0
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: POUNDCAKE_RELEASE_UPDATE_NOTIFICATIONS_INCLUDE_PRERELEASES
            value: "true"
        documentIndex: 0
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: POUNDCAKE_RELEASE_UPDATE_NOTIFICATIONS_REGISTRY_USERNAME
            valueFrom:
              secretKeyRef:
                name: poundcake-oci
                key: oci-user
                optional: true
        documentIndex: 0

  - it: applies configured poundcake API probe settings
    set:
      poundcakeApi.readiness.periodSeconds: 7
      poundcakeApi.readiness.timeoutSeconds: 8
      poundcakeApi.readiness.failureThreshold: 9
      poundcakeApi.liveness.initialDelaySeconds: 41
      poundcakeApi.liveness.periodSeconds: 11
      poundcakeApi.liveness.timeoutSeconds: 12
      poundcakeApi.liveness.failureThreshold: 13
    asserts:
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.periodSeconds
          value: 7
        documentIndex: 0
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.timeoutSeconds
          value: 8
        documentIndex: 0
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.failureThreshold
          value: 9
        documentIndex: 0
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.initialDelaySeconds
          value: 41
        documentIndex: 0
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.periodSeconds
          value: 11
        documentIndex: 0
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.timeoutSeconds
          value: 12
        documentIndex: 0
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.failureThreshold
          value: 13
        documentIndex: 0

  - it: binds workloads to the poundcake service account and wires Prometheus CRD env
    set:
      serviceAccount.create: true
      serviceAccount.name: ""
      prometheus.url: http://prometheus.example:9090
      prometheus.verifySsl: false
      prometheus.useCrds: true
      prometheus.crdNamespace: monitoring
      prometheus.crdLabels:
        release: kube-prometheus-stack
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: RELEASE-NAME-poundcake
        documentIndex: 0
      - equal:
          path: spec.template.spec.serviceAccountName
          value: RELEASE-NAME-poundcake
        documentIndex: 2
      - equal:
          path: spec.template.spec.serviceAccountName
          value: RELEASE-NAME-poundcake
        documentIndex: 5
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: POUNDCAKE_PROMETHEUS_URL
            value: "http://prometheus.example:9090"
        documentIndex: 0
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: POUNDCAKE_PROMETHEUS_CRD_NAMESPACE
            value: "monitoring"
        documentIndex: 0
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: POUNDCAKE_PROMETHEUS_USE_CRDS
            value: "true"
        documentIndex: 0

  - it: defaults Prometheus CRD namespace to the release namespace when unset
    set:
      serviceAccount.create: true
      serviceAccount.name: ""
      prometheus.useCrds: true
      prometheus.crdNamespace: ""
    release:
      namespace: poundcake
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: POUNDCAKE_PROMETHEUS_CRD_NAMESPACE
            value: "poundcake"
        documentIndex: 0

  - it: defaults the Prometheus API URL to the monitoring namespace service
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: POUNDCAKE_PROMETHEUS_URL
            value: "http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090"
        documentIndex: 0

  - it: wires git repo sync env and mounts credentials when configured
    set:
      git.enabled: true
      git.repoUrl: https://github.com/example/config.git
      git.branch: config-main
      git.rulesPath: prometheus/rules
      git.workflowsPath: poundcake/workflows
      git.actionsPath: poundcake/actions
      git.filePerAlert: true
      git.filePattern: "{alert_name}.yaml"
      git.userName: Repo Bot
      git.userEmail: repo-bot@example.com
      git.provider: github
      git.existingSecret: poundcake-git
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: POUNDCAKE_GIT_ENABLED
            value: "true"
        documentIndex: 0
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: POUNDCAKE_GIT_REPO_URL
            value: "https://github.com/example/config.git"
        documentIndex: 0
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: POUNDCAKE_GIT_WORKFLOWS_PATH
            value: "poundcake/workflows"
        documentIndex: 0
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: POUNDCAKE_GIT_ACTIONS_PATH
            value: "poundcake/actions"
        documentIndex: 0
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: POUNDCAKE_GIT_TOKEN
            valueFrom:
              secretKeyRef:
                name: poundcake-git
                key: git-token
                optional: true
        documentIndex: 0
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: poundcake-git
            mountPath: /run/secrets/poundcake-git
            readOnly: true
        documentIndex: 0
      - contains:
          path: spec.template.spec.volumes
          content:
            name: poundcake-git
            secret:
              secretName: poundcake-git
              optional: true
        documentIndex: 0

  - it: wires bootstrap remote sync env for periodic dishwasher from helm values
    set:
      bootstrap.ingredientsDir: /custom/bootstrap/ingredients
      bootstrap.recipesDir: /custom/bootstrap/recipes
      bootstrap.remoteSyncEnabled: true
      bootstrap.rulesRepoUrl: https://github.com/example/monitoring-rules.git
      bootstrap.rulesBranch: release-1
      bootstrap.rulesPath: alerts/team-a
      git.enabled: true
      git.repoUrl: https://github.com/example/config.git
      git.branch: main
      git.provider: github
      git.existingSecret: poundcake-git
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: POUNDCAKE_BOOTSTRAP_INGREDIENTS_DIR
            value: "/custom/bootstrap/ingredients"
        documentIndex: 0
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: POUNDCAKE_BOOTSTRAP_RECIPES_DIR
            value: "/custom/bootstrap/recipes"
        documentIndex: 0
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: POUNDCAKE_BOOTSTRAP_REMOTE_SYNC_ENABLED
            value: "true"
        documentIndex: 0
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: POUNDCAKE_BOOTSTRAP_RULES_REPO_URL
            value: "https://github.com/example/monitoring-rules.git"
        documentIndex: 0
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: POUNDCAKE_BOOTSTRAP_RULES_BRANCH
            value: "release-1"
        documentIndex: 0
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: POUNDCAKE_BOOTSTRAP_RULES_PATH
            value: "alerts/team-a"
        documentIndex: 0
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: POUNDCAKE_BOOTSTRAP_INGREDIENTS_DIR
            value: "/custom/bootstrap/ingredients"
        documentIndex: 5
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: POUNDCAKE_BOOTSTRAP_RECIPES_DIR
            value: "/custom/bootstrap/recipes"
        documentIndex: 5
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: POUNDCAKE_BOOTSTRAP_REMOTE_SYNC_ENABLED
            value: "true"
        documentIndex: 5
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: POUNDCAKE_BOOTSTRAP_RULES_REPO_URL
            value: "https://github.com/example/monitoring-rules.git"
        documentIndex: 5
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: POUNDCAKE_BOOTSTRAP_RULES_BRANCH
            value: "release-1"
        documentIndex: 5
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: POUNDCAKE_BOOTSTRAP_RULES_PATH
            value: "alerts/team-a"
        documentIndex: 5
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: POUNDCAKE_GIT_TOKEN
            valueFrom:
              secretKeyRef:
                name: poundcake-git
                key: git-token
                optional: true
        documentIndex: 5
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: POUNDCAKE_GIT_SSH_KEY_PATH
            value: "/run/secrets/poundcake-git/git-ssh-key"
        documentIndex: 5
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: poundcake-git
            mountPath: /run/secrets/poundcake-git
            readOnly: true
        documentIndex: 5
      - contains:
          path: spec.template.spec.volumes
          content:
            name: poundcake-git
            secret:
              secretName: poundcake-git
              optional: true
        documentIndex: 5

  - it: defaults PoundCake workload image tag to chart appVersion when unset
    set:
      poundcakeImage.tag: ""
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[0].image
          pattern: '^ghcr\.io/rackerlabs/poundcake:[0-9]+\.[0-9]+\.[0-9]+$'
        documentIndex: 0
      - matchRegex:
          path: spec.template.spec.containers[0].image
          pattern: '^ghcr\.io/rackerlabs/poundcake:[0-9]+\.[0-9]+\.[0-9]+$'
        documentIndex: 1
      - matchRegex:
          path: spec.template.spec.containers[0].image
          pattern: '^ghcr\.io/rackerlabs/poundcake:[0-9]+\.[0-9]+\.[0-9]+$'
        documentIndex: 3
      - matchRegex:
          path: spec.template.spec.containers[0].image
          pattern: '^ghcr\.io/rackerlabs/poundcake:[0-9]+\.[0-9]+\.[0-9]+$'
        documentIndex: 4
      - matchRegex:
          path: spec.template.spec.containers[0].image
          pattern: '^ghcr\.io/rackerlabs/poundcake:[0-9]+\.[0-9]+\.[0-9]+$'
        documentIndex: 5

  - it: defaults UI workload image tag to chart appVersion when unset
    set:
      uiImage.tag: ""
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[0].image
          pattern: '^ghcr\.io/rackerlabs/poundcake-ui:[0-9]+\.[0-9]+\.[0-9]+$'
        documentIndex: 2

  - it: reports API version from the deployed PoundCake image tag
    set:
      poundcakeImage.tag: "2.0.999"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: POUNDCAKE_APP_VERSION
            value: "2.0.999"
        documentIndex: 0

  - it: supports immutable digest image references for PoundCake workloads
    set:
      poundcakeImage.repository: ghcr.io/example/poundcake
      poundcakeImage.tag: ""
      poundcakeImage.digest: sha256:aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: ghcr.io/example/poundcake@sha256:aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
        documentIndex: 0

  - it: defaults UI container and probe ports to 8080
    asserts:
      - equal:
          path: spec.template.spec.containers[0].ports[0].containerPort
          value: 8080
        documentIndex: 2
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.port
          value: 8080
        documentIndex: 2
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.port
          value: 8080
        documentIndex: 2

  - it: mounts writable nginx runtime paths on UI by default
    asserts:
      - equal:
          path: spec.template.spec.containers[0].volumeMounts[0].name
          value: ui-nginx-confd
        documentIndex: 2
      - equal:
          path: spec.template.spec.containers[0].volumeMounts[0].mountPath
          value: /etc/nginx/conf.d
        documentIndex: 2
      - equal:
          path: spec.template.spec.containers[0].volumeMounts[1].name
          value: ui-nginx-cache
        documentIndex: 2
      - equal:
          path: spec.template.spec.containers[0].volumeMounts[1].mountPath
          value: /var/cache/nginx
        documentIndex: 2
      - equal:
          path: spec.template.spec.containers[0].volumeMounts[2].name
          value: ui-nginx-run
        documentIndex: 2
      - equal:
          path: spec.template.spec.containers[0].volumeMounts[2].mountPath
          value: /var/run
        documentIndex: 2
      - equal:
          path: spec.template.spec.volumes[1].name
          value: ui-nginx-confd
        documentIndex: 2
      - equal:
          path: spec.template.spec.volumes[2].name
          value: ui-nginx-cache
        documentIndex: 2
      - equal:
          path: spec.template.spec.volumes[3].name
          value: ui-nginx-run
        documentIndex: 2
      - isNotNull:
          path: spec.template.spec.volumes[1].emptyDir
        documentIndex: 2
      - isNotNull:
          path: spec.template.spec.volumes[2].emptyDir
        documentIndex: 2
      - isNotNull:
          path: spec.template.spec.volumes[3].emptyDir
        documentIndex: 2

  - it: allows disabling writable nginx runtime path mounts for UI
    set:
      uiImage.runtimeWritablePaths.enabled: false
    asserts:
      - isNull:
          path: spec.template.spec.containers[0].volumeMounts
        documentIndex: 2
      - isNull:
          path: spec.template.spec.volumes[1]
        documentIndex: 2

  - it: applies pod, app, and utility security contexts with writable defaults
    asserts:
      - equal:
          path: spec.template.spec.securityContext.runAsNonRoot
          value: true
        documentIndex: 0
      - equal:
          path: spec.template.spec.initContainers[0].securityContext.readOnlyRootFilesystem
          value: false
        documentIndex: 0
      - equal:
          path: spec.template.spec.containers[0].securityContext.readOnlyRootFilesystem
          value: false
        documentIndex: 0
      - equal:
          path: spec.template.spec.containers[0].securityContext.readOnlyRootFilesystem
          value: false
        documentIndex: 5

  - it: gates UI startup on API reachability and bootstrap marker
    asserts:
      - equal:
          path: spec.template.spec.initContainers[0].name
          value: wait-stage10
        documentIndex: 2
      - matchRegex:
          path: spec.template.spec.initContainers[0].command[2]
          pattern: "gate_wait_for_tcp \\\"poundcake-api\\\" \\\"8000\\\""
        documentIndex: 2
      - matchRegex:
          path: spec.template.spec.initContainers[0].command[2]
          pattern: "gate_wait_for_http_status \\\"http://poundcake-api:8000/api/v1/ready\\\""
        documentIndex: 2
      - matchRegex:
          path: spec.template.spec.initContainers[0].command[2]
          pattern: "GATE_LOG_ENABLED=\\\"true\\\""
        documentIndex: 2

  - it: uses services.api.port for PoundCake service URLs
    set:
      services.api.port: 9000
    asserts:
      - equal:
          path: spec.template.spec.containers[0].env[0].value
          value: http://poundcake-api:9000
        documentIndex: 2
      - matchRegex:
          path: spec.template.spec.initContainers[0].command[2]
          pattern: "gate_wait_for_tcp \\\"poundcake-api\\\" \\\"9000\\\""
        documentIndex: 2
      - matchRegex:
          path: spec.template.spec.initContainers[0].command[2]
          pattern: "gate_wait_for_http_status \\\"http://poundcake-api:9000/api/v1/ready\\\""
        documentIndex: 2

  - it: supports gate logging overrides on poundcake init gates
    set:
      startupHooks.gateLogging.enabled: false
      startupHooks.gateLogging.intervalSeconds: 7
      startupHooks.gateLogging.prefix: "[pc-gate]"
    asserts:
      - matchRegex:
          path: spec.template.spec.initContainers[0].command[2]
          pattern: "GATE_LOG_ENABLED=\\\"false\\\""
        documentIndex: 0
      - matchRegex:
          path: spec.template.spec.initContainers[0].command[2]
          pattern: "GATE_LOG_INTERVAL=\\\"7\\\""
        documentIndex: 0
      - matchRegex:
          path: spec.template.spec.initContainers[0].command[2]
          pattern: "GATE_LOG_PREFIX=\\\"\\[pc-gate\\]\\\""
        documentIndex: 0

  - it: supports hardened overrides for app and utility container profiles
    set:
      poundcakeImage.securityContext.readOnlyRootFilesystem: true
      utilitySecurityContext.readOnlyRootFilesystem: true
    asserts:
      - equal:
          path: spec.template.spec.containers[0].securityContext.readOnlyRootFilesystem
          value: true
        documentIndex: 1
      - equal:
          path: spec.template.spec.initContainers[0].securityContext.readOnlyRootFilesystem
          value: true
        documentIndex: 1

  - it: does not render image pull secrets by default
    asserts:
      - isNull:
          path: spec.template.spec.imagePullSecrets
        documentIndex: 0
      - isNull:
          path: spec.template.spec.imagePullSecrets
        documentIndex: 2
      - isNull:
          path: spec.template.spec.imagePullSecrets
        documentIndex: 4
      - isNull:
          path: spec.template.spec.imagePullSecrets
        documentIndex: 5

  - it: renders poundcakeImage pull secrets on PoundCake workloads
    set:
      poundcakeImage.pullSecrets[0]: registry-creds
    asserts:
      - equal:
          path: spec.template.spec.imagePullSecrets[0].name
          value: registry-creds
        documentIndex: 0
      - equal:
          path: spec.template.spec.imagePullSecrets[0].name
          value: registry-creds
        documentIndex: 2
      - equal:
          path: spec.template.spec.imagePullSecrets[0].name
          value: registry-creds
        documentIndex: 4
      - equal:
          path: spec.template.spec.imagePullSecrets[0].name
          value: registry-creds
        documentIndex: 5

  - it: mounts alembic config files into poundcake-api without shadowing image migrations
    asserts:
      - equal:
          path: spec.template.spec.containers[0].volumeMounts[2].name
          value: poundcake-alembic
        documentIndex: 0
      - equal:
          path: spec.template.spec.containers[0].volumeMounts[2].mountPath

suite: poundcake-workloads
templates:
  - templates/poundcake-workloads.yaml
tests:
  - it: renders all poundcake workloads
    asserts:
      - hasDocuments:
          count: 6
      - equal:
          path: metadata.name
          value: poundcake-api
        documentIndex: 0
      - equal:
          path: metadata.name
          value: poundcake-dishwasher
        documentIndex: 5
      - equal:
          path: metadata.name
          value: poundcake-ui
        documentIndex: 2

  - it: applies log-streaming labels to poundcake pod templates
    asserts:
      - equal:
          path: spec.template.metadata.labels["poundcake.io/log-group"]
          value: poundcake
        documentIndex: 0
      - equal:
          path: spec.template.metadata.labels["poundcake.io/log-subgroup"]
          value: app
        documentIndex: 0
      - equal:
          path: spec.template.metadata.labels["poundcake.io/log-role"]
          value: api
        documentIndex: 0
      - equal:
          path: spec.template.metadata.labels["poundcake.io/log-role"]
          value: worker
        documentIndex: 4

  - it: applies image and interval values to key containers
    set:
      poundcakeImage.repository: custom/poundcake
      poundcakeImage.tag: "2.0.0"
      poundcakeImage.pullPolicy: Always
      uiImage.repository: custom/poundcake-ui
      uiImage.tag: "2.0.0"
      uiImage.pullPolicy: Always
      uiImage.containerPort: 18080
      intervals.prepInterval: "42"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: custom/poundcake:2.0.0
        documentIndex: 0
      - equal:
          path: spec.template.spec.containers[0].imagePullPolicy
          value: Always
        documentIndex: 0
      - isNotNull:
          path: spec.template.spec.containers[0].readinessProbe
        documentIndex: 0
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.path
          value: /api/v1/health
        documentIndex: 0
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.timeoutSeconds
          value: 2
        documentIndex: 0
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.failureThreshold
          value: 6
        documentIndex: 0
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.path
          value: /api/v1/health
        documentIndex: 0
      - equal:
          path: spec.template.spec.containers[0].env[7].value
          value: "42"
        documentIndex: 4
      - equal:
          path: spec.template.spec.containers[0].imagePullPolicy
          value: Always
        documentIndex: 4
      - equal:
          path: spec.template.spec.containers[0].image
          value: custom/poundcake-ui:2.0.0
        documentIndex: 2
      - equal:
          path: spec.template.spec.containers[0].imagePullPolicy
          value: Always
        documentIndex: 2
      - equal:
          path: spec.template.spec.containers[0].ports[0].containerPort
          value: 18080
        documentIndex: 2
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.port
          value: 18080
        documentIndex: 2
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.port
          value: 18080
        documentIndex: 2

  - it: applies configured poundcake API readiness initial delay
    set:
      poundcakeApi.readiness.initialDelaySeconds: 9
    asserts:
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.initialDelaySeconds
          value: 9
        documentIndex: 0

  - it: binds workloads to the poundcake service account and wires Prometheus CRD env
    set:
      serviceAccount.create: true
      serviceAccount.name: ""
      prometheus.url: http://prometheus.example:9090
      prometheus.verifySsl: false
      prometheus.useCrds: true
      prometheus.crdNamespace: prometheus
      prometheus.crdLabels:
        release: kube-prometheus-stack
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: RELEASE-NAME-poundcake
        documentIndex: 0
      - equal:
          path: spec.template.spec.serviceAccountName
          value: RELEASE-NAME-poundcake
        documentIndex: 2
      - equal:
          path: spec.template.spec.serviceAccountName
          value: RELEASE-NAME-poundcake
        documentIndex: 5
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: POUNDCAKE_PROMETHEUS_URL
            value: "http://prometheus.example:9090"
        documentIndex: 0
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: POUNDCAKE_PROMETHEUS_CRD_NAMESPACE
            value: "prometheus"
        documentIndex: 0
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: POUNDCAKE_PROMETHEUS_USE_CRDS
            value: "true"
        documentIndex: 0

  - it: defaults PoundCake workload image tag to chart appVersion when unset
    set:
      poundcakeImage.tag: ""
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: ghcr.io/rackerlabs/poundcake:2.0.135
        documentIndex: 0
      - equal:
          path: spec.template.spec.containers[0].image
          value: ghcr.io/rackerlabs/poundcake:2.0.135
        documentIndex: 1
      - equal:
          path: spec.template.spec.containers[0].image
          value: ghcr.io/rackerlabs/poundcake:2.0.135
        documentIndex: 3
      - equal:
          path: spec.template.spec.containers[0].image
          value: ghcr.io/rackerlabs/poundcake:2.0.135
        documentIndex: 4
      - equal:
          path: spec.template.spec.containers[0].image
          value: ghcr.io/rackerlabs/poundcake:2.0.135
        documentIndex: 5

  - it: reports API version from the deployed PoundCake image tag
    set:
      poundcakeImage.tag: "2.0.999"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: POUNDCAKE_APP_VERSION
            value: "2.0.999"
        documentIndex: 0

  - it: supports immutable digest image references for PoundCake workloads
    set:
      poundcakeImage.repository: ghcr.io/example/poundcake
      poundcakeImage.tag: ""
      poundcakeImage.digest: sha256:aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: ghcr.io/example/poundcake@sha256:aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
        documentIndex: 0

  - it: defaults UI container and probe ports to 8080
    asserts:
      - equal:
          path: spec.template.spec.containers[0].ports[0].containerPort
          value: 8080
        documentIndex: 2
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.port
          value: 8080
        documentIndex: 2
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.port
          value: 8080
        documentIndex: 2

  - it: mounts writable nginx runtime paths on UI by default
    asserts:
      - equal:
          path: spec.template.spec.containers[0].volumeMounts[0].name
          value: ui-nginx-confd
        documentIndex: 2
      - equal:
          path: spec.template.spec.containers[0].volumeMounts[0].mountPath
          value: /etc/nginx/conf.d
        documentIndex: 2
      - equal:
          path: spec.template.spec.containers[0].volumeMounts[1].name
          value: ui-nginx-cache
        documentIndex: 2
      - equal:
          path: spec.template.spec.containers[0].volumeMounts[1].mountPath
          value: /var/cache/nginx
        documentIndex: 2
      - equal:
          path: spec.template.spec.containers[0].volumeMounts[2].name
          value: ui-nginx-run
        documentIndex: 2
      - equal:
          path: spec.template.spec.containers[0].volumeMounts[2].mountPath
          value: /var/run
        documentIndex: 2
      - equal:
          path: spec.template.spec.volumes[1].name
          value: ui-nginx-confd
        documentIndex: 2
      - equal:
          path: spec.template.spec.volumes[2].name
          value: ui-nginx-cache
        documentIndex: 2
      - equal:
          path: spec.template.spec.volumes[3].name
          value: ui-nginx-run
        documentIndex: 2
      - isNotNull:
          path: spec.template.spec.volumes[1].emptyDir
        documentIndex: 2
      - isNotNull:
          path: spec.template.spec.volumes[2].emptyDir
        documentIndex: 2
      - isNotNull:
          path: spec.template.spec.volumes[3].emptyDir
        documentIndex: 2

  - it: allows disabling writable nginx runtime path mounts for UI
    set:
      uiImage.runtimeWritablePaths.enabled: false
    asserts:
      - isNull:
          path: spec.template.spec.containers[0].volumeMounts
        documentIndex: 2
      - isNull:
          path: spec.template.spec.volumes[1]
        documentIndex: 2

  - it: applies pod, app, and utility security contexts with writable defaults
    asserts:
      - equal:
          path: spec.template.spec.securityContext.runAsNonRoot
          value: true
        documentIndex: 0
      - equal:
          path: spec.template.spec.initContainers[0].securityContext.readOnlyRootFilesystem
          value: false
        documentIndex: 0
      - equal:
          path: spec.template.spec.containers[0].securityContext.readOnlyRootFilesystem
          value: false
        documentIndex: 0
      - equal:
          path: spec.template.spec.containers[0].securityContext.readOnlyRootFilesystem
          value: false
        documentIndex: 5

  - it: gates UI startup on API reachability and bootstrap marker
    asserts:
      - equal:
          path: spec.template.spec.initContainers[0].name
          value: wait-stage10
        documentIndex: 2
      - matchRegex:
          path: spec.template.spec.initContainers[0].command[2]
          pattern: "gate_wait_for_tcp \\\"poundcake-api\\\" \\\"8000\\\""
        documentIndex: 2
      - matchRegex:
          path: spec.template.spec.initContainers[0].command[2]
          pattern: "gate_wait_for_http_status \\\"http://poundcake-api:8000/api/v1/health\\\""
        documentIndex: 2
      - matchRegex:
          path: spec.template.spec.initContainers[0].command[2]
          pattern: "GATE_LOG_ENABLED=\\\"true\\\""
        documentIndex: 2

  - it: uses services.api.port for PoundCake service URLs
    set:
      services.api.port: 9000
    asserts:
      - equal:
          path: spec.template.spec.containers[0].env[0].value
          value: http://poundcake-api:9000
        documentIndex: 2
      - matchRegex:
          path: spec.template.spec.initContainers[0].command[2]
          pattern: "gate_wait_for_tcp \\\"poundcake-api\\\" \\\"9000\\\""
        documentIndex: 2
      - matchRegex:
          path: spec.template.spec.initContainers[0].command[2]
          pattern: "gate_wait_for_http_status \\\"http://poundcake-api:9000/api/v1/health\\\""
        documentIndex: 2

  - it: supports gate logging overrides on poundcake init gates
    set:
      startupHooks.gateLogging.enabled: false
      startupHooks.gateLogging.intervalSeconds: 7
      startupHooks.gateLogging.prefix: "[pc-gate]"
    asserts:
      - matchRegex:
          path: spec.template.spec.initContainers[0].command[2]
          pattern: "GATE_LOG_ENABLED=\\\"false\\\""
        documentIndex: 0
      - matchRegex:
          path: spec.template.spec.initContainers[0].command[2]
          pattern: "GATE_LOG_INTERVAL=\\\"7\\\""
        documentIndex: 0
      - matchRegex:
          path: spec.template.spec.initContainers[0].command[2]
          pattern: "GATE_LOG_PREFIX=\\\"\\[pc-gate\\]\\\""
        documentIndex: 0

  - it: supports hardened overrides for app and utility container profiles
    set:
      poundcakeImage.securityContext.readOnlyRootFilesystem: true
      utilitySecurityContext.readOnlyRootFilesystem: true
    asserts:
      - equal:
          path: spec.template.spec.containers[0].securityContext.readOnlyRootFilesystem
          value: true
        documentIndex: 1
      - equal:
          path: spec.template.spec.initContainers[0].securityContext.readOnlyRootFilesystem
          value: true
        documentIndex: 1

  - it: does not render image pull secrets by default
    asserts:
      - isNull:
          path: spec.template.spec.imagePullSecrets
        documentIndex: 0
      - isNull:
          path: spec.template.spec.imagePullSecrets
        documentIndex: 2
      - isNull:
          path: spec.template.spec.imagePullSecrets
        documentIndex: 4
      - isNull:
          path: spec.template.spec.imagePullSecrets
        documentIndex: 5

  - it: renders poundcakeImage pull secrets on PoundCake workloads
    set:
      poundcakeImage.pullSecrets[0]: ghcr-pull
    asserts:
      - equal:
          path: spec.template.spec.imagePullSecrets[0].name
          value: ghcr-pull
        documentIndex: 0
      - equal:
          path: spec.template.spec.imagePullSecrets[0].name
          value: ghcr-pull
        documentIndex: 2
      - equal:
          path: spec.template.spec.imagePullSecrets[0].name
          value: ghcr-pull
        documentIndex: 4
      - equal:
          path: spec.template.spec.imagePullSecrets[0].name
          value: ghcr-pull
        documentIndex: 5

  - it: falls back to legacy imagePullSecrets when poundcakeImage.pullSecrets is unset
    set:
      imagePullSecrets[0]: ghcr-pull
    asserts:
      - equal:
          path: spec.template.spec.imagePullSecrets[0].name
          value: ghcr-pull
        documentIndex: 0

  - it: mounts alembic config and migration files into poundcake-api
    asserts:
      - equal:
          path: spec.template.spec.containers[0].volumeMounts[2].name
          value: poundcake-alembic
        documentIndex: 0
      - equal:
          path: spec.template.spec.containers[0].volumeMounts[2].mountPath
          value: /app/alembic.ini
        documentIndex: 0
      - equal:
          path: spec.template.spec.containers[0].volumeMounts[2].subPath
          value: alembic.ini
        documentIndex: 0
      - equal:
          path: spec.template.spec.volumes[2].name
          value: poundcake-alembic
        documentIndex: 0
      - equal:
          path: spec.template.spec.volumes[2].configMap.name
          value: poundcake-alembic
        documentIndex: 0

  - it: exposes pack sync token to poundcake-api
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: POUNDCAKE_PACK_SYNC_TOKEN
            valueFrom:
              secretKeyRef:
                name: poundcake-secrets
                key: PACK_SYNC_TOKEN
        documentIndex: 0

  - it: mounts stackstorm API key secret into poundcake-api and exposes env var/file path
    asserts:
      - equal:
          path: spec.template.spec.initContainers[0].volumeMounts[1].name
          value: st2-apikey
        documentIndex: 0
      - equal:
          path: spec.template.spec.initContainers[0].volumeMounts[1].mountPath
          value: /run/secrets/st2
        documentIndex: 0
      - equal:
          path: spec.template.spec.containers[0].volumeMounts[1].name
          value: st2-apikey
        documentIndex: 0
      - equal:
          path: spec.template.spec.containers[0].volumeMounts[1].mountPath
          value: /run/secrets/st2
        documentIndex: 0
      - equal:
          path: spec.template.spec.volumes[1].name
          value: st2-apikey
        documentIndex: 0
      - equal:
          path: spec.template.spec.volumes[1].secret.secretName
          value: stackstorm-apikeys
        documentIndex: 0
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: POUNDCAKE_STACKSTORM_API_KEY
            valueFrom:
              secretKeyRef:
                name: stackstorm-apikeys
                key: st2_api_key
        documentIndex: 0
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: ST2_API_KEY_FILE
            value: /run/secrets/st2/st2_api_key
        documentIndex: 0
      - equal:
          path: spec.template.spec.containers[0].env[7].name
          value: MONGODB_HOST
        documentIndex: 0
      - equal:
          path: spec.template.spec.containers[0].env[7].value
          value: stackstorm-mongodb
        documentIndex: 0
      - equal:
          path: spec.template.spec.containers[0].env[13].name
          value: REDIS_PORT
        documentIndex: 0
      - equal:
          path: spec.template.spec.containers[0].env[13].value
          value: "6379"
        documentIndex: 0
      - equal:
          path: spec.template.spec.containers[0].env[14].valueFrom.secretKeyRef.name
          value: stackstorm-secrets
        documentIndex: 0
      - equal:
          path: spec.template.spec.containers[0].env[15].valueFrom.secretKeyRef.name
          value: stackstorm-secrets
        documentIndex: 0

  - it: injects internal API keys into api and worker workloads when auth is enabled
    set:
      auth.enabled: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: POUNDCAKE_AUTH_ENABLED
            value: "true"
        documentIndex: 0
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: POUNDCAKE_AUTH_SECRET_NAME
            value: RELEASE-NAME-poundcake-admin
        documentIndex: 0
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: POUNDCAKE_AUTH_SECRET_NAMESPACE
            valueFrom:
              fieldRef:
                apiVersion: v1
                fieldPath: metadata.namespace
        documentIndex: 0
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: POUNDCAKE_AUTH_USERNAME
            valueFrom:
              secretKeyRef:
                name: RELEASE-NAME-poundcake-admin
                key: username
        documentIndex: 0
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: POUNDCAKE_AUTH_PASSWORD
            valueFrom:
              secretKeyRef:
                name: RELEASE-NAME-poundcake-admin
                key: password
        documentIndex: 0
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: POUNDCAKE_AUTH_SERVICE_TOKEN
            valueFrom:
              secretKeyRef:
                name: RELEASE-NAME-poundcake-admin
                key: internal-api-key
        documentIndex: 0
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: POUNDCAKE_AUTH_SERVICE_TOKEN
            valueFrom:
              secretKeyRef:
                name: RELEASE-NAME-poundcake-admin
                key: internal-api-key
        documentIndex: 1
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: POUNDCAKE_AUTH_SERVICE_TOKEN
            valueFrom:
              secretKeyRef:
                name: RELEASE-NAME-poundcake-admin
                key: internal-api-key
        documentIndex: 3
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: POUNDCAKE_AUTH_SERVICE_TOKEN
            valueFrom:
              secretKeyRef:
                name: RELEASE-NAME-poundcake-admin
                key: internal-api-key
        documentIndex: 4
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: POUNDCAKE_AUTH_SERVICE_TOKEN
            valueFrom:
              secretKeyRef:
                name: RELEASE-NAME-poundcake-admin
                key: internal-api-key
        documentIndex: 5

  - it: omits internal API key env vars when auth is disabled
    set:
      auth.enabled: false
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: POUNDCAKE_AUTH_ENABLED
            value: "false"
        documentIndex: 0
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: POUNDCAKE_AUTH_SERVICE_TOKEN
        documentIndex: 0
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: POUNDCAKE_AUTH_SECRET_NAME
        documentIndex: 0
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: POUNDCAKE_AUTH_SECRET_NAMESPACE
        documentIndex: 0
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: POUNDCAKE_AUTH_USERNAME
        documentIndex: 0
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: POUNDCAKE_AUTH_PASSWORD
        documentIndex: 0
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: POUNDCAKE_AUTH_SERVICE_TOKEN
        documentIndex: 1
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: POUNDCAKE_AUTH_SERVICE_TOKEN
        documentIndex: 3
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: POUNDCAKE_AUTH_SERVICE_TOKEN
        documentIndex: 4
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: POUNDCAKE_AUTH_SERVICE_TOKEN
        documentIndex: 5

  - it: injects bakery client env vars into poundcake-api with integrated defaults
    set:
      bakery.enabled: true
      bakery.client.enabled: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: POUNDCAKE_BAKERY_ENABLED
            value: "true"
        documentIndex: 0
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: POUNDCAKE_BAKERY_BASE_URL
            value: http://RELEASE-NAME-poundcake-bakery:8000
        documentIndex: 0
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: POUNDCAKE_BAKERY_AUTH_MODE
            value: hmac
        documentIndex: 0
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: POUNDCAKE_BAKERY_REQUEST_TIMEOUT_SECONDS
            value: "15"
        documentIndex: 0
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: POUNDCAKE_BAKERY_MAX_RETRIES
            value: "2"
        documentIndex: 0
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: POUNDCAKE_BAKERY_POLL_INTERVAL_SECONDS
            value: "2"
        documentIndex: 0
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: POUNDCAKE_BAKERY_POLL_TIMEOUT_SECONDS
            value: "60"
        documentIndex: 0
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: POUNDCAKE_BAKERY_HMAC_KEY_ID
            valueFrom:
              secretKeyRef:
                name: RELEASE-NAME-poundcake-bakery-secret
                key: active-key-id
                optional: true
        documentIndex: 0
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: POUNDCAKE_BAKERY_HMAC_KEY
            valueFrom:
              secretKeyRef:
                name: RELEASE-NAME-poundcake-bakery-secret
                key: active-key
                optional: true
        documentIndex: 0

  - it: supports bakery baseUrl and auth secret overrides for poundcake-api
    set:
      bakery.enabled: false
      bakery.client.enabled: true
      bakery.client.enforceRemoteBaseUrl: true
      bakery.client.baseUrl: https://bakery.example.com
      bakery.client.auth.existingSecret: external-bakery-hmac
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: POUNDCAKE_BAKERY_BASE_URL
            value: https://bakery.example.com
        documentIndex: 0
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: POUNDCAKE_BAKERY_HMAC_KEY_ID
            valueFrom:
              secretKeyRef:
                name: external-bakery-hmac
                key: active-key-id
                optional: true
        documentIndex: 0
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: POUNDCAKE_BAKERY_HMAC_KEY
            valueFrom:
              secretKeyRef:
                name: external-bakery-hmac
                key: active-key
                optional: true
        documentIndex: 0

  - it: fails fast when remote bakery client is enabled without baseUrl and local bakery is disabled
    set:
      bakery.enabled: false
      bakery.client.enabled: true
      bakery.client.enforceRemoteBaseUrl: true
      bakery.client.baseUrl: ""
    asserts:
      - failedTemplate:
          errorMessage: "bakery.client.baseUrl must be set when bakery.client.enforceRemoteBaseUrl=true (remote Bakery mode)"

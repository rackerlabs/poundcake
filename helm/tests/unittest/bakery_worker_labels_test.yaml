suite: bakery-worker-labels
templates:
  - templates/bakery-secret.yaml
  - templates/bakery-worker-deployment.yaml
tests:
  - it: applies poundcake log labels to bakery worker pod template
    set:
      poundcake.enabled: true
      bakery.enabled: true
      bakery.worker.enabled: true
    asserts:
      - equal:
          path: spec.template.metadata.labels["poundcake.io/log-group"]
          value: bakery
        template: templates/bakery-worker-deployment.yaml
      - equal:
          path: spec.template.metadata.labels["poundcake.io/log-subgroup"]
          value: app
        template: templates/bakery-worker-deployment.yaml
      - equal:
          path: spec.template.metadata.labels["poundcake.io/log-role"]
          value: worker
        template: templates/bakery-worker-deployment.yaml
      - matchRegex:
          path: spec.template.spec.initContainers[1].command[2]
          pattern: "bakery_db_init_ready"
        template: templates/bakery-worker-deployment.yaml
      - matchRegex:
          path: spec.template.spec.initContainers[2].command[2]
          pattern: "bakery-worker-api-ready"
        template: templates/bakery-worker-deployment.yaml
      - matchRegex:
          path: spec.template.spec.initContainers[2].command[2]
          pattern: "http://RELEASE-NAME-poundcake-bakery:8000/api/v1/health"
        template: templates/bakery-worker-deployment.yaml
      - equal:
          path: spec.template.spec.volumes[0].name
          value: app-config
        template: templates/bakery-worker-deployment.yaml

  - it: skips startup marker wait in bakery-only mode
    set:
      poundcake.enabled: false
      bakery.enabled: true
      bakery.worker.enabled: true
    asserts:
      - matchRegex:
          path: spec.template.spec.initContainers[1].command[2]
          pattern: "bakery-worker-api-ready"
        template: templates/bakery-worker-deployment.yaml
      - isNull:
          path: spec.template.spec.volumes
        template: templates/bakery-worker-deployment.yaml

  - it: defaults bakery worker pods to worker nodes
    set:
      poundcake.enabled: false
      bakery.enabled: true
      bakery.worker.enabled: true
    asserts:
      - equal:
          path: spec.template.spec.nodeSelector["node-role.kubernetes.io/worker"]
          value: ""
        template: templates/bakery-worker-deployment.yaml

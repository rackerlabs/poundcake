suite: stackstorm-third-party-workloads
templates:
  - templates/stackstorm-workloads.yaml
tests:
  - it: keeps pack installer disabled by default
    documentSelector:
      path: metadata.name
      value: stackstorm-api
    asserts:
      - equal:
          path: spec.template.spec.initContainers[0].name
          value: wait-stage2
      - notContains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: stackstorm-pack-configs

  - it: adds pack config mounts to stackstorm api without installer init container
    set:
      stackstorm.bootstrap.packs.kubernetes.enabled: true
      stackstorm.bootstrap.packs.kubernetes.version: "1.2.3"
      stackstorm.bootstrap.packs.openstack.enabled: true
      stackstorm.bootstrap.packs.openstack.version: "2.3.4"
    documentSelector:
      path: metadata.name
      value: stackstorm-api
    asserts:
      - equal:
          path: spec.template.spec.initContainers[0].name
          value: wait-stage2
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: stackstorm-pack-configs
            mountPath: /opt/stackstorm/configs
            readOnly: true
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: stackstorm-packs
            mountPath: /opt/stackstorm/shared-content/packs
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: stackstorm-virtualenvs
            mountPath: /opt/stackstorm/shared-content/virtualenvs
      - contains:
          path: spec.template.spec.volumes
          content:
            name: stackstorm-virtualenvs
            emptyDir: {}

  - it: keeps optional stackstorm workloads free of pack installer init container while mounting pack volumes
    set:
      stackstorm.bootstrap.packs.kubernetes.enabled: true
      stackstormServices.register.enabled: true
      stackstormServices.sensorcontainer.enabled: true
    asserts:
      - equal:
          path: spec.template.spec.initContainers[0].name
          value: wait-stage2
        documentSelector:
          path: metadata.name
          value: stackstorm-register
      - equal:
          path: spec.template.spec.initContainers[0].name
          value: wait-stage5
        documentSelector:
          path: metadata.name
          value: stackstorm-sensorcontainer
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: stackstorm-packs
            mountPath: /opt/stackstorm/shared-content/packs
        documentSelector:
          path: metadata.name
          value: stackstorm-register
      - contains:
          path: spec.template.spec.volumes
          content:
            name: stackstorm-pack-configs
            secret:
              secretName: stackstorm-pack-configs
              optional: true
        documentSelector:
          path: metadata.name
          value: stackstorm-sensorcontainer

  - it: applies stackstorm-specific pod security context overrides to stackstorm workloads
    set:
      stackstormPodSecurityContext.fsGroup: 1001
      stackstormPodSecurityContext.fsGroupChangePolicy: OnRootMismatch
      stackstormPodSecurityContext.supplementalGroups[0]: 1001
    documentSelector:
      path: metadata.name
      value: stackstorm-api
    asserts:
      - equal:
          path: spec.template.spec.securityContext.fsGroup
          value: 1001
      - equal:
          path: spec.template.spec.securityContext.fsGroupChangePolicy
          value: OnRootMismatch
      - equal:
          path: spec.template.spec.securityContext.supplementalGroups[0]
          value: 1001

suite: poddisruptionbudgets
templates:
  - templates/poddisruptionbudgets.yaml
tests:
  - it: renders PDBs by default with maxUnavailable policy
    asserts:
      - hasDocuments:
          count: 6
      - equal:
          path: spec.maxUnavailable
          value: 1
        documentIndex: 0
      - equal:
          path: spec.maxUnavailable
          value: 1
        documentIndex: 5

  - it: does not render any PDB when disabled
    set:
      pdb.enabled: false
    asserts:
      - hasDocuments:
          count: 0

suite: bakery-gateway-security
templates:
  - templates/bakery-required.yaml
tests:
  - it: fails fast when bakery gateway listener protocol is HTTP
    set:
      bakery.enabled: true
      bakery.rackspaceCore.existingSecret: bakery-rackspace-core
      bakery.gateway.enabled: true
      bakery.gateway.listener.protocol: HTTP
    asserts:
      - failedTemplate:
          errorMessage: "bakery.gateway.listener.protocol=HTTP is not allowed by default. Use HTTPS for external Bakery traffic, or set bakery.gateway.allowInsecureHttp=true only for isolated non-production environments."
        template: templates/bakery-required.yaml

  - it: allows explicitly insecure bakery gateway listener protocol for isolated environments
    set:
      bakery.enabled: true
      bakery.rackspaceCore.existingSecret: bakery-rackspace-core
      bakery.gateway.enabled: true
      bakery.gateway.listener.protocol: HTTP
      bakery.gateway.allowInsecureHttp: true
    asserts:
      - hasDocuments:
          count: 0
        template: templates/bakery-required.yaml

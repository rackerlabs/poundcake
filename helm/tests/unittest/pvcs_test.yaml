suite: pvcs
templates:
  - templates/pvcs.yaml
tests:
  - it: renders all required PVCs
    asserts:
      - hasDocuments:
          count: 5
      - equal:
          path: metadata.name
          value: poundcake-mariadb
        documentIndex: 0
      - equal:
          path: metadata.name
          value: stackstorm-redis
        documentIndex: 3
      - equal:
          path: metadata.name
          value: stackstorm-packs
        documentIndex: 4

  - it: applies storageClass values from global and per-pvc settings
    set:
      persistence.storageClassName: standard
      persistence.mongo.storageClassName: fast-mongo
    asserts:
      - equal:
          path: spec.storageClassName
          value: standard
        documentIndex: 0
      - equal:
          path: spec.storageClassName
          value: fast-mongo
        documentIndex: 1
      - equal:
          path: spec.storageClassName
          value: standard
        documentIndex: 3
      - equal:
          path: spec.storageClassName
          value: standard
        documentIndex: 4

  - it: omits storageClassName when all storage class values are empty
    set:
      persistence.storageClassName: ""
      persistence.mariadb.storageClassName: ""
      persistence.mongo.storageClassName: ""
      persistence.rabbitmq.storageClassName: ""
      persistence.redis.storageClassName: ""
    asserts:
      - notExists:
          path: spec.storageClassName
        documentIndex: 0
      - notExists:
          path: spec.storageClassName
        documentIndex: 1
      - notExists:
          path: spec.storageClassName
        documentIndex: 2
      - notExists:
          path: spec.storageClassName
        documentIndex: 3
      - notExists:
          path: spec.storageClassName
        documentIndex: 4

suite: bakery-disabled-rendering
templates:
  - templates/bakery-serviceaccount.yaml
  - templates/bakery-deployment.yaml
  - templates/bakery-worker-deployment.yaml
  - templates/bakery-init-job.yaml
  - templates/bakery-service.yaml
  - templates/bakery-mariadb.yaml
  - templates/bakery-startup-markers.yaml
  - templates/bakery-startup-rbac.yaml
tests:
  - it: does not render in-cluster bakery resources in full mode when bakery.enabled=false
    set:
      poundcake.enabled: true
      bakery.enabled: false
    asserts:
      - hasDocuments:
          count: 0

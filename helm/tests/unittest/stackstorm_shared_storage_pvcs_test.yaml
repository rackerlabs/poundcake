suite: stackstorm-shared-storage-pvcs
templates:
  - templates/poundcake-pvcs.yaml
tests:
  - it: renders shared third-party pack pvc objects when enabled
    set:
      persistence.stackstormSharedStorage.enabled: true
      persistence.stackstormSharedStorage.storageClassName: longhorn-rwx
      stackstorm.bootstrap.packs.kubernetes.enabled: true
    asserts:
      - hasDocuments:
          count: 6
      - equal:
          path: metadata.name
          value: stackstorm-packs
        documentSelector:
          path: metadata.name
          value: stackstorm-packs
      - equal:
          path: metadata.name
          value: stackstorm-virtualenvs
        documentSelector:
          path: metadata.name
          value: stackstorm-virtualenvs
      - equal:
          path: spec.storageClassName
          value: longhorn-rwx
        documentSelector:
          path: metadata.name
          value: stackstorm-packs
      - equal:
          path: spec.accessModes[0]
          value: ReadWriteMany
        documentSelector:
          path: metadata.name
          value: stackstorm-packs

suite: services
templates:
  - templates/services.yaml
tests:
  - it: renders required default services only
    asserts:
      - hasDocuments:
          count: 8
      - equal:
          path: metadata.name
          value: poundcake-api
        documentIndex: 4
      - equal:
          path: metadata.name
          value: poundcake-ui
        documentIndex: 5
      - equal:
          path: metadata.name
          value: stackstorm-auth
        documentIndex: 7
      - equal:
          path: spec.ports[0].targetPort
          value: 8080
        documentIndex: 5

  - it: renders poundcake-api service with values-driven type and port
    set:
      services.api.type: NodePort
      services.api.port: 9000
    asserts:
      - equal:
          path: metadata.name
          value: poundcake-api
        documentIndex: 4
      - equal:
          path: spec.type
          value: NodePort
        documentIndex: 4
      - equal:
          path: spec.ports[0].port
          value: 9000
        documentIndex: 4
      - equal:
          path: spec.publishNotReadyAddresses
          value: true
        documentIndex: 4

  - it: allows overriding poundcake-api publishNotReadyAddresses
    set:
      services.api.publishNotReadyAddresses: false
    asserts:
      - equal:
          path: spec.publishNotReadyAddresses
          value: false
        documentIndex: 4

  - it: renders stackstorm-web service on expected target port
    set:
      stackstormServices.stream.enabled: true
      stackstormServices.web.enabled: true
    asserts:
      - equal:
          path: metadata.name
          value: stackstorm-web
        documentIndex: 9
      - equal:
          path: spec.ports[0].targetPort
          value: 8080
        documentIndex: 9

  - it: applies overrides for stackstorm edge service ports and types
    set:
      services.stackstormApi.type: NodePort
      services.stackstormApi.port: 19101
      services.stackstormAuth.type: LoadBalancer
      services.stackstormAuth.port: 19100
      stackstormServices.stream.enabled: true
      stackstormServices.web.enabled: true
      services.stackstormStream.type: NodePort
      services.stackstormStream.port: 19102
      services.stackstormWeb.type: NodePort
      services.stackstormWeb.port: 18080
    asserts:
      - equal:
          path: spec.type
          value: NodePort
        documentIndex: 6
      - equal:
          path: spec.ports[0].port
          value: 19101
        documentIndex: 6
      - equal:
          path: spec.type
          value: LoadBalancer
        documentIndex: 7
      - equal:
          path: spec.ports[0].port
          value: 19100
        documentIndex: 7
      - equal:
          path: spec.ports[0].port
          value: 19102
        documentIndex: 8
      - equal:
          path: spec.ports[0].port
          value: 18080
        documentIndex: 9

  - it: applies UI targetPort override from uiImage.containerPort
    set:
      uiImage.containerPort: 18080
    asserts:
      - equal:
          path: metadata.name
          value: poundcake-ui
        documentIndex: 5
      - equal:
          path: spec.ports[0].targetPort
          value: 18080
        documentIndex: 5

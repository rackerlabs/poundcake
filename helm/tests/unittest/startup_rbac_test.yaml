suite: startup-rbac
templates:
  - templates/stackstorm-startup-rbac.yaml
tests:
  - it: renders service account, role, and rolebinding
    asserts:
      - hasDocuments:
          count: 3
      - equal:
          path: kind
          value: ServiceAccount
        documentIndex: 0
      - equal:
          path: kind
          value: Role
        documentIndex: 1
      - equal:
          path: kind
          value: RoleBinding
        documentIndex: 2

  - it: grants startup role required resource access
    asserts:
      - equal:
          path: metadata.name
          value: stackstorm-startup
        documentIndex: 1
      - equal:
          path: rules[0].resources[3]
          value: secrets
        documentIndex: 1
      - equal:
          path: roleRef.name
          value: stackstorm-startup
        documentIndex: 2

suite: bakery-pull-secrets
templates:
  - templates/bakery-secret.yaml
  - templates/bakery-deployment.yaml
  - templates/bakery-worker-deployment.yaml
  - templates/bakery-init-job.yaml
tests:
  - it: does not render bakery pull secrets by default
    set:
      poundcake.enabled: false
      bakery.enabled: true
      bakery.worker.enabled: true
    asserts:
      - isNull:
          path: spec.template.spec.imagePullSecrets
        template: templates/bakery-deployment.yaml
      - isNull:
          path: spec.template.spec.imagePullSecrets
        template: templates/bakery-worker-deployment.yaml
      - isNull:
          path: spec.template.spec.imagePullSecrets
        template: templates/bakery-init-job.yaml

  - it: renders canonical pull secrets on bakery workloads
    set:
      poundcake.enabled: false
      bakery.enabled: true
      bakery.worker.enabled: true
      poundcakeImage.pullSecrets[0]: ghcr-creds
    asserts:
      - equal:
          path: spec.template.spec.imagePullSecrets[0].name
          value: ghcr-creds
        template: templates/bakery-deployment.yaml
      - equal:
          path: spec.template.spec.imagePullSecrets[0].name
          value: ghcr-creds
        template: templates/bakery-worker-deployment.yaml
      - equal:
          path: spec.template.spec.imagePullSecrets[0].name
          value: ghcr-creds
        template: templates/bakery-init-job.yaml

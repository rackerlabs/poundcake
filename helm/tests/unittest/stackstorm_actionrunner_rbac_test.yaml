suite: stackstorm-actionrunner-rbac
templates:
  - templates/stackstorm-actionrunner-rbac.yaml
tests:
  - it: renders service account, role, and rolebinding by default
    asserts:
      - hasDocuments:
          count: 3
      - equal:
          path: kind
          value: ServiceAccount
        documentIndex: 0
      - equal:
          path: kind
          value: ClusterRole
        documentIndex: 1
      - equal:
          path: kind
          value: ClusterRoleBinding
        documentIndex: 2
      - equal:
          path: metadata.name
          value: RELEASE-NAME-poundcake-stackstorm-actionrunner
        documentIndex: 0
      - equal:
          path: metadata.name
          value: RELEASE-NAME-poundcake-stackstorm-actionrunner-cluster
        documentIndex: 1
      - contains:
          path: rules
          content:
            apiGroups:
              - ""
            resources:
              - persistentvolumeclaims
            verbs:
              - get
              - list
              - patch
        documentIndex: 1
      - contains:
          path: rules
          content:
            apiGroups:
              - ""
            resources:
              - pods
            verbs:
              - get
              - list
              - watch
              - delete
        documentIndex: 1
      - contains:
          path: rules
          content:
            apiGroups:
              - ""
            resources:
              - pods/eviction
            verbs:
              - create
        documentIndex: 1
      - contains:
          path: rules
          content:
            apiGroups:
              - apps
            resources:
              - deployments
              - statefulsets
              - daemonsets
            verbs:
              - get
              - list
              - watch
              - patch
        documentIndex: 1
      - equal:
          path: subjects[0].name
          value: RELEASE-NAME-poundcake-stackstorm-actionrunner
        documentIndex: 2
      - equal:
          path: subjects[0].namespace
          value: NAMESPACE
        documentIndex: 2
      - equal:
          path: roleRef.kind
          value: ClusterRole
        documentIndex: 2
      - equal:
          path: roleRef.name
          value: RELEASE-NAME-poundcake-stackstorm-actionrunner-cluster
        documentIndex: 2

  - it: skips service account when create is false but still renders pvc rbac
    set:
      stackstormActionrunner.serviceAccount.create: false
    asserts:
      - hasDocuments:
          count: 2
      - equal:
          path: kind
          value: ClusterRole
        documentIndex: 0
      - equal:
          path: kind
          value: ClusterRoleBinding
        documentIndex: 1

  - it: still renders recycle rbac when pvc patch access is disabled
    set:
      stackstormActionrunner.pvcPatchRbac.enabled: false
    asserts:
      - hasDocuments:
          count: 3
      - notContains:
          path: rules
          content:
            apiGroups:
              - ""
            resources:
              - persistentvolumeclaims
            verbs:
              - get
              - list
              - patch
        documentIndex: 1
      - contains:
          path: rules
          content:
            apiGroups:
              - ""
            resources:
              - pods
            verbs:
              - get
              - list
              - watch
              - delete
        documentIndex: 1

  - it: still renders pvc rbac when recycle access is disabled
    set:
      stackstormActionrunner.workloadRecycleRbac.enabled: false
    asserts:
      - hasDocuments:
          count: 3
      - contains:
          path: rules
          content:
            apiGroups:
              - ""
            resources:
              - persistentvolumeclaims
            verbs:
              - get
              - list
              - patch
        documentIndex: 1
      - notContains:
          path: rules
          content:
            apiGroups:
              - ""
            resources:
              - pods
            verbs:
              - get
              - list
              - watch
              - delete
        documentIndex: 1

  - it: skips role and rolebinding when all actionrunner rbac is disabled
    set:
      stackstormActionrunner.pvcPatchRbac.enabled: false
      stackstormActionrunner.workloadRecycleRbac.enabled: false
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: kind
          value: ServiceAccount
        documentIndex: 0

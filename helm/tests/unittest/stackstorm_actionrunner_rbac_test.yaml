suite: stackstorm-actionrunner-rbac
templates:
  - templates/stackstorm-actionrunner-rbac.yaml
tests:
  - it: renders service account, role, and rolebinding by default
    asserts:
      - hasDocuments:
          count: 3
      - equal:
          path: kind
          value: ServiceAccount
        documentIndex: 0
      - equal:
          path: kind
          value: Role
        documentIndex: 1
      - equal:
          path: kind
          value: RoleBinding
        documentIndex: 2
      - equal:
          path: metadata.name
          value: RELEASE-NAME-poundcake-stackstorm-actionrunner
        documentIndex: 0
      - equal:
          path: rules[0].resources[0]
          value: persistentvolumeclaims
        documentIndex: 1
      - equal:
          path: rules[0].verbs[2]
          value: patch
        documentIndex: 1
      - equal:
          path: subjects[0].name
          value: RELEASE-NAME-poundcake-stackstorm-actionrunner
        documentIndex: 2

  - it: skips service account when create is false but still renders pvc rbac
    set:
      stackstormActionrunner.serviceAccount.create: false
    asserts:
      - hasDocuments:
          count: 2
      - equal:
          path: kind
          value: Role
        documentIndex: 0
      - equal:
          path: kind
          value: RoleBinding
        documentIndex: 1

  - it: skips rbac when pvc patch access is disabled
    set:
      stackstormActionrunner.pvcPatchRbac.enabled: false
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: kind
          value: ServiceAccount
        documentIndex: 0

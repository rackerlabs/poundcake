suite: bakery-api-labels
templates:
  - templates/bakery-secret.yaml
  - templates/bakery-deployment.yaml
tests:
  - it: applies poundcake log labels to bakery api pod template in full mode
    set:
      poundcake.enabled: true
      bakery.enabled: true
    asserts:
      - equal:
          path: spec.template.metadata.labels["poundcake.io/log-group"]
          value: bakery
        template: templates/bakery-deployment.yaml
      - equal:
          path: spec.template.metadata.labels["poundcake.io/log-subgroup"]
          value: app
        template: templates/bakery-deployment.yaml
      - equal:
          path: spec.template.metadata.labels["poundcake.io/log-role"]
          value: api
        template: templates/bakery-deployment.yaml
      - matchRegex:
          path: spec.template.spec.initContainers[1].command[2]
          pattern: "bakery_db_init_ready"
        template: templates/bakery-deployment.yaml
      - equal:
          path: spec.template.spec.volumes[0].name
          value: app-config
        template: templates/bakery-deployment.yaml

  - it: applies poundcake log labels to bakery api pod template in bakery-only mode
    set:
      poundcake.enabled: false
      bakery.enabled: true
    asserts:
      - equal:
          path: spec.template.metadata.labels["poundcake.io/log-group"]
          value: bakery
        template: templates/bakery-deployment.yaml
      - equal:
          path: spec.template.metadata.labels["poundcake.io/log-subgroup"]
          value: app
        template: templates/bakery-deployment.yaml
      - equal:
          path: spec.template.metadata.labels["poundcake.io/log-role"]
          value: api
        template: templates/bakery-deployment.yaml
      - isNull:
          path: spec.template.spec.initContainers[1]
        template: templates/bakery-deployment.yaml
      - equal:
          path: spec.template.spec.volumes[0].name
          value: tmp
        template: templates/bakery-deployment.yaml

  - it: defaults bakery api pods to worker nodes
    set:
      poundcake.enabled: false
      bakery.enabled: true
    asserts:
      - equal:
          path: spec.template.spec.nodeSelector["node-role.kubernetes.io/worker"]
          value: worker
        template: templates/bakery-deployment.yaml

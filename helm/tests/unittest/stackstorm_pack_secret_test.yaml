suite: stackstorm-pack-secret
templates:
  - templates/poundcake-secret.yaml
tests:
  - it: does not render third-party pack secret by default
    set:
      auth.enabled: false
    asserts:
      - hasDocuments:
          count: 4

  - it: renders third-party pack config secret for openstack pack config values
    set:
      auth.enabled: false
      stackstorm.bootstrap.packs.kubernetes.enabled: true
      stackstorm.bootstrap.packs.kubernetes.config.kubeconfig: |
        apiVersion: v1
        kind: Config
        clusters: []
      stackstorm.bootstrap.packs.kubernetes.config.caCert: |
        -----BEGIN CERTIFICATE-----
        kubernetes
        -----END CERTIFICATE-----
      stackstorm.bootstrap.packs.openstack.enabled: true
      stackstorm.bootstrap.packs.openstack.config.cloudsYaml: |
        clouds:
          target:
            region_name: RegionOne
      stackstorm.bootstrap.packs.openstack.config.caCert: |
        -----BEGIN CERTIFICATE-----
        openstack
        -----END CERTIFICATE-----
    documentSelector:
      path: metadata.name
      value: stackstorm-pack-configs
    asserts:
      - equal:
          path: stringData["openstack.yaml"]
          value: |
            clouds:
              target:
                region_name: RegionOne
      - matchRegex:
          path: stringData["openstack-ca.crt"]
          pattern: "BEGIN CERTIFICATE"
      - isNull:
          path: stringData["kubernetes.yaml"]
      - isNull:
          path: stringData["kubernetes-ca.crt"]

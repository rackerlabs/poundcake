suite: gateway
templates:
  - templates/poundcake-gateway.yaml
tests:
  - it: does not render gateway resources by default
    asserts:
      - hasDocuments:
          count: 0

  - it: renders envoy gateway with api and ui listeners and routes
    set:
      gateway.enabled: true
    asserts:
      - hasDocuments:
          count: 3
      - equal:
          path: kind
          value: Gateway
        documentIndex: 0
      - equal:
          path: spec.gatewayClassName
          value: envoyproxy
        documentIndex: 0
      - equal:
          path: spec.listeners[0].name
          value: api
        documentIndex: 0
      - equal:
          path: spec.listeners[1].name
          value: ui
        documentIndex: 0
      - equal:
          path: kind
          value: HTTPRoute
        documentIndex: 1
      - equal:
          path: metadata.name
          value: poundcake-api-route
        documentIndex: 1
      - equal:
          path: spec.parentRefs[0].sectionName
          value: api
        documentIndex: 1
      - equal:
          path: spec.rules[0].backendRefs[0].name
          value: poundcake-api
        documentIndex: 1
      - equal:
          path: spec.rules[0].backendRefs[0].port
          value: 8000
        documentIndex: 1
      - equal:
          path: metadata.name
          value: poundcake-ui-route
        documentIndex: 2
      - equal:
          path: spec.parentRefs[0].sectionName
          value: ui
        documentIndex: 2
      - equal:
          path: spec.rules[0].backendRefs[0].name
          value: poundcake-ui
        documentIndex: 2
      - equal:
          path: spec.rules[0].backendRefs[0].port
          value: 80
        documentIndex: 2

  - it: applies gateway listener and route overrides
    set:
      gateway.enabled: true
      gateway.className: eg
      gateway.name: edge
      gateway.listeners.api.hostname: api.example.com
      gateway.listeners.api.port: 8088
      gateway.listeners.api.pathPrefix: /api
      gateway.listeners.ui.hostname: ui.example.com
      gateway.listeners.ui.pathPrefix: /
      services.api.port: 9000
      services.ui.port: 8080
    asserts:
      - equal:
          path: metadata.name
          value: edge
        documentIndex: 0
      - equal:
          path: spec.gatewayClassName
          value: eg
        documentIndex: 0
      - equal:
          path: spec.listeners[0].port
          value: 8088
        documentIndex: 0
      - equal:
          path: spec.hostnames[0]
          value: api.example.com
        documentIndex: 1
      - equal:
          path: spec.rules[0].matches[0].path.value
          value: /api
        documentIndex: 1
      - equal:
          path: spec.rules[0].backendRefs[0].port
          value: 9000
        documentIndex: 1
      - equal:
          path: spec.hostnames[0]
          value: ui.example.com
        documentIndex: 2
      - equal:
          path: spec.rules[0].backendRefs[0].port
          value: 8080
        documentIndex: 2

  - it: renders https api listener with tls configuration
    set:
      gateway.enabled: true
      gateway.listeners.ui.enabled: false
      gateway.listeners.api.protocol: HTTPS
      gateway.listeners.api.port: 443
      gateway.listeners.api.tls.secretName: poundcake-gw-tls-secret
    asserts:
      - hasDocuments:
          count: 2
      - equal:
          path: spec.listeners[0].name
          value: api
        documentIndex: 0
      - equal:
          path: spec.listeners[0].protocol
          value: HTTPS
        documentIndex: 0
      - equal:
          path: spec.listeners[0].tls.mode
          value: Terminate
        documentIndex: 0
      - equal:
          path: spec.listeners[0].tls.certificateRefs[0].name
          value: poundcake-gw-tls-secret
        documentIndex: 0

  - it: shares api listener when api and ui listener tuples are identical
    set:
      gateway.enabled: true
      gateway.listeners.api.hostname: poundcake.example.com
      gateway.listeners.ui.hostname: poundcake.example.com
      gateway.listeners.api.port: 443
      gateway.listeners.ui.port: 443
      gateway.listeners.api.protocol: HTTPS
      gateway.listeners.ui.protocol: HTTPS
      gateway.listeners.api.tls.secretName: poundcake-gw-tls-secret
      gateway.listeners.ui.tls.secretName: poundcake-gw-tls-secret
    asserts:
      - hasDocuments:
          count: 3
      - equal:
          path: spec.listeners[0].name
          value: api
        documentIndex: 0
      - notExists:
          path: spec.listeners[1]
        documentIndex: 0
      - equal:
          path: spec.parentRefs[0].sectionName
          value: api
        documentIndex: 1
      - equal:
          path: spec.parentRefs[0].sectionName
          value: api
        documentIndex: 2

suite: gateway
templates:
  - templates/poundcake-gateway.yaml
tests:
  - it: does not render gateway resources by default
    asserts:
      - hasDocuments:
          count: 0

  - it: renders routes that attach to an existing gateway
    set:
      gateway.enabled: true
    asserts:
      - hasDocuments:
          count: 2
      - equal:
          path: kind
          value: HTTPRoute
        documentIndex: 0
      - equal:
          path: metadata.name
          value: poundcake-api-route
        documentIndex: 0
      - equal:
          path: spec.parentRefs[0].sectionName
          value: api
        documentIndex: 0
      - equal:
          path: spec.parentRefs[0].name
          value: poundcake-gateway
        documentIndex: 0
      - equal:
          path: spec.rules[0].backendRefs[0].name
          value: poundcake-api
        documentIndex: 0
      - equal:
          path: spec.rules[0].backendRefs[0].port
          value: 8000
        documentIndex: 0
      - equal:
          path: spec.rules[0].timeouts.request
          value: 300s
        documentIndex: 0
      - equal:
          path: spec.rules[0].timeouts.backendRequest
          value: 300s
        documentIndex: 0
      - equal:
          path: kind
          value: HTTPRoute
        documentIndex: 1
      - equal:
          path: metadata.name
          value: poundcake-ui-route
        documentIndex: 1
      - equal:
          path: spec.parentRefs[0].sectionName
          value: ui
        documentIndex: 1
      - equal:
          path: spec.rules[0].backendRefs[0].name
          value: poundcake-ui
        documentIndex: 1
      - equal:
          path: spec.rules[0].backendRefs[0].port
          value: 80
        documentIndex: 1

  - it: applies parent gateway and route overrides
    set:
      gateway.enabled: true
      gateway.gatewayName: flex-gateway
      gateway.gatewayNamespace: envoy-gateway
      gateway.listener.name: poundcake-https
      gateway.hostnames:
        - poundcake.api.example.com
      gateway.listeners.api.hostname: api.example.com
      gateway.listeners.api.port: 8088
      gateway.listeners.api.pathPrefix: /api
      gateway.listeners.api.requestTimeout: 480s
      gateway.listeners.api.backendRequestTimeout: 450s
      gateway.listeners.ui.hostname: ui.example.com
      gateway.listeners.ui.pathPrefix: /
      services.api.port: 9000
      services.ui.port: 8080
    asserts:
      - equal:
          path: metadata.name
          value: poundcake-api-route
        documentIndex: 0
      - equal:
          path: spec.parentRefs[0].name
          value: flex-gateway
        documentIndex: 0
      - equal:
          path: spec.parentRefs[0].namespace
          value: envoy-gateway
        documentIndex: 0
      - equal:
          path: spec.parentRefs[0].sectionName
          value: poundcake-https
        documentIndex: 0
      - equal:
          path: spec.hostnames[0]
          value: poundcake.api.example.com
        documentIndex: 0
      - equal:
          path: spec.rules[0].matches[0].path.value
          value: /api
        documentIndex: 0
      - equal:
          path: spec.rules[0].backendRefs[0].port
          value: 9000
        documentIndex: 0
      - equal:
          path: spec.rules[0].timeouts.request
          value: 480s
        documentIndex: 0
      - equal:
          path: spec.rules[0].timeouts.backendRequest
          value: 450s
        documentIndex: 0
      - equal:
          path: spec.parentRefs[0].name
          value: flex-gateway
        documentIndex: 1
      - equal:
          path: spec.parentRefs[0].namespace
          value: envoy-gateway
        documentIndex: 1
      - equal:
          path: spec.parentRefs[0].sectionName
          value: poundcake-https
        documentIndex: 1
      - equal:
          path: spec.hostnames[0]
          value: poundcake.api.example.com
        documentIndex: 1
      - equal:
          path: spec.rules[0].backendRefs[0].port
          value: 8080
        documentIndex: 1

  - it: renders only api route when ui listener is disabled
    set:
      gateway.enabled: true
      gateway.listeners.ui.enabled: false
      gateway.listeners.api.pathPrefix: /api
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: metadata.name
          value: poundcake-api-route
        documentIndex: 0
      - equal:
          path: spec.rules[0].matches[0].path.value
          value: /api
        documentIndex: 0

  - it: shares api listener when api and ui listener tuples are identical
    set:
      gateway.enabled: true
      gateway.listeners.api.hostname: poundcake.example.com
      gateway.listeners.ui.hostname: poundcake.example.com
      gateway.listeners.api.port: 443
      gateway.listeners.ui.port: 443
      gateway.listeners.api.protocol: HTTPS
      gateway.listeners.ui.protocol: HTTPS
    asserts:
      - hasDocuments:
          count: 2
      - equal:
          path: spec.parentRefs[0].sectionName
          value: api
        documentIndex: 0
      - equal:
          path: spec.parentRefs[0].sectionName
          value: api
        documentIndex: 1

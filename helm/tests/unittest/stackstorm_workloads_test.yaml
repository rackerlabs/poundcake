suite: stackstorm-workloads
templates:
  - templates/stackstorm-workloads.yaml
tests:
  - it: renders reduced default stackstorm workloads
    asserts:
      - hasDocuments:
          count: 8
      - equal:
          path: metadata.name
          value: stackstorm-auth
        documentIndex: 0
      - equal:
          path: metadata.name
          value: stackstorm-garbagecollector
        documentIndex: 6
      - equal:
          path: metadata.name
          value: stackstorm-client
        documentIndex: 7

  - it: applies edge and execution log-streaming labels
    asserts:
      - equal:
          path: spec.template.metadata.labels["poundcake.io/log-group"]
          value: stackstorm-edge
        documentIndex: 0
      - equal:
          path: spec.template.metadata.labels["poundcake.io/log-role"]
          value: auth
        documentIndex: 0
      - equal:
          path: spec.template.metadata.labels["poundcake.io/log-group"]
          value: stackstorm-exec
        documentIndex: 6

  - it: gates worker workloads on control-plane readiness marker
    asserts:
      - matchRegex:
          path: spec.template.spec.initContainers[0].command[2]
          pattern: "stackstorm_controlplane_ready"
        documentIndex: 2
      - matchRegex:
          path: spec.template.spec.initContainers[0].command[2]
          pattern: "GATE_LOG_ENABLED=\\\"true\\\""
        documentIndex: 2
      - matchRegex:
          path: spec.template.spec.initContainers[0].command[2]
          pattern: "stackstorm_controlplane_ready"
        documentIndex: 6
      - equal:
          path: spec.template.metadata.labels["poundcake.io/log-role"]
          value: garbagecollector
        documentIndex: 6
      - matchRegex:
          path: spec.template.spec.initContainers[0].command[2]
          pattern: "stackstorm_controlplane_ready"
        documentIndex: 7
      - equal:
          path: spec.template.metadata.labels["poundcake.io/log-role"]
          value: client
        documentIndex: 7

  - it: defaults stackstorm workloads to worker nodes
    asserts:
      - equal:
          path: spec.template.spec.nodeSelector["node-role.kubernetes.io/worker"]
          value: worker
        documentIndex: 0
      - equal:
          path: spec.template.spec.nodeSelector["node-role.kubernetes.io/worker"]
          value: worker
        documentIndex: 7

  - it: attaches the dedicated service account to stackstorm-actionrunner
    documentSelector:
      path: metadata.name
      value: stackstorm-actionrunner
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: RELEASE-NAME-poundcake-stackstorm-actionrunner

  - it: supports gate logging overrides on stackstorm init gates
    set:
      startupHooks.gateLogging.enabled: false
      startupHooks.gateLogging.intervalSeconds: 5
      startupHooks.gateLogging.prefix: "[ss-gate]"
    asserts:
      - matchRegex:
          path: spec.template.spec.initContainers[0].command[2]
          pattern: "GATE_LOG_ENABLED=\\\"false\\\""
        documentIndex: 0
      - matchRegex:
          path: spec.template.spec.initContainers[0].command[2]
          pattern: "GATE_LOG_INTERVAL=\\\"5\\\""
        documentIndex: 0
      - matchRegex:
          path: spec.template.spec.initContainers[0].command[2]
          pattern: "GATE_LOG_PREFIX=\\\"\\[ss-gate\\]\\\""
        documentIndex: 0

  - it: applies stackstorm-exec labels to optional execution services
    set:
      stackstormServices.notifier.enabled: true
      stackstormServices.timersengine.enabled: true
      stackstormServices.sensorcontainer.enabled: true
    asserts:
      - equal:
          path: spec.template.metadata.labels["poundcake.io/log-group"]
          value: stackstorm-exec
        documentIndex: 6
      - equal:
          path: spec.template.metadata.labels["poundcake.io/log-role"]
          value: notifier
        documentIndex: 6
      - equal:
          path: spec.template.metadata.labels["poundcake.io/log-role"]
          value: timersengine
        documentIndex: 8
      - equal:
          path: spec.template.metadata.labels["poundcake.io/log-role"]
          value: sensorcontainer
        documentIndex: 9

  - it: renders optional stackstorm workloads when enabled
    set:
      stackstormServices.register.enabled: true
      stackstormServices.notifier.enabled: true
      stackstormServices.timersengine.enabled: true
      stackstormServices.sensorcontainer.enabled: true
      stackstormServices.stream.enabled: true
      stackstormServices.web.enabled: true
      stackstormServices.client.enabled: true
    asserts:
      - hasDocuments:
          count: 14
      - equal:
          path: metadata.name
          value: stackstorm-register
        documentIndex: 0
      - equal:
          path: metadata.name
          value: stackstorm-notifier
        documentIndex: 7
      - equal:
          path: metadata.name
          value: stackstorm-timersengine
        documentIndex: 9
      - equal:
          path: metadata.name
          value: stackstorm-sensorcontainer
        documentIndex: 10
      - equal:
          path: metadata.name
          value: stackstorm-web
        documentIndex: 12
      - equal:
          path: metadata.name
          value: stackstorm-client
        documentIndex: 13
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: ST2_API_KEY_FILE
            value: /app/config/st2_api_key
        documentIndex: 13

  - it: applies image values and expected API/web probes and ports
    set:
      stackstormImage.repository: custom/st2
      stackstormImage.tag: "4.0.0"
      stackstormImage.pullPolicy: Always
      stackstormServices.register.enabled: true
      stackstormServices.notifier.enabled: true
      stackstormServices.timersengine.enabled: true
      stackstormServices.sensorcontainer.enabled: true
      stackstormServices.stream.enabled: true
      stackstormServices.web.enabled: true
      stackstormServices.client.enabled: true
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: custom/st2:4.0.0
        documentIndex: 2
      - equal:
          path: spec.template.spec.containers[0].imagePullPolicy
          value: Always
        documentIndex: 2
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.tcpSocket.port
          value: 9101
        documentIndex: 2
      - equal:
          path: spec.template.spec.containers[0].ports[0].containerPort
          value: 8080
        documentIndex: 12
      - equal:
          path: spec.template.spec.containers[0].imagePullPolicy
          value: Always
        documentIndex: 12
      - equal:
          path: spec.template.spec.containers[0].args[2]
          value: /tmp/st2/st2.conf
        documentIndex: 2
      - equal:
          path: spec.template.spec.containers[0].args[2]
          value: /tmp/st2/st2.conf
        documentIndex: 12

  - it: applies configured stackstorm API readiness initial delay
    set:
      stackstormApi.readiness.initialDelaySeconds: 7
    asserts:
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.initialDelaySeconds
          value: 7
        documentIndex: 1

  - it: applies pod, stackstorm, and utility security contexts with writable defaults
    asserts:
      - equal:
          path: spec.template.spec.securityContext.runAsNonRoot
          value: true
        documentIndex: 0
      - equal:
          path: spec.template.spec.initContainers[0].securityContext.runAsNonRoot
          value: true
        documentIndex: 0
      - equal:
          path: spec.template.spec.initContainers[0].securityContext.runAsUser
          value: 1000
        documentIndex: 0
      - equal:
          path: spec.template.spec.initContainers[0].securityContext.readOnlyRootFilesystem
          value: false
        documentIndex: 0
      - equal:
          path: spec.template.spec.containers[0].securityContext.readOnlyRootFilesystem
          value: false
        documentIndex: 0
      - equal:
          path: spec.template.spec.containers[0].volumeMounts[1].name
          value: stackstorm-secrets-files
        documentIndex: 0
      - equal:
          path: spec.template.spec.volumes[2].secret.secretName
          value: stackstorm-secrets
        documentIndex: 0
      - equal:
          path: spec.template.spec.containers[0].securityContext.readOnlyRootFilesystem
          value: false
        documentIndex: 6

  - it: uses local emptyDir packs volume for pack-consuming services
    asserts:
      - equal:
          path: spec.template.spec.volumes[2].name
          value: packs
        documentIndex: 1
      - equal:
          path: spec.template.spec.volumes[2].emptyDir
          value: {}
        documentIndex: 1
      - equal:
          path: spec.template.spec.volumes[2].emptyDir
          value: {}
        documentIndex: 2
      - equal:
          path: spec.template.spec.volumes[2].emptyDir
          value: {}
        documentIndex: 4

  - it: uses local emptyDir packs volume for stackstorm-register when enabled
    set:
      stackstormServices.register.enabled: true
    asserts:
      - equal:
          path: spec.template.spec.volumes[2].emptyDir
          value: {}
        documentIndex: 0

  - it: adds pack sync sidecar for pack-consuming services by default
    asserts:
      - equal:
          path: spec.template.spec.containers[1].name
          value: stackstorm-pack-sync
        documentIndex: 1
      - equal:
          path: spec.template.spec.containers[1].env[1].value
          value: "5"
        documentIndex: 1
      - equal:
          path: spec.template.spec.containers[1].env[2].value
          value: "2"
        documentIndex: 1
      - equal:
          path: spec.template.spec.containers[1].name
          value: stackstorm-pack-sync
        documentIndex: 2
      - equal:
          path: spec.template.spec.containers[1].name
          value: stackstorm-pack-sync
        documentIndex: 4

  - it: can disable pack sync sidecars
    set:
      stackstormPackSync.enabled: false
    asserts:
      - isNull:
          path: spec.template.spec.containers[1]
        documentIndex: 1
      - isNull:
          path: spec.template.spec.containers[1]
        documentIndex: 2
      - isNull:
          path: spec.template.spec.containers[1]
        documentIndex: 4

  - it: supports hardened overrides for stackstorm and utility container profiles
    set:
      stackstormImage.securityContext.readOnlyRootFilesystem: true
      utilitySecurityContext.readOnlyRootFilesystem: true
    asserts:
      - equal:
          path: spec.template.spec.containers[0].securityContext.readOnlyRootFilesystem
          value: true
        documentIndex: 0
      - equal:
          path: spec.template.spec.initContainers[0].securityContext.readOnlyRootFilesystem
          value: true
        documentIndex: 0

  - it: fails fast when required stackstorm services are disabled
    set:
      stackstormServices.api.enabled: false
    asserts:
      - failedTemplate:
          errorMessage: "invalid stackstorm service profile: stackstormServices.api.enabled must be true for Poundcake operations"

  - it: does not render pull secrets from poundcakeImage settings
    set:
      poundcakeImage.pullSecrets[0]: ghcr-pull
    asserts:
      - isNull:
          path: spec.template.spec.imagePullSecrets
        documentIndex: 0
      - isNull:
          path: spec.template.spec.imagePullSecrets
        documentIndex: 6

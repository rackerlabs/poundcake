# Default values for poundcake
#
# NAMESPACE CONFIGURATION:
# The namespace is set at install time with: helm install --namespace <namespace>
# Example: helm install poundcake . -n poundcake
# The default namespace is "poundcake" if not specified during installation.
# All resources (API, UI, Celery workers, Redis, etc.) will be created in the same namespace.
#
# ARCHITECTURE:
# - API: Main FastAPI application container
# - UI: Separate container (built/stored separately via GitHub workflows)
# - Celery: Worker containers for async task processing
# - Redis: Message broker for Celery
# - Database: External MySQL/MariaDB (required)

replicaCount: 1

image:
  repository: ghcr.io/aedan/poundcake
  pullPolicy: IfNotPresent
  tag: "bbe8333"  # Git SHA tag from build workflow

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext:
  fsGroup: 1000

securityContext:
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000

service:
  type: ClusterIP
  port: 8080

# UI configuration
# The UI is a separate container built and stored independently in GitHub container registry.
# It connects to the API service in the same namespace.
ui:
  enabled: true
  image:
    repository: ghcr.io/aedan/poundcake-ui
    pullPolicy: IfNotPresent
    tag: "bbe8333"  # Git SHA tag from build workflow
  service:
    type: ClusterIP
    port: 80
  resources:
    limits:
      cpu: 100m
      memory: 64Mi
    requests:
      cpu: 50m
      memory: 32Mi

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: poundcake.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: poundcake-tls
  #    hosts:
  #      - poundcake.local

# Envoy Gateway API HTTPRoute configuration
# Use this instead of ingress for Envoy Gateway deployments
#
# This configuration will:
# 1. Check if a Gateway listener exists for PoundCake
# 2. Create or update the listener if needed (idempotent)
# 3. Create an HTTPRoute that attaches to that listener
gateway:
  enabled: false

  # Gateway reference (required if enabled)
  # The Gateway resource must already exist (created by infrastructure team)
  gatewayName: ""  # Example: flex-gateway
  gatewayNamespace: ""  # Example: envoy-gateway

  # Gateway Listener Configuration
  # This will be automatically created/updated in the Gateway
  listener:
    # Listener name - will be used as sectionName in HTTPRoute
    name: ""  # Example: poundcake-https

    # Full hostname for your PoundCake deployment
    hostname: ""  # Example: poundcake.api.ord.cloudmunchers.net

    # Listener port and protocol
    port: 443
    protocol: "HTTPS"  # HTTPS or HTTP

    # TLS certificate secret (required if protocol is HTTPS)
    # This secret must exist in the same namespace as the Gateway
    tlsSecretName: ""  # Example: poundcake-gw-tls-secret

    # Namespace access control for HTTPRoutes
    # "All" allows HTTPRoutes from any namespace to attach
    # "Same" restricts to same namespace as Gateway
    # "Selector" uses namespaceSelector (not configured here)
    allowedNamespaces: "All"

    # Update listener if it already exists but config differs
    # Set to false to skip updates if listener already exists
    updateIfExists: true

  # HTTPRoute Configuration
  # Hostnames for the HTTPRoute (should match listener.hostname)
  hostnames: []
    # - poundcake.api.ord.cloudmunchers.net

  # Optional annotations for HTTPRoute
  annotations: {}
    # application: gateway-api
    # route: poundcake

  # Session persistence configuration
  sessionPersistence:
    enabled: true
    timeout: "300s"
    cookieLifetimeType: "Permanent"  # or "Session"
    cookieName: "PoundcakeSession"
    uiCookieName: "PoundcakeUISession"

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

# PoundCake configuration
config:
  # Server settings
  host: "0.0.0.0"
  port: 8080
  debug: false

  # Logging
  logLevel: INFO
  logFormat: console

  # Metrics
  metricsEnabled: true
  metricsPath: /metrics

  # Remediation settings
  defaultTimeout: 300
  maxConcurrentRemediations: 10

# StackStorm Helm Chart Integration
# Controls whether to deploy StackStorm as a subchart or use external instance
stackstorm:
  chart:
    # Enable StackStorm subchart deployment (all-in-one mode)
    # When true: StackStorm is deployed as part of this chart
    # When false: Connect to external StackStorm instance using url/authUrl below
    enabled: true

  # Connection configuration
  # When chart.enabled = true: These are auto-generated from subchart service names (leave empty)
  # When chart.enabled = false: Set these to point to your external StackStorm instance
  url: ""  # Auto-generated when subchart enabled: http://{{ .Release.Name }}-stackstorm-ha-st2api:9101
  authUrl: ""  # Auto-generated when subchart enabled: http://{{ .Release.Name }}-stackstorm-ha-st2auth:9100
  verifySsl: false

  # API key or auth token (use secrets for production)
  apiKey: ""
  authToken: ""
  # Reference to existing secret containing StackStorm credentials
  existingSecret: ""
  # Keys in the secret
  secretKeys:
    apiKey: "api-key"
    authToken: "auth-token"
  # Auto-discovery settings
  autoDiscover: true
  discoverAcrossNamespaces: true
  # Admin credentials for auto API key generation
  adminUser: "st2admin"
  adminPassword: ""
  adminPasswordSecret: "poundcake-st2-auth"
  adminPasswordSecretKey: "ST2_AUTH_PASSWORD"

# StackStorm subchart configuration
# These values are passed to the stackstorm-ha subchart when stackstorm.chart.enabled = true
stackstorm-chart:
  # Disable bundled services in StackStorm chart (we deploy them at parent level for sharing)
  mongodb:
    enabled: false

  rabbitmq:
    enabled: false

  redis:
    enabled: false

  # StackStorm configuration
  st2:
    rbac:
      enabled: true

    # Admin user configuration
    auth:
      username: st2admin
      password: ""  # Auto-generated if empty

    # Configure StackStorm to use parent-level services
    # Note: Cannot use Helm templates here, must use actual service names
    config: |
      [database]
      host = poundcake-mongodb
      port = 27017
      db_name = st2
      username = stackstorm
      password = stackstorm

      [messaging]
      url = amqp://stackstorm:stackstorm@poundcake-rabbitmq:5672

      [coordination]
      url = redis://poundcake-redis:6379

      [api]
      allow_origin = *

# Redis configuration (used by StackStorm for coordination and optionally by PoundCake for caching)
# Uses Redis Operator (OpsTree Labs) to deploy Redis
redis:
  enabled: true
  # Use external Redis or deploy via operator
  external: false
  # External Redis settings (if external: true)
  host: "redis.default.svc.cluster.local"
  port: 6379
  password: ""
  database: 0
  # Deployment settings (if external: false, uses Redis Operator)
  image:
    repository: quay.io/opstree/redis
    tag: v7.0.15
    pullPolicy: IfNotPresent
  auth:
    enabled: false
    password: ""
  persistence:
    size: 1Gi
    storageClassName: ""
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  metrics:
    enabled: false
    image:
      repository: quay.io/opstree/redis-exporter
      tag: v1.44.0

# RabbitMQ configuration (used by StackStorm for task distribution and workflow coordination)
# Uses RabbitMQ Operator to deploy RabbitMQ cluster
rabbitmq:
  enabled: true
  # Use external RabbitMQ or deploy via operator
  external: false
  # External RabbitMQ settings (if external: true)
  host: "rabbitmq.default.svc.cluster.local"
  port: 5672
  username: "stackstorm"
  password: "stackstorm"
  vhost: "/"
  # Deployment settings (if external: false, uses RabbitMQ Operator)
  replicas: 1
  auth:
    username: stackstorm
    password: stackstorm
  persistence:
    size: 8Gi
    storageClassName: ""
  service:
    type: ClusterIP
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi

# Alert-to-action mappings
# These will be mounted as ConfigMap
mappings:
  common.yaml: |
    alerts:
      HighCPUUsage:
        description: "Remediate high CPU usage"
        handler: yaml_config
        actions:
          - name: identify_cpu_process
            action: core.remote
            description: "Identify CPU-intensive processes"
            parameters:
              hosts: "{{instance}}"
              cmd: "ps aux --sort=-%cpu | head -10"
            timeout: 60

      LowDiskSpace:
        description: "Clean up disk space"
        handler: yaml_config
        actions:
          - name: cleanup_logs
            action: core.remote
            description: "Clean up old log files"
            parameters:
              hosts: "{{instance}}"
              cmd: "find /var/log -name '*.gz' -mtime +7 -delete"
            timeout: 120

      ServiceDown:
        description: "Restart down services"
        handler: yaml_config
        actions:
          - name: restart_service
            action: linux.service
            parameters:
              host: "{{instance}}"
              service: "{{labels.service}}"
              action: restart
            timeout: 120

# ServiceMonitor for Prometheus Operator
serviceMonitor:
  enabled: true
  namespace: prometheus
  interval: 30s
  scrapeTimeout: 10s
  labels:
    release: kube-prometheus-stack

# Pod Disruption Budget
podDisruptionBudget:
  enabled: false
  minAvailable: 1
  # maxUnavailable: 1

# Persistence for writable mappings (required for web UI edits)
persistence:
  enabled: false
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 100Mi

# Prometheus integration
prometheus:
  # Prometheus API URL for querying metrics
  # Default for kube-prometheus-stack installation
  url: "http://kube-prometheus-stack-prometheus.prometheus.svc.cluster.local:9090"
  verifySsl: false

  # Prometheus Operator CRD settings (Kubernetes)
  # When enabled, PoundCake can manage PrometheusRule CRDs directly
  useCrds: true
  crdNamespace: prometheus

  # Allow creating/updating/deleting PrometheusRule CRDs
  # Set to false for read-only access (can only view rules)
  allowRuleManagement: true

  # IMPORTANT: Labels to apply to PrometheusRule CRDs created by PoundCake
  # These MUST match your Prometheus Operator's ruleSelector, otherwise
  # Prometheus will not load the rules. Check your Prometheus CR with:
  #   kubectl get prometheus -n prometheus -o jsonpath='{.items[0].spec.ruleSelector}'
  #
  # Default is for kube-prometheus-stack. Adjust if using a different release name.
  crdLabels:
    release: kube-prometheus-stack

# Git repository integration for Prometheus rule management
# Enables GitOps workflow: edit rules in UI -> commit to Git -> create PR
git:
  # Enable Git integration (optional - rules can be managed via CRDs alone)
  enabled: false

  # Git repository URL (HTTPS or SSH)
  # Example: https://github.com/yourorg/prometheus-config.git
  repoUrl: ""

  # Branch to create PRs against
  branch: main

  # Path to Prometheus rules directory in repo
  rulesPath: prometheus/rules

  # File organization strategy
  # When true, each alert gets its own file (recommended)
  # When false, alerts are grouped in files by CRD name
  filePerAlert: true

  # File naming pattern (used when filePerAlert: true)
  # Available variables: {alert_name}, {group_name}, {crd_name}
  filePattern: "{alert_name}.yaml"

  # Git authentication
  # For HTTPS: use token
  # For SSH: use sshKeyPath (mount SSH key as secret)
  token: ""
  sshKeyPath: ""

  # Git commit author
  userName: PoundCake
  userEmail: poundcake@example.com

  # Git provider for PR creation
  # Options: github, gitlab, gitea, none
  # Use "none" to commit without creating PRs
  provider: github

  # Reference to existing secret containing Git credentials
  existingSecret: ""
  secretKeys:
    token: "git-token"
    sshKey: "git-ssh-key"

# Authentication configuration
auth:
  # Enable authentication for web UI and API
  enabled: true
  # Session timeout in seconds (default: 24 hours)
  sessionTimeout: 86400
  # Secret name will be: <release-name>-poundcake-admin
  # Get password with: kubectl get secret <release-name>-poundcake-admin -n <namespace> -o jsonpath='{.data.password}' | base64 -d

# Redis configuration for stateful alert tracking
# Required for horizontal scaling
redis:
  # Enable Redis for state management (required for replicaCount > 1)
  enabled: false

  # Deploy Redis as part of this chart (independent deployment)
  # Set to false to use an external Redis instance
  deploy: true

  # Redis image configuration
  image:
    repository: redis
    tag: "7-alpine"
    pullPolicy: IfNotPresent

  # Redis authentication
  password: ""
  # Reference to existing secret containing Redis password
  existingSecret: ""
  secretKey: "redis-password"

  # Redis resource limits
  resources:
    limits:
      cpu: 500m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi

  # Persistence configuration
  persistence:
    enabled: true
    # Storage class - leave empty for default storage class
    storageClass: ""
    accessMode: ReadWriteOnce
    size: 1Gi

  # External Redis configuration (when deploy: false)
  external:
    # Redis connection URL (e.g., redis://my-redis:6379/0)
    url: ""
    # Password for external Redis
    password: ""
    existingSecret: ""
    secretKey: "redis-password"

  # State management settings
  alertTtlHours: 24  # How long to keep resolved alerts
  lockTimeoutSeconds: 300  # Distributed lock timeout

# Database configuration (MySQL/MariaDB)
# Required for persistent storage of alerts, mappings, and execution history
database:
  # Database connection URL
  # Format: mysql+pymysql://user:password@host:port/database
  url: ""
  # Reference to existing secret containing database URL
  existingSecret: ""
  secretKey: "database-url"

# MariaDB Operator integration
# When enabled, PoundCake will create MariaDB resources using the mariadb-operator CRDs
# Requires mariadb-operator to be installed: https://github.com/mariadb-operator/mariadb-operator
mariadbOperator:
  # Enable MariaDB Operator integration
  # When true, the chart will check for the operator and create MariaDB CRDs
  enabled: true

  # Namespace to deploy MariaDB resources (defaults to release namespace)
  namespace: ""

  # MariaDB server configuration
  server:
    # Name of the MariaDB instance (defaults to release name)
    name: ""
    # MariaDB version
    image:
      repository: mariadb
      tag: "11.4"
      pullPolicy: IfNotPresent
    # Root password (auto-generated if not provided)
    rootPassword: ""
    # Use existing secret for root password
    rootPasswordSecret: ""
    rootPasswordSecretKey: "password"
    # Storage configuration
    storage:
      size: 10Gi
      storageClassName: ""
    # Resource limits
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    # Number of replicas (1 for standalone, 3+ for Galera)
    replicas: 1

  # Database configuration
  database:
    # Database name to create
    name: poundcake

  # User configuration
  user:
    # Username to create
    name: poundcake
    # Password (auto-generated if not provided)
    password: ""
    # Use existing secret for user password
    passwordSecret: ""
    passwordSecretKey: "password"
    # Max connections for this user
    maxUserConnections: 20

  # Grant configuration
  grants:
    # Privileges to grant (default: full access to the database)
    privileges:
      - "ALL PRIVILEGES"

# MongoDB configuration (shared by StackStorm and PoundCake)
# When stackstorm.chart.enabled = true, this MongoDB instance is used by both:
# - StackStorm (st2 database)
# - PoundCake (poundcake database, if needed)
mongodb:
  # Enable MongoDB deployment
  enabled: true

  # Use external MongoDB or deploy as part of the chart
  external: false

  # External MongoDB settings (if external: true)
  host: "mongodb.default.svc.cluster.local"
  port: 27017
  database: "stackstorm"
  username: "stackstorm"
  password: ""
  # Reference to existing secret containing MongoDB credentials
  existingSecret: ""
  usernameKey: "mongodb-username"
  passwordKey: "mongodb-password"

  # MongoDB deployment settings (if external: false)
  image:
    repository: mongo
    tag: "7.0.28"  # MongoDB 7.0.28 (fully supported by StackStorm 3.9.0)
    pullPolicy: IfNotPresent

  # Authentication settings
  auth:
    enabled: true
    rootPassword: ""  # Auto-generated if not provided
    # Primary user for StackStorm
    username: "stackstorm"
    password: "stackstorm"
    database: "st2"

  # Storage configuration (increased for both StackStorm + PoundCake data)
  persistence:
    enabled: true
    size: 20Gi
    storageClassName: ""

  # Resource limits
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 1000m
      memory: 2Gi

  # Service configuration
  service:
    type: ClusterIP
    port: 27017

# Celery worker configuration for async task processing
# NOTE: Celery deployment template not included in this chart version.
# Worker services (oven, oven-service, timer) handle task processing instead.
# Keep enabled for future Celery integration or if using external Celery workers.
celery:
  # Enable Celery configuration (no deployment template currently)
  enabled: false

  # Number of Celery worker replicas
  replicaCount: 1

  # Celery broker URL (defaults to Redis URL if redis.enabled)
  # Override for external broker
  brokerUrl: ""

  # Celery result backend URL (defaults to Redis URL if redis.enabled)
  resultBackend: ""

  # Worker resources
  resources:
    limits:
      cpu: 500m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi

  # Worker concurrency (number of parallel tasks)
  concurrency: 4

# Oven service configuration
# Executor service that polls for ovens and triggers their execution
oven:
  enabled: true
  replicaCount: 1
  pollInterval: 5
  resources:
    limits:
      cpu: 200m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi

# Dispatcher service configuration
# Polls API and triggers baking operations
dispatcher:
  enabled: true
  replicaCount: 1
  interval: 5
  resources:
    limits:
      cpu: 200m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi

# Oven-service configuration
# Dispatcher service that converts alerts into oven objects
ovenService:
  enabled: true
  replicaCount: 1
  interval: 5
  resources:
    limits:
      cpu: 200m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi

# Timer service configuration
# Monitoring service that tracks oven execution status in StackStorm
timer:
  enabled: true
  replicaCount: 1
  interval: 10
  slaBufferPercent: 0.2
  resources:
    limits:
      cpu: 200m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi

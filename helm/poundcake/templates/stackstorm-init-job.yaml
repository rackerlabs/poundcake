
{{- if .Values.stackstorm.chart.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "poundcake.fullname" . }}-stackstorm-init
  labels:
    {{- include "poundcake.labels" . | nindent 4 }}
    app.kubernetes.io/component: stackstorm-init
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "10"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  template:
    metadata:
      name: {{ include "poundcake.fullname" . }}-stackstorm-init
      labels:
        {{- include "poundcake.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: stackstorm-init
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ include "poundcake.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
      - name: st2-init
        securityContext:
          {{- toYaml .Values.securityContext | nindent 10 }}
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        command:
        - /bin/bash
        - -c
        - |
          set -e

          echo "========================================"
          echo "StackStorm Initialization Job"
          echo "========================================"

          # Wait for StackStorm API to be ready (accept 401 as valid - API is up but requires auth)
          echo "Waiting for StackStorm API at {{ include "poundcake.stackstormApiUrl" . }}..."
          MAX_RETRIES=60
          RETRY_COUNT=0

          until HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" {{ include "poundcake.stackstormApiUrl" . }}/v1/actions) && [ "$HTTP_CODE" = "401" -o "$HTTP_CODE" = "200" ]; do
            RETRY_COUNT=$((RETRY_COUNT + 1))
            if [ $RETRY_COUNT -ge $MAX_RETRIES ]; then
              echo "ERROR: StackStorm API did not become ready after ${MAX_RETRIES} attempts (5 minutes)"
              echo "Last HTTP code: $HTTP_CODE"
              exit 1
            fi
            echo "Attempt ${RETRY_COUNT}/${MAX_RETRIES}: Waiting for StackStorm API... (HTTP $HTTP_CODE)"
            sleep 5
          done

          echo "✓ StackStorm API is ready (HTTP $HTTP_CODE)"

          # Note: API key creation would require st2 CLI which is not in PoundCake image
          # This is handled by StackStorm's own initialization
          # PoundCake will use the st2-apikeys secret created by StackStorm subchart

          echo "========================================"
          echo "Initialization Complete"
          echo "========================================"
          echo ""
          echo "StackStorm is ready at:"
          echo "  API: {{ include "poundcake.stackstormApiUrl" . }}"
          echo "  Auth: {{ include "poundcake.stackstormAuthUrl" . }}"
          echo ""
          echo "PoundCake can now communicate with StackStorm."
        {{- with .Values.resources }}
        resources:
          {{- toYaml . | nindent 10 }}
        {{- end }}
{{- end }}

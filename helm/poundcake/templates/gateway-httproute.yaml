{{- if .Values.gateway.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "poundcake.fullname" . }}-httproute
  labels:
    {{- include "poundcake.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
  {{- with .Values.gateway.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  hostnames:
  {{- range .Values.gateway.hostnames }}
  - {{ . | quote }}
  {{- end }}
  parentRefs:
  - name: {{ .Values.gateway.gatewayName }}
    {{- if .Values.gateway.gatewayNamespace }}
    namespace: {{ .Values.gateway.gatewayNamespace }}
    {{- end }}
    {{- if .Values.gateway.listener.name }}
    sectionName: {{ .Values.gateway.listener.name }}
    {{- end }}
  rules:
  # Route /api to API service
  - matches:
    - path:
        type: PathPrefix
        value: /api
    backendRefs:
    - name: {{ include "poundcake.fullname" . }}
      port: {{ .Values.service.port }}
    {{- if .Values.gateway.sessionPersistence.enabled }}
    sessionPersistence:
      absoluteTimeout: {{ .Values.gateway.sessionPersistence.timeout }}
      cookieConfig:
        lifetimeType: {{ .Values.gateway.sessionPersistence.cookieLifetimeType }}
      sessionName: {{ .Values.gateway.sessionPersistence.cookieName }}
      type: Cookie
    {{- end }}

  # Route /docs to API service
  - matches:
    - path:
        type: PathPrefix
        value: /docs
    backendRefs:
    - name: {{ include "poundcake.fullname" . }}
      port: {{ .Values.service.port }}

  # Route /redoc to API service
  - matches:
    - path:
        type: PathPrefix
        value: /redoc
    backendRefs:
    - name: {{ include "poundcake.fullname" . }}
      port: {{ .Values.service.port }}

  # Route /openapi.json to API service
  - matches:
    - path:
        type: Exact
        value: /openapi.json
    backendRefs:
    - name: {{ include "poundcake.fullname" . }}
      port: {{ .Values.service.port }}

  # Route /metrics to API service
  - matches:
    - path:
        type: Exact
        value: /metrics
    backendRefs:
    - name: {{ include "poundcake.fullname" . }}
      port: {{ .Values.service.port }}

  # Route everything else (/) to UI service - MUST BE LAST
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: {{ include "poundcake.fullname" . }}-ui
      port: {{ .Values.ui.service.port }}
    {{- if .Values.gateway.sessionPersistence.enabled }}
    sessionPersistence:
      absoluteTimeout: {{ .Values.gateway.sessionPersistence.timeout }}
      cookieConfig:
        lifetimeType: {{ .Values.gateway.sessionPersistence.cookieLifetimeType }}
      sessionName: {{ .Values.gateway.sessionPersistence.uiCookieName }}
      type: Cookie
    {{- end }}
{{- end }}

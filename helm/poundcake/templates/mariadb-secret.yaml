{{- if .Values.mariadbOperator.enabled }}
{{/*
Generate secrets for MariaDB root and user passwords if not using existing secrets
*/}}

{{- if not .Values.mariadbOperator.server.rootPasswordSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "poundcake.mariadbRootSecretName" . }}
  namespace: {{ include "poundcake.mariadbNamespace" . }}
  labels:
    {{- include "poundcake.labels" . | nindent 4 }}
    app.kubernetes.io/component: mariadb
type: Opaque
data:
  {{- if .Values.mariadbOperator.server.rootPassword }}
  password: {{ .Values.mariadbOperator.server.rootPassword | b64enc | quote }}
  {{- else }}
  password: {{ randAlphaNum 24 | b64enc | quote }}
  {{- end }}
{{- end }}

{{- if not .Values.mariadbOperator.user.passwordSecret }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "poundcake.mariadbUserSecretName" . }}
  namespace: {{ include "poundcake.mariadbNamespace" . }}
  labels:
    {{- include "poundcake.labels" . | nindent 4 }}
    app.kubernetes.io/component: mariadb
type: Opaque
data:
  {{- if .Values.mariadbOperator.user.password }}
  password: {{ .Values.mariadbOperator.user.password | b64enc | quote }}
  {{- else }}
  password: {{ randAlphaNum 24 | b64enc | quote }}
  {{- end }}
{{- end }}
{{- end }}

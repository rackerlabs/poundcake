{{- if or .Values.bakery.enabled (eq (default "full" .Values.deployment.mode) "bakery-only") }}
{{- $hasDirectServiceNow := and (not .Values.bakery.servicenow.existingSecret) .Values.bakery.servicenow.password }}
{{- $hasDirectJira := and (not .Values.bakery.jira.existingSecret) .Values.bakery.jira.apiToken }}
{{- $hasDirectGithub := and (not .Values.bakery.github.existingSecret) .Values.bakery.github.token }}
{{- $hasDirectPagerDuty := and (not .Values.bakery.pagerduty.existingSecret) .Values.bakery.pagerduty.apiKey }}
{{- $hasDirectRackspaceCore := and (not .Values.bakery.rackspaceCore.existingSecret) .Values.bakery.rackspaceCore.password }}
{{- $hasDirectBakeryAuth := and (not .Values.bakery.auth.existingSecret) .Values.bakery.auth.hmac.activeKey .Values.bakery.auth.hmac.activeKeyId }}
{{- $hasDirectBakeryClientAuth := and (not .Values.bakery.client.auth.existingSecret) .Values.bakery.client.auth.key .Values.bakery.client.auth.keyId }}
{{- if or $hasDirectServiceNow $hasDirectJira $hasDirectGithub $hasDirectPagerDuty $hasDirectRackspaceCore $hasDirectBakeryAuth $hasDirectBakeryClientAuth }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "poundcake.bakerySecretName" . }}
  labels:
    {{- include "poundcake.labels" . | nindent 4 }}
    app.kubernetes.io/component: bakery
type: Opaque
data:
  {{- if $hasDirectServiceNow }}
  servicenow-password: {{ .Values.bakery.servicenow.password | b64enc | quote }}
  {{- end }}
  {{- if $hasDirectJira }}
  jira-api-token: {{ .Values.bakery.jira.apiToken | b64enc | quote }}
  {{- end }}
  {{- if $hasDirectGithub }}
  github-token: {{ .Values.bakery.github.token | b64enc | quote }}
  {{- end }}
  {{- if $hasDirectPagerDuty }}
  pagerduty-api-key: {{ .Values.bakery.pagerduty.apiKey | b64enc | quote }}
  {{- end }}
  {{- if $hasDirectRackspaceCore }}
  rackspace-core-password: {{ .Values.bakery.rackspaceCore.password | b64enc | quote }}
  {{- end }}
  {{- if $hasDirectBakeryAuth }}
  active-key-id: {{ .Values.bakery.auth.hmac.activeKeyId | b64enc | quote }}
  active-key: {{ .Values.bakery.auth.hmac.activeKey | b64enc | quote }}
  next-key-id: {{ .Values.bakery.auth.hmac.nextKeyId | b64enc | quote }}
  next-key: {{ .Values.bakery.auth.hmac.nextKey | b64enc | quote }}
  {{- end }}
  {{- if $hasDirectBakeryClientAuth }}
  client-key-id: {{ .Values.bakery.client.auth.keyId | b64enc | quote }}
  client-key: {{ .Values.bakery.client.auth.key | b64enc | quote }}
  {{- end }}
{{- end }}
{{- end }}

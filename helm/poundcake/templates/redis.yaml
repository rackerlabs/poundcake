{{- if ne (default "full" .Values.deployment.mode) "bakery-only" }}

{{- if and .Values.redis.enabled .Values.redis.deploy }}
apiVersion: redis.redis.opstreelabs.in/v1beta2
kind: Redis
metadata:
  name: {{ include "poundcake.stackstormRedisName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "poundcake.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
    stackstorm.io/log-group: stackstorm
    stackstorm.io/log-role: infra
spec:
  kubernetesConfig:
    image: {{ .Values.redis.image.repository | default "quay.io/opstree/redis" }}:{{ .Values.redis.image.tag | default "v7.0.15" }}
    imagePullPolicy: {{ .Values.redis.image.pullPolicy | default "IfNotPresent" }}

    {{- if .Values.redis.resources }}
    resources:
      {{- toYaml .Values.redis.resources | nindent 6 }}
    {{- else }}
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
    {{- end }}

  podSecurityContext:
    runAsUser: 1000
    fsGroup: 1000

  storage:
    volumeClaimTemplate:
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.redis.persistence.storageClassName }}
        storageClassName: {{ .Values.redis.persistence.storageClassName }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.redis.persistence.size | default "1Gi" }}

  redisExporter:
    enabled: {{ .Values.redis.metrics.enabled | default false }}
    image: {{ .Values.redis.metrics.image.repository | default "quay.io/opstree/redis-exporter" }}:{{ .Values.redis.metrics.image.tag | default "v1.44.0" }}

  {{- if .Values.redis.auth.enabled }}
  redisConfig:
    additionalRedisConfig: |
      requirepass {{ .Values.redis.auth.password | default "stackstorm" }}
  {{- end }}
{{- end }}
{{- end }}

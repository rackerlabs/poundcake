
{{- if .Values.stackstorm.chart.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "poundcake.fullname" . }}-stackstorm-bootstrap
  labels:
    {{- include "poundcake.labels" . | nindent 4 }}
    app.kubernetes.io/component: stackstorm-bootstrap
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "10"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  template:
    metadata:
      name: {{ include "poundcake.fullname" . }}-stackstorm-bootstrap
      labels:
        {{- include "poundcake.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: stackstorm-bootstrap
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ include "poundcake.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
      - name: stackstorm-bootstrap
        image: "bitnami/kubectl:latest"
        imagePullPolicy: IfNotPresent
        command:
        - /bin/sh
        - -c
        - |
          set -e

          NS="{{ .Release.Namespace }}"
          ST2_PREFIX="{{ include "poundcake.stackstormSubchartPrefix" . }}"
          API_KEY_SECRET="{{ include "poundcake.stackstormApiKeySecret" . }}"
          API_KEY_FIELD="{{ include "poundcake.stackstormApiKeySecretKey" . }}"
          ST2_AUTH_SECRET="{{ include "poundcake.stackstormAuthSecretName" . }}"
          ST2_AUTH_USER_DEFAULT="{{ .Values.stackstorm.adminUser }}"
          ST2_ADMIN_PASSWORD_SECRET="{{ .Values.stackstorm.adminPasswordSecret | default (include "poundcake.stackstormAuthSecretName" .) }}"
          ST2_ADMIN_PASSWORD_KEY="{{ .Values.stackstorm.adminPasswordSecretKey | default "ST2_AUTH_PASSWORD" }}"
          ST2_AUTH_URL="{{ include "poundcake.stackstormAuthUrl" . }}"
          ST2_API_URL="{{ include "poundcake.stackstormApiUrl" . }}"
          TIMEOUT="600s"

          for cmd in kubectl curl sed base64; do
            if ! command -v "${cmd}" >/dev/null 2>&1; then
              echo "ERROR: required command '${cmd}' not found in bootstrap image"
              exit 1
            fi
          done

          scale_if_exists() {
            name="$1"
            replicas="$2"
            if kubectl -n "${NS}" get deployment "${name}" >/dev/null 2>&1; then
              echo "Scaling ${name} -> ${replicas}"
              kubectl -n "${NS}" scale deployment "${name}" --replicas="${replicas}"
            else
              echo "Skipping ${name} (not found)"
            fi
          }

          wait_rollout_if_exists() {
            name="$1"
            if kubectl -n "${NS}" get deployment "${name}" >/dev/null 2>&1; then
              echo "Waiting for rollout: ${name}"
              kubectl -n "${NS}" rollout status "deployment/${name}" --timeout="${TIMEOUT}"
            fi
          }

          get_secret_value() {
            secret_name="$1"
            secret_key="$2"
            kubectl -n "${NS}" get secret "${secret_name}" -o "jsonpath={.data['${secret_key}']}" 2>/dev/null | base64 -d 2>/dev/null || true
          }

          wait_for_api_ready() {
            max_retries=120
            retry=0
            echo "Waiting for StackStorm API readiness at ${ST2_API_URL}..."
            while [ "${retry}" -lt "${max_retries}" ]; do
              http_code="$(curl -s -o /dev/null -w "%{http_code}" "${ST2_API_URL}/v1/actions" || true)"
              if [ "${http_code}" = "200" ] || [ "${http_code}" = "401" ]; then
                echo "✓ StackStorm API ready (HTTP ${http_code})"
                return 0
              fi
              retry=$((retry + 1))
              sleep 5
            done
            echo "ERROR: StackStorm API not ready in time"
            return 1
          }

          get_auth_token() {
            user="$1"
            pass="$2"
            response="$(curl -s -u "${user}:${pass}" -X POST "${ST2_AUTH_URL}/tokens" || true)"
            echo "${response}" | sed -n 's/.*"token"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1
          }

          create_api_key() {
            token="$1"
            response="$(curl -s -X POST "${ST2_API_URL}/v1/apikeys" \
              -H "X-Auth-Token: ${token}" \
              -H "Content-Type: application/json" \
              -d '{}' || true)"
            echo "${response}" | sed -n 's/.*"key"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1
          }

          validate_api_key() {
            key="$1"
            http_code="$(curl -s -o /dev/null -w "%{http_code}" -H "St2-Api-Key: ${key}" "${ST2_API_URL}/v1/actions" || true)"
            [ "${http_code}" = "200" ]
          }

          upsert_api_key_secret() {
            api_key="$1"
            encoded="$(printf "%s" "${api_key}" | base64 | tr -d '\n')"
            if kubectl -n "${NS}" get secret "${API_KEY_SECRET}" >/dev/null 2>&1; then
              kubectl -n "${NS}" patch secret "${API_KEY_SECRET}" --type merge \
                -p "{\"data\":{\"${API_KEY_FIELD}\":\"${encoded}\"}}" >/dev/null
            else
              kubectl -n "${NS}" create secret generic "${API_KEY_SECRET}" \
                --from-literal="${API_KEY_FIELD}=${api_key}" >/dev/null
            fi
          }

          ensure_api_key_secret() {
            st2_auth_user="${ST2_AUTH_USER_DEFAULT}"
            st2_auth_password=""

            # Prefer StackStorm auth secret (used by subchart), then fallback to PoundCake admin secret.
            discovered_user="$(get_secret_value "${ST2_AUTH_SECRET}" "username")"
            if [ -z "${discovered_user}" ]; then
              discovered_user="$(get_secret_value "${ST2_AUTH_SECRET}" "ST2_AUTH_USERNAME")"
            fi
            if [ -n "${discovered_user}" ]; then
              st2_auth_user="${discovered_user}"
            fi

            st2_auth_password="$(get_secret_value "${ST2_AUTH_SECRET}" "password")"
            if [ -z "${st2_auth_password}" ]; then
              st2_auth_password="$(get_secret_value "${ST2_AUTH_SECRET}" "ST2_AUTH_PASSWORD")"
            fi
            if [ -z "${st2_auth_password}" ] && [ -n "${ST2_ADMIN_PASSWORD_SECRET}" ] && [ -n "${ST2_ADMIN_PASSWORD_KEY}" ]; then
              st2_auth_password="$(get_secret_value "${ST2_ADMIN_PASSWORD_SECRET}" "${ST2_ADMIN_PASSWORD_KEY}")"
            fi

            if [ -z "${st2_auth_password}" ]; then
              echo "ERROR: unable to resolve StackStorm admin password from secrets."
              return 1
            fi

            existing_key="$(get_secret_value "${API_KEY_SECRET}" "${API_KEY_FIELD}")"
            if [ -n "${existing_key}" ] && validate_api_key "${existing_key}"; then
              echo "✓ Existing StackStorm API key is valid."
              return 0
            fi

            echo "Generating StackStorm API key..."
            attempt=0
            while [ "${attempt}" -lt 20 ]; do
              attempt=$((attempt + 1))
              token="$(get_auth_token "${st2_auth_user}" "${st2_auth_password}")"
              if [ -n "${token}" ]; then
                new_key="$(create_api_key "${token}")"
                if [ -n "${new_key}" ] && validate_api_key "${new_key}"; then
                  upsert_api_key_secret "${new_key}"
                  echo "✓ StackStorm API key secret updated: ${API_KEY_SECRET}/${API_KEY_FIELD}"
                  return 0
                fi
              fi
              echo "Attempt ${attempt}/20: failed to generate valid API key, retrying..."
              sleep 4
            done

            echo "ERROR: failed to generate and store StackStorm API key."
            return 1
          }

          echo "========================================"
          echo "StackStorm Bootstrap Job"
          echo "========================================"

          {{- if .Values.stackstorm.startupOrder.enabled }}
          # Stage 1: keep only auth+api up while bootstrap prerequisites complete.
          scale_if_exists "${ST2_PREFIX}-st2stream" 0
          scale_if_exists "${ST2_PREFIX}-st2sensorcontainer" 0
          scale_if_exists "${ST2_PREFIX}-st2rulesengine" 0
          scale_if_exists "${ST2_PREFIX}-st2workflowengine" 0
          scale_if_exists "${ST2_PREFIX}-st2actionrunner" 0
          scale_if_exists "${ST2_PREFIX}-st2scheduler" 0
          scale_if_exists "${ST2_PREFIX}-st2notifier" 0
          scale_if_exists "${ST2_PREFIX}-st2garbagecollector" 0
          scale_if_exists "${ST2_PREFIX}-st2timersengine" 0
          scale_if_exists "${ST2_PREFIX}-st2chatops" 0
          scale_if_exists "${ST2_PREFIX}-st2web" 0
          {{- end }}

          # Wait for auth and api to be available.
          wait_rollout_if_exists "${ST2_PREFIX}-st2auth"
          wait_rollout_if_exists "${ST2_PREFIX}-st2api"
          wait_for_api_ready

          # Bootstrap / validate st2_api_key and write it into a Kubernetes Secret.
          ensure_api_key_secret

          {{- if .Values.stackstorm.startupOrder.enabled }}
          # Stage 2: scale remaining StackStorm services to desired replicas.
          scale_if_exists "${ST2_PREFIX}-st2stream" {{ .Values.stackstorm.startupOrder.replicas.st2stream | int }}
          scale_if_exists "${ST2_PREFIX}-st2sensorcontainer" {{ .Values.stackstorm.startupOrder.replicas.st2sensorcontainer | int }}
          scale_if_exists "${ST2_PREFIX}-st2rulesengine" {{ .Values.stackstorm.startupOrder.replicas.st2rulesengine | int }}
          scale_if_exists "${ST2_PREFIX}-st2workflowengine" {{ .Values.stackstorm.startupOrder.replicas.st2workflowengine | int }}
          scale_if_exists "${ST2_PREFIX}-st2actionrunner" {{ .Values.stackstorm.startupOrder.replicas.st2actionrunner | int }}
          scale_if_exists "${ST2_PREFIX}-st2scheduler" {{ .Values.stackstorm.startupOrder.replicas.st2scheduler | int }}
          scale_if_exists "${ST2_PREFIX}-st2notifier" {{ .Values.stackstorm.startupOrder.replicas.st2notifier | int }}
          scale_if_exists "${ST2_PREFIX}-st2garbagecollector" {{ .Values.stackstorm.startupOrder.replicas.st2garbagecollector | int }}
          scale_if_exists "${ST2_PREFIX}-st2timersengine" {{ .Values.stackstorm.startupOrder.replicas.st2timersengine | int }}
          scale_if_exists "${ST2_PREFIX}-st2chatops" {{ .Values.stackstorm.startupOrder.replicas.st2chatops | int }}
          scale_if_exists "${ST2_PREFIX}-st2web" {{ .Values.stackstorm.startupOrder.replicas.st2web | int }}
          {{- end }}

          echo "========================================"
          echo "Bootstrap Complete"
          echo "========================================"
{{- end }}

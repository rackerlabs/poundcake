{{- if .Values.internal.renderEmbeddedStackstormSubchart -}}
{{- fail "Embedded StackStorm mode is disabled. Install stackstorm-ha separately via bin/install-poundcake.sh." -}}
{{- end -}}

{{- if or (not .Values.stackstorm.url) (not .Values.stackstorm.authUrl) -}}
{{- fail "Set stackstorm.url and stackstorm.authUrl for external StackStorm." -}}
{{- end -}}

{{- if .Values.database.url -}}
{{- fail "database.url is disabled. Use database.existingSecret for secret-based DB URL injection." -}}
{{- end -}}

{{- if .Values.redis.external.password -}}
{{- fail "redis.external.password is disabled. Use redis.external.existingSecret for secret-based Redis password injection." -}}
{{- end -}}

{{- if .Values.stackstorm.adminPassword -}}
{{- fail "stackstorm.adminPassword is disabled. Use stackstorm.adminPasswordSecret for secret-based admin password injection." -}}
{{- end -}}

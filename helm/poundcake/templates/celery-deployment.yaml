{{- if .Values.celery.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "poundcake.fullname" . }}-celery
  labels:
    {{- include "poundcake.labels" . | nindent 4 }}
    app.kubernetes.io/component: celery
spec:
  replicas: {{ .Values.celery.replicaCount }}
  selector:
    matchLabels:
      {{- include "poundcake.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: celery
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "poundcake.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: celery
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "poundcake.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: celery
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - celery
            - -A
            - app.tasks.celery_app
            - worker
            - --loglevel={{ .Values.config.logLevel | lower }}
            - --concurrency={{ .Values.celery.concurrency }}
          env:
            - name: POUNDCAKE_LOG_LEVEL
              value: {{ .Values.config.logLevel | quote }}
            {{- if or .Values.database.url .Values.database.existingSecret }}
            - name: POUNDCAKE_DATABASE_URL
              {{- if .Values.database.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.existingSecret }}
                  key: {{ .Values.database.secretKey }}
              {{- else }}
              value: {{ .Values.database.url | quote }}
              {{- end }}
            {{- end }}
            - name: POUNDCAKE_CELERY_BROKER_URL
              value: {{ include "poundcake.celeryBrokerUrl" . | quote }}
            - name: POUNDCAKE_CELERY_RESULT_BACKEND
              value: {{ include "poundcake.celeryResultBackend" . | quote }}
            {{- if .Values.redis.enabled }}
            {{- if .Values.redis.deploy }}
            {{- if or .Values.redis.password .Values.redis.existingSecret }}
            - name: POUNDCAKE_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "poundcake.redisSecretName" . }}
                  key: {{ .Values.redis.secretKey }}
            {{- end }}
            {{- else }}
            {{- if .Values.redis.external.password }}
            - name: POUNDCAKE_REDIS_PASSWORD
              value: {{ .Values.redis.external.password | quote }}
            {{- else if .Values.redis.external.existingSecret }}
            - name: POUNDCAKE_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.redis.external.existingSecret }}
                  key: {{ .Values.redis.external.secretKey }}
            {{- end }}
            {{- end }}
            {{- end }}
            - name: POUNDCAKE_STACKSTORM_URL
              value: {{ .Values.stackstorm.url | quote }}
            {{- if .Values.stackstorm.authUrl }}
            - name: POUNDCAKE_STACKSTORM_AUTH_URL
              value: {{ .Values.stackstorm.authUrl | quote }}
            {{- end }}
            - name: POUNDCAKE_STACKSTORM_VERIFY_SSL
              value: {{ .Values.stackstorm.verifySsl | quote }}
            {{- if or .Values.stackstorm.apiKey .Values.stackstorm.existingSecret }}
            - name: POUNDCAKE_STACKSTORM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "poundcake.stackstormSecretName" . }}
                  key: {{ .Values.stackstorm.secretKeys.apiKey }}
                  optional: true
            {{- end }}
          resources:
            {{- toYaml .Values.celery.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}

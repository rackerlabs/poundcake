
{{- if .Values.stackstorm.adminPasswordSecret }}
---
{{- $adminSecretName := .Values.stackstorm.adminPasswordSecret }}
{{- $adminSecretKey := .Values.stackstorm.adminPasswordSecretKey | default "ST2_AUTH_PASSWORD" }}
{{- $existingAdminSecret := lookup "v1" "Secret" .Release.Namespace $adminSecretName }}
{{- $adminPassword := "" }}
{{- if $existingAdminSecret }}
  {{- $existingAdminPassword := index $existingAdminSecret.data $adminSecretKey }}
  {{- if $existingAdminPassword }}
    {{- $adminPassword = $existingAdminPassword | b64dec }}
  {{- else }}
    {{- $adminPassword = randAlphaNum 24 }}
  {{- end }}
{{- else }}
  {{- $adminPassword = randAlphaNum 24 }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $adminSecretName }}
  labels:
    {{- include "poundcake.labels" . | nindent 4 }}
  annotations:
    "helm.sh/resource-policy": keep
type: Opaque
data:
  {{ $adminSecretKey }}: {{ $adminPassword | b64enc | quote }}
{{- end }}
{{- if .Values.auth.enabled }}
---
{{- $secretName := printf "%s-admin" (include "poundcake.fullname" .) }}
{{- $existingSecret := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- $adminPassword := "" }}
{{- if $existingSecret }}
  {{- $adminPassword = index $existingSecret.data "password" | b64dec }}
{{- else }}
  {{- $adminPassword = randAlphaNum 24 }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "poundcake.labels" . | nindent 4 }}
  annotations:
    "helm.sh/resource-policy": keep
type: Opaque
data:
  username: {{ "admin" | b64enc | quote }}
  password: {{ $adminPassword | b64enc | quote }}
{{- end }}


{{- if .Values.stackstorm.adminPasswordSecret }}
---
{{- $adminSecretName := .Values.stackstorm.adminPasswordSecret }}
{{- $adminSecretKey := .Values.stackstorm.adminPasswordSecretKey | default "ST2_AUTH_PASSWORD" }}
{{- $existingAdminSecret := lookup "v1" "Secret" .Release.Namespace $adminSecretName }}
{{- $adminPassword := "" }}
{{- if $existingAdminSecret }}
  {{- $existingAdminPassword := index $existingAdminSecret.data $adminSecretKey }}
  {{- if $existingAdminPassword }}
    {{- $adminPassword = $existingAdminPassword | b64dec }}
  {{- else }}
    {{- $adminPassword = randAlphaNum 24 }}
  {{- end }}
{{- else }}
  {{- $adminPassword = randAlphaNum 24 }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $adminSecretName }}
  labels:
    {{- include "poundcake.labels" . | nindent 4 }}
  annotations:
    {{- include "poundcake.preInstallSecretAnnotations" . | nindent 4 }}
type: Opaque
data:
  {{ $adminSecretKey }}: {{ $adminPassword | b64enc | quote }}
{{- end }}
{{- if .Values.stackstorm.chart.enabled }}
---
{{- $apiKeySecretName := include "poundcake.stackstormApiKeySecret" . }}
{{- $apiKeySecretKey := include "poundcake.stackstormApiKeySecretKey" . }}
{{- $existingApiKeySecret := lookup "v1" "Secret" .Release.Namespace $apiKeySecretName }}
{{- $apiKeyValue := "" }}
{{- if $existingApiKeySecret }}
  {{- $existingApiKey := index $existingApiKeySecret.data $apiKeySecretKey }}
  {{- if $existingApiKey }}
    {{- $apiKeyValue = $existingApiKey | b64dec }}
  {{- else }}
    {{- $apiKeyValue = randAlphaNum 40 }}
  {{- end }}
{{- else }}
  {{- $apiKeyValue = randAlphaNum 40 }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $apiKeySecretName }}
  labels:
    {{- include "poundcake.labels" . | nindent 4 }}
    app.kubernetes.io/component: stackstorm
  annotations:
    {{- include "poundcake.preInstallSecretAnnotations" . | nindent 4 }}
type: Opaque
data:
  {{ $apiKeySecretKey }}: {{ $apiKeyValue | b64enc | quote }}
{{- end }}
{{- if .Values.auth.enabled }}
---
{{- $secretName := printf "%s-admin" (include "poundcake.fullname" .) }}
{{- $existingSecret := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- $adminPassword := "" }}
{{- if $existingSecret }}
  {{- $adminPassword = index $existingSecret.data "password" | b64dec }}
{{- else }}
  {{- $adminPassword = randAlphaNum 24 }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "poundcake.labels" . | nindent 4 }}
  annotations:
    {{- include "poundcake.preInstallSecretAnnotations" . | nindent 4 }}
type: Opaque
data:
  username: {{ "admin" | b64enc | quote }}
  password: {{ $adminPassword | b64enc | quote }}
{{- end }}

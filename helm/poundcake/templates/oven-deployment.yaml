
{{- if .Values.oven.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "poundcake.fullname" . }}-oven
  labels:
    {{- include "poundcake.labels" . | nindent 4 }}
    app.kubernetes.io/component: oven
spec:
  replicas: {{ .Values.oven.replicaCount }}
  selector:
    matchLabels:
      {{- include "poundcake.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: oven
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "poundcake.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: oven
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "poundcake.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      initContainers:
        - name: wait-for-api
          image: curlimages/curl:latest
          command:
          - /bin/sh
          - -c
          - |
            set -e
            echo "Waiting for PoundCake API to be ready..."

            MAX_WAIT=300  # 5 minutes
            ELAPSED=0
            INTERVAL=5

            while [ $ELAPSED -lt $MAX_WAIT ]; do
              if curl -sf http://{{ include "poundcake.fullname" . }}:{{ .Values.service.port }}/api/v1/health > /dev/null 2>&1; then
                echo "✓ PoundCake API is ready"
                exit 0
              fi

              echo "Waiting for API... (${ELAPSED}s / ${MAX_WAIT}s)"
              sleep $INTERVAL
              ELAPSED=$((ELAPSED + INTERVAL))
            done

            echo "✗ Timeout waiting for PoundCake API"
            exit 1
      containers:
        - name: oven
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["python", "oven/oven.py"]
          env:
            - name: POUNDCAKE_API_URL
              value: "http://{{ include "poundcake.fullname" . }}:{{ .Values.service.port }}/api/v1"
            - name: OVEN_POLL_INTERVAL
              value: {{ .Values.oven.pollInterval | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.config.logLevel | quote }}
          resources:
            {{- toYaml .Values.oven.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}

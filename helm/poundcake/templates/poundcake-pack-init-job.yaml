{{- if .Values.bootstrap.packInit.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "poundcake.fullname" . }}-pack-init
  labels:
    {{- include "poundcake.labels" . | nindent 4 }}
    app.kubernetes.io/component: pack-init
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "30"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 2
  template:
    metadata:
      labels:
        {{- include "poundcake.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: pack-init
    spec:
      restartPolicy: OnFailure
      containers:
        - name: pack-init
          image: {{ .Values.bootstrap.packInit.image | quote }}
          command:
            - sh
            - -c
            - >
              mkdir -p /tmp/stackstorm-packs/workflows
              && mkdir -p /tmp/stackstorm-packs/actions
              && chown -R 1000:1000 /tmp/stackstorm-packs
              && echo "[PACK-INIT] Prepared /tmp/stackstorm-packs tree";
{{- end }}

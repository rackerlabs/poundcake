{{- if and .Values.bakery.enabled .Values.bakery.database.createServer .Values.mariadbOperator.enabled }}
---
apiVersion: k8s.mariadb.com/v1alpha1
kind: MariaDB
metadata:
  name: {{ include "poundcake.fullname" . }}-bakery-mariadb
  namespace: {{ .Values.mariadbOperator.namespace | default .Release.Namespace }}
  labels:
    {{- include "poundcake.labels" . | nindent 4 }}
    app.kubernetes.io/component: bakery-database
spec:
  rootPasswordSecretKeyRef:
    name: {{ include "poundcake.bakeryMariadbRootSecretName" . }}
    key: {{ .Values.mariadbOperator.server.rootPasswordSecretKey | default "password" }}

  image: {{ .Values.mariadbOperator.server.image.repository }}:{{ .Values.mariadbOperator.server.image.tag }}
  imagePullPolicy: {{ .Values.mariadbOperator.server.image.pullPolicy }}

  port: 3306

  replicas: {{ .Values.mariadbOperator.server.replicas }}

  storage:
    size: {{ .Values.mariadbOperator.server.storage.size }}
    {{- if .Values.mariadbOperator.server.storage.storageClassName }}
    storageClassName: {{ .Values.mariadbOperator.server.storage.storageClassName }}
    {{- end }}

  resources:
    {{- toYaml .Values.mariadbOperator.server.resources | nindent 4 }}

  myCnf: |
    [mariadb]
    bind-address=*
    default_storage_engine=InnoDB
    binlog_format=row
    innodb_autoinc_lock_mode=2
    max_allowed_packet=256M
    character-set-server=utf8mb4
    collation-server=utf8mb4_unicode_ci

---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "poundcake.bakeryMariadbRootSecretName" . }}
  namespace: {{ .Values.mariadbOperator.namespace | default .Release.Namespace }}
  labels:
    {{- include "poundcake.labels" . | nindent 4 }}
    app.kubernetes.io/component: bakery-database
  annotations:
    {{- include "poundcake.preInstallSecretAnnotations" . | nindent 4 }}
type: Opaque
{{- $bakeryRootSecretName := include "poundcake.bakeryMariadbRootSecretName" . }}
{{- $existingBakeryRootSecret := lookup "v1" "Secret" (.Values.mariadbOperator.namespace | default .Release.Namespace) $bakeryRootSecretName }}
data:
  {{- if .Values.mariadbOperator.server.rootPassword }}
  password: {{ .Values.mariadbOperator.server.rootPassword | b64enc | quote }}
  {{- else if $existingBakeryRootSecret }}
  password: {{ index $existingBakeryRootSecret.data "password" }}
  {{- else }}
  password: {{ randAlphaNum 32 | b64enc | quote }}
  {{- end }}

---
apiVersion: k8s.mariadb.com/v1alpha1
kind: Database
metadata:
  name: {{ include "poundcake.fullname" . }}-bakery-db
  namespace: {{ .Values.mariadbOperator.namespace | default .Release.Namespace }}
  labels:
    {{- include "poundcake.labels" . | nindent 4 }}
    app.kubernetes.io/component: bakery-database
spec:
  mariaDbRef:
    name: {{ include "poundcake.fullname" . }}-bakery-mariadb
  name: {{ .Values.bakery.database.name }}
  characterSet: utf8mb4
  collate: utf8mb4_unicode_ci

---
apiVersion: k8s.mariadb.com/v1alpha1
kind: User
metadata:
  name: {{ include "poundcake.fullname" . }}-bakery-user
  namespace: {{ .Values.mariadbOperator.namespace | default .Release.Namespace }}
  labels:
    {{- include "poundcake.labels" . | nindent 4 }}
    app.kubernetes.io/component: bakery-database
spec:
  mariaDbRef:
    name: {{ include "poundcake.fullname" . }}-bakery-mariadb
  name: {{ .Values.bakery.database.user.name }}
  passwordSecretKeyRef:
    name: {{ include "poundcake.bakeryDbSecretName" . }}
    key: {{ .Values.bakery.database.user.passwordSecretKey | default "password" }}
  maxUserConnections: {{ .Values.bakery.database.user.maxUserConnections }}
  host: "%"

---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "poundcake.bakeryDbSecretName" . }}
  namespace: {{ .Values.mariadbOperator.namespace | default .Release.Namespace }}
  labels:
    {{- include "poundcake.labels" . | nindent 4 }}
    app.kubernetes.io/component: bakery-database
  annotations:
    {{- include "poundcake.preInstallSecretAnnotations" . | nindent 4 }}
type: Opaque
{{- $bakeryUserSecretName := include "poundcake.bakeryDbSecretName" . }}
{{- $existingBakeryUserSecret := lookup "v1" "Secret" (.Values.mariadbOperator.namespace | default .Release.Namespace) $bakeryUserSecretName }}
data:
  {{- if .Values.bakery.database.user.password }}
  password: {{ .Values.bakery.database.user.password | b64enc | quote }}
  {{- else if $existingBakeryUserSecret }}
  password: {{ index $existingBakeryUserSecret.data "password" }}
  {{- else }}
  password: {{ randAlphaNum 32 | b64enc | quote }}
  {{- end }}

---
apiVersion: k8s.mariadb.com/v1alpha1
kind: Grant
metadata:
  name: {{ include "poundcake.fullname" . }}-bakery-grant
  namespace: {{ .Values.mariadbOperator.namespace | default .Release.Namespace }}
  labels:
    {{- include "poundcake.labels" . | nindent 4 }}
    app.kubernetes.io/component: bakery-database
spec:
  mariaDbRef:
    name: {{ include "poundcake.fullname" . }}-bakery-mariadb
  privileges:
    - "ALL PRIVILEGES"
  database: {{ .Values.bakery.database.name }}
  table: "*"
  username: {{ .Values.bakery.database.user.name }}
  host: "%"
  grantOption: false
{{- end }}

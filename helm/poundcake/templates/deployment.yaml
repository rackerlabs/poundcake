{{- if ne (default "full" .Values.deployment.mode) "bakery-only" }}

apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "poundcake.fullname" . }}
  labels:
    {{- include "poundcake.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "poundcake.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/mappings: {{ include (print $.Template.BasePath "/configmap-mappings.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "poundcake.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: api
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "poundcake.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      initContainers:
        - name: bootstrap-marker
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - touch /tmp/poundcake_bootstrap.done
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      containers:
        - name: api
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- if .Values.mariadbOperator.enabled }}
          command:
            - /bin/bash
            - -c
            - |
              # Construct database URL with password from secret
              export POUNDCAKE_DATABASE_URL="mysql+pymysql://{{ include "poundcake.mariadbUsername" . }}:${MARIADB_PASSWORD}@{{ include "poundcake.mariadbHost" . }}:3306/{{ include "poundcake.mariadbDatabaseName" . }}"
              # Start the application
              exec uvicorn api.main:app --host ${POUNDCAKE_SERVER_HOST} --port ${POUNDCAKE_SERVER_PORT}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.config.port }}
              protocol: TCP
          env:
            # Note: Using SERVER_HOST/SERVER_PORT to avoid collision with
            # Kubernetes auto-generated service env vars (POUNDCAKE_PORT, etc.)
            - name: POUNDCAKE_SERVER_HOST
              value: {{ .Values.config.host | quote }}
            - name: POUNDCAKE_SERVER_PORT
              value: {{ .Values.config.port | quote }}
            - name: POUNDCAKE_DEBUG
              value: {{ .Values.config.debug | quote }}
            - name: POUNDCAKE_LOG_LEVEL
              value: {{ .Values.config.logLevel | quote }}
            - name: POUNDCAKE_LOG_FORMAT
              value: {{ .Values.config.logFormat | quote }}
            - name: SERVICE_NAME
              value: "api"
            - name: POUNDCAKE_AUTH_ENABLED
              value: {{ .Values.auth.enabled | quote }}
            - name: POUNDCAKE_METRICS_ENABLED
              value: {{ .Values.config.metricsEnabled | quote }}
            - name: POUNDCAKE_METRICS_PATH
              value: {{ .Values.config.metricsPath | quote }}
            - name: POUNDCAKE_DEFAULT_TIMEOUT
              value: {{ .Values.config.defaultTimeout | quote }}
            - name: POUNDCAKE_MAX_CONCURRENT_REMEDIATIONS
              value: {{ .Values.config.maxConcurrentRemediations | quote }}
            - name: DISHWASHER_DEFAULT_DURATION
              value: {{ .Values.dishwasher.defaultDuration | quote }}
            - name: DISHWASHER_DEFAULT_TIMEOUT
              value: {{ .Values.dishwasher.defaultTimeout | quote }}
            - name: DISHWASHER_PRUNE_MISSING
              value: {{ .Values.dishwasher.pruneMissing | quote }}
            - name: POUNDCAKE_MAPPINGS_PATH
              value: "/app/config/mappings"
            {{- if .Values.database.existingSecret }}
            - name: POUNDCAKE_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.existingSecret }}
                  key: {{ .Values.database.secretKey }}
            {{- else if .Values.mariadbOperator.enabled }}
            # MariaDB Operator: password from generated secret (URL constructed in command)
            - name: MARIADB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "poundcake.mariadbUserSecretName" . }}
                  key: {{ .Values.mariadbOperator.user.passwordSecretKey | default "password" }}
            {{- end }}
            - name: POUNDCAKE_STACKSTORM_URL
              value: {{ include "poundcake.stackstormApiUrl" . | quote }}
            - name: POUNDCAKE_STACKSTORM_AUTH_URL
              value: {{ include "poundcake.stackstormAuthUrl" . | quote }}
            - name: POUNDCAKE_STACKSTORM_VERIFY_SSL
              value: {{ .Values.stackstorm.verifySsl | quote }}
            {{- if .Values.mongodb.enabled }}
            - name: MONGODB_HOST
              {{- if .Values.mongodb.external }}
              value: {{ .Values.mongodb.host | quote }}
              {{- else }}
              value: "{{ include "poundcake.stackstormMongoName" . }}"
              {{- end }}
            - name: MONGODB_PORT
              {{- if .Values.mongodb.external }}
              value: {{ .Values.mongodb.port | quote }}
              {{- else }}
              value: {{ .Values.mongodb.service.port | quote }}
              {{- end }}
            {{- end }}
            {{- if .Values.rabbitmq.enabled }}
            - name: RABBITMQ_HOST
              {{- if .Values.rabbitmq.external }}
              value: {{ .Values.rabbitmq.host | quote }}
              {{- else }}
              value: "{{ include "poundcake.stackstormRabbitmqName" . }}"
              {{- end }}
            - name: RABBITMQ_PORT
              value: {{ .Values.rabbitmq.port | quote }}
            - name: RABBITMQ_MANAGEMENT_PORT
              value: "15672"
            - name: RABBITMQ_USER
              {{- if .Values.rabbitmq.external }}
              value: {{ .Values.rabbitmq.username | quote }}
              {{- else }}
              value: {{ .Values.rabbitmq.auth.username | quote }}
              {{- end }}
            - name: RABBITMQ_PASSWORD
              {{- if .Values.rabbitmq.external }}
              value: {{ .Values.rabbitmq.password | quote }}
              {{- else }}
              value: {{ .Values.rabbitmq.auth.password | quote }}
              {{- end }}
            {{- end }}
            - name: POUNDCAKE_STACKSTORM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "poundcake.stackstormApiKeySecret" . }}
                  key: {{ include "poundcake.stackstormApiKeySecretKey" . }}
                  optional: true
            {{- if .Values.stackstorm.adminUser }}
            - name: POUNDCAKE_STACKSTORM_ADMIN_USER
              value: {{ .Values.stackstorm.adminUser | quote }}
            {{- end }}
            {{- $st2AdminSecret := .Values.stackstorm.adminPasswordSecret | default (include "poundcake.stackstormAuthSecretName" .) }}
            - name: POUNDCAKE_STACKSTORM_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $st2AdminSecret }}
                  key: {{ .Values.stackstorm.adminPasswordSecretKey | default "ST2_AUTH_PASSWORD" }}
                  optional: true
            {{- if .Values.redis.enabled }}
            - name: REDIS_HOST
              {{- if .Values.redis.deploy }}
              value: "{{ include "poundcake.stackstormRedisName" . }}"
              {{- else }}
              value: {{ .Values.redis.external.host | quote }}
              {{- end }}
            - name: REDIS_PORT
              {{- if .Values.redis.deploy }}
              value: "6379"
              {{- else }}
              value: {{ .Values.redis.external.port | quote }}
              {{- end }}
            - name: POUNDCAKE_REDIS_URL
              value: {{ include "poundcake.redisUrl" . | quote }}
            - name: POUNDCAKE_ALERT_TTL_HOURS
              value: {{ .Values.redis.alertTtlHours | quote }}
            - name: POUNDCAKE_LOCK_TIMEOUT_SECONDS
              value: {{ .Values.redis.lockTimeoutSeconds | quote }}
            {{- if .Values.redis.deploy }}
            {{- if or .Values.redis.password .Values.redis.existingSecret }}
            - name: POUNDCAKE_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "poundcake.redisSecretName" . }}
                  key: {{ .Values.redis.secretKey }}
            {{- end }}
            {{- else }}
            {{- if .Values.redis.external.existingSecret }}
            - name: POUNDCAKE_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.redis.external.existingSecret }}
                  key: {{ .Values.redis.external.secretKey }}
            {{- end }}
            {{- end }}
            {{- end }}
            {{- if .Values.prometheus }}
            - name: POUNDCAKE_PROMETHEUS_URL
              value: {{ .Values.prometheus.url | quote }}
            - name: POUNDCAKE_PROMETHEUS_VERIFY_SSL
              value: {{ .Values.prometheus.verifySsl | quote }}
            - name: POUNDCAKE_PROMETHEUS_USE_CRDS
              value: {{ .Values.prometheus.useCrds | quote }}
            - name: POUNDCAKE_PROMETHEUS_CRD_NAMESPACE
              value: {{ .Values.prometheus.crdNamespace | quote }}
            {{- if .Values.prometheus.crdLabels }}
            - name: POUNDCAKE_PROMETHEUS_CRD_LABELS
              value: {{ .Values.prometheus.crdLabels | toJson | quote }}
            {{- end }}
            {{- end }}
            {{- if .Values.git.enabled }}
            - name: POUNDCAKE_GIT_ENABLED
              value: "true"
            - name: POUNDCAKE_GIT_REPO_URL
              value: {{ .Values.git.repoUrl | quote }}
            - name: POUNDCAKE_GIT_BRANCH
              value: {{ .Values.git.branch | quote }}
            - name: POUNDCAKE_GIT_RULES_PATH
              value: {{ .Values.git.rulesPath | quote }}
            - name: POUNDCAKE_GIT_FILE_PER_ALERT
              value: {{ .Values.git.filePerAlert | quote }}
            - name: POUNDCAKE_GIT_FILE_PATTERN
              value: {{ .Values.git.filePattern | quote }}
            - name: POUNDCAKE_GIT_USER_NAME
              value: {{ .Values.git.userName | quote }}
            - name: POUNDCAKE_GIT_USER_EMAIL
              value: {{ .Values.git.userEmail | quote }}
            - name: POUNDCAKE_GIT_PROVIDER
              value: {{ .Values.git.provider | quote }}
            {{- if or .Values.git.token .Values.git.existingSecret }}
            - name: POUNDCAKE_GIT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "poundcake.gitSecretName" . }}
                  key: {{ .Values.git.secretKeys.token }}
                  optional: true
            {{- end }}
            {{- if .Values.git.sshKeyPath }}
            - name: POUNDCAKE_GIT_SSH_KEY_PATH
              value: {{ .Values.git.sshKeyPath | quote }}
            {{- end }}
            {{- end }}
            {{- if .Values.auth.enabled }}
            - name: POUNDCAKE_AUTH_SECRET_NAME
              value: {{ include "poundcake.fullname" . }}-admin
            - name: POUNDCAKE_AUTH_SECRET_NAMESPACE
              value: {{ .Release.Namespace }}
            - name: POUNDCAKE_AUTH_SESSION_TIMEOUT
              value: {{ .Values.auth.sessionTimeout | quote }}
            - name: POUNDCAKE_AUTH_INTERNAL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "poundcake.fullname" . }}-admin
                  key: internal-api-key
            {{- end }}
          startupProbe:
            httpGet:
              path: /api/v1/health
              port: http
            periodSeconds: 5
            failureThreshold: 120
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: mappings
              mountPath: /app/config/mappings
              readOnly: false
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: mappings
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "poundcake.fullname" . }}-mappings
          {{- else }}
          configMap:
            name: {{ include "poundcake.fullname" . }}-mappings
          {{- end }}
        - name: tmp
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}

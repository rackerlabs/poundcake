{{- if .Values.bakery.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "poundcake.bakeryName" . }}
  labels:
    {{- include "poundcake.labels" . | nindent 4 }}
    app.kubernetes.io/component: bakery
spec:
  type: {{ .Values.bakery.service.type }}
  ports:
    - port: {{ .Values.bakery.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "poundcake.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: bakery
{{- end }}

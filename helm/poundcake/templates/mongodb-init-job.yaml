
{{- if and .Values.mongodb.enabled (not .Values.mongodb.external) }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "poundcake.fullname" . }}-mongodb-init
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "poundcake.labels" . | nindent 4 }}
    app.kubernetes.io/component: mongodb-init
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "2"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 5
  template:
    metadata:
      name: {{ include "poundcake.fullname" . }}-mongodb-init
      labels:
        {{- include "poundcake.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: mongodb-init
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ include "poundcake.serviceAccountName" . }}
      containers:
      - name: mongodb-init
        image: mongo:7.0.28
        imagePullPolicy: IfNotPresent
        command:
        - /bin/bash
        - -c
        - |
          set -e

          echo "========================================"
          echo "MongoDB User Initialization for StackStorm"
          echo "========================================"

          # Wait for MongoDB to be ready
          echo "Waiting for MongoDB to be ready..."
          MAX_RETRIES=30
          RETRY_COUNT=0

          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            if mongosh --host {{ include "poundcake.fullname" . }}-mongodb --eval "db.adminCommand('ping')" > /dev/null 2>&1; then
              echo "✓ MongoDB is ready"
              break
            fi
            RETRY_COUNT=$((RETRY_COUNT + 1))
            echo "Attempt ${RETRY_COUNT}/${MAX_RETRIES}: Waiting for MongoDB..."
            sleep 2
          done

          if [ $RETRY_COUNT -ge $MAX_RETRIES ]; then
            echo "✗ ERROR: MongoDB did not become ready after ${MAX_RETRIES} attempts"
            exit 1
          fi

          # Create StackStorm user in st2 database
          echo "Creating StackStorm user in st2 database..."

          # Build MongoDB connection string
          MONGO_URI="mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@{{ include "poundcake.fullname" . }}-mongodb:27017/admin"

          # Try to create user, update if exists
          mongosh "${MONGO_URI}" --eval "
            db.getSiblingDB('st2').createUser({
              user: '${ST2_DB_USERNAME}',
              pwd: '${ST2_DB_PASSWORD}',
              roles: [{role: 'dbOwner', db: 'st2'}]
            })
          " 2>&1 | tee /tmp/create_result.txt

          # Check if user already exists error occurred
          if grep -q "already exists" /tmp/create_result.txt; then
            echo "✓ User ${ST2_DB_USERNAME} already exists, updating..."
            mongosh "${MONGO_URI}" --eval "
              db.getSiblingDB('st2').updateUser('${ST2_DB_USERNAME}', {
                pwd: '${ST2_DB_PASSWORD}',
                roles: [{role: 'dbOwner', db: 'st2'}]
              })
            "
            echo "✓ User ${ST2_DB_USERNAME} updated successfully"
          elif grep -q "{ ok: 1 }" /tmp/create_result.txt; then
            echo "✓ User ${ST2_DB_USERNAME} created successfully"
          else
            echo "✗ ERROR: Failed to create or update user"
            cat /tmp/create_result.txt
            exit 1
          fi

          # Verify user exists
          echo "Verifying user..."
          mongosh "${MONGO_URI}" --eval "
            db.getSiblingDB('st2').runCommand({usersInfo: '${ST2_DB_USERNAME}'})
          " | grep -q "user: '${ST2_DB_USERNAME}'" && echo "✓ User ${ST2_DB_USERNAME} verified in st2 database" || (echo "✗ ERROR: User verification failed" && exit 1)

          echo "========================================"
          echo "MongoDB Initialization Complete"
          echo "========================================"
        env:
        - name: MONGO_ROOT_USERNAME
          value: {{ .Values.mongodb.auth.username | default "stackstorm" | quote }}
        - name: MONGO_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "poundcake.fullname" . }}-mongodb-secret
              key: mongodb-root-password
        - name: ST2_DB_USERNAME
          value: {{ .Values.mongodb.auth.username | default "stackstorm" | quote }}
        - name: ST2_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "poundcake.fullname" . }}-mongodb-secret
              key: mongodb-password
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
{{- end }}

{{- if or .Values.database.url .Values.database.existingSecret .Values.mariadbOperator.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "poundcake.fullname" . }}-db-migrate
  labels:
    {{- include "poundcake.labels" . | nindent 4 }}
    app.kubernetes.io/component: db-migrate
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 3
  template:
    metadata:
      name: {{ include "poundcake.fullname" . }}-db-migrate
      labels:
        {{- include "poundcake.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: db-migrate
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ include "poundcake.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
      - name: db-migrate
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        command:
        - /bin/bash
        - -c
        - |
          set -e

          echo "========================================"
          echo "PoundCake Database Migration"
          echo "========================================"

          # Change to project root where alembic.ini lives
          cd /app

          # Wait for database to be ready
          echo "Waiting for database connection..."
          MAX_RETRIES=30
          RETRY_COUNT=0

          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            if python3 -c "from api.core.database import engine; engine.connect()" 2>/dev/null; then
              echo "✓ Database connection successful"
              break
            fi
            RETRY_COUNT=$((RETRY_COUNT + 1))
            echo "Attempt ${RETRY_COUNT}/${MAX_RETRIES}: Waiting for database..."
            sleep 2
          done

          if [ $RETRY_COUNT -ge $MAX_RETRIES ]; then
            echo "✗ ERROR: Database did not become ready after ${MAX_RETRIES} attempts"
            exit 1
          fi

          # Check if any migrations exist (excluding __init__.py and __pycache__)
          MIGRATION_COUNT=$(find alembic/versions -name "*.py" ! -name "__init__*" ! -path "*/__pycache__/*" 2>/dev/null | wc -l)

          if [ "$MIGRATION_COUNT" -eq 0 ]; then
            echo "[WARN] No migrations found. Creating initial schema migration..."
            alembic revision --autogenerate -m "initial_schema"
            echo "[OK] Initial migration created"
          else
            echo "[OK] Found $MIGRATION_COUNT existing migration(s)"
          fi

          # Run database migrations
          echo "Running database migrations..."
          python3 -m alembic upgrade head

          if [ $? -eq 0 ]; then
            echo "✓ Database migrations applied successfully"
          else
            echo "✗ Database migration failed!"
            exit 1
          fi

          # Show current revision
          echo ""
          echo "Current database revision:"
          python3 -m alembic current

          echo "========================================"
          echo "Migration Complete"
          echo "========================================"
        env:
          {{- if or .Values.database.url .Values.database.existingSecret }}
          - name: POUNDCAKE_DATABASE_URL
            {{- if .Values.database.existingSecret }}
            valueFrom:
              secretKeyRef:
                name: {{ .Values.database.existingSecret }}
                key: {{ .Values.database.secretKey }}
            {{- else }}
            value: {{ .Values.database.url | quote }}
            {{- end }}
          {{- else if .Values.mariadbOperator.enabled }}
          - name: POUNDCAKE_DATABASE_URL
            value: {{ include "poundcake.databaseUrl" . | quote }}
          - name: MARIADB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: {{ include "poundcake.mariadbUserSecretName" . }}
                key: password
          {{- end }}
          - name: POUNDCAKE_LOG_LEVEL
            value: "INFO"
        {{- with .Values.resources }}
        resources:
          {{- toYaml . | nindent 10 }}
        {{- end }}
{{- end }}

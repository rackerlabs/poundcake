
{{- if .Values.ui.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "poundcake.fullname" . }}-ui
  labels:
    {{- include "poundcake.labels" . | nindent 4 }}
    app.kubernetes.io/component: ui
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "poundcake.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: ui
  template:
    metadata:
      labels:
        {{- include "poundcake.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: ui
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      initContainers:
        - name: wait-for-api
          image: curlimages/curl:latest
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          command:
          - /bin/sh
          - -c
          - |
            set -e
            echo "Waiting for PoundCake API to be ready..."

            MAX_WAIT=300  # 5 minutes
            ELAPSED=0
            INTERVAL=5

            while [ $ELAPSED -lt $MAX_WAIT ]; do
              if curl -sf http://{{ include "poundcake.fullname" . }}:{{ .Values.service.port }}/api/v1/health > /dev/null 2>&1; then
                echo "✓ PoundCake API is ready"
                exit 0
              fi

              echo "Waiting for API... (${ELAPSED}s / ${MAX_WAIT}s)"
              sleep $INTERVAL
              ELAPSED=$((ELAPSED + INTERVAL))
            done

            echo "✗ Timeout waiting for PoundCake API"
            exit 1
      containers:
        - name: ui
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.ui.image.repository }}:{{ .Values.ui.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.ui.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          env:
            - name: API_URL
              # Use FQDN to explicitly reference the API service in the same namespace
              value: "http://{{ include "poundcake.fullname" . }}.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.service.port }}"
          volumeMounts:
            # Writable tmpfs volumes for nginx on read-only filesystems (Talos)
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d
          resources:
            {{- toYaml .Values.ui.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        # tmpfs volumes for nginx writable directories on read-only filesystems
        - name: nginx-cache
          emptyDir:
            medium: Memory
            sizeLimit: 10Mi
        - name: nginx-run
          emptyDir:
            medium: Memory
            sizeLimit: 1Mi
        - name: nginx-conf
          emptyDir:
            medium: Memory
            sizeLimit: 1Mi
{{- end }}

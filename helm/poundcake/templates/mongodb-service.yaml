
{{- if and .Values.mongodb.enabled (not .Values.mongodb.external) }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "poundcake.fullname" . }}-mongodb
  labels:
    {{- include "poundcake.labels" . | nindent 4 }}
    app.kubernetes.io/component: mongodb
spec:
  type: {{ .Values.mongodb.service.type }}
  ports:
  - port: {{ .Values.mongodb.service.port }}
    targetPort: mongodb
    protocol: TCP
    name: mongodb
  selector:
    {{- include "poundcake.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: mongodb
{{- end }}

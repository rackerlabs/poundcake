{{- if .Values.mongodb.enabled }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "poundcake.fullname" . }}-mongodb
  labels:
    {{- include "poundcake.labels" . | nindent 4 }}
    app.kubernetes.io/component: mongodb
type: Opaque
stringData:
  {{- if .Values.mongodb.server.rootPasswordSecret }}
  root-password: {{ .Values.mongodb.server.rootPassword | b64enc }}
  {{- else }}
  root-password: {{ .Values.mongodb.server.rootPassword | default (randAlphaNum 32) | b64enc }}
  {{- end }}
  {{- if .Values.mongodb.user.passwordSecret }}
  user-password: {{ .Values.mongodb.user.password | b64enc }}
  {{- else }}
  user-password: {{ .Values.mongodb.user.password | default (randAlphaNum 32) | b64enc }}
  {{- end }}
  mongodb-url: {{ printf "mongodb://%s:%s@%s-mongodb:%d/%s" .Values.mongodb.user.username .Values.mongodb.user.password (include "poundcake.fullname" .) (.Values.mongodb.server.port | int) .Values.mongodb.database.name | b64enc }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "poundcake.fullname" . }}-mongodb
  labels:
    {{- include "poundcake.labels" . | nindent 4 }}
    app.kubernetes.io/component: mongodb
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.mongodb.server.port }}
      targetPort: mongodb
      protocol: TCP
      name: mongodb
  selector:
    {{- include "poundcake.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: mongodb
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "poundcake.fullname" . }}-mongodb
  labels:
    {{- include "poundcake.labels" . | nindent 4 }}
    app.kubernetes.io/component: mongodb
spec:
  accessModes:
    - ReadWriteOnce
  {{- if .Values.mongodb.server.storage.storageClassName }}
  storageClassName: {{ .Values.mongodb.server.storage.storageClassName }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.mongodb.server.storage.size }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "poundcake.fullname" . }}-mongodb
  labels:
    {{- include "poundcake.labels" . | nindent 4 }}
    app.kubernetes.io/component: mongodb
spec:
  serviceName: {{ include "poundcake.fullname" . }}-mongodb
  replicas: 1
  selector:
    matchLabels:
      {{- include "poundcake.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: mongodb
  template:
    metadata:
      labels:
        {{- include "poundcake.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: mongodb
    spec:
      containers:
      - name: mongodb
        image: "{{ .Values.mongodb.server.image.repository }}:{{ .Values.mongodb.server.image.tag }}"
        imagePullPolicy: {{ .Values.mongodb.server.image.pullPolicy }}
        ports:
        - name: mongodb
          containerPort: {{ .Values.mongodb.server.port }}
          protocol: TCP
        env:
        - name: MONGO_INITDB_ROOT_USERNAME
          value: {{ .Values.mongodb.server.rootUsername | quote }}
        - name: MONGO_INITDB_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "poundcake.fullname" . }}-mongodb
              key: root-password
        - name: MONGO_INITDB_DATABASE
          value: {{ .Values.mongodb.database.name | quote }}
        volumeMounts:
        - name: data
          mountPath: /data/db
        resources:
          {{- toYaml .Values.mongodb.server.resources | nindent 10 }}
        livenessProbe:
          exec:
            command:
            - mongo
            - --eval
            - "db.adminCommand('ping')"
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 6
        readinessProbe:
          exec:
            command:
            - mongo
            - --eval
            - "db.adminCommand('ping')"
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 6
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: {{ include "poundcake.fullname" . }}-mongodb
{{- end }}

{{- if .Values.bootstrap.poundcakeBootstrap.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "poundcake.fullname" . }}-bootstrap
  labels:
    {{- include "poundcake.labels" . | nindent 4 }}
    app.kubernetes.io/component: poundcake-bootstrap
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "12"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        {{- include "poundcake.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: poundcake-bootstrap
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ include "poundcake.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: poundcake-bootstrap
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /bin/bash
            - -c
            - |
              set -e
              python kitchen/dishwasher.py
          env:
            - name: POUNDCAKE_API_URL
              value: "http://{{ include "poundcake.fullname" . }}:{{ .Values.service.port }}"
            - name: LOG_LEVEL
              value: {{ .Values.config.logLevel | quote }}
            - name: DISHWASHER_DEFAULT_DURATION
              value: {{ .Values.bootstrap.poundcakeBootstrap.defaultDuration | quote }}
            - name: DISHWASHER_DEFAULT_TIMEOUT
              value: {{ .Values.bootstrap.poundcakeBootstrap.defaultTimeout | quote }}
            - name: DISHWASHER_PRUNE_MISSING
              value: {{ .Values.bootstrap.poundcakeBootstrap.pruneMissing | quote }}
            - name: DISHWASHER_INTERVAL
              value: "0"
            - name: POUNDCAKE_BOOTSTRAP_MARK
              value: "true"
            - name: SERVICE_NAME
              value: "dishwasher-bootstrap"
          resources:
            limits:
              cpu: 200m
              memory: 128Mi
            requests:
              cpu: 50m
              memory: 64Mi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
{{- end }}

apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "poundcake.fullname" . }}-namespace-config
  labels:
    {{- include "poundcake.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "poundcake.fullname" . }}-namespace-config
  labels:
    {{- include "poundcake.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
rules:
- apiGroups: [""]
  resources: ["namespaces"]
  verbs: ["get", "patch"]
  resourceNames: ["{{ .Release.Namespace }}"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "poundcake.fullname" . }}-namespace-config
  labels:
    {{- include "poundcake.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "poundcake.fullname" . }}-namespace-config
subjects:
- kind: ServiceAccount
  name: {{ include "poundcake.fullname" . }}-namespace-config
  namespace: {{ .Release.Namespace }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "poundcake.fullname" . }}-namespace-config
  labels:
    {{- include "poundcake.labels" . | nindent 4 }}
    app.kubernetes.io/component: namespace-config
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-9"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  template:
    metadata:
      name: {{ include "poundcake.fullname" . }}-namespace-config
      labels:
        {{- include "poundcake.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: namespace-config
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ include "poundcake.fullname" . }}-namespace-config
      containers:
      - name: configure-namespace
        image: bitnami/kubectl:latest
        imagePullPolicy: IfNotPresent
        command:
        - /bin/bash
        - -c
        - |
          set -e

          echo "=========================================="
          echo "Configuring Namespace Pod Security Labels"
          echo "=========================================="
          echo "Namespace: {{ .Release.Namespace }}"
          echo ""

          # Apply Pod Security labels to namespace
          kubectl label namespace {{ .Release.Namespace }} \
            pod-security.kubernetes.io/enforce=baseline \
            pod-security.kubernetes.io/audit=baseline \
            pod-security.kubernetes.io/warn=baseline \
            --overwrite

          echo ""
          echo "✓ Namespace configured with baseline Pod Security Standard"
          echo ""
          echo "This configuration eliminates PodSecurity warnings in hardened"
          echo "Kubernetes environments (like Talos) while maintaining strong security."
          echo ""
          echo "Current namespace labels:"
          kubectl get namespace {{ .Release.Namespace }} -o jsonpath='{.metadata.labels}' | jq -r 'to_entries[] | select(.key | startswith("pod-security")) | "\(.key): \(.value)"'
          echo ""
          echo "=========================================="

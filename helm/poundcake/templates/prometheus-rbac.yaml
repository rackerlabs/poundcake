{{- if .Values.prometheus.useCrds }}
# ClusterRole for reading PrometheusRule CRDs
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "poundcake.fullname" . }}-prometheus-reader
  labels:
    {{- include "poundcake.labels" . | nindent 4 }}
rules:
# PrometheusRule CRD resources (read-only for listing rules)
- apiGroups: ["monitoring.coreos.com"]
  resources: ["prometheusrules"]
  verbs: ["get", "list", "watch"]
# For creating/updating/deleting rules (if enabled)
{{- if .Values.prometheus.allowRuleManagement }}
- apiGroups: ["monitoring.coreos.com"]
  resources: ["prometheusrules"]
  verbs: ["create", "update", "patch", "delete"]
{{- end }}
---
# ClusterRoleBinding to grant permissions to the ServiceAccount
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "poundcake.fullname" . }}-prometheus-reader
  labels:
    {{- include "poundcake.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "poundcake.fullname" . }}-prometheus-reader
subjects:
- kind: ServiceAccount
  name: {{ include "poundcake.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
{{- end }}

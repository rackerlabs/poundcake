
{{- if .Values.mariadbOperator.enabled }}
apiVersion: k8s.mariadb.com/v1alpha1
kind: MariaDB
metadata:
  name: {{ include "poundcake.mariadbName" . }}
  namespace: {{ include "poundcake.mariadbNamespace" . }}
  labels:
    {{- include "poundcake.labels" . | nindent 4 }}
    app.kubernetes.io/component: mariadb
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "2"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  rootPasswordSecretKeyRef:
    name: {{ include "poundcake.mariadbRootSecretName" . }}
    key: {{ .Values.mariadbOperator.server.rootPasswordSecretKey | default "password" }}

  image: "{{ .Values.mariadbOperator.server.image.repository }}:{{ .Values.mariadbOperator.server.image.tag }}"
  imagePullPolicy: {{ .Values.mariadbOperator.server.image.pullPolicy }}

  port: 3306

  {{- if gt (int .Values.mariadbOperator.server.replicas) 1 }}
  replicas: {{ .Values.mariadbOperator.server.replicas }}
  galera:
    enabled: true
    primary:
      podIndex: 0
      automaticFailover: true
    sst: mariabackup
    replicaThreads: 1
  {{- else }}
  replicas: 1
  {{- end }}

  storage:
    size: {{ .Values.mariadbOperator.server.storage.size }}
    {{- if .Values.mariadbOperator.server.storage.storageClassName }}
    storageClassName: {{ .Values.mariadbOperator.server.storage.storageClassName }}
    {{- end }}

  {{- with .Values.mariadbOperator.server.resources }}
  resources:
    {{- toYaml . | nindent 4 }}
  {{- end }}

  myCnf: |
    [mariadb]
    bind-address=*
    default_storage_engine=InnoDB
    binlog_format=row
    innodb_autoinc_lock_mode=2
    max_allowed_packet=256M
    max_connections=200

  livenessProbe:
    initialDelaySeconds: 20
    periodSeconds: 5
    timeoutSeconds: 5

  readinessProbe:
    initialDelaySeconds: 20
    periodSeconds: 5
    timeoutSeconds: 5

  service:
    type: ClusterIP

  updateStrategy:
    type: ReplicasFirstPrimaryLast
{{- end }}

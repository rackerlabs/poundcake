{{- if or .Values.bakery.enabled (eq (default "full" .Values.deployment.mode) "bakery-only") }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "poundcake.bakeryName" . }}-db-init
  labels:
    {{- include "poundcake.labels" . | nindent 4 }}
    app.kubernetes.io/component: bakery-db-init
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        {{- include "poundcake.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: bakery-db-init
        {{- include "poundcake.logGroupLabel" . | nindent 8 }}
        {{- include "poundcake.logRoleWorker" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "poundcake.bakeryServiceAccountName" . }}
      restartPolicy: OnFailure
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      initContainers:
        {{- include "poundcake.bakeryWaitForDbInitContainer" . | nindent 8 }}
      containers:
        - name: db-init
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.bakery.image.repository }}:{{ .Values.bakery.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.bakery.image.pullPolicy }}
          command:
            - python
            - -m
            - bakery.db_init
          env:
            - name: ENVIRONMENT
              value: {{ .Values.bakery.config.environment | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.bakery.config.logLevel | quote }}
            - name: DATABASE_HOST
              value: {{ include "poundcake.bakeryDbHost" . }}
            - name: DATABASE_PORT
              value: "3306"
            - name: DATABASE_NAME
              value: {{ .Values.bakery.database.name | quote }}
            - name: DATABASE_USER
              value: {{ .Values.bakery.database.user.name | quote }}
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "poundcake.bakeryDbSecretName" . }}
                  key: password
          resources:
            {{- toYaml .Values.bakery.dbInit.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
{{- end }}

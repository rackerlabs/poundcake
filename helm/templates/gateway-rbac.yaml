{{- if ne (default "full" .Values.deployment.mode) "bakery-only" }}
{{- if .Values.gateway.enabled }}
# ClusterRole for managing Gateway listeners across namespaces
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "poundcake.fullname" . }}-gateway-manager
  labels:
    {{- include "poundcake.labels" . | nindent 4 }}
rules:
# Gateway API resources
- apiGroups: ["gateway.networking.k8s.io"]
  resources: ["gateways"]
  verbs: ["get", "list", "watch", "update", "patch"]
- apiGroups: ["gateway.networking.k8s.io"]
  resources: ["httproutes"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
# ClusterRoleBinding to grant permissions to the ServiceAccount
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "poundcake.fullname" . }}-gateway-manager
  labels:
    {{- include "poundcake.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "poundcake.fullname" . }}-gateway-manager
subjects:
- kind: ServiceAccount
  name: {{ include "poundcake.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
{{- end }}
{{- end }}

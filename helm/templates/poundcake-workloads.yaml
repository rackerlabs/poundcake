            - name: DISHWASHER_DEFAULT_TIMEOUT
              value: "300"
            - name: DISHWASHER_PRUNE_MISSING
              value: "false"
            - name: DISHWASHER_INTERVAL
              value: {{ .Values.intervals.dishwasher | quote }}
            - name: SERVICE_NAME
              value: dishwasher
            {{- if .Values.auth.enabled }}
            - name: POUNDCAKE_AUTH_SERVICE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "poundcake.fullname" . }}-admin
                  key: internal-api-key
            {{- end }}
          volumeMounts:
            - name: app-config
              mountPath: /app/config
      volumes:
        - name: app-config
          projected:
            sources:
              - secret:
                  name: stackstorm-startup-markers
                  optional: true
              - secret:
                  name: stackstorm-apikeys
                  optional: true
{{- end }}

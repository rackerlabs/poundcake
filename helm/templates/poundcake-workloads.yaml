apiVersion: apps/v1
kind: Deployment
metadata:
  name: poundcake-ui
  labels:
    app.kubernetes.io/component: ui
    {{- include "poundcake.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: ui
      {{- include "poundcake.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/poundcake-secrets: {{ include "poundcake.secretChecksumMaterial" . | sha256sum }}
      labels:
        app.kubernetes.io/component: ui
        {{- include "poundcake.logLabelsForComponent" (dict "component" "ui") | nindent 8 }}
        {{- include "poundcake.selectorLabels" . | nindent 8 }}
    spec:
      {{- if .Values.podSecurityContext }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- end }}
      {{- include "poundcake.poundcakePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ include "poundcake.serviceAccountName" . }}
      initContainers:
        - name: wait-stage10
          image: {{ .Values.images.busybox }}
          securityContext:
            {{- toYaml .Values.utilitySecurityContext | nindent 12 }}
          command:
            - sh
            - -ec
            - |
              {{- include "poundcake.gateLogHelpers" . | nindent 14 }}
              gate_wait_for_tcp "poundcake-api" "{{ .Values.services.api.port }}" "wait-stage10-api-port" "tcp poundcake-api:{{ .Values.services.api.port }}"
              gate_wait_for_http_status "{{ include "poundcake.apiServiceUrl" . }}/api/v1/health" "wait-stage10-api-ready" "http endpoint poundcake-api:{{ .Values.services.api.port }}/api/v1/health" 200
          volumeMounts:
            - name: app-config
              mountPath: /app/config
      containers:
        - name: ui
          image: {{ .Values.uiImage.repository }}:{{ default .Chart.AppVersion .Values.uiImage.tag }}
          imagePullPolicy: {{ .Values.uiImage.pullPolicy }}
          securityContext:
            {{- toYaml .Values.uiImage.securityContext | nindent 12 }}
          {{- if .Values.uiImage.runtimeWritablePaths.enabled }}
          volumeMounts:
            - name: ui-nginx-confd
              mountPath: /etc/nginx/conf.d
            - name: ui-nginx-cache
              mountPath: /var/cache/nginx
            - name: ui-nginx-run
              mountPath: /var/run
          {{- end }}
          env:
            - name: API_URL
              value: {{ include "poundcake.apiServiceUrl" . | quote }}
            - name: SERVICE_NAME
              value: ui
          ports:
            - containerPort: {{ .Values.uiImage.containerPort }}
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: {{ .Values.uiImage.containerPort }}
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /
              port: {{ .Values.uiImage.containerPort }}
            initialDelaySeconds: 20
            periodSeconds: 10
      volumes:
        - name: app-config
          projected:
            sources:
              - secret:
                  name: stackstorm-startup-markers
                  optional: true
        {{- if .Values.uiImage.runtimeWritablePaths.enabled }}
        - name: ui-nginx-confd
          emptyDir: {}
        - name: ui-nginx-cache
          emptyDir: {}
        - name: ui-nginx-run
          emptyDir: {}
        {{- end }}

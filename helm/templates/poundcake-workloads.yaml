{{- if and .Values.poundcake.enabled .Values.bakery.client.enabled (not .Values.bakery.client.baseUrl) }}
{{- fail "bakery.client.baseUrl must be set when bakery.client.enabled=true (remote Bakery mode)" }}
{{- end }}
{{- if .Values.poundcake.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: poundcake-api
  labels:
    app.kubernetes.io/component: api
    {{- include "poundcake.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: api
      {{- include "poundcake.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/poundcake-secrets: {{ include "poundcake.secretChecksumMaterial" . | sha256sum }}
      labels:
        app.kubernetes.io/component: api
        {{- include "poundcake.logLabelsForComponent" (dict "component" "api") | nindent 8 }}
        {{- include "poundcake.selectorLabels" . | nindent 8 }}
    spec:
      {{- if .Values.podSecurityContext }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- end }}
      {{- include "poundcake.poundcakePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ include "poundcake.serviceAccountName" . }}
      {{- include "poundcake.podPlacement" . | nindent 6 }}
      initContainers:
        - name: wait-stage-ready
          image: {{ .Values.images.busybox }}
          securityContext:
            {{- toYaml .Values.utilitySecurityContext | nindent 12 }}
          command:
            - sh
            - -ec
            - |
              {{- include "poundcake.gateLogHelpers" . | nindent 14 }}
              gate_wait_for_tcp "{{ include "poundcake.databaseHost" . }}" "3306" "wait-stage-ready-mariadb" "tcp {{ include "poundcake.databaseHost" . }}:3306"
              gate_wait_for_nonempty_file "/run/secrets/st2/st2_api_key" "wait-stage-ready-st2-apikey" "st2 api key file"
          volumeMounts:
            - name: app-config
              mountPath: /app/config
            - name: st2-apikey
              mountPath: /run/secrets/st2
              readOnly: true
      containers:
        - name: api
          image: {{ include "poundcake.poundcakeImageRef" . }}
          imagePullPolicy: {{ .Values.poundcakeImage.pullPolicy }}
          securityContext:
            {{- toYaml .Values.poundcakeImage.securityContext | nindent 12 }}
          workingDir: /app
          command: ["/app/api/scripts/entrypoint-auto-migrate.sh"]
          env:
            - name: PYTHONPATH
              value: /app
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: poundcake-secrets
                  key: DB_NAME
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: poundcake-secrets
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: poundcake-secrets
                  key: DB_PASSWORD
            - name: POUNDCAKE_DATABASE_URL
              value: mysql+pymysql://$(DB_USER):$(DB_PASSWORD)@{{ include "poundcake.databaseHost" . }}:3306/$(DB_NAME)
            - name: POUNDCAKE_STACKSTORM_URL
              value: {{ include "poundcake.stackstormApiUrl" . | quote }}
            - name: POUNDCAKE_STACKSTORM_VERIFY_SSL
              value: "False"
            - name: MONGODB_HOST
              value: stackstorm-mongodb
            - name: MONGODB_PORT
              value: "27017"
            - name: RABBITMQ_HOST
              value: stackstorm-rabbitmq
            - name: RABBITMQ_PORT
              value: "5672"
            - name: RABBITMQ_MANAGEMENT_PORT
              value: "15672"
            - name: REDIS_HOST
              value: stackstorm-redis
            - name: REDIS_PORT
              value: "6379"
            - name: POUNDCAKE_REDIS_URL
              value: redis://$(REDIS_HOST):$(REDIS_PORT)/0
            - name: RABBITMQ_USER
              valueFrom:
                secretKeyRef:
                  name: stackstorm-secrets
                  key: RABBITMQ_USER
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: stackstorm-secrets
                  key: RABBITMQ_PASSWORD
            - name: POUNDCAKE_LOG_LEVEL
              value: DEBUG
            - name: POUNDCAKE_LOG_FORMAT
              value: {{ .Values.logFormat | quote }}
            - name: POUNDCAKE_APP_VERSION
              value: {{ include "poundcake.poundcakeImageVersion" . | quote }}
            - name: POUNDCAKE_PROMETHEUS_URL
              value: {{ .Values.prometheus.url | quote }}
            - name: POUNDCAKE_PROMETHEUS_VERIFY_SSL
              value: {{ .Values.prometheus.verifySsl | quote }}
            - name: POUNDCAKE_PROMETHEUS_USE_CRDS
              value: {{ .Values.prometheus.useCrds | quote }}
            - name: POUNDCAKE_PROMETHEUS_CRD_NAMESPACE
              value: {{ .Values.prometheus.crdNamespace | quote }}
            - name: POUNDCAKE_PROMETHEUS_CRD_LABELS
              value: {{ .Values.prometheus.crdLabels | toJson | quote }}
            - name: POUNDCAKE_GIT_ENABLED
              value: {{ .Values.git.enabled | quote }}
            - name: POUNDCAKE_GIT_REPO_URL
              value: {{ .Values.git.repoUrl | quote }}
            - name: POUNDCAKE_GIT_BRANCH
              value: {{ .Values.git.branch | quote }}
            - name: POUNDCAKE_GIT_RULES_PATH
              value: {{ .Values.git.rulesPath | quote }}
            - name: POUNDCAKE_GIT_WORKFLOWS_PATH
              value: {{ .Values.git.workflowsPath | quote }}
            - name: POUNDCAKE_GIT_ACTIONS_PATH
              value: {{ .Values.git.actionsPath | quote }}
            - name: POUNDCAKE_GIT_FILE_PER_ALERT
              value: {{ .Values.git.filePerAlert | quote }}
            - name: POUNDCAKE_GIT_FILE_PATTERN
              value: {{ .Values.git.filePattern | quote }}
            - name: POUNDCAKE_GIT_USER_NAME
              value: {{ .Values.git.userName | quote }}
            - name: POUNDCAKE_GIT_USER_EMAIL
              value: {{ .Values.git.userEmail | quote }}
            - name: POUNDCAKE_GIT_PROVIDER
              value: {{ .Values.git.provider | quote }}
            {{- if .Values.git.existingSecret }}
            - name: POUNDCAKE_GIT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.git.existingSecret }}
                  key: {{ .Values.git.secretKeys.token }}
                  optional: true
            - name: POUNDCAKE_GIT_SSH_KEY_PATH
              value: {{ printf "/run/secrets/poundcake-git/%s" .Values.git.secretKeys.sshKey | quote }}
            {{- else }}
            - name: POUNDCAKE_GIT_TOKEN
              value: ""
            - name: POUNDCAKE_GIT_SSH_KEY_PATH
              value: ""
            {{- end }}
            - name: SERVICE_NAME
              value: api
            - name: POUNDCAKE_AUTH_ENABLED
              value: {{ .Values.auth.enabled | quote }}
            {{- if .Values.auth.enabled }}
            - name: POUNDCAKE_AUTH_SESSION_TIMEOUT
              value: {{ .Values.auth.sessionTimeout | quote }}
            - name: POUNDCAKE_AUTH_OIDC_STATE_TTL
              value: {{ .Values.auth.oidcStateTtl | quote }}
            - name: POUNDCAKE_AUTH_LOCAL_ENABLED
              value: {{ .Values.auth.local.enabled | quote }}
            - name: POUNDCAKE_AUTH_SECRET_NAME
              value: {{ include "poundcake.fullname" . }}-admin
            - name: POUNDCAKE_AUTH_SECRET_NAMESPACE
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.namespace
            - name: POUNDCAKE_AUTH_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "poundcake.fullname" . }}-admin
                  key: username
            - name: POUNDCAKE_AUTH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "poundcake.fullname" . }}-admin
                  key: password
            - name: POUNDCAKE_AUTH_SERVICE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "poundcake.fullname" . }}-admin
                  key: internal-api-key
            - name: POUNDCAKE_AUTH_AD_ENABLED
              value: {{ .Values.auth.activeDirectory.enabled | quote }}
            - name: POUNDCAKE_AUTH_AD_SERVER_URI
              value: {{ .Values.auth.activeDirectory.serverUri | quote }}
            - name: POUNDCAKE_AUTH_AD_USER_BASE_DN
              value: {{ .Values.auth.activeDirectory.userBaseDn | quote }}
            - name: POUNDCAKE_AUTH_AD_BIND_DN
              value: {{ .Values.auth.activeDirectory.bindDn | quote }}
            - name: POUNDCAKE_AUTH_AD_USER_FILTER
              value: {{ .Values.auth.activeDirectory.userFilter | quote }}
            - name: POUNDCAKE_AUTH_AD_GROUP_ATTRIBUTE
              value: {{ .Values.auth.activeDirectory.groupAttribute | quote }}
            - name: POUNDCAKE_AUTH_AD_DISPLAY_NAME_ATTRIBUTE
              value: {{ .Values.auth.activeDirectory.displayNameAttribute | quote }}
            - name: POUNDCAKE_AUTH_AD_USERNAME_ATTRIBUTE
              value: {{ .Values.auth.activeDirectory.usernameAttribute | quote }}
            - name: POUNDCAKE_AUTH_AD_SUBJECT_ATTRIBUTE
              value: {{ .Values.auth.activeDirectory.subjectAttribute | quote }}
            - name: POUNDCAKE_AUTH_AD_USE_SSL
              value: {{ .Values.auth.activeDirectory.useSsl | quote }}
            - name: POUNDCAKE_AUTH_AD_VALIDATE_TLS
              value: {{ .Values.auth.activeDirectory.validateTls | quote }}
            - name: POUNDCAKE_AUTH_AD_GROUP_NAME_REGEX
              value: {{ .Values.auth.activeDirectory.groupNameRegex | quote }}
            {{- if .Values.auth.activeDirectory.existingSecret }}
            - name: POUNDCAKE_AUTH_AD_BIND_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth.activeDirectory.existingSecret }}
                  key: {{ .Values.auth.activeDirectory.secretKeys.bindPassword }}
            {{- end }}
            {{- if .Values.auth.activeDirectory.caBundle.existingSecret }}
            - name: POUNDCAKE_AUTH_AD_CA_CERTS_FILE
              value: {{ printf "%s/%s" .Values.auth.activeDirectory.caBundle.mountPath .Values.auth.activeDirectory.caBundle.fileName | quote }}
            {{- end }}
            - name: POUNDCAKE_AUTH_AUTH0_ENABLED
              value: {{ .Values.auth.auth0.enabled | quote }}
            - name: POUNDCAKE_AUTH_AUTH0_DOMAIN
              value: {{ .Values.auth.auth0.shared.domain | quote }}
            - name: POUNDCAKE_AUTH_AUTH0_AUDIENCE
              value: {{ .Values.auth.auth0.shared.audience | quote }}
            - name: POUNDCAKE_AUTH_AUTH0_SCOPE
              value: {{ .Values.auth.auth0.shared.scope | quote }}
            - name: POUNDCAKE_AUTH_AUTH0_ORGANIZATION
              value: {{ .Values.auth.auth0.shared.organization | quote }}
            - name: POUNDCAKE_AUTH_AUTH0_CONNECTION
              value: {{ .Values.auth.auth0.shared.connection | quote }}
            - name: POUNDCAKE_AUTH_AUTH0_USERNAME_CLAIM
              value: {{ .Values.auth.auth0.shared.usernameClaim | quote }}
            - name: POUNDCAKE_AUTH_AUTH0_DISPLAY_NAME_CLAIM
              value: {{ .Values.auth.auth0.shared.displayNameClaim | quote }}
            - name: POUNDCAKE_AUTH_AUTH0_GROUPS_CLAIM
              value: {{ .Values.auth.auth0.shared.groupsClaim | quote }}
            - name: POUNDCAKE_AUTH_AUTH0_SUBJECT_CLAIM
              value: {{ .Values.auth.auth0.shared.subjectClaim | quote }}
            - name: POUNDCAKE_AUTH_AUTH0_UI_ENABLED
              value: {{ .Values.auth.auth0.ui.enabled | quote }}
            - name: POUNDCAKE_AUTH_AUTH0_UI_CLIENT_ID
              value: {{ .Values.auth.auth0.ui.clientId | quote }}
            - name: POUNDCAKE_AUTH_AUTH0_UI_CALLBACK_URL
              value: {{ .Values.auth.auth0.ui.callbackUrl | quote }}
            {{- if .Values.auth.auth0.ui.existingSecret }}
            - name: POUNDCAKE_AUTH_AUTH0_UI_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth.auth0.ui.existingSecret }}
                  key: {{ .Values.auth.auth0.ui.secretKeys.clientSecret }}
            {{- end }}
            - name: POUNDCAKE_AUTH_AUTH0_CLI_ENABLED
              value: {{ .Values.auth.auth0.cli.enabled | quote }}
            - name: POUNDCAKE_AUTH_AUTH0_CLI_CLIENT_ID
              value: {{ .Values.auth.auth0.cli.clientId | quote }}
            {{- if .Values.auth.auth0.cli.existingSecret }}
            - name: POUNDCAKE_AUTH_AUTH0_CLI_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth.auth0.cli.existingSecret }}
                  key: {{ .Values.auth.auth0.cli.secretKeys.clientSecret }}
            {{- end }}
            - name: POUNDCAKE_AUTH_AZURE_AD_ENABLED
              value: {{ .Values.auth.azureAd.enabled | quote }}
            - name: POUNDCAKE_AUTH_AZURE_AD_TENANT
              value: {{ .Values.auth.azureAd.shared.tenant | quote }}
            - name: POUNDCAKE_AUTH_AZURE_AD_AUDIENCE
              value: {{ .Values.auth.azureAd.shared.audience | quote }}
            - name: POUNDCAKE_AUTH_AZURE_AD_SCOPE
              value: {{ .Values.auth.azureAd.shared.scope | quote }}
            - name: POUNDCAKE_AUTH_AZURE_AD_USERNAME_CLAIM
              value: {{ .Values.auth.azureAd.shared.usernameClaim | quote }}
            - name: POUNDCAKE_AUTH_AZURE_AD_DISPLAY_NAME_CLAIM
              value: {{ .Values.auth.azureAd.shared.displayNameClaim | quote }}
            - name: POUNDCAKE_AUTH_AZURE_AD_GROUPS_CLAIM
              value: {{ .Values.auth.azureAd.shared.groupsClaim | quote }}
            - name: POUNDCAKE_AUTH_AZURE_AD_SUBJECT_CLAIM
              value: {{ .Values.auth.azureAd.shared.subjectClaim | quote }}
            - name: POUNDCAKE_AUTH_AZURE_AD_UI_ENABLED
              value: {{ .Values.auth.azureAd.ui.enabled | quote }}
            - name: POUNDCAKE_AUTH_AZURE_AD_UI_CLIENT_ID
              value: {{ .Values.auth.azureAd.ui.clientId | quote }}
            - name: POUNDCAKE_AUTH_AZURE_AD_UI_CALLBACK_URL
              value: {{ .Values.auth.azureAd.ui.callbackUrl | quote }}
            {{- if .Values.auth.azureAd.ui.existingSecret }}
            - name: POUNDCAKE_AUTH_AZURE_AD_UI_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth.azureAd.ui.existingSecret }}
                  key: {{ .Values.auth.azureAd.ui.secretKeys.clientSecret }}
            {{- end }}
            - name: POUNDCAKE_AUTH_AZURE_AD_CLI_ENABLED
              value: {{ .Values.auth.azureAd.cli.enabled | quote }}
            - name: POUNDCAKE_AUTH_AZURE_AD_CLI_CLIENT_ID
              value: {{ .Values.auth.azureAd.cli.clientId | quote }}
            {{- end }}
            - name: POUNDCAKE_STACKSTORM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: stackstorm-apikeys
                  key: st2_api_key
            - name: ST2_API_KEY_FILE
              value: /run/secrets/st2/st2_api_key
            - name: POUNDCAKE_PACK_SYNC_TOKEN
              valueFrom:
                secretKeyRef:
                  name: poundcake-secrets
                  key: PACK_SYNC_TOKEN
            - name: POUNDCAKE_BAKERY_ENABLED
              value: {{ .Values.bakery.client.enabled | quote }}
            - name: POUNDCAKE_BAKERY_BASE_URL
              value: {{ include "poundcake.bakeryBaseUrl" . | quote }}
            - name: POUNDCAKE_BAKERY_AUTH_MODE
              value: {{ .Values.bakery.client.auth.mode | quote }}
            {{- $defaultBakeryMonitorId := printf "%s/%s" .Release.Namespace .Release.Name }}
            - name: POUNDCAKE_BAKERY_MONITOR_ID
              value: {{ default $defaultBakeryMonitorId .Values.bakery.client.monitor.id | quote }}
            - name: POUNDCAKE_BAKERY_MONITOR_ENVIRONMENT_LABEL
              value: {{ default $defaultBakeryMonitorId .Values.bakery.client.monitor.environmentLabel | quote }}
            - name: POUNDCAKE_BAKERY_MONITOR_NAMESPACE
              value: {{ default .Release.Namespace .Values.bakery.client.monitor.namespace | quote }}
            - name: POUNDCAKE_BAKERY_MONITOR_RELEASE_NAME
              value: {{ default .Release.Name .Values.bakery.client.monitor.releaseName | quote }}
            - name: POUNDCAKE_BAKERY_MONITOR_REGION
              value: {{ .Values.bakery.client.monitor.region | quote }}
            - name: POUNDCAKE_BAKERY_MONITOR_CLUSTER_NAME
              value: {{ .Values.bakery.client.monitor.clusterName | quote }}
            - name: POUNDCAKE_BAKERY_MONITOR_TAGS
              value: {{ join "," .Values.bakery.client.monitor.tags | quote }}
            - name: POUNDCAKE_BAKERY_MONITOR_HEARTBEAT_INTERVAL_SECONDS
              value: {{ .Values.bakery.client.heartbeatIntervalSeconds | quote }}
            - name: POUNDCAKE_BAKERY_COLLECTION_POLL_INTERVAL_SECONDS
              value: {{ .Values.bakery.client.collectionPollIntervalSeconds | quote }}
            - name: POUNDCAKE_BAKERY_REQUEST_TIMEOUT_SECONDS
              value: {{ .Values.bakery.client.requestTimeoutSeconds | quote }}
            - name: POUNDCAKE_BAKERY_MAX_RETRIES
              value: {{ .Values.bakery.client.maxRetries | quote }}
            - name: POUNDCAKE_BAKERY_POLL_INTERVAL_SECONDS
              value: {{ .Values.bakery.client.pollIntervalSeconds | quote }}
            - name: POUNDCAKE_BAKERY_POLL_TIMEOUT_SECONDS
              value: {{ .Values.bakery.client.pollTimeoutSeconds | quote }}
            - name: POUNDCAKE_BAKERY_ACTIVE_PROVIDER
              value: {{ .Values.bakery.config.activeProvider | default "" | quote }}
            - name: POUNDCAKE_CATCH_ALL_RECIPE_NAME
              value: {{ .Values.poundcakeApi.ticketing.catchAllRecipeName | default "fallback-recipe" | quote }}
            - name: POUNDCAKE_BAKERY_RACKSPACE_CONFIRMED_SOLVED_STATUS
              value: {{ .Values.poundcakeApi.ticketing.rackspaceConfirmedSolvedStatus | default "confirmed solved" | quote }}
            {{- $bakeryClientSecretName := .Values.bakery.client.auth.existingSecret | default (include "poundcake.bakerySecretName" .) }}
            - name: POUNDCAKE_BAKERY_BOOTSTRAP_HMAC_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ $bakeryClientSecretName }}
                  key: {{ .Values.bakery.client.auth.secretKeys.bootstrapKeyId }}
                  optional: true
            - name: POUNDCAKE_BAKERY_BOOTSTRAP_HMAC_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $bakeryClientSecretName }}
                  key: {{ .Values.bakery.client.auth.secretKeys.bootstrapKey }}
                  optional: true
            - name: POUNDCAKE_BAKERY_SECRET_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $bakeryClientSecretName }}
                  key: {{ .Values.bakery.client.auth.secretKeys.monitorEncryptionKey }}
                  optional: true
          ports:
            - containerPort: 8000
              name: http
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: {{ .Values.poundcakeApi.readiness.initialDelaySeconds }}
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 40
            periodSeconds: 10
          volumeMounts:
            - name: app-config
              mountPath: /app/config
            - name: st2-apikey
              mountPath: /run/secrets/st2
              readOnly: true
            {{- if and .Values.auth.enabled .Values.auth.activeDirectory.caBundle.existingSecret }}
            - name: poundcake-auth-ad-ca
              mountPath: {{ .Values.auth.activeDirectory.caBundle.mountPath | quote }}
              readOnly: true
            {{- end }}
            {{- if .Values.git.existingSecret }}
            - name: poundcake-git
              mountPath: /run/secrets/poundcake-git
              readOnly: true
            {{- end }}
            - name: poundcake-alembic
              mountPath: /app/alembic.ini
              subPath: alembic.ini
            - name: poundcake-alembic
              mountPath: /app/alembic
              subPath: alembic
      volumes:
        - name: app-config
          projected:
            sources:
              - secret:
                  name: stackstorm-startup-markers
                  optional: true
        - name: st2-apikey
          secret:
            secretName: stackstorm-apikeys
            items:
              - key: st2_api_key
                path: st2_api_key
        {{- if and .Values.auth.enabled .Values.auth.activeDirectory.caBundle.existingSecret }}
        - name: poundcake-auth-ad-ca
          secret:
            secretName: {{ .Values.auth.activeDirectory.caBundle.existingSecret }}
            items:
              - key: {{ .Values.auth.activeDirectory.caBundle.key }}
                path: {{ .Values.auth.activeDirectory.caBundle.fileName }}
        {{- end }}
        {{- if .Values.git.existingSecret }}
        - name: poundcake-git
          secret:
            secretName: {{ .Values.git.existingSecret }}
            optional: true
        {{- end }}
        - name: poundcake-alembic
          configMap:
            name: poundcake-alembic
            items:
              - key: alembic.ini
                path: alembic.ini
              - key: env.py
                path: alembic/env.py
              - key: script.py.mako
                path: alembic/script.py.mako
              {{- range $path, $_ := .Files.Glob "files/poundcake-alembic/versions/*.py" }}
              - key: {{ base $path }}
                path: alembic/versions/{{ base $path }}
              {{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: poundcake-chef
  labels:
    app.kubernetes.io/component: chef
    {{- include "poundcake.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: chef
      {{- include "poundcake.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/poundcake-secrets: {{ include "poundcake.secretChecksumMaterial" . | sha256sum }}
      labels:
        app.kubernetes.io/component: chef
        {{- include "poundcake.logLabelsForComponent" (dict "component" "chef") | nindent 8 }}
        {{- include "poundcake.selectorLabels" . | nindent 8 }}
    spec:
      {{- if .Values.podSecurityContext }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- end }}
      {{- include "poundcake.poundcakePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ include "poundcake.serviceAccountName" . }}
      {{- include "poundcake.podPlacement" . | nindent 6 }}
      initContainers:
        - name: wait-api
          image: {{ .Values.images.busybox }}
          securityContext:
            {{- toYaml .Values.utilitySecurityContext | nindent 12 }}
          command:
            - sh
            - -ec
            - |
              {{- include "poundcake.gateLogHelpers" . | nindent 14 }}
              gate_wait_for_tcp "poundcake-api" "{{ .Values.services.api.port }}" "wait-api-port" "tcp poundcake-api:{{ .Values.services.api.port }}"
              gate_wait_for_http_status "{{ include "poundcake.apiServiceUrl" . }}/api/v1/health" "wait-api-ready" "http endpoint poundcake-api:{{ .Values.services.api.port }}/api/v1/health" 200
          volumeMounts:
            - name: app-config
              mountPath: /app/config
      containers:
        - name: chef
          image: {{ include "poundcake.poundcakeImageRef" . }}
          imagePullPolicy: {{ .Values.poundcakeImage.pullPolicy }}
          securityContext:
            {{- toYaml .Values.poundcakeImage.securityContext | nindent 12 }}
          workingDir: /app
          command: ["python3", "kitchen/chef.py"]
          env:
            - name: PYTHONPATH
              value: /app
            - name: POUNDCAKE_API_URL
              value: {{ include "poundcake.apiServiceUrl" . | quote }}
            - name: CHEF_POLL_INTERVAL
              value: {{ .Values.intervals.chef | quote }}
            - name: LOG_LEVEL
              value: INFO
            - name: POUNDCAKE_LOG_FORMAT
              value: {{ .Values.logFormat | quote }}
            - name: SERVICE_NAME
              value: chef
            {{- if .Values.auth.enabled }}
            - name: POUNDCAKE_AUTH_SERVICE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "poundcake.fullname" . }}-admin
                  key: internal-api-key
            {{- end }}
      volumes:
        - name: app-config
          projected:
            sources:
              - secret:
                  name: stackstorm-startup-markers
                  optional: true
              - secret:
                  name: stackstorm-apikeys
                  optional: true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: poundcake-ui
  labels:
    app.kubernetes.io/component: ui
    {{- include "poundcake.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: ui
      {{- include "poundcake.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/poundcake-secrets: {{ include "poundcake.secretChecksumMaterial" . | sha256sum }}
      labels:
        app.kubernetes.io/component: ui
        {{- include "poundcake.logLabelsForComponent" (dict "component" "ui") | nindent 8 }}
        {{- include "poundcake.selectorLabels" . | nindent 8 }}
    spec:
      {{- if .Values.podSecurityContext }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- end }}
      {{- include "poundcake.poundcakePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ include "poundcake.serviceAccountName" . }}
      {{- include "poundcake.podPlacement" . | nindent 6 }}
      initContainers:
        - name: wait-stage10
          image: {{ .Values.images.busybox }}
          securityContext:
            {{- toYaml .Values.utilitySecurityContext | nindent 12 }}
          command:
            - sh
            - -ec
            - |
              {{- include "poundcake.gateLogHelpers" . | nindent 14 }}
              gate_wait_for_tcp "poundcake-api" "{{ .Values.services.api.port }}" "wait-stage10-api-port" "tcp poundcake-api:{{ .Values.services.api.port }}"
              gate_wait_for_http_status "{{ include "poundcake.apiServiceUrl" . }}/api/v1/health" "wait-stage10-api-ready" "http endpoint poundcake-api:{{ .Values.services.api.port }}/api/v1/health" 200
          volumeMounts:
            - name: app-config
              mountPath: /app/config
      containers:
        - name: ui
          image: {{ .Values.uiImage.repository }}:{{ default .Chart.AppVersion .Values.uiImage.tag }}
          imagePullPolicy: {{ .Values.uiImage.pullPolicy }}
          securityContext:
            {{- toYaml .Values.uiImage.securityContext | nindent 12 }}
          {{- if .Values.uiImage.runtimeWritablePaths.enabled }}
          volumeMounts:
            - name: ui-nginx-confd
              mountPath: /etc/nginx/conf.d
            - name: ui-nginx-cache
              mountPath: /var/cache/nginx
            - name: ui-nginx-run
              mountPath: /var/run
          {{- end }}
          env:
            - name: API_URL
              value: {{ include "poundcake.apiServiceUrl" . | quote }}
            - name: SERVICE_NAME
              value: ui
          ports:
            - containerPort: {{ .Values.uiImage.containerPort }}
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: {{ .Values.uiImage.containerPort }}
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /
              port: {{ .Values.uiImage.containerPort }}
            initialDelaySeconds: 20
            periodSeconds: 10
      volumes:
        - name: app-config
          projected:
            sources:
              - secret:
                  name: stackstorm-startup-markers
                  optional: true
        {{- if .Values.uiImage.runtimeWritablePaths.enabled }}
        - name: ui-nginx-confd
          emptyDir: {}
        - name: ui-nginx-cache
          emptyDir: {}
        - name: ui-nginx-run
          emptyDir: {}
        {{- end }}

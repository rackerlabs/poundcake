apiVersion: apps/v1
kind: Deployment
metadata:
  name: poundcake-api
  labels:
    app.kubernetes.io/component: api
    {{- include "poundcake.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: api
      {{- include "poundcake.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/poundcake-secrets: {{ include "poundcake.secretChecksumMaterial" . | sha256sum }}
      labels:
        app.kubernetes.io/component: api
        {{- include "poundcake.logLabelsForComponent" (dict "component" "api") | nindent 8 }}
        {{- include "poundcake.selectorLabels" . | nindent 8 }}
    spec:
      {{- if .Values.podSecurityContext }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- end }}
      {{- include "poundcake.poundcakePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ include "poundcake.serviceAccountName" . }}
      initContainers:
        - name: wait-stage-ready
          image: {{ .Values.images.busybox }}
          securityContext:
            {{- toYaml .Values.utilitySecurityContext | nindent 12 }}
          command:
            - sh
            - -ec
            - |
              {{- include "poundcake.gateLogHelpers" . | nindent 14 }}
              gate_wait_for_tcp "{{ include "poundcake.databaseHost" . }}" "3306" "wait-stage-ready-mariadb" "tcp {{ include "poundcake.databaseHost" . }}:3306"
              gate_wait_for_nonempty_file "/run/secrets/st2/st2_api_key" "wait-stage-ready-st2-apikey" "st2 api key file"
          volumeMounts:
            - name: app-config
              mountPath: /app/config
            - name: st2-apikey
              mountPath: /run/secrets/st2
              readOnly: true
      containers:
        - name: api
          image: {{ include "poundcake.poundcakeImageRef" . }}
          imagePullPolicy: {{ .Values.poundcakeImage.pullPolicy }}
          securityContext:
            {{- toYaml .Values.poundcakeImage.securityContext | nindent 12 }}
          workingDir: /app
          command: ["/app/api/scripts/entrypoint-auto-migrate.sh"]
          env:
            - name: PYTHONPATH
              value: /app
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: poundcake-secrets
                  key: DB_NAME
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: poundcake-secrets
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: poundcake-secrets
                  key: DB_PASSWORD
            - name: POUNDCAKE_DATABASE_URL
              value: mysql+pymysql://$(DB_USER):$(DB_PASSWORD)@{{ include "poundcake.databaseHost" . }}:3306/$(DB_NAME)
            - name: POUNDCAKE_STACKSTORM_URL
              value: {{ include "poundcake.stackstormApiUrl" . | quote }}
            - name: POUNDCAKE_STACKSTORM_VERIFY_SSL
              value: "False"
            - name: MONGODB_HOST
              value: stackstorm-mongodb
            - name: MONGODB_PORT
              value: "27017"
            - name: RABBITMQ_HOST
              value: stackstorm-rabbitmq
            - name: RABBITMQ_PORT
              value: "5672"
            - name: RABBITMQ_MANAGEMENT_PORT
              value: "15672"
            - name: REDIS_HOST
              value: stackstorm-redis
            - name: REDIS_PORT
              value: "6379"
            - name: POUNDCAKE_REDIS_URL
              value: redis://$(REDIS_HOST):$(REDIS_PORT)/0
            - name: RABBITMQ_USER
              valueFrom:
                secretKeyRef:
                  name: stackstorm-secrets
                  key: RABBITMQ_USER
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: stackstorm-secrets
                  key: RABBITMQ_PASSWORD
            - name: POUNDCAKE_LOG_LEVEL
              value: DEBUG
            - name: POUNDCAKE_LOG_FORMAT
              value: {{ .Values.logFormat | quote }}
            - name: POUNDCAKE_APP_VERSION
              value: {{ include "poundcake.poundcakeImageVersion" . | quote }}
            - name: POUNDCAKE_PROMETHEUS_URL
              value: {{ .Values.prometheus.url | quote }}
            - name: POUNDCAKE_PROMETHEUS_VERIFY_SSL
              value: {{ .Values.prometheus.verifySsl | quote }}
            - name: POUNDCAKE_PROMETHEUS_USE_CRDS
              value: {{ .Values.prometheus.useCrds | quote }}
            - name: POUNDCAKE_PROMETHEUS_CRD_NAMESPACE
              value: {{ .Values.prometheus.crdNamespace | quote }}
            - name: POUNDCAKE_PROMETHEUS_CRD_LABELS
              value: {{ .Values.prometheus.crdLabels | toJson | quote }}
            - name: SERVICE_NAME
              value: api
            - name: POUNDCAKE_AUTH_ENABLED
              value: {{ .Values.auth.enabled | quote }}
            {{- if .Values.auth.enabled }}
            - name: POUNDCAKE_AUTH_SECRET_NAME
              value: {{ include "poundcake.fullname" . }}-admin
            - name: POUNDCAKE_AUTH_SECRET_NAMESPACE
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.namespace
            - name: POUNDCAKE_AUTH_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "poundcake.fullname" . }}-admin
                  key: username
            - name: POUNDCAKE_AUTH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "poundcake.fullname" . }}-admin
                  key: password
            - name: POUNDCAKE_AUTH_SERVICE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "poundcake.fullname" . }}-admin
                  key: internal-api-key
            {{- end }}
            - name: POUNDCAKE_STACKSTORM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: stackstorm-apikeys
                  key: st2_api_key
            - name: ST2_API_KEY_FILE
              value: /run/secrets/st2/st2_api_key
            - name: POUNDCAKE_PACK_SYNC_TOKEN
              valueFrom:
                secretKeyRef:
                  name: poundcake-secrets
                  key: PACK_SYNC_TOKEN
            - name: POUNDCAKE_BAKERY_ENABLED
              value: {{ .Values.bakery.client.enabled | quote }}
            - name: POUNDCAKE_BAKERY_BASE_URL
              value: {{ include "poundcake.bakeryBaseUrl" . | quote }}
            - name: POUNDCAKE_BAKERY_AUTH_MODE
              value: {{ .Values.bakery.client.auth.mode | quote }}
            - name: POUNDCAKE_BAKERY_REQUEST_TIMEOUT_SECONDS
              value: {{ .Values.bakery.client.requestTimeoutSeconds | quote }}
            - name: POUNDCAKE_BAKERY_MAX_RETRIES
              value: {{ .Values.bakery.client.maxRetries | quote }}
            - name: POUNDCAKE_BAKERY_POLL_INTERVAL_SECONDS
              value: {{ .Values.bakery.client.pollIntervalSeconds | quote }}
            - name: POUNDCAKE_BAKERY_POLL_TIMEOUT_SECONDS
              value: {{ .Values.bakery.client.pollTimeoutSeconds | quote }}
            - name: POUNDCAKE_BAKERY_ACTIVE_PROVIDER
              value: {{ .Values.bakery.config.activeProvider | default "" | quote }}
            - name: POUNDCAKE_CATCH_ALL_RECIPE_NAME
              value: {{ .Values.poundcakeApi.ticketing.catchAllRecipeName | default "fallback-recipe" | quote }}
            - name: POUNDCAKE_BAKERY_RACKSPACE_CONFIRMED_SOLVED_STATUS
              value: {{ .Values.poundcakeApi.ticketing.rackspaceConfirmedSolvedStatus | default "confirmed solved" | quote }}
            {{- $bakeryClientSecretName := .Values.bakery.client.auth.existingSecret | default (include "poundcake.bakerySecretName" .) }}
            - name: POUNDCAKE_BAKERY_HMAC_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ $bakeryClientSecretName }}
                  key: {{ .Values.bakery.client.auth.secretKeys.keyId }}
                  optional: true
            - name: POUNDCAKE_BAKERY_HMAC_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $bakeryClientSecretName }}
                  key: {{ .Values.bakery.client.auth.secretKeys.key }}
                  optional: true
          ports:
            - containerPort: 8000
              name: http
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: {{ .Values.poundcakeApi.readiness.initialDelaySeconds }}
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 40
            periodSeconds: 10
          volumeMounts:
            - name: app-config
              mountPath: /app/config
            - name: st2-apikey
              mountPath: /run/secrets/st2
              readOnly: true
            - name: poundcake-alembic
              mountPath: /app/alembic.ini
              subPath: alembic.ini
            - name: poundcake-alembic
              mountPath: /app/alembic
              subPath: alembic
      volumes:
        - name: app-config
          projected:
            sources:
              - secret:
                  name: stackstorm-startup-markers
                  optional: true
        - name: st2-apikey
          secret:
            secretName: stackstorm-apikeys
            items:
              - key: st2_api_key
                path: st2_api_key
        - name: poundcake-alembic
          configMap:
            name: poundcake-alembic
            items:
              - key: alembic.ini
                path: alembic.ini
              - key: env.py
                path: alembic/env.py
              - key: script.py.mako
                path: alembic/script.py.mako
              {{- range $path, $_ := .Files.Glob "files/poundcake-alembic/versions/*.py" }}
              - key: {{ base $path }}
                path: alembic/versions/{{ base $path }}
              {{- end }}
---

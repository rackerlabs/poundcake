          workingDir: /app
          command: ["python3", "kitchen/chef.py"]
          env:
            - name: PYTHONPATH
              value: /app
            - name: POUNDCAKE_API_URL
              value: http://poundcake-api:8000
            - name: CHEF_POLL_INTERVAL
              value: {{ .Values.intervals.chef | quote }}
            - name: LOG_LEVEL
              value: INFO
            - name: POUNDCAKE_LOG_FORMAT
              value: {{ .Values.logFormat | quote }}
            - name: SERVICE_NAME
              value: chef
      volumes:
        - name: app-config
          projected:
            sources:
              - secret:
                  name: stackstorm-startup-markers
                  optional: true
              - secret:
                  name: stackstorm-apikeys
                  optional: true

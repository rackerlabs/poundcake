apiVersion: apps/v1
kind: Deployment
metadata:
  name: poundcake-api
  labels:
    app.kubernetes.io/component: api
    {{- include "poundcake.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: api
      {{- include "poundcake.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: api
        {{- include "poundcake.logLabelsForComponent" (dict "component" "api") | nindent 8 }}
        {{- include "poundcake.selectorLabels" . | nindent 8 }}
    spec:
      {{- if .Values.podSecurityContext }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- end }}
      {{- include "poundcake.poundcakePullSecrets" . | nindent 6 }}
      initContainers:
        - name: wait-stage-ready
          image: {{ .Values.images.busybox }}
          securityContext:
            {{- toYaml .Values.utilitySecurityContext | nindent 12 }}
          command:
            - sh
            - -ec
            - |
              {{- include "poundcake.gateLogHelpers" . | nindent 14 }}
              gate_wait_for_true_file "/app/config/poundcake_mariadb_ready" "wait-stage-ready-mariadb" "marker poundcake_mariadb_ready"
              gate_wait_for_true_file "/app/config/stackstorm_bootstrap_ready" "wait-stage-ready-stackstorm-bootstrap" "marker stackstorm_bootstrap_ready"
              gate_wait_for_nonempty_file "/run/secrets/st2/st2_api_key" "wait-stage-ready-st2-apikey" "st2 api key file"
          volumeMounts:
            - name: app-config
              mountPath: /app/config
            - name: st2-apikey
              mountPath: /run/secrets/st2
              readOnly: true
      containers:
        - name: api
          image: {{ .Values.poundcakeImage.repository }}:{{ default .Chart.AppVersion .Values.poundcakeImage.tag }}
          imagePullPolicy: {{ .Values.poundcakeImage.pullPolicy }}
          securityContext:
            {{- toYaml .Values.poundcakeImage.securityContext | nindent 12 }}
          workingDir: /app
          command: ["/app/api/scripts/entrypoint-auto-migrate.sh"]
          env:
            - name: PYTHONPATH
              value: /app
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: poundcake-secrets
                  key: DB_NAME
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: poundcake-secrets
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: poundcake-secrets
                  key: DB_PASSWORD
            - name: POUNDCAKE_DATABASE_URL
              value: mysql+pymysql://$(DB_USER):$(DB_PASSWORD)@poundcake-mariadb:3306/$(DB_NAME)
            - name: POUNDCAKE_STACKSTORM_URL
              value: http://stackstorm-api:9101
            - name: POUNDCAKE_STACKSTORM_VERIFY_SSL
              value: "False"
            - name: MONGODB_HOST
              value: stackstorm-mongodb
            - name: MONGODB_PORT
              value: "27017"
            - name: RABBITMQ_HOST
              value: stackstorm-rabbitmq
            - name: RABBITMQ_PORT
              value: "5672"
            - name: RABBITMQ_MANAGEMENT_PORT
              value: "15672"
            - name: REDIS_HOST
              value: stackstorm-redis
            - name: REDIS_PORT
              value: "6379"
            - name: RABBITMQ_USER
              valueFrom:
                secretKeyRef:
                  name: stackstorm-secrets
                  key: RABBITMQ_USER
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: stackstorm-secrets
                  key: RABBITMQ_PASSWORD
            - name: POUNDCAKE_LOG_LEVEL
              value: DEBUG
            - name: POUNDCAKE_LOG_FORMAT
              value: {{ .Values.logFormat | quote }}
            - name: POUNDCAKE_APP_VERSION
              value: {{ .Chart.AppVersion | quote }}
            - name: SERVICE_NAME
              value: api
            - name: POUNDCAKE_STACKSTORM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: stackstorm-apikeys
                  key: st2_api_key
            - name: ST2_API_KEY_FILE
              value: /run/secrets/st2/st2_api_key
            - name: POUNDCAKE_PACK_SYNC_TOKEN
              valueFrom:
                secretKeyRef:
                  name: poundcake-secrets
                  key: PACK_SYNC_TOKEN
          ports:
            - containerPort: 8000
              name: http
          readinessProbe:
            httpGet:
              path: /api/v1/ready
              port: 8000
            initialDelaySeconds: {{ .Values.poundcakeApi.readiness.initialDelaySeconds }}
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /api/v1/live
              port: 8000
            initialDelaySeconds: 40
            periodSeconds: 10
          volumeMounts:
            - name: app-config
              mountPath: /app/config
            - name: st2-apikey
              mountPath: /run/secrets/st2
              readOnly: true
            - name: poundcake-alembic
              mountPath: /app/alembic.ini
              subPath: alembic.ini
            - name: poundcake-alembic
              mountPath: /app/alembic
              subPath: alembic
      volumes:
        - name: app-config
          projected:
            sources:
              - secret:
                  name: stackstorm-startup-markers
                  optional: true
        - name: st2-apikey
          secret:
            secretName: stackstorm-apikeys
            items:
              - key: st2_api_key
                path: st2_api_key
        - name: poundcake-alembic
          configMap:
            name: poundcake-alembic
            items:
              - key: alembic.ini
                path: alembic.ini
              - key: env.py
                path: alembic/env.py
              - key: script.py.mako
                path: alembic/script.py.mako
              - key: versions__init__.py
                path: alembic/versions/__init__.py
              - key: 2026_02_03_1600_initial_schema.py
                path: alembic/versions/2026_02_03_1600_initial_schema.py
---

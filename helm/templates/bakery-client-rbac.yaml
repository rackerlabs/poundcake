{{- if and .Values.poundcake.enabled .Values.bakery.client.enabled }}
{{- $client := .Values.bakery.client | default dict }}
{{- $collectionRbac := $client.collectionRbac | default dict }}
{{- $enabled := true }}
{{- if hasKey $collectionRbac "enabled" }}
{{- $enabled = $collectionRbac.enabled }}
{{- end }}
{{- if $enabled }}
{{- $monitor := $client.monitor | default dict }}
{{- $defaultNamespace := default .Release.Namespace ($monitor.namespace | default "") }}
{{- $extraNamespaces := $collectionRbac.namespaces | default (list) }}
{{- $namespaces := uniq (compact (concat (list $defaultNamespace) $extraNamespaces)) }}
{{- $name := printf "%s-bakery-collectors" (include "poundcake.fullname" .) | trunc 63 | trimSuffix "-" }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ printf "%s-cluster" $name | trunc 63 | trimSuffix "-" }}
  labels:
    {{- include "poundcake.labels" $ | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["nodes", "persistentvolumes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ printf "%s-cluster" $name | trunc 63 | trimSuffix "-" }}
  labels:
    {{- include "poundcake.labels" $ | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "poundcake.serviceAccountName" $ }}
    namespace: {{ $.Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ printf "%s-cluster" $name | trunc 63 | trimSuffix "-" }}
{{- range $namespace := $namespaces }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $name }}
  namespace: {{ $namespace }}
  labels:
    {{- include "poundcake.labels" $ | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $name }}
  namespace: {{ $namespace }}
  labels:
    {{- include "poundcake.labels" $ | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "poundcake.serviceAccountName" $ }}
    namespace: {{ $.Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $name }}
{{- end }}
{{- end }}
{{- end }}

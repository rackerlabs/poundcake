apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: poundcake-mariadb
  labels:
    {{- include "poundcake-standalone.labels" . | nindent 4 }}
spec:
  accessModes: ["{{ .Values.persistence.mariadb.accessMode | default "ReadWriteOnce" }}"]
  resources:
    requests:
      storage: {{ .Values.persistence.mariadb.size }}
  {{- include "poundcake-standalone.pvcStorageClass" (dict "root" . "pvcStorageClass" .Values.persistence.mariadb.storageClassName) | nindent 2 }}

    {{- include "poundcake.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": {{ include "poundcake.startupHookDeletePolicy" . | quote }}
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/component: stackstorm-workers-ready
        {{- include "poundcake.logLabelsForComponent" (dict "component" "stackstorm-workers-ready") | nindent 8 }}
        {{- include "poundcake.selectorLabels" . | nindent 8 }}
    spec:
      {{- if .Values.podSecurityContext }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- end }}
      restartPolicy: OnFailure
      serviceAccountName: stackstorm-startup
      containers:
        - name: wait-workers
          image: {{ .Values.images.kubectl }}
          securityContext:
            {{- toYaml .Values.utilitySecurityContext | nindent 12 }}
          command:
            - /bin/sh
            - -ec
            - |
              NS="{{ .Release.Namespace }}"
              kubectl -n "${NS}" wait --for=condition=Available deployment/stackstorm-actionrunner --timeout=15m
              kubectl -n "${NS}" wait --for=condition=Available deployment/stackstorm-rulesengine --timeout=15m
              kubectl -n "${NS}" wait --for=condition=Available deployment/stackstorm-workflowengine --timeout=15m

apiVersion: batch/v1
kind: Job
metadata:
  name: poundcake-bootstrap
  labels:
    app.kubernetes.io/component: poundcake-bootstrap
    {{- include "poundcake.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "30"
    "helm.sh/hook-delete-policy": {{ include "poundcake.startupHookDeletePolicy" . | quote }}
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/component: poundcake-bootstrap
        {{- include "poundcake.logLabelsForComponent" (dict "component" "poundcake-bootstrap") | nindent 8 }}
        {{- include "poundcake.selectorLabels" . | nindent 8 }}
    spec:
      {{- if .Values.podSecurityContext }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- end }}
      {{- include "poundcake.poundcakePullSecrets" . | nindent 6 }}
      restartPolicy: OnFailure
      serviceAccountName: stackstorm-startup
      initContainers:
        - name: wait-stackstorm-bootstrap
          image: {{ .Values.images.kubectl }}
          securityContext:
            {{- toYaml .Values.utilitySecurityContext | nindent 12 }}
          command:
            - /bin/sh
            - -ec
            - |
              NS="{{ .Release.Namespace }}"
              until [ "$(kubectl -n "${NS}" get secret stackstorm-startup-markers -o jsonpath='{.data.stackstorm_bootstrap_ready}' 2>/dev/null | base64 -d)" = "true" ]; do sleep 2; done
        - name: wait-api
          image: {{ .Values.images.busybox }}
          securityContext:
            {{- toYaml .Values.utilitySecurityContext | nindent 12 }}
          command: ["sh", "-c", "until nc -z poundcake-api 8000; do sleep 2; done"]
        - name: run-bootstrap
          image: {{ .Values.poundcakeImage.repository }}:{{ .Values.poundcakeImage.tag }}
          securityContext:
            {{- toYaml .Values.utilitySecurityContext | nindent 12 }}
          imagePullPolicy: {{ .Values.poundcakeImage.pullPolicy }}
          workingDir: /app
          command:
            - /bin/bash
            - -ec
            - |
              python3 kitchen/dishwasher.py
          env:
            - name: PYTHONPATH
              value: /app
            - name: POUNDCAKE_API_URL
              value: http://poundcake-api:8000
            - name: LOG_LEVEL
              value: INFO
            - name: POUNDCAKE_LOG_FORMAT
              value: {{ .Values.logFormat | quote }}
            - name: DISHWASHER_DEFAULT_DURATION
              value: "60"
            - name: DISHWASHER_DEFAULT_TIMEOUT
              value: "300"
            - name: DISHWASHER_PRUNE_MISSING
              value: "false"
            - name: DISHWASHER_INTERVAL
              value: "0"
            - name: POUNDCAKE_BOOTSTRAP_MARK
              value: "true"
      containers:
        - name: mark-ready
          image: {{ .Values.images.kubectl }}
          securityContext:
            {{- toYaml .Values.utilitySecurityContext | nindent 12 }}
          command:
            - /bin/sh
            - -ec
            - |
              NS="{{ .Release.Namespace }}"
              kubectl -n "${NS}" patch secret stackstorm-startup-markers --type merge \
                -p '{"stringData":{"poundcake_bootstrap_ready":"true"}}'

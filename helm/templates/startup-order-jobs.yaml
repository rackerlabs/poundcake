apiVersion: batch/v1
kind: Job
metadata:
  name: stackstorm-apikey-init
  labels:
    app.kubernetes.io/component: stackstorm-apikey-init
    {{- include "poundcake.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "4"
    "helm.sh/hook-delete-policy": {{ include "poundcake.startupHookDeletePolicy" . | quote }}
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/component: stackstorm-apikey-init
        {{- include "poundcake.logLabelsForComponent" (dict "component" "stackstorm-apikey-init") | nindent 8 }}
        {{- include "poundcake.selectorLabels" . | nindent 8 }}
    spec:
      {{- if .Values.podSecurityContext }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- end }}
      restartPolicy: OnFailure
      serviceAccountName: stackstorm-startup
      initContainers:
        - name: generate-apikey
          image: {{ .Values.stackstormImage.repository }}:{{ .Values.stackstormImage.tag }}
          securityContext:
            {{- toYaml .Values.utilitySecurityContext | nindent 12 }}
          imagePullPolicy: {{ .Values.stackstormImage.pullPolicy }}
          envFrom:
            - secretRef:
                name: stackstorm-secrets
          env:
            - name: ST2_AUTH_URL
              value: http://stackstorm-auth:9100
            - name: ST2_API_URL
              value: http://stackstorm-api:9101
          command:
            - /bin/bash
            - -ec
            - |
              until (echo > /dev/tcp/stackstorm-api/9101) >/dev/null 2>&1; do sleep 3; done
              until (echo > /dev/tcp/stackstorm-auth/9100) >/dev/null 2>&1; do sleep 3; done

              token=""
              for i in $(seq 1 30); do
                token="$(st2 auth "${ST2_AUTH_USER}" -p "${ST2_AUTH_PASSWORD}" -t 2>/dev/null || true)"
                [ -n "${token}" ] && break
                sleep 2
              done
              [ -n "${token}" ]
              export ST2_AUTH_TOKEN="${token}"

              key=""
              for i in $(seq 1 30); do
                key="$(st2 apikey create -k -m '{"description":"PoundCake-Internal"}' 2>/dev/null || true)"
                [ -n "${key}" ] && break
                sleep 2
              done
              [ -n "${key}" ]
              printf "%s" "${key}" > /work/st2_api_key
          volumeMounts:
            - name: key-work
              mountPath: /work
      containers:
        - name: publish-apikey
          image: {{ .Values.images.kubectl }}
          securityContext:
            {{- toYaml .Values.utilitySecurityContext | nindent 12 }}
          command:
            - /bin/sh
            - -ec
            - |
              NS="{{ .Release.Namespace }}"
              key="$(cat /work/st2_api_key)"
              kubectl -n "${NS}" create secret generic stackstorm-apikeys \
                --from-literal=st2_api_key="${key}" \
                --dry-run=client -o yaml | kubectl apply -f -
              kubectl -n "${NS}" patch secret stackstorm-startup-markers --type merge \
                -p '{"stringData":{"stackstorm_apikey_ready":"true"}}'
          volumeMounts:
            - name: key-work
              mountPath: /work
      volumes:
        - name: key-work
          emptyDir: {}
---
apiVersion: batch/v1

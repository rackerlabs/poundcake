apiVersion: batch/v1
kind: Job
metadata:
  name: stackstorm-startup-markers-reset
  labels:
    app.kubernetes.io/component: stackstorm-startup-markers-reset
    {{- include "poundcake.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": {{ include "poundcake.startupHookDeletePolicy" . | quote }}
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/component: stackstorm-startup-markers-reset
        {{- include "poundcake.logLabelsForComponent" (dict "component" "stackstorm-startup-markers-reset") | nindent 8 }}
        {{- include "poundcake.selectorLabels" . | nindent 8 }}
    spec:
      {{- if .Values.podSecurityContext }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- end }}
      restartPolicy: OnFailure
      serviceAccountName: stackstorm-startup
      containers:
        - name: reset-markers
          image: {{ .Values.images.kubectl }}
          securityContext:
            {{- toYaml .Values.utilitySecurityContext | nindent 12 }}
          command:
            - /bin/sh
            - -ec
            - |
              NS="{{ .Release.Namespace }}"
              kubectl -n "${NS}" patch secret stackstorm-startup-markers --type merge \
                -p '{"stringData":{"stackstorm_mongodb_user_ready":"false","stackstorm_infra_ready":"false","stackstorm_controlplane_ready":"false","stackstorm_workers_ready":"false","stackstorm_edge_ready":"false","stackstorm_bootstrap_ready":"false","poundcake_mariadb_ready":"false","poundcake_bootstrap_ready":"false"}}'
---
apiVersion: batch/v1
kind: Job
metadata:
  name: stackstorm-mongodb-user-sync
  labels:
    app.kubernetes.io/component: stackstorm-mongodb-user-sync
    {{- include "poundcake.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": {{ include "poundcake.startupHookDeletePolicy" . | quote }}
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/component: stackstorm-mongodb-user-sync
        {{- include "poundcake.logLabelsForComponent" (dict "component" "stackstorm-mongodb-user-sync") | nindent 8 }}
        {{- include "poundcake.selectorLabels" . | nindent 8 }}
    spec:
      {{- if .Values.podSecurityContext }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- end }}
      serviceAccountName: stackstorm-startup
      restartPolicy: OnFailure
      initContainers:
        - name: sync-user
          image: {{ .Values.images.mongodb }}
          securityContext:
            {{- toYaml .Values.utilitySecurityContext | nindent 12 }}
          command:
            - /bin/bash
            - -ec
            - |
              set -euo pipefail

              echo "Waiting for MongoDB..."
              until mongosh --host stackstorm-mongodb --quiet --eval "db.adminCommand('ping').ok" 2>/dev/null | grep -q 1; do
                sleep 2
              done

              MONGO_URI="mongodb://admin:${MONGO_ROOT_PASSWORD}@stackstorm-mongodb:27017/admin"
              echo "Ensuring StackStorm MongoDB user exists and password is current..."

              mongosh "${MONGO_URI}" --quiet --eval "
                const upsert = function(dbName, roles) {
                  try {
                    db.getSiblingDB(dbName).createUser({
                      user: '${MONGO_USERNAME}',
                      pwd: '${MONGO_PASSWORD}',
                      roles: roles
                    });
                    print('created:' + dbName);
                  } catch (e) {
                    if (e.codeName === 'DuplicateKey' || /already exists/.test(e.message)) {
                      db.getSiblingDB(dbName).updateUser('${MONGO_USERNAME}', {
                        pwd: '${MONGO_PASSWORD}',
                        roles: roles
                      });
                      print('updated:' + dbName);
                    } else {
                      throw e;
                    }
                  }
                };

                // Keep a user in st2 DB for explicit authSource=st2.
                upsert('st2', [{role: 'dbOwner', db: 'st2'}]);
                // Also keep a user in admin DB for clients that auth against admin.
                upsert('admin', [{role: 'dbOwner', db: 'st2'}]);
              "

              echo "Validating StackStorm Mongo credentials..."
              until mongosh "mongodb://${MONGO_USERNAME}:${MONGO_PASSWORD}@stackstorm-mongodb:27017/st2?authSource=st2" --quiet --eval "db.runCommand({ping:1}).ok" 2>/dev/null | grep -q 1; do
                sleep 2
              done
              until mongosh "mongodb://${MONGO_USERNAME}:${MONGO_PASSWORD}@stackstorm-mongodb:27017/st2?authSource=admin" --quiet --eval "db.runCommand({ping:1}).ok" 2>/dev/null | grep -q 1; do
                sleep 2
              done
          env:
            - name: MONGO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: stackstorm-secrets
                  key: MONGO_ROOT_PASSWORD
            - name: MONGO_USERNAME
              valueFrom:
                secretKeyRef:
                  name: stackstorm-secrets
                  key: MONGO_USERNAME
            - name: MONGO_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: stackstorm-secrets
                  key: MONGO_PASSWORD
      containers:
        - name: mark-user-ready
          image: {{ .Values.images.kubectl }}
          securityContext:
            {{- toYaml .Values.utilitySecurityContext | nindent 12 }}
          command:
            - /bin/sh
            - -ec
            - |
              NS="{{ .Release.Namespace }}"
              kubectl -n "${NS}" patch secret stackstorm-startup-markers --type merge \
                -p '{"stringData":{"stackstorm_mongodb_user_ready":"true"}}'
---
apiVersion: batch/v1
kind: Job
metadata:
  name: stackstorm-infra-ready
  labels:
    app.kubernetes.io/component: stackstorm-infra-ready
    {{- include "poundcake.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "2"
    "helm.sh/hook-delete-policy": {{ include "poundcake.startupHookDeletePolicy" . | quote }}
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/component: stackstorm-infra-ready
        {{- include "poundcake.logLabelsForComponent" (dict "component" "stackstorm-infra-ready") | nindent 8 }}
        {{- include "poundcake.selectorLabels" . | nindent 8 }}
    spec:
      {{- if .Values.podSecurityContext }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- end }}
      restartPolicy: OnFailure
      serviceAccountName: stackstorm-startup
      containers:
        - name: wait-infra
          image: {{ .Values.images.kubectl }}
          securityContext:
            {{- toYaml .Values.utilitySecurityContext | nindent 12 }}
          command:
            - /bin/sh
            - -ec
            - |
              NS="{{ .Release.Namespace }}"
              {{- include "poundcake.gateLogHelpers" . | nindent 14 }}
              PARALLEL_ENABLED="{{ ternary "true" "false" .Values.startupHooks.parallelWait.enabled }}"
              FAIL_FAST="{{ ternary "true" "false" .Values.startupHooks.parallelWait.failFast }}"
              services="stackstorm-mongodb stackstorm-rabbitmq stackstorm-redis"

              wait_for_service_endpoint() {
                svc="$1"
                gate_log_wait_start "stackstorm-infra-${svc}" "service endpoint ${svc}"
                until [ -n "$(kubectl -n "${NS}" get endpoints "${svc}" -o jsonpath='{.subsets[0].addresses[0].ip}' 2>/dev/null || true)" ]; do
                  gate_log_wait_tick "stackstorm-infra-${svc}" "service endpoint ${svc}"
                  sleep 2
                done
                gate_log_wait_ready "stackstorm-infra-${svc}"
              }

              if [ "${PARALLEL_ENABLED}" = "true" ]; then
                pids=""
                status=0
                for svc in ${services}; do
                  wait_for_service_endpoint "${svc}" &
                  pids="${pids} $!"
                done

                for pid in ${pids}; do
                  if ! wait "${pid}"; then
                    status=1
                    if [ "${FAIL_FAST}" = "true" ]; then
                      exit 1
                    fi
                  fi
                done
                [ "${status}" -eq 0 ] || exit 1
              else
                for svc in ${services}; do
                  wait_for_service_endpoint "${svc}"
                done
              fi
              kubectl -n "${NS}" patch secret stackstorm-startup-markers --type merge \
                -p '{"stringData":{"stackstorm_infra_ready":"true"}}'
---

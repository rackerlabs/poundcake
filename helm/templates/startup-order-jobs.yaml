apiVersion: batch/v1
kind: Job
metadata:
  name: stackstorm-bootstrap
  labels:
    app.kubernetes.io/component: stackstorm-bootstrap
    {{- include "poundcake.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "7"
    "helm.sh/hook-delete-policy": {{ include "poundcake.startupHookDeletePolicy" . | quote }}
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/component: stackstorm-bootstrap
        {{- include "poundcake.logLabelsForComponent" (dict "component" "stackstorm-bootstrap") | nindent 8 }}
        {{- include "poundcake.selectorLabels" . | nindent 8 }}
    spec:
      {{- if .Values.podSecurityContext }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- end }}
      restartPolicy: OnFailure
      serviceAccountName: stackstorm-startup
      initContainers:
        - name: wait-stage6
          image: {{ .Values.images.kubectl }}
          securityContext:
            {{- toYaml .Values.utilitySecurityContext | nindent 12 }}
          command:
            - /bin/sh
            - -ec
            - |
              NS="{{ .Release.Namespace }}"
              {{- include "poundcake.gateLogHelpers" . | nindent 14 }}
              gate_log_wait_start "wait-stage6-edge-ready" "marker stackstorm_edge_ready"
              until [ "$(kubectl -n "${NS}" get secret stackstorm-startup-markers -o jsonpath='{.data.stackstorm_edge_ready}' 2>/dev/null | base64 -d)" = "true" ]; do
                gate_log_wait_tick "wait-stage6-edge-ready" "marker stackstorm_edge_ready"
                sleep 2
              done
              gate_log_wait_ready "wait-stage6-edge-ready"
        - name: run-bootstrap
          image: {{ .Values.stackstormImage.repository }}:{{ .Values.stackstormImage.tag }}
          securityContext:
            {{- toYaml .Values.utilitySecurityContext | nindent 12 }}
          imagePullPolicy: {{ .Values.stackstormImage.pullPolicy }}
          envFrom:
            - secretRef:
                name: stackstorm-secrets
          env:
            - name: ST2_AUTH_URL
              value: http://stackstorm-auth:9100
            - name: ST2_API_URL
              value: http://stackstorm-api:9101
          command:
            - /bin/bash
            - -ec
            - |
              cp /run/apikey/st2_api_key /app/config/st2_api_key || true
              /bin/bash /st2-entrypoint.sh /automated-setup.sh
          volumeMounts:
            - name: stackstorm-config
              mountPath: /etc/st2/st2.conf.template
              subPath: st2.conf.template
            - name: scripts
              mountPath: /st2-entrypoint.sh
              subPath: st2-entrypoint.sh
            - name: scripts
              mountPath: /automated-setup.sh
              subPath: automated-setup.sh
            - name: app-config
              mountPath: /app/config
            - name: apikey
              mountPath: /run/apikey
      containers:
        - name: mark-ready
          image: {{ .Values.images.kubectl }}
          securityContext:
            {{- toYaml .Values.utilitySecurityContext | nindent 12 }}
          command:
            - /bin/sh
            - -ec
            - |
              NS="{{ .Release.Namespace }}"
              if [ -s /app/config/st2_api_key ]; then
                key="$(cat /app/config/st2_api_key)"
                kubectl -n "${NS}" create secret generic stackstorm-apikeys \
                  --from-literal=st2_api_key="${key}" \
                  --dry-run=client -o yaml | kubectl apply -f -
              fi
              kubectl -n "${NS}" patch secret stackstorm-startup-markers --type merge \
                -p '{"stringData":{"stackstorm_bootstrap_ready":"true"}}'
          volumeMounts:
            - name: app-config
              mountPath: /app/config
      volumes:
        - name: stackstorm-config
          configMap:
            name: stackstorm-config
        - name: scripts
          configMap:
            name: stackstorm-scripts
            defaultMode: 0755
        - name: app-config
          emptyDir: {}
        - name: apikey
          secret:
            secretName: stackstorm-apikeys
            optional: true
---

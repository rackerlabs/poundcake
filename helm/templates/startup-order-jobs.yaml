              kubectl -n "${NS}" wait --for=condition=Available deployment/stackstorm-notifier --timeout=15m
              {{- end }}
              kubectl -n "${NS}" wait --for=condition=Available deployment/stackstorm-garbagecollector --timeout=15m
              {{- if eq (include "poundcake.stackstormServiceEnabled" (dict "root" . "name" "timersengine")) "true" }}

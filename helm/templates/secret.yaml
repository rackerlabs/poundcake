{{- $existingPound := (lookup "v1" "Secret" .Release.Namespace "poundcake-secrets") | default dict -}}
{{- $poundData := (dig "data" (dict) $existingPound) -}}
{{- $existingStack := (lookup "v1" "Secret" .Release.Namespace "stackstorm-secrets") | default dict -}}
{{- $stackData := (dig "data" (dict) $existingStack) -}}
{{- $existingApikeys := (lookup "v1" "Secret" .Release.Namespace "stackstorm-apikeys") | default dict -}}
{{- $apikeyData := (dig "data" (dict) $existingApikeys) -}}
{{- $st2AuthPassword := default (default (randAlphaNum 24) (get $stackData "ST2_AUTH_PASSWORD" | default "" | b64dec)) .Values.secrets.st2AuthPassword -}}
{{- $existingPackSyncToken := coalesce (get $poundData "PACK_SYNC_TOKEN" | default "" | b64dec) (get $stackData "PACK_SYNC_TOKEN" | default "" | b64dec) -}}
{{- $packSyncToken := default (default (randAlphaNum 32) $existingPackSyncToken) .Values.secrets.packSyncToken -}}

apiVersion: v1
kind: Secret
metadata:
  name: poundcake-secrets
  labels:
    {{- include "poundcake.labels" . | nindent 4 }}
type: Opaque
stringData:
  DB_ROOT_PASSWORD: {{ default (default (randAlphaNum 24) (get $poundData "DB_ROOT_PASSWORD" | default "" | b64dec)) .Values.secrets.dbRootPassword | quote }}
  DB_NAME: {{ .Values.secrets.dbName | quote }}
  DB_USER: {{ .Values.secrets.dbUser | quote }}
  DB_PASSWORD: {{ default (default (randAlphaNum 24) (get $poundData "DB_PASSWORD" | default "" | b64dec)) .Values.secrets.dbPassword | quote }}
  PACK_SYNC_TOKEN: {{ $packSyncToken | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: stackstorm-secrets
  labels:
    {{- include "poundcake.labels" . | nindent 4 }}
type: Opaque
stringData:
  MONGO_ROOT_PASSWORD: {{ default (default (randAlphaNum 24) (get $stackData "MONGO_ROOT_PASSWORD" | default "" | b64dec)) .Values.secrets.mongoRootPassword | quote }}
  MONGO_USERNAME: {{ .Values.secrets.mongoUsername | quote }}
  MONGO_PASSWORD: {{ default (default (randAlphaNum 24) (get $stackData "MONGO_PASSWORD" | default "" | b64dec)) .Values.secrets.mongoPassword | quote }}
  RABBITMQ_USER: {{ .Values.secrets.rabbitmqUser | quote }}
  RABBITMQ_PASSWORD: {{ default (default (randAlphaNum 24) (get $stackData "RABBITMQ_PASSWORD" | default "" | b64dec)) .Values.secrets.rabbitmqPassword | quote }}
  ST2_AUTH_USER: {{ .Values.secrets.st2AuthUser | quote }}
  ST2_AUTH_PASSWORD: {{ $st2AuthPassword | quote }}
  ST2_AUTH_HTPASSWD: {{ htpasswd .Values.secrets.st2AuthUser $st2AuthPassword | quote }}
  PACK_SYNC_TOKEN: {{ $packSyncToken | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: stackstorm-startup-markers
  labels:
    {{- include "poundcake.labels" . | nindent 4 }}
type: Opaque
stringData:
  stackstorm_mongodb_user_ready: "false"
  stackstorm_infra_ready: "false"
  stackstorm_controlplane_ready: "false"
  stackstorm_workers_ready: "false"
  stackstorm_edge_ready: "false"
  stackstorm_bootstrap_ready: "false"
  poundcake_mariadb_ready: "false"
  poundcake_bootstrap_ready: "false"
---
apiVersion: v1
kind: Secret
metadata:
  name: stackstorm-apikeys
  labels:
    {{- include "poundcake.labels" . | nindent 4 }}
type: Opaque
stringData:
  st2_api_key: {{ default "" (get $apikeyData "st2_api_key" | default "" | b64dec) | quote }}

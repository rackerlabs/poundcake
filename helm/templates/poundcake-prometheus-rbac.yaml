{{- if and .Values.poundcake.enabled .Values.prometheus.useCrds }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "poundcake.fullname" . }}-prometheus-rules
  labels:
    {{- include "poundcake.labels" . | nindent 4 }}
rules:
  - apiGroups:
      - monitoring.coreos.com
    resources:
      - prometheusrules
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "poundcake.fullname" . }}-prometheus-rules
  labels:
    {{- include "poundcake.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "poundcake.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "poundcake.fullname" . }}-prometheus-rules
{{- end }}

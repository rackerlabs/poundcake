{{- if .Values.gateway.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ .Values.gateway.name }}
  labels:
    {{- include "poundcake.labels" . | nindent 4 }}
spec:
  gatewayClassName: {{ .Values.gateway.className }}
  listeners:
    {{- if .Values.gateway.listeners.api.enabled }}
    - name: api
      protocol: HTTP
      port: {{ .Values.gateway.listeners.api.port }}
      {{- if .Values.gateway.listeners.api.hostname }}
      hostname: {{ .Values.gateway.listeners.api.hostname | quote }}
      {{- end }}
      allowedRoutes:
        namespaces:
          from: Same
    {{- end }}
    {{- if .Values.gateway.listeners.ui.enabled }}
    - name: ui
      protocol: HTTP
      port: {{ .Values.gateway.listeners.ui.port }}
      {{- if .Values.gateway.listeners.ui.hostname }}
      hostname: {{ .Values.gateway.listeners.ui.hostname | quote }}
      {{- end }}
      allowedRoutes:
        namespaces:
          from: Same
    {{- end }}
{{- if .Values.gateway.listeners.api.enabled }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: poundcake-api-route
  labels:
    {{- include "poundcake.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.gateway.name }}
      sectionName: api
  {{- if .Values.gateway.listeners.api.hostname }}
  hostnames:
    - {{ .Values.gateway.listeners.api.hostname | quote }}
  {{- end }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: {{ .Values.gateway.listeners.api.pathPrefix | quote }}
      backendRefs:
        - name: poundcake-api
          port: {{ .Values.services.api.port }}
{{- end }}
{{- if .Values.gateway.listeners.ui.enabled }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: poundcake-ui-route
  labels:
    {{- include "poundcake.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.gateway.name }}
      sectionName: ui
  {{- if .Values.gateway.listeners.ui.hostname }}
  hostnames:
    - {{ .Values.gateway.listeners.ui.hostname | quote }}
  {{- end }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: {{ .Values.gateway.listeners.ui.pathPrefix | quote }}
      backendRefs:
        - name: poundcake-ui
          port: {{ .Values.services.ui.port }}
{{- end }}
{{- end }}

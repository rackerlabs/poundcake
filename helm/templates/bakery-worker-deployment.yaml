{{- $bakeryEnabled := .Values.bakery.enabled -}}
{{- if and $bakeryEnabled .Values.bakery.worker.enabled }}
{{- if not .Values.bakery.database.createServer }}
{{- if not .Values.bakery.database.host }}
{{- fail "bakery.database.host must be set when bakery.database.createServer=false" }}
{{- end }}
{{- end }}
{{- if and .Values.bakery.database.createServer (not .Values.mariadbOperator.enabled) }}
{{- fail "bakery.database.createServer=true requires mariadbOperator.enabled=true (or set bakery.database.createServer=false and provide bakery.database.user.passwordSecret)" }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "poundcake.bakeryName" . }}-worker
  labels:
    {{- include "poundcake.labels" . | nindent 4 }}
    app.kubernetes.io/component: bakery-worker
spec:
  replicas: {{ .Values.bakery.worker.replicaCount }}
  selector:
    matchLabels:
      {{- include "poundcake.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: bakery-worker
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/bakery-secret.yaml") . | sha256sum }}
      labels:
        {{- include "poundcake.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: bakery-worker
        {{- include "poundcake.logGroupLabel" . | nindent 8 }}
        {{- include "poundcake.logRoleWorker" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "poundcake.bakeryServiceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      initContainers:
        {{- include "poundcake.bakeryWaitForDbInitContainer" . | nindent 8 }}
        - name: wait-for-bakery-api
          image: {{ .Values.images.busybox | quote }}
          securityContext:
            {{- toYaml .Values.utilitySecurityContext | nindent 12 }}
          command:
            - sh
            - -ec
            - |
              {{- include "poundcake.gateLogHelpers" . | nindent 14 }}
              gate_log_wait_start "bakery-worker-api-ready" "http endpoint http://{{ include "poundcake.bakeryName" . }}:{{ .Values.bakery.service.port }}/api/v1/health"
              until wget -q -T 2 -O /dev/null "http://{{ include "poundcake.bakeryName" . }}:{{ .Values.bakery.service.port }}/api/v1/health"; do
                gate_log_wait_tick "bakery-worker-api-ready" "http endpoint http://{{ include "poundcake.bakeryName" . }}:{{ .Values.bakery.service.port }}/api/v1/health"
                sleep 2
              done
              gate_log_wait_ready "bakery-worker-api-ready"
      containers:
        - name: bakery-worker
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.bakery.image.repository }}:{{ .Values.bakery.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.bakery.image.pullPolicy }}
          command:
            - python
            - -m
            - bakery.worker
          env:
            - name: ENVIRONMENT
              value: {{ .Values.bakery.config.environment | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.bakery.config.logLevel | quote }}
            - name: TICKETING_DRY_RUN
              value: {{ .Values.bakery.config.ticketingDryRun | quote }}
            - name: BAKERY_ACTIVE_PROVIDER
              value: {{ .Values.bakery.config.activeProvider | default "rackspace_core" | quote }}
            - name: DATABASE_HOST
              value: {{ include "poundcake.bakeryDbHost" . }}
            - name: DATABASE_PORT
              value: "3306"
            - name: DATABASE_NAME
              value: {{ .Values.bakery.database.name | quote }}
            - name: DATABASE_USER
              value: {{ .Values.bakery.database.user.name | quote }}
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "poundcake.bakeryDbSecretName" . }}
                  key: {{ include "poundcake.bakeryDbSecretKey" . }}
            - name: MIXER_TIMEOUT_SEC
              value: {{ .Values.bakery.config.mixerTimeoutSec | quote }}
            - name: MIXER_MAX_RETRIES
              value: {{ .Values.bakery.config.mixerMaxRetries | quote }}
            - name: BAKERY_WORKER_POLL_INTERVAL_SEC
              value: {{ .Values.bakery.worker.pollIntervalSec | quote }}
            - name: BAKERY_WORKER_BATCH_SIZE
              value: {{ .Values.bakery.worker.batchSize | quote }}
            - name: BAKERY_WORKER_MAX_ATTEMPTS
              value: {{ .Values.bakery.worker.maxAttempts | quote }}
            - name: BAKERY_WORKER_BACKOFF_BASE_SEC
              value: {{ .Values.bakery.worker.backoffBaseSec | quote }}
            - name: BAKERY_WORKER_BACKOFF_MAX_SEC
              value: {{ .Values.bakery.worker.backoffMaxSec | quote }}
            - name: BAKERY_AUTH_ENABLED
              value: {{ .Values.bakery.auth.enabled | quote }}
            - name: BAKERY_AUTH_MODE
              value: {{ .Values.bakery.auth.mode | quote }}
            - name: BAKERY_HMAC_TIMESTAMP_SKEW_SEC
              value: {{ .Values.bakery.auth.hmac.timestampSkewSec | quote }}
            {{- $bakeryAuthSecretName := .Values.bakery.auth.existingSecret | default (include "poundcake.bakerySecretName" .) }}
            - name: BAKERY_HMAC_ACTIVE_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ $bakeryAuthSecretName }}
                  key: {{ .Values.bakery.auth.secretKeys.activeKeyId }}
                  optional: true
            - name: BAKERY_HMAC_ACTIVE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $bakeryAuthSecretName }}
                  key: {{ .Values.bakery.auth.secretKeys.activeKey }}
                  optional: true
            - name: BAKERY_HMAC_NEXT_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ $bakeryAuthSecretName }}
                  key: {{ .Values.bakery.auth.secretKeys.nextKeyId }}
                  optional: true
            - name: BAKERY_HMAC_NEXT_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $bakeryAuthSecretName }}
                  key: {{ .Values.bakery.auth.secretKeys.nextKey }}
                  optional: true
            {{- if .Values.bakery.servicenow.existingSecret }}
            - name: SERVICENOW_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.bakery.servicenow.existingSecret }}
                  key: {{ .Values.bakery.servicenow.secretKeys.url }}
            - name: SERVICENOW_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.bakery.servicenow.existingSecret }}
                  key: {{ .Values.bakery.servicenow.secretKeys.username }}
            - name: SERVICENOW_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.bakery.servicenow.existingSecret }}
                  key: {{ .Values.bakery.servicenow.secretKeys.password }}
            {{- else if and .Values.bakery.servicenow.url .Values.bakery.servicenow.password }}
            - name: SERVICENOW_URL
              value: {{ .Values.bakery.servicenow.url | quote }}
            - name: SERVICENOW_USERNAME
              value: {{ .Values.bakery.servicenow.username | quote }}
            - name: SERVICENOW_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "poundcake.bakerySecretName" . }}
                  key: servicenow-password
            {{- end }}
            {{- if .Values.bakery.jira.existingSecret }}
            - name: JIRA_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.bakery.jira.existingSecret }}
                  key: {{ .Values.bakery.jira.secretKeys.url }}
            - name: JIRA_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.bakery.jira.existingSecret }}
                  key: {{ .Values.bakery.jira.secretKeys.username }}
            - name: JIRA_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.bakery.jira.existingSecret }}
                  key: {{ .Values.bakery.jira.secretKeys.apiToken }}
            {{- else if and .Values.bakery.jira.url .Values.bakery.jira.apiToken }}
            - name: JIRA_URL
              value: {{ .Values.bakery.jira.url | quote }}
            - name: JIRA_USERNAME
              value: {{ .Values.bakery.jira.username | quote }}
            - name: JIRA_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "poundcake.bakerySecretName" . }}
                  key: jira-api-token
            {{- end }}
            {{- if .Values.bakery.github.existingSecret }}
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.bakery.github.existingSecret }}
                  key: {{ .Values.bakery.github.secretKeys.token }}
            {{- else if .Values.bakery.github.token }}
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "poundcake.bakerySecretName" . }}
                  key: github-token
            {{- end }}
            {{- if .Values.bakery.pagerduty.existingSecret }}
            - name: PAGERDUTY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.bakery.pagerduty.existingSecret }}
                  key: {{ .Values.bakery.pagerduty.secretKeys.apiKey }}
            {{- else if .Values.bakery.pagerduty.apiKey }}
            - name: PAGERDUTY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "poundcake.bakerySecretName" . }}
                  key: pagerduty-api-key
            {{- end }}
            {{- if .Values.bakery.rackspaceCore.existingSecret }}
            - name: RACKSPACE_CORE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.bakery.rackspaceCore.existingSecret }}
                  key: {{ .Values.bakery.rackspaceCore.secretKeys.url }}
            - name: RACKSPACE_CORE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.bakery.rackspaceCore.existingSecret }}
                  key: {{ .Values.bakery.rackspaceCore.secretKeys.username }}
            - name: RACKSPACE_CORE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.bakery.rackspaceCore.existingSecret }}
                  key: {{ .Values.bakery.rackspaceCore.secretKeys.password }}
            {{- else if and .Values.bakery.rackspaceCore.url .Values.bakery.rackspaceCore.password }}
            - name: RACKSPACE_CORE_URL
              value: {{ .Values.bakery.rackspaceCore.url | quote }}
            - name: RACKSPACE_CORE_USERNAME
              value: {{ .Values.bakery.rackspaceCore.username | quote }}
            - name: RACKSPACE_CORE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "poundcake.bakerySecretName" . }}
                  key: rackspace-core-password
            {{- end }}
            - name: RACKSPACE_CORE_VERIFY_SSL
              value: {{ .Values.bakery.rackspaceCore.verifySsl | quote }}
          resources:
            {{- toYaml .Values.bakery.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}

{{- if and (.Values.bakery.enabled) .Values.bakery.database.createServer .Values.mariadbOperator.enabled }}
{{- $mariaDbNamespace := .Values.mariadbOperator.namespace | default .Release.Namespace -}}
---
apiVersion: k8s.mariadb.com/v1alpha1
kind: MariaDB
metadata:
  name: {{ include "poundcake.bakeryDbHost" . }}
  namespace: {{ $mariaDbNamespace }}
  labels:
    {{- include "poundcake.labels" . | nindent 4 }}
    app.kubernetes.io/component: bakery-database
spec:
  rootPasswordSecretKeyRef:
    name: {{ .Values.mariadbOperator.server.rootPasswordSecret | default (printf "%s-root" (include "poundcake.bakeryDbHost" .)) }}
    key: {{ .Values.mariadbOperator.server.rootPasswordSecretKey | default "password" }}

  image: {{ .Values.mariadbOperator.server.image.repository }}:{{ .Values.mariadbOperator.server.image.tag }}
  imagePullPolicy: {{ .Values.mariadbOperator.server.image.pullPolicy }}

  port: 3306

  replicas: {{ .Values.mariadbOperator.server.replicas }}

  storage:
    size: {{ .Values.mariadbOperator.server.storage.size }}
    {{- if .Values.mariadbOperator.server.storage.storageClassName }}
    storageClassName: {{ .Values.mariadbOperator.server.storage.storageClassName }}
    {{- end }}

  resources:
    {{- toYaml .Values.mariadbOperator.server.resources | nindent 4 }}

  myCnf: |
    [mariadb]
    bind-address=*
    default_storage_engine=InnoDB
    binlog_format=row
    innodb_autoinc_lock_mode=2
    max_allowed_packet=256M
    character-set-server=utf8mb4
    collation-server=utf8mb4_unicode_ci

  # Bakery MariaDB can run with root auth modes where password-based root probes fail.
  # Use TCP probes to verify process readiness without coupling probes to root credentials.
  startupProbe:
    tcpSocket:
      port: 3306
    initialDelaySeconds: 20
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 30
  readinessProbe:
    tcpSocket:
      port: 3306
    initialDelaySeconds: 20
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 6
  livenessProbe:
    tcpSocket:
      port: 3306
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 6

---
apiVersion: v1
kind: Secret
{{- $bakeryRootSecretName := .Values.mariadbOperator.server.rootPasswordSecret | default (printf "%s-root" (include "poundcake.bakeryDbHost" .) ) }}
{{- $bakeryRootSecret := lookup "v1" "Secret" $mariaDbNamespace $bakeryRootSecretName }}
metadata:
  name: {{ $bakeryRootSecretName }}
  namespace: {{ $mariaDbNamespace }}
  labels:
    {{- include "poundcake.labels" . | nindent 4 }}
    app.kubernetes.io/component: bakery-database
type: Opaque
data:
  {{- if and $bakeryRootSecret (hasKey $bakeryRootSecret.data "password") }}
  password: {{ index $bakeryRootSecret.data "password" | quote }}
  {{- else if .Values.mariadbOperator.server.rootPassword }}
  password: {{ .Values.mariadbOperator.server.rootPassword | b64enc | quote }}
  {{- else }}
  password: {{ randAlphaNum 32 | b64enc | quote }}
  {{- end }}

---
apiVersion: k8s.mariadb.com/v1alpha1
kind: Database
metadata:
  name: {{ include "poundcake.bakeryName" . }}-db
  namespace: {{ $mariaDbNamespace }}
  labels:
    {{- include "poundcake.labels" . | nindent 4 }}
    app.kubernetes.io/component: bakery-database
spec:
  mariaDbRef:
    name: {{ include "poundcake.bakeryDbHost" . }}
  name: {{ .Values.bakery.database.name }}
  characterSet: utf8mb4
  collate: utf8mb4_unicode_ci

---
apiVersion: k8s.mariadb.com/v1alpha1
kind: User
metadata:
  name: {{ include "poundcake.bakeryName" . }}-user
  namespace: {{ $mariaDbNamespace }}
  labels:
    {{- include "poundcake.labels" . | nindent 4 }}
    app.kubernetes.io/component: bakery-database
spec:
  mariaDbRef:
    name: {{ include "poundcake.bakeryDbHost" . }}
  name: {{ .Values.bakery.database.user.name }}
  passwordSecretKeyRef:
    name: {{ .Values.bakery.database.user.passwordSecret | default (include "poundcake.bakeryDbSecretName" .) }}
    key: {{ include "poundcake.bakeryDbSecretKey" . }}
  maxUserConnections: {{ .Values.bakery.database.user.maxUserConnections }}
  host: "%"

---
apiVersion: v1
kind: Secret
{{- $bakeryUserSecretName := .Values.bakery.database.user.passwordSecret | default (include "poundcake.bakeryDbSecretName" .) }}
{{- $bakeryUserSecretKey := include "poundcake.bakeryDbSecretKey" . }}
{{- $bakeryUserSecret := lookup "v1" "Secret" $mariaDbNamespace $bakeryUserSecretName }}
{{- $bakeryUserPasswordB64 := "" }}
{{- if and $bakeryUserSecret (hasKey $bakeryUserSecret.data $bakeryUserSecretKey) }}
{{- $bakeryUserPasswordB64 = index $bakeryUserSecret.data $bakeryUserSecretKey }}
{{- else if .Values.bakery.database.user.password }}
{{- $bakeryUserPasswordB64 = .Values.bakery.database.user.password | b64enc }}
{{- else }}
{{- $bakeryUserPasswordB64 = randAlphaNum 32 | b64enc }}
{{- end }}
metadata:
  name: {{ $bakeryUserSecretName }}
  namespace: {{ $mariaDbNamespace }}
  labels:
    {{- include "poundcake.labels" . | nindent 4 }}
    app.kubernetes.io/component: bakery-database
type: Opaque
data:
  {{ $bakeryUserSecretKey }}: {{ $bakeryUserPasswordB64 | quote }}

{{- if ne $mariaDbNamespace .Release.Namespace }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $bakeryUserSecretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "poundcake.labels" . | nindent 4 }}
    app.kubernetes.io/component: bakery-database
type: Opaque
data:
  {{ $bakeryUserSecretKey }}: {{ $bakeryUserPasswordB64 | quote }}
{{- end }}

---
apiVersion: k8s.mariadb.com/v1alpha1
kind: Grant
metadata:
  name: {{ include "poundcake.bakeryName" . }}-grant
  namespace: {{ $mariaDbNamespace }}
  labels:
    {{- include "poundcake.labels" . | nindent 4 }}
    app.kubernetes.io/component: bakery-database
spec:
  mariaDbRef:
    name: {{ include "poundcake.bakeryDbHost" . }}
  privileges:
    - "ALL PRIVILEGES"
  database: {{ .Values.bakery.database.name }}
  table: "*"
  username: {{ .Values.bakery.database.user.name }}
  host: "%"
  grantOption: false
{{- end }}

apiVersion: v1
kind: Service
metadata:
  name: poundcake-mariadb
  labels:
    {{- include "poundcake.labels" . | nindent 4 }}
  annotations:
    "helm.sh/release": {{ .Release.Name | quote }}
    "helm.sh/chart": {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
    "helm.sh/namespace": {{ .Release.Namespace | quote }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/component: mariadb
    {{- include "poundcake.selectorLabels" . | nindent 4 }}
  ports:
    - name: mysql
      port: 3306
      targetPort: 3306
---
apiVersion: v1
kind: Service
metadata:
  name: stackstorm-mongodb
  labels:
    {{- include "poundcake.labels" . | nindent 4 }}
  annotations:
    "helm.sh/release": {{ .Release.Name | quote }}
    "helm.sh/chart": {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
    "helm.sh/namespace": {{ .Release.Namespace | quote }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/component: stackstorm-mongodb
    {{- include "poundcake.selectorLabels" . | nindent 4 }}
  ports:
    - name: mongo
      port: 27017
      targetPort: 27017
---

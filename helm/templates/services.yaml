---
apiVersion: v1
kind: Service
metadata:
  name: poundcake-api
  labels:
    {{- include "poundcake.labels" . | nindent 4 }}
  annotations:
    "helm.sh/release": {{ .Release.Name | quote }}
    "helm.sh/chart": {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
    "helm.sh/namespace": {{ .Release.Namespace | quote }}
spec:
  type: {{ .Values.services.api.type }}
  publishNotReadyAddresses: {{ .Values.services.api.publishNotReadyAddresses }}
  selector:
    app.kubernetes.io/component: api
    {{- include "poundcake.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.services.api.port }}
      targetPort: 8000
---

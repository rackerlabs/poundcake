{{- if and (or .Values.bakery.enabled (eq (default "full" .Values.deployment.mode) "bakery-only")) .Values.bakery.gateway.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "poundcake.bakeryName" . }}-gateway-listener
  labels:
    {{- include "poundcake.labels" . | nindent 4 }}
    app.kubernetes.io/component: bakery-gateway-listener
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 3
  template:
    metadata:
      name: {{ include "poundcake.bakeryName" . }}-gateway-listener
      labels:
        {{- include "poundcake.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: bakery-gateway-listener
        {{- include "poundcake.logGroupLabel" . | nindent 8 }}
        {{- include "poundcake.logRoleWorker" . | nindent 8 }}
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ include "poundcake.bakeryServiceAccountName" . }}
      containers:
      - name: bakery-gateway-listener
        image: bitnami/kubectl:latest
        imagePullPolicy: IfNotPresent
        command:
        - /bin/bash
        - -c
        - |
          set -e

          echo "=========================================="
          echo "Bakery Gateway Listener Configuration"
          echo "=========================================="
          echo "Gateway: {{ .Values.bakery.gateway.gatewayName }}"
          echo "Namespace: {{ .Values.bakery.gateway.gatewayNamespace }}"
          echo "Listener: {{ .Values.bakery.gateway.listener.name }}"
          echo "Hostname: {{ .Values.bakery.gateway.listener.hostname }}"
          echo "=========================================="

          if ! kubectl get gateway {{ .Values.bakery.gateway.gatewayName }} -n {{ .Values.bakery.gateway.gatewayNamespace }} &>/dev/null; then
            echo "ERROR: Gateway '{{ .Values.bakery.gateway.gatewayName }}' not found in namespace '{{ .Values.bakery.gateway.gatewayNamespace }}'"
            exit 1
          fi

          LISTENER_EXISTS=$(kubectl get gateway {{ .Values.bakery.gateway.gatewayName }} -n {{ .Values.bakery.gateway.gatewayNamespace }} -o jsonpath='{.spec.listeners[?(@.name=="{{ .Values.bakery.gateway.listener.name }}")].name}')

          if [ -n "$LISTENER_EXISTS" ]; then
            CURRENT_HOSTNAME=$(kubectl get gateway {{ .Values.bakery.gateway.gatewayName }} -n {{ .Values.bakery.gateway.gatewayNamespace }} -o jsonpath='{.spec.listeners[?(@.name=="{{ .Values.bakery.gateway.listener.name }}")].hostname}')
            CURRENT_PORT=$(kubectl get gateway {{ .Values.bakery.gateway.gatewayName }} -n {{ .Values.bakery.gateway.gatewayNamespace }} -o jsonpath='{.spec.listeners[?(@.name=="{{ .Values.bakery.gateway.listener.name }}")].port}')
            CURRENT_PROTOCOL=$(kubectl get gateway {{ .Values.bakery.gateway.gatewayName }} -n {{ .Values.bakery.gateway.gatewayNamespace }} -o jsonpath='{.spec.listeners[?(@.name=="{{ .Values.bakery.gateway.listener.name }}")].protocol}')

            {{- if .Values.bakery.gateway.listener.updateIfExists }}
            if [ "$CURRENT_HOSTNAME" != "{{ .Values.bakery.gateway.listener.hostname }}" ] || \
               [ "$CURRENT_PORT" != "{{ .Values.bakery.gateway.listener.port }}" ] || \
               [ "$CURRENT_PROTOCOL" != "{{ .Values.bakery.gateway.listener.protocol }}" ]; then
              NEEDS_UPDATE=true
            else
              NEEDS_UPDATE=false
            fi
            {{- else }}
            NEEDS_UPDATE=false
            {{- end }}
          else
            NEEDS_UPDATE=true
          fi

          if [ "$NEEDS_UPDATE" = "true" ]; then
            kubectl get gateway {{ .Values.bakery.gateway.gatewayName }} -n {{ .Values.bakery.gateway.gatewayNamespace }} -o json > /tmp/gateway.json
            LISTENER_INDEX=$(jq '.spec.listeners | map(.name) | index("{{ .Values.bakery.gateway.listener.name }}")' /tmp/gateway.json)

            if [ "$LISTENER_INDEX" = "null" ]; then
              jq '.spec.listeners += [
                {
                  "name": "{{ .Values.bakery.gateway.listener.name }}",
                  "hostname": "{{ .Values.bakery.gateway.listener.hostname }}",
                  "port": {{ .Values.bakery.gateway.listener.port }},
                  "protocol": "{{ .Values.bakery.gateway.listener.protocol }}",
                  {{- if eq .Values.bakery.gateway.listener.protocol "HTTPS" }}
                  "tls": {
                    "mode": "Terminate",
                    "certificateRefs": [
                      {
                        "kind": "Secret",
                        "name": "{{ .Values.bakery.gateway.listener.tlsSecretName }}"
                      }
                    ]
                  },
                  {{- end }}
                  "allowedRoutes": {
                    "namespaces": {
                      "from": "{{ .Values.bakery.gateway.listener.allowedNamespaces }}"
                    }
                  }
                }
              ]' /tmp/gateway.json > /tmp/gateway-updated.json
            else
              jq ".spec.listeners[$LISTENER_INDEX] = {
                \"name\": \"{{ .Values.bakery.gateway.listener.name }}\",
                \"hostname\": \"{{ .Values.bakery.gateway.listener.hostname }}\",
                \"port\": {{ .Values.bakery.gateway.listener.port }},
                \"protocol\": \"{{ .Values.bakery.gateway.listener.protocol }}\",
                {{- if eq .Values.bakery.gateway.listener.protocol "HTTPS" }}
                \"tls\": {
                  \"mode\": \"Terminate\",
                  \"certificateRefs\": [
                    {
                      \"kind\": \"Secret\",
                      \"name\": \"{{ .Values.bakery.gateway.listener.tlsSecretName }}\"
                    }
                  ]
                },
                {{- end }}
                \"allowedRoutes\": {
                  \"namespaces\": {
                    \"from\": \"{{ .Values.bakery.gateway.listener.allowedNamespaces }}\"
                  }
                }
              }" /tmp/gateway.json > /tmp/gateway-updated.json
            fi

            kubectl apply -f /tmp/gateway-updated.json
          fi

          echo "Bakery Gateway listener configuration complete"
{{- end }}

{{- if .Values.poundcake.enabled }}
{{- if .Values.gateway.enabled }}
{{- $apiEnabled := .Values.gateway.listeners.api.enabled }}
{{- $uiEnabled := .Values.gateway.listeners.ui.enabled }}
{{- $apiHostname := default "" .Values.gateway.listeners.api.hostname }}
{{- $uiHostname := default "" .Values.gateway.listeners.ui.hostname }}
{{- $apiProtocol := upper (default "HTTP" .Values.gateway.listeners.api.protocol) }}
{{- $uiProtocol := upper (default "HTTP" .Values.gateway.listeners.ui.protocol) }}
{{- $sharedListener := and $apiEnabled $uiEnabled (eq $apiHostname $uiHostname) (eq (int .Values.gateway.listeners.api.port) (int .Values.gateway.listeners.ui.port)) (eq $apiProtocol $uiProtocol) }}
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ .Values.gateway.name }}
  labels:
    {{- include "poundcake.labels" . | nindent 4 }}
spec:
  gatewayClassName: {{ .Values.gateway.className }}
  listeners:
    {{- if $apiEnabled }}
    - name: api
      protocol: {{ $apiProtocol }}
      port: {{ .Values.gateway.listeners.api.port }}
      {{- if $apiHostname }}
      hostname: {{ $apiHostname | quote }}
      {{- end }}
      {{- if eq $apiProtocol "HTTPS" }}
      tls:
        mode: {{ default "Terminate" .Values.gateway.listeners.api.tls.mode }}
        certificateRefs:
          - kind: Secret
            name: {{ required "gateway.listeners.api.tls.secretName is required when gateway.listeners.api.protocol=HTTPS" .Values.gateway.listeners.api.tls.secretName }}
      {{- end }}
      allowedRoutes:
        namespaces:
          from: Same
    {{- end }}
    {{- if and $uiEnabled (not $sharedListener) }}
    - name: ui
      protocol: {{ $uiProtocol }}
      port: {{ .Values.gateway.listeners.ui.port }}
      {{- if $uiHostname }}
      hostname: {{ $uiHostname | quote }}
      {{- end }}
      {{- if eq $uiProtocol "HTTPS" }}
      tls:
        mode: {{ default "Terminate" .Values.gateway.listeners.ui.tls.mode }}
        certificateRefs:
          - kind: Secret
            name: {{ required "gateway.listeners.ui.tls.secretName is required when gateway.listeners.ui.protocol=HTTPS" .Values.gateway.listeners.ui.tls.secretName }}
      {{- end }}
      allowedRoutes:
        namespaces:
          from: Same
    {{- end }}
{{- if $apiEnabled }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: poundcake-api-route
  labels:
    {{- include "poundcake.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.gateway.name }}
      sectionName: api
  {{- if $apiHostname }}
  hostnames:
    - {{ $apiHostname | quote }}
  {{- end }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: {{ .Values.gateway.listeners.api.pathPrefix | quote }}
      backendRefs:
        - name: poundcake-api
          port: {{ .Values.services.api.port }}
{{- end }}
{{- if $uiEnabled }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: poundcake-ui-route
  labels:
    {{- include "poundcake.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.gateway.name }}
      sectionName: {{ ternary "api" "ui" $sharedListener }}
  {{- if $uiHostname }}
  hostnames:
    - {{ $uiHostname | quote }}
  {{- end }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: {{ .Values.gateway.listeners.ui.pathPrefix | quote }}
      backendRefs:
        - name: poundcake-ui
          port: {{ .Values.services.ui.port }}
{{- end }}
{{- end }}
{{- end }}

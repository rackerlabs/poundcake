{{- if .Values.poundcake.enabled }}
{{- if .Values.gateway.enabled }}
{{- $apiEnabled := .Values.gateway.listeners.api.enabled }}
{{- $uiEnabled := .Values.gateway.listeners.ui.enabled }}
{{- $apiHostname := default "" .Values.gateway.listeners.api.hostname }}
{{- $uiHostname := default "" .Values.gateway.listeners.ui.hostname }}
{{- $apiProtocol := upper (default "HTTP" .Values.gateway.listeners.api.protocol) }}
{{- $uiProtocol := upper (default "HTTP" .Values.gateway.listeners.ui.protocol) }}
{{- $sharedListener := and $apiEnabled $uiEnabled (eq $apiHostname $uiHostname) (eq (int .Values.gateway.listeners.api.port) (int .Values.gateway.listeners.ui.port)) (eq $apiProtocol $uiProtocol) }}
{{- $parentGatewayName := default .Values.gateway.name .Values.gateway.gatewayName }}
{{- $parentGatewayNamespace := .Values.gateway.gatewayNamespace }}
{{- $routeHostnames := .Values.gateway.hostnames | default list }}
{{- $listenerHostname := default "" .Values.gateway.listener.hostname }}
{{- $gatewaySectionName := default "" .Values.gateway.listener.name }}
{{- $apiRequestTimeout := default "" .Values.gateway.listeners.api.requestTimeout }}
{{- $apiBackendRequestTimeout := default "" .Values.gateway.listeners.api.backendRequestTimeout }}
{{- if $apiEnabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: poundcake-api-route
  labels:
    {{- include "poundcake.labels" . | nindent 4 }}
  {{- with .Values.gateway.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
    - name: {{ $parentGatewayName }}
      {{- if $parentGatewayNamespace }}
      namespace: {{ $parentGatewayNamespace }}
      {{- end }}
      sectionName: {{ default "api" $gatewaySectionName }}
  {{- if gt (len $routeHostnames) 0 }}
  hostnames:
    {{- range $hostname := $routeHostnames }}
    - {{ $hostname | quote }}
    {{- end }}
  {{- else if $listenerHostname }}
  hostnames:
    - {{ $listenerHostname | quote }}
  {{- else if $apiHostname }}
  hostnames:
    - {{ $apiHostname | quote }}
  {{- end }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: {{ default "/api" .Values.gateway.listeners.api.pathPrefix | quote }}
      {{- if or $apiRequestTimeout $apiBackendRequestTimeout }}
      timeouts:
        {{- if $apiRequestTimeout }}
        request: {{ $apiRequestTimeout | quote }}
        {{- end }}
        {{- if $apiBackendRequestTimeout }}
        backendRequest: {{ $apiBackendRequestTimeout | quote }}
        {{- end }}
      {{- end }}
      backendRefs:
        - name: poundcake-api
          port: {{ .Values.services.api.port }}
{{- end }}
{{- if $uiEnabled }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: poundcake-ui-route
  labels:
    {{- include "poundcake.labels" . | nindent 4 }}
  {{- with .Values.gateway.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
    - name: {{ $parentGatewayName }}
      {{- if $parentGatewayNamespace }}
      namespace: {{ $parentGatewayNamespace }}
      {{- end }}
      sectionName: {{ default (ternary "api" "ui" $sharedListener) $gatewaySectionName }}
  {{- if gt (len $routeHostnames) 0 }}
  hostnames:
    {{- range $hostname := $routeHostnames }}
    - {{ $hostname | quote }}
    {{- end }}
  {{- else if $listenerHostname }}
  hostnames:
    - {{ $listenerHostname | quote }}
  {{- else if $uiHostname }}
  hostnames:
    - {{ $uiHostname | quote }}
  {{- end }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: {{ default "/" .Values.gateway.listeners.ui.pathPrefix | quote }}
      backendRefs:
        - name: poundcake-ui
          port: {{ .Values.services.ui.port }}
{{- end }}
{{- end }}
{{- end }}

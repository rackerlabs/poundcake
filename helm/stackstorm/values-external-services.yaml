# Default StackStorm overrides for external-services mode.
# This file is consumed by helm/bin/install-poundcake.sh
# when installing stackstorm-ha.
#
# Default profile goals:
# - Lean-but-functional core for actions/workflows
# - Scheduler enabled by default
# - One pod per enabled service unless overridden by higher-priority values
# - StackStorm chart owns mongodb/rabbitmq/redis

# Global labels for log grouping.
global:
  podLabels:
    stackstorm.io/log-group: stackstorm

# Core services (enabled, single replica by default)
st2api:
  enabled: true
  replicas: 1
  replicaCount: 1
  podLabels:
    stackstorm.io/log-group: stackstorm
    stackstorm.io/log-role: api

st2auth:
  enabled: true
  replicas: 1
  replicaCount: 1
  podLabels:
    stackstorm.io/log-group: stackstorm
    stackstorm.io/log-role: worker

st2actionrunner:
  enabled: true
  replicas: 1
  replicaCount: 1
  podLabels:
    stackstorm.io/log-group: stackstorm
    stackstorm.io/log-role: worker

st2rulesengine:
  enabled: true
  replicas: 1
  replicaCount: 1
  podLabels:
    stackstorm.io/log-group: stackstorm
    stackstorm.io/log-role: worker

st2workflowengine:
  enabled: true
  replicas: 1
  replicaCount: 1
  podLabels:
    stackstorm.io/log-group: stackstorm
    stackstorm.io/log-role: worker

st2scheduler:
  enabled: true
  replicas: 1
  replicaCount: 1
  podLabels:
    stackstorm.io/log-group: stackstorm
    stackstorm.io/log-role: worker

# Recommended support component for notifications and workflow completion events.
st2notifier:
  enabled: true
  replicas: 1
  replicaCount: 1
  podLabels:
    stackstorm.io/log-group: stackstorm
    stackstorm.io/log-role: worker

# Optional services (disabled by default)
st2stream:
  enabled: false
  podLabels:
    stackstorm.io/log-group: stackstorm
    stackstorm.io/log-role: worker

st2web:
  enabled: false
  podLabels:
    stackstorm.io/log-group: stackstorm
    stackstorm.io/log-role: worker

st2chatops:
  enabled: false
  podLabels:
    stackstorm.io/log-group: stackstorm
    stackstorm.io/log-role: worker

st2garbagecollector:
  enabled: false
  podLabels:
    stackstorm.io/log-group: stackstorm
    stackstorm.io/log-role: worker

st2timersengine:
  enabled: false
  podLabels:
    stackstorm.io/log-group: stackstorm
    stackstorm.io/log-role: worker

st2sensorcontainer:
  enabled: false
  podLabels:
    stackstorm.io/log-group: stackstorm
    stackstorm.io/log-role: worker

# StackStorm-owned infrastructure services (enabled, single pod defaults)
redis:
  enabled: true
  replicas: 1
  replicaCount: 1
  image:
    repository: bitnamilegacy/redis
    tag: "7.2"
  # Keep sentinel aligned with Redis image when the chart enables sentinel.
  sentinel:
    image:
      repository: bitnamilegacy/redis-sentinel
      tag: "7.2"
  podLabels:
    stackstorm.io/log-group: stackstorm
    stackstorm.io/log-role: infra

rabbitmq:
  enabled: true
  replicas: 1
  replicaCount: 1
  image:
    repository: bitnamilegacy/rabbitmq
    tag: "3.13"
  podLabels:
    stackstorm.io/log-group: stackstorm
    stackstorm.io/log-role: infra

mongodb:
  enabled: true
  replicas: 1
  replicaCount: 1
  image:
    repository: bitnamilegacy/mongodb
    tag: "4.4"
  podLabels:
    stackstorm.io/log-group: stackstorm
    stackstorm.io/log-role: infra

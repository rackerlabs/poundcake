# Default StackStorm overrides for external-services mode.
# This file is consumed by bin/install-poundcake.sh when installing stackstorm-ha.
# It sets pod labels used by kubectl log selectors.

global:
  podLabels:
    stackstorm.io/log-group: stackstorm

st2api:
  podLabels:
    stackstorm.io/log-group: stackstorm
    stackstorm.io/log-role: api

st2auth:
  podLabels:
    stackstorm.io/log-group: stackstorm
    stackstorm.io/log-role: worker

st2stream:
  podLabels:
    stackstorm.io/log-group: stackstorm
    stackstorm.io/log-role: worker

st2actionrunner:
  podLabels:
    stackstorm.io/log-group: stackstorm
    stackstorm.io/log-role: worker


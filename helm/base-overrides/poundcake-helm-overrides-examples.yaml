# Example Helm overrides for PoundCake.
# Start by setting real FQDNs for Envoy Gateway listeners/routes.
# Copy this file to /etc/genestack/helm-configs/poundcake/poundcake-helm-overrides.yaml
# (or another location consumed via -f/--values), then adjust values for your environment.
#
# Bakery is deployed separately from https://github.com/rackerlabs/bakery .
# This file keeps only the PoundCake-side remote Bakery client settings.

poundcake:
  enabled: true

# Canonical image overrides.
# Keep tags at latest by default, or pin explicit tags/digests per environment policy.
poundcakeImage:
  repository: ghcr.io/rackerlabs/poundcake
  tag: latest
  pullPolicy: Always

uiImage:
  repository: ghcr.io/rackerlabs/poundcake-ui
  tag: latest
  pullPolicy: Always

bakery:
  config:
    activeProvider: rackspace_core
  client:
    enabled: false
    enforceRemoteBaseUrl: true
    baseUrl: ""
    auth:
      existingSecret: bakery-monitor-bootstrap

gateway:
  enabled: true
  className: envoyproxy
  name: poundcake-gateway
  listeners:
    api:
      enabled: true
      hostname: api.example.yourdomain.com
      port: 80
      pathPrefix: /
    ui:
      enabled: true
      hostname: ui.example.yourdomain.com
      port: 80
      pathPrefix: /

# Remote Bakery example for the PoundCake release:

# Example Helm overrides for PoundCake/Bakery.
# Start by setting real FQDNs for Envoy Gateway listeners/routes.
# Copy this file to /etc/genestack/helm-configs/poundcake/poundcake-helm-overrides.yaml
# (or another location consumed via -f/--values), then adjust values for your environment.
#
# Service selection profiles (install target mapping):
# - PoundCake-only (default below): poundcake.enabled=true, bakery.enabled=false
# - Bakery-only: poundcake.enabled=false, bakery.enabled=true
# - Both: poundcake.enabled=true, bakery.enabled=true
#
# Wrapper mapping:
# - ./install/install-poundcake-helm.sh --target poundcake => true/false
# - ./install/install-poundcake-helm.sh --target bakery    => false/true
# - ./install/install-poundcake-helm.sh --target both      => true/true

# Canonical service-selection defaults for this example:
poundcake:
  enabled: true

# Canonical image overrides.
# Keep tags at latest by default, or pin explicit tags/digests per environment policy.
poundcakeImage:
  repository: ghcr.io/rackerlabs/poundcake
  tag: latest

uiImage:
  repository: ghcr.io/rackerlabs/poundcake-ui
  tag: latest

bakery:
  enabled: false
  image:
    repository: ghcr.io/rackerlabs/poundcake-bakery
    tag: latest

gateway:
  enabled: true
  className: envoyproxy
  name: poundcake-gateway
  listeners:
    api:
      enabled: true
      hostname: api.example.yourdomain.com
      port: 80
      pathPrefix: /
    ui:
      enabled: true
      hostname: ui.example.yourdomain.com
      port: 80
      pathPrefix: /

# Alternate service-selection snippets:
# Bakery-only:
# poundcake:
#   enabled: false
# bakery:
#   enabled: true
#
# Both services:
# poundcake:
#   enabled: true
# bakery:
#   enabled: true

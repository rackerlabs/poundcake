# Default values for poundcake
#
# NAMESPACE CONFIGURATION:
# The namespace is set at install time with: helm install --namespace <namespace>
# Example: helm install poundcake . -n poundcake
# The default namespace is "poundcake" if not specified during installation.
# All resources (API, UI, workers, Redis, etc.) will be created in the same namespace.
#
# ARCHITECTURE:
# - API: Main FastAPI application container
# - UI: Separate container (built/stored separately via GitHub workflows)
# - Workers: prep-chef, chef, timer, dishwasher
# - Redis: StackStorm coordination cache
# - Database: External MySQL/MariaDB (required)

replicaCount: 1

# Deployment mode:
# - full: PoundCake + StackStorm workflow (and Bakery if bakery.enabled=true)
# - bakery-only: only Bakery and its dependencies
deployment:
  mode: full

image:
  repository: ghcr.io/rackerlabs/poundcake
  pullPolicy: IfNotPresent
  tag: "2.0.96"  # Release tag

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext:
  fsGroup: 1000
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000

service:
  type: ClusterIP
  port: 8080

# UI configuration
# The UI is a separate container built and stored independently in GitHub container registry.
# It connects to the API service in the same namespace.
ui:
  enabled: true
  image:
    repository: ghcr.io/rackerlabs/poundcake-ui
    pullPolicy: IfNotPresent
    tag: "2.0.96"  # Release tag
  service:
    type: ClusterIP
    port: 80
  resources:
    limits:
      cpu: 100m
      memory: 64Mi
    requests:
      cpu: 50m
      memory: 32Mi

ingress:
  enabled: false
  className: ""
  annotations:
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: poundcake.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: poundcake-tls
  #    hosts:
  #      - poundcake.local

# Envoy Gateway API HTTPRoute configuration
# Use this instead of ingress for Envoy Gateway deployments
#
# This configuration will:
# 1. Check if a Gateway listener exists for PoundCake
# 2. Create or update the listener if needed (idempotent)
# 3. Create an HTTPRoute that attaches to that listener
gateway:
  enabled: false

  # Gateway reference (required if enabled)
  # The Gateway resource must already exist (created by infrastructure team)
  gatewayName: ""  # Example: flex-gateway
  gatewayNamespace: ""  # Example: envoy-gateway

  # Gateway Listener Configuration
  # This will be automatically created/updated in the Gateway
  listener:
    # Listener name - will be used as sectionName in HTTPRoute
    name: ""  # Example: poundcake-https

    # Full hostname for your PoundCake deployment
    hostname: ""  # Example: poundcake.api.ord.cloudmunchers.net

    # Listener port and protocol
    port: 443
    protocol: "HTTPS"  # HTTPS or HTTP

    # TLS certificate secret (required if protocol is HTTPS)
    # This secret must exist in the same namespace as the Gateway
    tlsSecretName: ""  # Example: poundcake-gw-tls-secret

    # Namespace access control for HTTPRoutes
    # "All" allows HTTPRoutes from any namespace to attach
    # "Same" restricts to same namespace as Gateway
    # "Selector" uses namespaceSelector (not configured here)
    allowedNamespaces: "All"

    # Update listener if it already exists but config differs
    # Set to false to skip updates if listener already exists
    updateIfExists: true

  # HTTPRoute Configuration
  # Hostnames for the HTTPRoute (should match listener.hostname)
  # - poundcake.api.ord.cloudmunchers.net
  hostnames: []

  # Optional annotations for HTTPRoute
  annotations:
    # application: gateway-api
    # route: poundcake

  # Alternate gateway/listener schema used by some templates.
  className: envoyproxy
  name: poundcake-gateway
  listeners:
    api:
      enabled: true
      hostname: api.poundcake.local
      port: 80
      pathPrefix: /
    ui:
      enabled: true
      hostname: ui.poundcake.local
      port: 80
      pathPrefix: /

  # Session persistence configuration
  sessionPersistence:
    enabled: true
    timeout: "300s"
    cookieLifetimeType: "Permanent"  # or "Session"
    cookieName: "PoundcakeSession"
    uiCookieName: "PoundcakeUISession"

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

# PoundCake configuration
config:
  # Server settings
  host: "0.0.0.0"
  port: 8080
  debug: false

  # Logging
  logLevel: INFO
  logFormat: console

  # Metrics
  metricsEnabled: true
  metricsPath: /metrics

  # Remediation settings
  defaultTimeout: 300
  maxConcurrentRemediations: 10

# Alert suppression behavior in PoundCake API
suppressions:
  enabled: true
  lifecycleEnabled: true
  lifecycleIntervalSeconds: 30
  lifecycleBatchLimit: 25

# StackStorm integration (external chart managed by install script).
stackstorm:
  # External StackStorm release name used for service/secret defaults.
  # Example: "stackstorm" -> stackstorm-st2api, stackstorm-st2auth, stackstorm-st2-apikeys.
  releaseName: ""

  # Connection configuration
  # Auto-generated from releaseName if empty; can be set explicitly.
  url: ""  # Example external: http://stackstorm-st2api.<namespace>.svc.cluster.local:9101
  authUrl: ""  # Example external: http://stackstorm-st2auth.<namespace>.svc.cluster.local:9100
  verifySsl: false

  # API key secret mapping.
  apiKeySecretName: ""
  apiKeySecretKey: "api-key"

  # Auto-discovery settings
  autoDiscover: true
  discoverAcrossNamespaces: true
  # Admin credentials for auto API key generation
  adminUser: "st2admin"
  adminPassword: ""
  # Optional override for the secret that stores StackStorm admin password.
  # Leave empty to use the StackStorm auth secret automatically.
  adminPasswordSecret: ""
  adminPasswordSecretKey: "ST2_AUTH_PASSWORD"
  # Resource naming for StackStorm backend dependencies managed by this chart.
  resourceNames:
    mongodb: "st2-mongodb"
    rabbitmq: "st2-rabbitmq"
    redis: "st2-redis"

# Redis configuration (used by StackStorm for coordination and optionally by PoundCake for caching)
# Uses Redis Operator (OpsTree Labs) to deploy Redis
redis:
  # Enable Redis for state management (required for replicaCount > 1)
  enabled: true

  # Deploy Redis as part of this chart (independent deployment)
  # Set to false to use an external Redis instance
  deploy: true

  # External Redis configuration (when deploy: false)
  external:
    # Redis connection URL (e.g., redis://my-redis:6379/0)
    url: "redis://redis.default.svc.cluster.local:6379/0"
    # Explicit host/port for components that do TCP health checks.
    host: "redis.default.svc.cluster.local"
    port: 6379
    # Password for external Redis
    password: ""
    existingSecret: ""
    secretKey: "redis-password"

  # Redis image configuration
  image:
    repository: quay.io/opstree/redis
    tag: v7.0.15
    pullPolicy: IfNotPresent

  # Redis authentication
  password: ""
  existingSecret: ""
  secretKey: "redis-password"

  auth:
    enabled: false
    password: ""

  # Persistence configuration
  persistence:
    enabled: true
    size: 1Gi
    storageClassName: ""

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  metrics:
    enabled: false
    image:
      repository: quay.io/opstree/redis-exporter
      tag: v1.44.0

  # State management settings
  alertTtlHours: 24  # How long to keep resolved orders
  lockTimeoutSeconds: 300  # Distributed lock timeout

# RabbitMQ configuration (used by StackStorm for task distribution and workflow coordination)
# Uses RabbitMQ Operator to deploy RabbitMQ cluster
rabbitmq:
  enabled: true
  # Use external RabbitMQ or deploy via operator
  external: false
  # Optional existing secret for RabbitMQ credentials
  # If set, this chart will use the secret and skip creating one.
  existingSecret: ""
  secretKeys:
    username: "username"
    password: "password"
  # External RabbitMQ settings (if external: true)
  host: "rabbitmq.default.svc.cluster.local"
  port: 5672
  username: "stackstorm"
  password: "stackstorm"
  vhost: "/"
  # Deployment settings (if external: false, uses RabbitMQ Operator)
  replicas: 1
  auth:
    username: stackstorm
    password: stackstorm
  persistence:
    size: 8Gi
    storageClassName: ""
  service:
    type: ClusterIP
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi

# Alert-to-action mappings
# These will be mounted as ConfigMap
mappings:
  common.yaml: |
    orders:
      HighCPUUsage:
        description: "Remediate high CPU usage"
        handler: yaml_config
        actions:
          - name: identify_cpu_process
            action: core.remote
            description: "Identify CPU-intensive processes"
            parameters:
              hosts: "{{instance}}"
              cmd: "ps aux --sort=-%cpu | head -10"
            timeout: 60

      LowDiskSpace:
        description: "Clean up disk space"
        handler: yaml_config
        actions:
          - name: cleanup_logs
            action: core.remote
            description: "Clean up old log files"
            parameters:
              hosts: "{{instance}}"
              cmd: "find /var/log -name '*.gz' -mtime +7 -delete"
            timeout: 120

      ServiceDown:
        description: "Restart down services"
        handler: yaml_config
        actions:
          - name: restart_service
            action: linux.service
            parameters:
              host: "{{instance}}"
              service: "{{labels.service}}"
              action: restart
            timeout: 120

# ServiceMonitor for Prometheus Operator
serviceMonitor:
  enabled: true
  namespace: prometheus
  interval: 30s
  scrapeTimeout: 10s
  labels:
    release: kube-prometheus-stack

# Pod Disruption Budget
podDisruptionBudget:
  enabled: false
  minAvailable: 1
  # maxUnavailable: 1

# Persistence for writable mappings (required for web UI edits)
persistence:
  enabled: false
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 100Mi
  # Legacy/infra storage options consumed by StackStorm-related templates.
  storageClassName: ""
  mariadb:
    size: 10Gi
    accessMode: ReadWriteOnce
    storageClassName: ""
  mongo:
    size: 10Gi
    accessMode: ReadWriteOnce
    storageClassName: ""
  rabbitmq:
    size: 5Gi
    accessMode: ReadWriteOnce
    storageClassName: ""
  redis:
    size: 2Gi
    accessMode: ReadWriteOnce
    storageClassName: ""
  config:
    size: 1Gi
    accessMode: ReadWriteMany
    storageClassName: ""

# Prometheus integration
prometheus:
  # Prometheus API URL for querying metrics
  # Default for kube-prometheus-stack installation
  url: "http://kube-prometheus-stack-prometheus.prometheus.svc.cluster.local:9090"
  verifySsl: false

  # Prometheus Operator CRD settings (Kubernetes)
  # When enabled, PoundCake can manage PrometheusRule CRDs directly
  useCrds: true
  crdNamespace: prometheus

  # Allow creating/updating/deleting PrometheusRule CRDs
  # Set to false for read-only access (can only view rules)
  allowRuleManagement: true

  # IMPORTANT: Labels to apply to PrometheusRule CRDs created by PoundCake
  # These MUST match your Prometheus Operator's ruleSelector, otherwise
  # Prometheus will not load the rules. Check your Prometheus CR with:
  #   kubectl get prometheus -n prometheus -o jsonpath='{.items[0].spec.ruleSelector}'
  #
  # Default is for kube-prometheus-stack. Adjust if using a different release name.
  crdLabels:
    release: kube-prometheus-stack

# Git repository integration for Prometheus rule management
# Enables GitOps workflow: edit rules in UI -> commit to Git -> create PR
git:
  # Enable Git integration (optional - rules can be managed via CRDs alone)
  enabled: false

  # Git repository URL (HTTPS or SSH)
  # Example: https://github.com/yourorg/prometheus-config.git
  repoUrl: ""

  # Branch to create PRs against
  branch: main

  # Path to Prometheus rules directory in repo
  rulesPath: prometheus/rules

  # File organization strategy
  # When true, each alert gets its own file (recommended)
  # When false, orders are grouped in files by CRD name
  filePerAlert: true

  # File naming pattern (used when filePerAlert: true)
  # Available variables: {alert_name}, {group_name}, {crd_name}
  filePattern: "{alert_name}.yaml"

  # Git authentication
  # For HTTPS: use token
  # For SSH: use sshKeyPath (mount SSH key as secret)
  token: ""
  sshKeyPath: ""

  # Git commit author
  userName: PoundCake
  userEmail: poundcake@example.com

  # Git provider for PR creation
  # Options: github, gitlab, gitea, none
  # Use "none" to commit without creating PRs
  provider: github

  # Reference to existing secret containing Git credentials
  existingSecret: ""
  secretKeys:
    token: "git-token"
    sshKey: "git-ssh-key"

# Authentication configuration
auth:
  # Enable authentication for web UI and API
  enabled: true
  # Session timeout in seconds (default: 24 hours)
  sessionTimeout: 86400
  # Shared internal API key for service-to-service auth (API <-> workers).
  # If empty, Helm will generate one and persist it in the admin secret.
  internalApiKey: ""
  # Secret name will be: <release-name>-poundcake-admin
  # Get password with: kubectl get secret <release-name>-poundcake-admin -n <namespace> -o jsonpath='{.data.password}' | base64 -d
  # Get internal key with: kubectl get secret <release-name>-poundcake-admin -n <namespace> -o jsonpath='{.data.internal-api-key}' | base64 -d

# Database configuration (MySQL/MariaDB) for PoundCake API only.
# Bakery uses a separate database contract under bakery.database.
database:
  # Database connection URL
  # Format: mysql+pymysql://user:password@host:port/database
  url: ""
  # Reference to existing secret containing database URL
  existingSecret: ""
  secretKey: "database-url"

# MariaDB Operator integration
# When enabled, PoundCake will create MariaDB resources using the mariadb-operator CRDs
# Requires mariadb-operator to be installed: https://github.com/mariadb-operator/mariadb-operator
mariadbOperator:
  # Enable MariaDB Operator integration
  # When true, the chart will check for the operator and create MariaDB CRDs
  enabled: true

  # Namespace to deploy MariaDB resources (defaults to release namespace)
  namespace: ""

  # MariaDB server configuration
  server:
    # Name of the MariaDB instance (defaults to release name)
    name: ""
    # MariaDB version
    image:
      repository: mariadb
      tag: "11.4"
      pullPolicy: IfNotPresent
    # Root password (auto-generated if not provided)
    rootPassword: ""
    # Use existing secret for root password
    rootPasswordSecret: ""
    rootPasswordSecretKey: "password"
    # Storage configuration
    storage:
      size: 10Gi
      storageClassName: ""
    # Resource limits
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    # Number of replicas (1 for standalone, 3+ for Galera)
    replicas: 1

  # Database configuration
  database:
    # Database name to create
    name: poundcake

  # User configuration
  user:
    # Username to create
    name: poundcake
    # Password (auto-generated if not provided)
    password: ""
    # Use existing secret for user password
    passwordSecret: ""
    passwordSecretKey: "password"
    # Max connections for this user
    maxUserConnections: 20

  # Grant configuration
  grants:
    # Privileges to grant (default: full access to the database)
    privileges:
      - "ALL PRIVILEGES"

# MongoDB configuration (shared by external StackStorm and PoundCake)
# StackStorm uses this for the st2 database.
mongodb:
  # Enable MongoDB deployment
  enabled: true

  # Use external MongoDB or deploy as part of the chart
  external: false

  # External MongoDB settings (if external: true)
  host: "mongodb.default.svc.cluster.local"
  port: 27017
  database: "stackstorm"
  username: "stackstorm"
  password: ""
  # Reference to existing secret containing MongoDB credentials
  existingSecret: ""
  usernameKey: "mongodb-username"
  passwordKey: "mongodb-password"

  # MongoDB deployment settings (if external: false)
  image:
    repository: mongo
    tag: "7.0.28"  # MongoDB 7.0.28 (fully supported by StackStorm 3.9.0)
    pullPolicy: IfNotPresent

  # Authentication settings
  auth:
    enabled: true
    rootPassword: ""  # Auto-generated if not provided
    # Primary user for StackStorm
    username: "stackstorm"
    password: "stackstorm"
    database: "st2"

  # Storage configuration (increased for both StackStorm + PoundCake data)
  persistence:
    enabled: true
    size: 20Gi
    storageClassName: ""

  # Resource limits
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 1000m
      memory: 2Gi

  # Service configuration
  service:
    type: ClusterIP
    port: 27017

# Chef service configuration
# Executor service that polls for dishes and triggers their execution
chef:
  enabled: true
  replicaCount: 1
  interval: 5
  resources:
    limits:
      cpu: 200m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi

# Prep chef service configuration
# Polls API and converts new orders into dishes.
prepChef:
  enabled: true
  replicaCount: 1
  interval: 5
  resources:
    limits:
      cpu: 200m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi

# Timer service configuration
# Monitoring service that tracks dish execution status in StackStorm
timer:
  enabled: true
  replicaCount: 1
  interval: 10
  slaBufferPercent: 0.2
  resources:
    limits:
      cpu: 200m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi

# Dishwasher service configuration
# Periodic sync job that reconciles StackStorm content/state.
dishwasher:
  enabled: true
  replicaCount: 1
  interval: 300
  defaultDuration: 60
  defaultTimeout: 300
  pruneMissing: false
  resources:
    limits:
      cpu: 200m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi

# Bootstrap jobs configuration
# Includes compatibility jobs that mirror docker-compose startup flow.
bootstrap:
  # One-shot job that mirrors poundcake-pack-init.
  packInit:
    enabled: true
    image: alpine:3.19

  # One-shot job that mirrors poundcake-bootstrap (dishwasher in bootstrap mode).
  poundcakeBootstrap:
    enabled: true
    defaultDuration: 60
    defaultTimeout: 300
    pruneMissing: false

  # One-shot job that prepares StackStorm API key and startup ordering.
  stackstormBootstrap:
    enabled: true

# Bakery service configuration
# API proxy/translator for ticketing systems (ServiceNow, Jira, GitHub, PagerDuty, Rackspace Core)
bakery:
  # Enable Bakery deployment in full mode.
  # In deployment.mode=bakery-only, Bakery is always rendered regardless of this flag.
  enabled: false

  # Number of Bakery replicas
  replicaCount: 1

  worker:
    enabled: true
    replicaCount: 1
    pollIntervalSec: 2
    batchSize: 10
    maxAttempts: 5
    backoffBaseSec: 5
    backoffMaxSec: 300

  dbInit:
    resources:
      limits:
        cpu: 200m
        memory: 128Mi
      requests:
        cpu: 100m
        memory: 64Mi

  # Bakery image configuration
  image:
    repository: ghcr.io/rackerlabs/poundcake-bakery
    pullPolicy: IfNotPresent
    tag: "2.0.96"

  # Service configuration
  service:
    type: ClusterIP
    port: 8000

  # Gateway API exposure for Bakery (optional)
  # Useful when PoundCake is deployed in a different environment/cluster.
  gateway:
    enabled: false

    # Gateway reference (required if enabled)
    gatewayName: ""  # Example: flex-gateway
    gatewayNamespace: ""  # Example: envoy-gateway

    # Listener configuration to create/update on the target Gateway
    listener:
      name: ""  # Example: bakery-https
      hostname: ""  # Example: bakery.api.ord.cloudmunchers.net
      port: 443
      protocol: "HTTPS"  # HTTPS or HTTP
      tlsSecretName: ""  # Required when protocol is HTTPS
      allowedNamespaces: "All"
      updateIfExists: true

    # HTTPRoute hostnames (should match listener.hostname)
    hostnames: []

    # Optional HTTPRoute annotations
    annotations: {}

  # Resource limits
  resources:
    limits:
      cpu: 500m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi

  # Environment configuration
  config:
    # Application settings
    environment: production
    logLevel: INFO
    activeProvider: rackspace_core
    # If true, Bakery logs all requests and skips outbound calls to external ticketing systems.
    ticketingDryRun: false

    # Message queue settings
    messageRetentionHours: 24
    maxMessagesPerPoll: 100

    # Mixer settings
    mixerTimeoutSec: 30
    mixerMaxRetries: 3

  auth:
    enabled: true
    mode: hmac
    existingSecret: ""
    secretKeys:
      activeKeyId: "active-key-id"
      activeKey: "active-key"
      nextKeyId: "next-key-id"
      nextKey: "next-key"
    hmac:
      activeKeyId: ""
      activeKey: ""
      nextKeyId: ""
      nextKey: ""
      timestampSkewSec: 300

  client:
    enabled: true
    baseUrl: ""
    auth:
      mode: hmac
      existingSecret: ""
      secretKeys:
        keyId: "active-key-id"
        key: "active-key"
      keyId: ""
      key: ""
    requestTimeoutSeconds: 15
    maxRetries: 2
    pollIntervalSeconds: 2
    pollTimeoutSeconds: 60

  # ServiceNow configuration
  servicenow:
    url: ""
    username: ""
    password: ""
    # Reference to existing secret
    existingSecret: ""
    secretKeys:
      url: "servicenow-url"
      username: "servicenow-username"
      password: "servicenow-password"

  # Jira configuration
  jira:
    url: ""
    username: ""
    apiToken: ""
    # Reference to existing secret
    existingSecret: ""
    secretKeys:
      url: "jira-url"
      username: "jira-username"
      apiToken: "jira-api-token"

  # GitHub configuration
  github:
    token: ""
    # Reference to existing secret
    existingSecret: ""
    secretKeys:
      token: "github-token"

  # PagerDuty configuration
  pagerduty:
    apiKey: ""
    # Reference to existing secret
    existingSecret: ""
    secretKeys:
      apiKey: "pagerduty-api-key"

  # Rackspace Core configuration
  rackspaceCore:
    url: "https://ws.core.rackspace.com"
    verifySsl: true
    username: ""
    password: ""
    # Default CTK queue/subcategory for ticket creation if not provided in context
    defaultQueue: "CloudBuilders Support"
    defaultSubcategory: "Monitoring"
    # Reference to existing secret
    existingSecret: ""
    secretKeys:
      url: "rackspace-core-url"
      username: "rackspace-core-username"
      password: "rackspace-core-password"

  # MariaDB database configuration for Bakery
  # Bakery owns a dedicated database and migration stream.
  # In alongside mode, Bakery may share the MariaDB server endpoint with PoundCake,
  # but must use a separate database + user credentials.
  # Uses MariaDB Operator to create dedicated database
  database:
    # Optional external host override (for standalone/externally managed MariaDB).
    # Leave empty to use "<release>-poundcake-bakery-mariadb".
    host: ""
    # Database name
    name: bakery
    # User configuration
    user:
      name: bakery
      password: ""  # Auto-generated if not provided
      passwordSecret: ""
      passwordSecretKey: "password"
      maxUserConnections: 20
  # Server configuration (inherits from mariadbOperator.server)
  # Set to false to use existing MariaDB instance
    createServer: true

poundcakeImage:
  repository: poundcake
  # Defaults to Chart.appVersion when empty.
  tag: ""
  # Optional immutable image digest (sha256:...); overrides tag when set.
  digest: ""
  pullPolicy: Always
  pullSecrets: []
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    capabilities:
      drop:
        - ALL

uiImage:
  repository: poundcake-ui
  tag: latest
  pullPolicy: IfNotPresent
  containerPort: 8080
  runtimeWritablePaths:
    enabled: true
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    capabilities:
      drop:
        - ALL

stackstormImage:
  repository: stackstorm/st2
  tag: "3.9.0"
  pullPolicy: IfNotPresent
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000

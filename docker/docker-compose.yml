services:
  # POUNDCAKE INFRASTRUCTURE
  mariadb:
    image: mariadb:11.6
    container_name: poundcake-mariadb
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-poundcake}
      MYSQL_USER: ${DB_USER:-poundcake}
      MYSQL_PASSWORD: ${DB_PASSWORD:-poundcake}
      POUNDCAKE_LOG_FORMAT: console
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./mariadb-init:/docker-entrypoint-initdb.d
    ports:
      - "127.0.0.1:3306:3306"
    networks:
      - poundcake
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # POUNDCAKE SERVICES
  api:
    build:
      context: ..
      dockerfile: ../Dockerfile
    container_name: poundcake-api
    working_dir: /app
    entrypoint: /app/api/scripts/entrypoint-auto-migrate.sh
    environment:
      PYTHONPATH: /app
      POUNDCAKE_DATABASE_URL: mysql+pymysql://${DB_USER:-poundcake}:${DB_PASSWORD:-poundcake}@mariadb:3306/${DB_NAME:-poundcake}
      POUNDCAKE_STACKSTORM_URL: http://stackstorm-api:9101
      POUNDCAKE_STACKSTORM_VERIFY_SSL: "False"
      RABBITMQ_USER: ${RABBITMQ_USER:-stackstorm}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-password}
      POUNDCAKE_LOG_LEVEL: DEBUG
      POUNDCAKE_LOG_FORMAT: console
      POUNDCAKE_APP_VERSION: ${APP_VERSION:-1.0.0}
      SERVICE_NAME: api
      POUNDCAKE_AUTH_INTERNAL_API_KEY: ${POUNDCAKE_INTERNAL_API_KEY:-}
      # The API reads the key generated by automated-setup.sh
      ST2_API_KEY_FILE: /app/config/st2_api_key
    depends_on:
      poundcake-pack-init:
        condition: service_completed_successfully
      mariadb:
        condition: service_healthy
      stackstorm-api:
        condition: service_healthy
    volumes:
      - ../:/app
      - ../logs:/app/logs
      - ../config:/app/config
      - stackstorm_packs:/app/stackstorm-packs/poundcake
    ports:
      - "8000:8000"
    networks:
      - poundcake
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 120s
    restart: unless-stopped

  chef:
    build:
      context: ..
      dockerfile: ../Dockerfile
    container_name: poundcake-chef
    working_dir: /app
    environment:
      PYTHONPATH: /app
      POUNDCAKE_API_URL: http://api:8000
      CHEF_POLL_INTERVAL: ${CHEF_INTERVAL:-5}
      POUNDCAKE_INTERNAL_API_KEY: ${POUNDCAKE_INTERNAL_API_KEY:-}
      LOG_LEVEL: INFO
      POUNDCAKE_LOG_FORMAT: console
      SERVICE_NAME: chef
    depends_on:
      api:
        condition: service_healthy
      poundcake-bootstrap:
        condition: service_completed_successfully
    volumes:
      - ../:/app
      - ../logs:/app/logs
    networks:
      - poundcake
    command: python3 kitchen/chef.py
    restart: unless-stopped

  prep-chef:
    build:
      context: ..
      dockerfile: ../Dockerfile
    container_name: poundcake-prep-chef
    working_dir: /app
    environment:
      PYTHONPATH: /app
      POUNDCAKE_API_URL: http://api:8000
      PREP_INTERVAL: ${PREP_INTERVAL:-5}
      POUNDCAKE_INTERNAL_API_KEY: ${POUNDCAKE_INTERNAL_API_KEY:-}
      LOG_LEVEL: INFO
      POUNDCAKE_LOG_FORMAT: console
      SERVICE_NAME: prep-chef
    depends_on:
      api:
        condition: service_healthy
      poundcake-bootstrap:
        condition: service_completed_successfully
    volumes:
      - ../:/app
      - ../logs:/app/logs
    networks:
      - poundcake
    command: python3 kitchen/prep_chef.py
    restart: unless-stopped

  timer:
    build:
      context: ..
      dockerfile: ../Dockerfile
    container_name: poundcake-timer
    working_dir: /app
    environment:
      PYTHONPATH: /app
      POUNDCAKE_API_URL: http://api:8000
      TIMER_INTERVAL: ${TIMER_INTERVAL:-10}
      POUNDCAKE_INTERNAL_API_KEY: ${POUNDCAKE_INTERNAL_API_KEY:-}
      SLA_BUFFER_PERCENT: 0.2
      LOG_LEVEL: INFO
      POUNDCAKE_LOG_FORMAT: console
      SERVICE_NAME: timer
    depends_on:
      api:
        condition: service_healthy
      poundcake-bootstrap:
        condition: service_completed_successfully
    volumes:
      - ../:/app
      - ../logs:/app/logs
      - ../config:/app/config:ro
    networks:
      - poundcake
    command: python3 kitchen/timer.py
    restart: unless-stopped

  dishwasher:
    build:
      context: ..
      dockerfile: ../Dockerfile
    container_name: poundcake-dishwasher
    working_dir: /app
    environment:
      PYTHONPATH: /app
      POUNDCAKE_API_URL: http://api:8000
      POUNDCAKE_INTERNAL_API_KEY: ${POUNDCAKE_INTERNAL_API_KEY:-}
      LOG_LEVEL: INFO
      POUNDCAKE_LOG_FORMAT: console
      DISHWASHER_DEFAULT_DURATION: 60
      DISHWASHER_DEFAULT_TIMEOUT: 300
      DISHWASHER_PRUNE_MISSING: "false"
      DISHWASHER_INTERVAL: ${DISHWASHER_INTERVAL:-300}
      SERVICE_NAME: dishwasher
    depends_on:
      api:
        condition: service_healthy
      stackstorm-api:
        condition: service_healthy
      poundcake-bootstrap:
        condition: service_completed_successfully
    volumes:
      - ../:/app
      - ../logs:/app/logs
      - ../config:/app/config:ro
    networks:
      - poundcake
    command: python3 kitchen/dishwasher.py
    restart: unless-stopped

  poundcake-pack-init:
    image: alpine:3.19
    container_name: poundcake-pack-init
    volumes:
      - stackstorm_packs:/stackstorm-packs
    command:
      - sh
      - -c
      - >
        mkdir -p /stackstorm-packs/workflows
        && mkdir -p /stackstorm-packs/actions
        && chown -R 1000:1000 /stackstorm-packs
        && echo "[POUNDCAKE-PACK-INIT] Ownership:"
        && ls -ld /stackstorm-packs
        && ls -ld /stackstorm-packs/workflows
        && ls -ld /stackstorm-packs/actions
        && echo "[POUNDCAKE-PACK-INIT] Tree (depth 2):"
        && find /stackstorm-packs -maxdepth 2 -type d -print
    networks:
      - poundcake
    restart: "no"

  poundcake-bootstrap:
    build:
      context: ..
      dockerfile: ../Dockerfile
    container_name: poundcake-bootstrap
    working_dir: /app
    environment:
      PYTHONPATH: /app
      POUNDCAKE_API_URL: http://api:8000
      POUNDCAKE_INTERNAL_API_KEY: ${POUNDCAKE_INTERNAL_API_KEY:-}
      LOG_LEVEL: INFO
      POUNDCAKE_LOG_FORMAT: console
      DISHWASHER_DEFAULT_DURATION: 60
      DISHWASHER_DEFAULT_TIMEOUT: 300
      DISHWASHER_PRUNE_MISSING: "false"
      DISHWASHER_INTERVAL: "0"
      POUNDCAKE_BOOTSTRAP_MARK: "true"
    depends_on:
      api:
        condition: service_started
      poundcake-pack-init:
        condition: service_completed_successfully
      stackstorm-api:
        condition: service_healthy
    volumes:
      - ../:/app
      - ../logs:/app/logs
      - ../config:/app/config:ro
    networks:
      - poundcake
    command: python3 kitchen/dishwasher.py
    restart: "no"

  # STACKSTORM BACKEND
  stackstorm-mongodb:
    image: mongo:7.0
    container_name: stackstorm-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-password}
      POUNDCAKE_LOG_FORMAT: console
    volumes:
      - mongo_data:/data/db
      # Uses the user creation script for the 'st2' database
      - ./mongodb-init/01-create-st2-user.sh:/docker-entrypoint-initdb.d/01-create-st2-user.sh:ro
    networks:
      - poundcake
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  stackstorm-rabbitmq:
    image: rabbitmq:3.13-management
    container_name: stackstorm-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: stackstorm
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-password}
      POUNDCAKE_LOG_FORMAT: console
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - poundcake
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  stackstorm-redis:
    image: redis:7.4-alpine
    container_name: stackstorm-redis
    volumes:
      - redis_data:/data
    networks:
      - poundcake
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  stackstorm-api:
    image: stackstorm/st2:3.9.0
    container_name: stackstorm-api
    environment:
      MONGO_PASSWORD: ${MONGO_PASSWORD:-password}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-password}
      POUNDCAKE_LOG_FORMAT: console
    depends_on:
      stackstorm-mongodb:
        condition: service_healthy
      stackstorm-rabbitmq:
        condition: service_healthy
      stackstorm-redis:
        condition: service_healthy
    volumes:
      # Mounts the template and entrypoint to enable runtime configuration templating
      - ./st2-config/st2.conf.template:/etc/st2/st2.conf.template:ro
      - ./st2-init/st2-entrypoint.sh:/st2-entrypoint.sh:ro
      - stackstorm_packs:/opt/stackstorm/packs/poundcake
    ports:
      - "127.0.0.1:9101:9101"
    networks:
      - poundcake
    entrypoint: ["/bin/bash", "/st2-entrypoint.sh"]
    command:
      ["/opt/stackstorm/st2/bin/st2api", "--config-file", "/etc/st2/st2.conf"]
    healthcheck:
      test: ["CMD", "pgrep", "-f", "st2api"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
    restart: unless-stopped

  stackstorm-auth:
    image: stackstorm/st2:3.9.0
    container_name: stackstorm-auth
    environment:
      MONGO_PASSWORD: ${MONGO_PASSWORD:-password}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-password}
      POUNDCAKE_LOG_FORMAT: console
    depends_on:
      stackstorm-mongodb:
        condition: service_healthy
    volumes:
      - ./st2-config/st2.conf.template:/etc/st2/st2.conf.template:ro
      - ./st2-init/st2-entrypoint.sh:/st2-entrypoint.sh:ro
      - ./st2-config/htpasswd:/etc/st2/htpasswd:ro
    ports:
      - "127.0.0.1:9100:9100"
    networks:
      - poundcake
    entrypoint: ["/bin/bash", "/st2-entrypoint.sh"]
    command:
      ["/opt/stackstorm/st2/bin/st2auth", "--config-file", "/etc/st2/st2.conf"]
    restart: unless-stopped

  stackstorm-actionrunner:
    image: stackstorm/st2:3.9.0
    container_name: stackstorm-actionrunner
    environment:
      MONGO_PASSWORD: ${MONGO_PASSWORD:-password}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-password}
      POUNDCAKE_LOG_FORMAT: console
    depends_on:
      - stackstorm-api
    volumes:
      - ./st2-config/st2.conf.template:/etc/st2/st2.conf.template:ro
      - ./st2-init/st2-entrypoint.sh:/st2-entrypoint.sh:ro
      - stackstorm_packs:/opt/stackstorm/packs/poundcake
    networks:
      - poundcake
    entrypoint: ["/bin/bash", "/st2-entrypoint.sh"]
    command:
      [
        "/opt/stackstorm/st2/bin/st2actionrunner",
        "--config-file",
        "/etc/st2/st2.conf",
      ]
    restart: unless-stopped

  stackstorm-stream:
    image: stackstorm/st2:3.9.0
    container_name: stackstorm-stream
    environment:
      MONGO_PASSWORD: ${MONGO_PASSWORD:-password}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-password}
      POUNDCAKE_LOG_FORMAT: console
    depends_on:
      stackstorm-api:
        condition: service_healthy
    volumes:
      - ./st2-config/st2.conf.template:/etc/st2/st2.conf.template:ro
      - ./st2-init/st2-entrypoint.sh:/st2-entrypoint.sh:ro
    ports:
      - "127.0.0.1:9102:9102"
    networks:
      - poundcake
    entrypoint: ["/bin/bash", "/st2-entrypoint.sh"]
    command:
      [
        "/opt/stackstorm/st2/bin/st2stream",
        "--config-file",
        "/etc/st2/st2.conf",
      ]
    healthcheck:
      test: ["CMD", "pgrep", "-f", "st2stream"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  stackstorm-workflowengine:
    image: stackstorm/st2:3.9.0
    container_name: stackstorm-workflowengine
    environment:
      MONGO_PASSWORD: ${MONGO_PASSWORD:-password}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-password}
      POUNDCAKE_LOG_FORMAT: console
    depends_on:
      stackstorm-api:
        condition: service_healthy
    volumes:
      - ./st2-config/st2.conf.template:/etc/st2/st2.conf.template:ro
      - ./st2-init/st2-entrypoint.sh:/st2-entrypoint.sh:ro
      - stackstorm_packs:/opt/stackstorm/packs/poundcake
    networks:
      - poundcake
    entrypoint: ["/bin/bash", "/st2-entrypoint.sh"]
    command:
      [
        "/opt/stackstorm/st2/bin/st2workflowengine",
        "--config-file",
        "/etc/st2/st2.conf",
      ]
    healthcheck:
      test: ["CMD", "pgrep", "-f", "st2workflowengine"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  stackstorm-notifier:
    image: stackstorm/st2:3.9.0
    container_name: stackstorm-notifier
    environment:
      MONGO_PASSWORD: ${MONGO_PASSWORD:-password}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-password}
      POUNDCAKE_LOG_FORMAT: console
    depends_on:
      stackstorm-api:
        condition: service_healthy
    volumes:
      - ./st2-config/st2.conf.template:/etc/st2/st2.conf.template:ro
      - ./st2-init/st2-entrypoint.sh:/st2-entrypoint.sh:ro
    networks:
      - poundcake
    entrypoint: ["/bin/bash", "/st2-entrypoint.sh"]
    command:
      [
        "/opt/stackstorm/st2/bin/st2notifier",
        "--config-file",
        "/etc/st2/st2.conf",
      ]
    healthcheck:
      test: ["CMD", "pgrep", "-f", "st2notifier"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  stackstorm-garbagecollector:
    image: stackstorm/st2:3.9.0
    container_name: stackstorm-garbagecollector
    environment:
      MONGO_PASSWORD: ${MONGO_PASSWORD:-password}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-password}
      POUNDCAKE_LOG_FORMAT: json
    depends_on:
      stackstorm-api:
        condition: service_healthy
    volumes:
      - ./st2-config/st2.conf.template:/etc/st2/st2.conf.template:ro
      - ./st2-init/st2-entrypoint.sh:/st2-entrypoint.sh:ro
    networks:
      - poundcake
    entrypoint: ["/bin/bash", "/st2-entrypoint.sh"]
    command:
      [
        "/opt/stackstorm/st2/bin/st2garbagecollector",
        "--config-file",
        "/etc/st2/st2.conf",
      ]
    healthcheck:
      test: ["CMD", "pgrep", "-f", "st2garbagecollector"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  stackstorm-scheduler:
    image: stackstorm/st2:3.9.0
    container_name: stackstorm-scheduler
    environment:
      MONGO_PASSWORD: ${MONGO_PASSWORD:-password}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-password}
      POUNDCAKE_LOG_FORMAT: json
    depends_on:
      stackstorm-api:
        condition: service_healthy
    volumes:
      - ./st2-config/st2.conf.template:/etc/st2/st2.conf.template:ro
      - ./st2-init/st2-entrypoint.sh:/st2-entrypoint.sh:ro
    networks:
      - poundcake
    entrypoint: ["/bin/bash", "/st2-entrypoint.sh"]
    command:
      [
        "/opt/stackstorm/st2/bin/st2scheduler",
        "--config-file",
        "/etc/st2/st2.conf",
      ]
    healthcheck:
      test: ["CMD", "pgrep", "-f", "st2scheduler"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  stackstorm-bootstrap:
    image: stackstorm/st2:3.9.0
    container_name: stackstorm-bootstrap
    depends_on:
      stackstorm-api:
        condition: service_healthy
      stackstorm-auth:
        condition: service_started
    environment:
      MONGO_PASSWORD: ${MONGO_PASSWORD:-password}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-password}
      ST2_AUTH_URL: http://stackstorm-auth:9100
      ST2_API_URL: http://stackstorm-api:9101
      ST2_AUTH_USER: ${ST2_AUTH_USER:-st2admin}
      ST2_AUTH_PASSWORD: ${ST2_AUTH_PASSWORD:-Ch@ngeMe}
      POUNDCAKE_LOG_FORMAT: json
    volumes:
      - ./st2-config/st2.conf.template:/etc/st2/st2.conf.template:ro
      - ./st2-init/st2-entrypoint.sh:/st2-entrypoint.sh:ro
      - ../docker/scripts/automated-setup.sh:/automated-setup.sh:ro
      - ../config:/app/config
      - ../.env:/app/.env
    networks:
      - poundcake
    entrypoint: ["/bin/bash", "/st2-entrypoint.sh"]
    # Bootstrap runs once: registers content, installs packs, generates API keys, then exits
    command: ["/automated-setup.sh"]
    restart: on-failure

  st2client:
    image: stackstorm/st2:3.9.0
    container_name: st2client
    depends_on:
      stackstorm-bootstrap:
        condition: service_completed_successfully
      stackstorm-api:
        condition: service_healthy
    environment:
      MONGO_PASSWORD: ${MONGO_PASSWORD:-password}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-password}
      ST2_AUTH_URL: http://stackstorm-auth:9100
      ST2_API_URL: http://stackstorm-api:9101
      ST2_AUTH_USER: ${ST2_AUTH_USER:-st2admin}
      ST2_AUTH_PASSWORD: ${ST2_AUTH_PASSWORD:-Ch@ngeMe}
      POUNDCAKE_LOG_FORMAT: json
    volumes:
      - ./st2-config/st2.conf.template:/etc/st2/st2.conf.template:ro
      - ./st2-init/st2-entrypoint.sh:/st2-entrypoint.sh:ro
      - ../config:/app/config:ro
    networks:
      - poundcake
    entrypoint: ["/bin/bash", "/st2-entrypoint.sh"]
    # Client stays alive for interactive troubleshooting and debugging
    command:
      [
        "sh",
        "-c",
        "echo 'ST2 Client ready for troubleshooting' && tail -f /dev/null",
      ]
    restart: unless-stopped

networks:
  poundcake:
    driver: bridge

volumes:
  mariadb_data:
  mongo_data:
  rabbitmq_data:
  redis_data:
  stackstorm_packs:

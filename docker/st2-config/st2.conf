# StackStorm Configuration for PoundCake

[database]
# MongoDB connection - CRITICAL: No authentication_mechanism to avoid SSL bug
host = stackstorm-mongodb
port = 27017
db_name = st2
username = 
password = 
ssl = False
tls = False
# CRITICAL BUG: Do NOT set authentication_mechanism - it forces TLS incorrectly
# authentication_mechanism = SCRAM-SHA-256
connection_timeout = 3000
server_selection_timeout = 3000

[messaging]
url = amqp://stackstorm:password@stackstorm-rabbitmq:5672

[coordination]
url = redis://stackstorm-redis:6379

[auth]
host = stackstorm-auth
port = 9100
use_ssl = False
mode = standalone

[api]
host = 0.0.0.0
port = 9101

[stream]
host = 0.0.0.0
port = 9102

[sensorcontainer]
logging = /etc/st2/logging.sensorcontainer.conf

[rulesengine]
logging = /etc/st2/logging.rulesengine.conf

[actionrunner]
logging = /etc/st2/logging.actionrunner.conf

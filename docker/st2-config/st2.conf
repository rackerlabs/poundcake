#
# StackStorm Configuration for Docker/Kubernetes
# This config file overrides defaults to work in containerized environments

[database]
# MongoDB connection settings - NO SSL/TLS
host = mongodb
port = 27017
db_name = st2
username = stackstorm
password = stackstorm
ssl = False
tls = False
tlsInsecure = True
# authentication_mechanism = SCRAM-SHA-256
connection_timeout = 3000
server_selection_timeout = 3000
connect = True
read_preference = primaryPreferred

[messaging]
url = amqp://stackstorm:stackstorm@rabbitmq:5672

[coordination]
url = redis://redis:6379

[auth]
enable = True
backend = flat_file
backend_kwargs = {"file_path": "/etc/st2/htpasswd"}

[api]
host = 0.0.0.0
port = 9101
allow_origin = *
mask_secrets = True

[stream]
host = 0.0.0.0
port = 9102
heartbeat = 25

[sensorcontainer]
logging = /etc/st2/logging.sensorcontainer.conf

[rulesengine]
logging = /etc/st2/logging.rulesengine.conf

[actionrunner]
logging = /etc/st2/logging.actionrunner.conf

[resultstracker]
logging = /etc/st2/logging.resultstracker.conf
query_interval = 0.1

[notifier]
logging = /etc/st2/logging.notifier.conf

[scheduler]
logging = /etc/st2/logging.scheduler.conf

[garbagecollector]
logging = /etc/st2/logging.garbagecollector.conf
collection_interval = 600
action_executions_ttl = 30
action_executions_output_ttl = 7
trigger_instances_ttl = 30

[log]
excludes = requests,paramiko

# StackStorm Configuration for Docker/Kubernetes
# This config file overrides defaults to work in containerized environments

[database]
# MongoDB connection settings for Docker
host = mongodb
port = 27017
db_name = st2
username = stackstorm
password = stackstorm

# Connection options
ssl = False
ssl_keyfile = None
ssl_certfile = None
ssl_cert_reqs = None
ssl_ca_certs = None
ssl_match_hostname = True
authentication_mechanism = SCRAM-SHA-256

# Connection pool settings
connection_timeout = 3000
server_selection_timeout = 3000
connect = True
replicaset = None
read_preference = primaryPreferred

[messaging]
# RabbitMQ connection settings
url = amqp://stackstorm:stackstorm@rabbitmq:5672

[coordination]
# Redis coordination settings
url = redis://redis:6379

[auth]
# Authentication settings
enable = True
backend = flat_file
backend_kwargs = {"file_path": "/etc/st2/htpasswd"}

[api]
# API settings
host = 0.0.0.0
port = 9101
allow_origin = *
mask_secrets = True

[stream]
# Stream API settings
host = 0.0.0.0
port = 9102
heartbeat = 25

[sensorcontainer]
# Sensor container settings
logging = /etc/st2/logging.sensorcontainer.conf

[rulesengine]
# Rules engine settings
logging = /etc/st2/logging.rulesengine.conf

[actionrunner]
# Action runner settings
logging = /etc/st2/logging.actionrunner.conf

[resultstracker]
# Results tracker settings
logging = /etc/st2/logging.resultstracker.conf
query_interval = 0.1

[notifier]
# Notifier settings
logging = /etc/st2/logging.notifier.conf

[scheduler]
# Scheduler settings
logging = /etc/st2/logging.scheduler.conf

[garbagecollector]
# Garbage collector settings
logging = /etc/st2/logging.garbagecollector.conf
collection_interval = 600
action_executions_ttl = 30
action_executions_output_ttl = 7
trigger_instances_ttl = 30

[log]
# Logging settings
excludes = requests,paramiko

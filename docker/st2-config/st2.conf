#
# StackStorm Configuration for PoundCake
# Values will be overridden by ST2_CONF_* environment variables in docker-compose

[database]
host = stackstorm-mongodb
port = 27017
db_name = st2
username = admin
# These will be overridden by ST2_CONF_DATABASE_PASSWORD env var
password = changeme
# This will be overridden by ST2_CONF_DATABASE_AUTHENTICATION_DATABASE env var
authentication_database = admin
ssl = False

[messaging]
# This will be overridden by ST2_CONF_MESSAGING_URL env var
url = amqp://stackstorm:changeme@stackstorm-rabbitmq:5672

[coordination]
url = redis://stackstorm-redis:6379

[auth]
host = 0.0.0.0
port = 9100
use_ssl = False
mode = standalone
backend = flat_file
backend_kwargs = {"file_path": "/etc/st2/htpasswd"}
enable = True
api_url = http://stackstorm-api:9101

[api]
host = 0.0.0.0
port = 9101
# Allow the PoundCake API to talk to ST2 without CORS issues
allow_origin = *

[stream]
host = 0.0.0.0
port = 9102

[sensorcontainer]
logging = /etc/st2/logging.sensorcontainer.conf

[rulesengine]
logging = /etc/st2/logging.rulesengine.conf

[actionrunner]
logging = /etc/st2/logging.actionrunner.conf

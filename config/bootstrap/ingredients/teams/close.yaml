apiVersion: poundcake/v1
kind: IngredientCatalog
ingredients:
  - execution_target: teams
    task_key_template: teams.close
    execution_engine: bakery
    execution_purpose: comms
    execution_payload:
      template:
        context:
          source: poundcake
    execution_parameters:
      operation: close
    is_default: true
    is_blocking: false
    expected_duration_sec: 15
    timeout_duration_sec: 120
    retry_count: 1
    retry_delay: 5
    on_failure: continue

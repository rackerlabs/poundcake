#
# Example Alertmanager configuration for integration.
# Save this as alertmanager.yml in your Alertmanager deployment.
# IMPORTANT:
# - Replace the namespace in URL (example uses `rackspace`).
# - Replace INTERNAL_API_KEY_VALUE with PoundCake internal API key.

global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'cluster', 'service']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 12h
  receiver: 'webhook'
  routes:
    # Send critical alerts immediately
    - match:
        severity: critical
      receiver: 'webhook'
      group_wait: 0s
    # Send warning alerts after grouping
    - match:
        severity: warning
      receiver: 'webhook'
      group_wait: 30s

receivers:
  - name: 'webhook'
    webhook_configs:
      - url: 'http://poundcake.rackspace.svc.cluster.local:8080/api/v1/webhook'
        send_resolved: true
        http_config:
          authorization:
            type: Bearer
            credentials: INTERNAL_API_KEY_VALUE
        # Optional: Configure retry behavior
        max_alerts: 0  # 0 = no limit

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'cluster', 'service']

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  PACKAGE_OWNER: ${{ vars.GHCR_OWNER || github.repository_owner }}
  REPO_NAME: ${{ vars.GHCR_REPO_NAME || github.event.repository.name }}
  IMAGE_NAME: ${{ format('{0}/{1}', vars.GHCR_OWNER || github.repository_owner, vars.GHCR_REPO_NAME || github.event.repository.name) }}
  CHART_NAME: poundcake

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.CR_PAT || secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          no-cache: true
          platforms: linux/amd64

      - name: Extract metadata for UI Docker
        id: meta-ui
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-ui
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push UI Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./ui/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-ui.outputs.tags }}
          labels: ${{ steps.meta-ui.outputs.labels }}
          no-cache: true
          platforms: linux/amd64

      - name: Make UI Docker image public
        if: github.event_name != 'pull_request'
        run: |
          curl -X PATCH \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/orgs/${{ env.PACKAGE_OWNER }}/packages/container/${{ env.REPO_NAME }}-ui \
            -d '{"visibility":"public"}' || echo "Package may already be public or API call failed (non-fatal)"

      - name: Make Docker image public
        if: github.event_name != 'pull_request'
        run: |
          curl -X PATCH \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/orgs/${{ env.PACKAGE_OWNER }}/packages/container/${{ env.REPO_NAME }} \
            -d '{"visibility":"public"}' || echo "Package may already be public or API call failed (non-fatal)"

      - name: Extract metadata for Bakery Docker
        id: meta-bakery
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-bakery
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push Bakery Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./bakery/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-bakery.outputs.tags }}
          labels: ${{ steps.meta-bakery.outputs.labels }}
          no-cache: true
          platforms: linux/amd64

      - name: Make Bakery Docker image public
        if: github.event_name != 'pull_request'
        run: |
          curl -X PATCH \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/orgs/${{ env.PACKAGE_OWNER }}/packages/container/${{ env.REPO_NAME }}-bakery \
            -d '{"visibility":"public"}' || echo "Package may already be public or API call failed (non-fatal)"

  build-and-push-chart:
    runs-on: ubuntu-latest
    needs: build-and-push-image
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.13.0

      - name: Log in to Container Registry
        run: |
          echo ${{ secrets.CR_PAT || secrets.GITHUB_TOKEN }} | helm registry login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: Package Helm chart
        run: |
          mkdir -p .helm-packages
          helm package helm -d .helm-packages
          ls -lah .helm-packages/

      - name: Push Helm chart to OCI registry
        run: |
          for chart in .helm-packages/*.tgz; do
            echo "Pushing $chart to oci://${{ env.REGISTRY }}/${{ env.PACKAGE_OWNER }}/charts"
            helm push "$chart" oci://${{ env.REGISTRY }}/${{ env.PACKAGE_OWNER }}/charts
          done

      - name: Make Helm chart public
        run: |
          curl -X PATCH \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/orgs/${{ env.PACKAGE_OWNER }}/packages/container/charts%2F${{ env.CHART_NAME }} \
            -d '{"visibility":"public"}' || echo "Package may already be public or API call failed (non-fatal)"

  create-release:
    runs-on: ubuntu-latest
    needs: [build-and-push-image, build-and-push-chart]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
      packages: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Installation

            ### Docker Image
            ```bash
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            ```

            ### Helm Chart
            ```bash
            helm install poundcake oci://${{ env.REGISTRY }}/${{ env.PACKAGE_OWNER }}/charts/${{ env.CHART_NAME }} --version ${{ github.ref_name }}
            ```

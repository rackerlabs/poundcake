name: Manual Build and Push Artifacts

on:
  workflow_dispatch:
    inputs:
      target:
        description: Select which artifact(s) to build and push
        type: choice
        required: true
        default: all
        options:
          - all
          - poundcake
          - ui
          - bakery
          - chart

permissions:
  contents: read
  packages: write

concurrency:
  group: manual-build-push-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  PACKAGE_OWNER: ${{ vars.GHCR_OWNER || github.repository_owner }}
  REPO_NAME: ${{ vars.GHCR_REPO_NAME || github.event.repository.name }}
  IMAGE_NAME: ${{ format('{0}/{1}', vars.GHCR_OWNER || github.repository_owner, vars.GHCR_REPO_NAME || github.event.repository.name) }}
  CHART_PATH: helm

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.CR_PAT || secrets.GITHUB_TOKEN }}

      - name: Compute manual tag
        id: tags
        run: |
          echo "sha_tag=sha-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build and push API Docker image
        if: ${{ inputs.target == 'all' || inputs.target == 'poundcake' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          target: api-runtime
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tags.outputs.sha_tag }}
          cache-from: type=gha,scope=poundcake-api
          cache-to: type=gha,mode=max,scope=poundcake-api
          platforms: linux/amd64

      - name: Build and push UI Docker image
        if: ${{ inputs.target == 'all' || inputs.target == 'ui' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./ui/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-ui:${{ steps.tags.outputs.sha_tag }}
          cache-from: type=gha,scope=poundcake-ui
          cache-to: type=gha,mode=max,scope=poundcake-ui
          platforms: linux/amd64

      - name: Build and push Bakery Docker image
        if: ${{ inputs.target == 'all' || inputs.target == 'bakery' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          target: bakery-runtime
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-bakery:${{ steps.tags.outputs.sha_tag }}
          cache-from: type=gha,scope=poundcake-bakery
          cache-to: type=gha,mode=max,scope=poundcake-bakery
          platforms: linux/amd64

      - name: Make UI Docker image public
        if: ${{ inputs.target == 'all' || inputs.target == 'ui' }}
        run: |
          curl -X PATCH \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/orgs/${{ env.PACKAGE_OWNER }}/packages/container/${{ env.REPO_NAME }}-ui \
            -d '{"visibility":"public"}' || echo "Package may already be public or API call failed (non-fatal)"

      - name: Make Docker image public
        if: ${{ inputs.target == 'all' || inputs.target == 'poundcake' }}
        run: |
          curl -X PATCH \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/orgs/${{ env.PACKAGE_OWNER }}/packages/container/${{ env.REPO_NAME }} \
            -d '{"visibility":"public"}' || echo "Package may already be public or API call failed (non-fatal)"

      - name: Make Bakery Docker image public
        if: ${{ inputs.target == 'all' || inputs.target == 'bakery' }}
        run: |
          curl -X PATCH \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/orgs/${{ env.PACKAGE_OWNER }}/packages/container/${{ env.REPO_NAME }}-bakery \
            -d '{"visibility":"public"}' || echo "Package may already be public or API call failed (non-fatal)"

      - name: Set up Helm
        if: ${{ inputs.target == 'all' || inputs.target == 'chart' }}
        uses: azure/setup-helm@v4
        with:
          version: v3.13.0

      - name: Resolve chart metadata and manual version
        if: ${{ inputs.target == 'all' || inputs.target == 'chart' }}
        id: chart_meta
        run: |
          chart_name="$(awk -F': ' '/^name:/ {print $2; exit}' "${{ env.CHART_PATH }}/Chart.yaml")"
          base_version="$(awk -F': ' '/^version:/ {print $2; exit}' "${{ env.CHART_PATH }}/Chart.yaml" | tr -d '"')"
          short_sha="${GITHUB_SHA:0:12}"
          if [ -z "$chart_name" ] || [ -z "$base_version" ]; then
            echo "Failed to resolve chart name/version from ${{ env.CHART_PATH }}/Chart.yaml" >&2
            exit 1
          fi
          if [[ "$base_version" == *-* ]]; then
            manual_version="${base_version}.sha.${short_sha}"
          else
            manual_version="${base_version}-sha.${short_sha}"
          fi
          echo "chart_name=$chart_name" >> "$GITHUB_OUTPUT"
          echo "base_version=$base_version" >> "$GITHUB_OUTPUT"
          echo "manual_version=$manual_version" >> "$GITHUB_OUTPUT"

      - name: Log in to Container Registry for Helm
        if: ${{ inputs.target == 'all' || inputs.target == 'chart' }}
        run: |
          echo "${{ secrets.CR_PAT || secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: Package Helm chart
        if: ${{ inputs.target == 'all' || inputs.target == 'chart' }}
        run: |
          mkdir -p .helm-packages
          helm package "${{ env.CHART_PATH }}" --version "${{ steps.chart_meta.outputs.manual_version }}" -d .helm-packages
          ls -lah .helm-packages/

      - name: Push Helm chart to OCI registry
        if: ${{ inputs.target == 'all' || inputs.target == 'chart' }}
        run: |
          helm push .helm-packages/*.tgz oci://${{ env.REGISTRY }}/${{ env.PACKAGE_OWNER }}/charts

      - name: Make Helm chart public
        if: ${{ inputs.target == 'all' || inputs.target == 'chart' }}
        run: |
          curl -X PATCH \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/orgs/${{ env.PACKAGE_OWNER }}/packages/container/charts%2F${{ steps.chart_meta.outputs.chart_name }} \
            -d '{"visibility":"public"}' || echo "Package may already be public or API call failed (non-fatal)"

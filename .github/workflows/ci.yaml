#
# CI workflow for PRs: lint, type-check, and unit tests.

name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            pyproject.toml
            requirements.txt
            dev-requirements.txt

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Run pre-commit checks
        run: |
          pre-commit run --all-files

      - name: Run unit tests
        run: |
          pytest -m "not integration" tests/ -v --cov=api --cov-report=xml

  integration:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            pyproject.toml
            requirements.txt
            dev-requirements.txt

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Run integration tests
        run: |
          set +e
          pytest -m "integration" tests/ -v
          status=$?
          set -e
          if [ "$status" -eq 5 ]; then
            echo "No integration tests were collected; treating as skip."
            exit 0
          fi
          exit "$status"

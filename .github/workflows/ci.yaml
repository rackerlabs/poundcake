#
# CI workflow for PRs: lint, type-check, and unit tests.

name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  helm-unit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Install helm-unittest plugin
        run: |
          helm plugin install https://github.com/helm-unittest/helm-unittest --version v0.5.1 --verify=false

      - name: Run helm lint
        run: |
          helm lint ./helm

      - name: Run helm-unittest suites
        run: |
          helm unittest ./helm --file 'tests/unittest/*_test.yaml'

  helm-chart-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2.7.0

      - name: Run ct lint
        run: |
          ct lint --charts helm --validate-maintainers=false --check-version-increment=false

  helm-chart-install:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2.7.0

      - name: Create Kind cluster
        uses: helm/kind-action@v1.12.0

      - name: Run ct install
        run: |
          ct install --charts helm --helm-extra-args "--timeout 10m"

  unit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            pyproject.toml
            requirements.txt
            dev-requirements.txt

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Run pre-commit checks
        run: |
          pre-commit run --all-files

      - name: Run unit tests
        run: |
          pytest -m "not integration" tests/ -v --cov=api --cov-report=xml

  integration:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            pyproject.toml
            requirements.txt
            dev-requirements.txt

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Run integration tests
        run: |
          set +e
          pytest -m "integration" tests/ -v
          rc=$?
          set -e
          if [ "$rc" -eq 5 ]; then
            echo "No integration tests collected; treating as success."
            exit 0
          fi
          exit "$rc"

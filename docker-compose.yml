version: '3.8'

services:
  # ============================================================================
  # SHARED INFRASTRUCTURE
  # ============================================================================
  
  # MariaDB - Shared database for PoundCake AND StackStorm
  mariadb:
    image: mariadb:11.6
    container_name: poundcake-mariadb
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: poundcake
      MYSQL_USER: poundcake
      MYSQL_PASSWORD: poundcake
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./docker/mariadb-init:/docker-entrypoint-initdb.d
    ports:
      - "127.0.0.1:3306:3306"  # Bind to localhost only for security
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - poundcake

  # RabbitMQ - Message broker for StackStorm
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: stackstorm-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: stackstorm
      RABBITMQ_DEFAULT_PASS: stackstorm
    ports:
      - "127.0.0.1:5672:5672"   # Bind to localhost only for security
      - "127.0.0.1:15672:15672"  # Management UI - localhost only
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - poundcake

  # Redis - Coordination and locking for StackStorm
  redis:
    image: redis:7.4-alpine
    container_name: stackstorm-redis
    command: redis-server --appendonly yes
    ports:
      - "127.0.0.1:6379:6379"  # Bind to localhost only for security
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - poundcake

  # MongoDB - Primary database for StackStorm
  mongodb:
    image: mongo:7.0.28
    container_name: stackstorm-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: stackstorm
      MONGO_INITDB_ROOT_PASSWORD: stackstorm
      MONGO_INITDB_DATABASE: st2
    ports:
      - "127.0.0.1:27017:27017"  # Bind to localhost only for security
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - poundcake

  # ============================================================================
  # STACKSTORM SERVICES
  # ============================================================================

  # StackStorm API
  st2api:
    image: stackstorm/st2:3.9.0
    container_name: stackstorm-api
    environment:
      # Authentication
      ST2_USER: ${ST2_USER:-st2admin}
      ST2_PASSWORD: ${ST2_PASSWORD:-Ch@ngeMe}
      
      ST2_AUTH_URL: http://st2auth:9100
      ST2_API_URL: http://st2api:9101
      ST2_STREAM_URL: http://st2stream:9102
      
      # Database (MongoDB - Primary database for StackStorm)
      ST2_DATABASE: mongodb
      ST2_DATABASE_HOST: mongodb
      ST2_DATABASE_PORT: 27017
      ST2_DATABASE_NAME: st2
      ST2_DATABASE_USERNAME: stackstorm
      ST2_DATABASE_PASSWORD: stackstorm
      
      # RabbitMQ
      ST2_RABBITMQ_HOST: rabbitmq
      ST2_RABBITMQ_PORT: 5672
      ST2_RABBITMQ_USERNAME: stackstorm
      ST2_RABBITMQ_PASSWORD: stackstorm
      
      # Redis
      ST2_REDIS_HOST: redis
      ST2_REDIS_PORT: 6379
      ST2_REDIS_DB: 0
    ports:
      - "127.0.0.1:9101:9101"  # ST2 API - localhost only for security
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - st2-packs:/opt/stackstorm/packs
      - st2-virtualenvs:/opt/stackstorm/virtualenvs
      - st2-configs:/opt/stackstorm/configs
      - ./docker/st2-config/st2.conf:/etc/st2/st2.conf:ro
    healthcheck:
      test: ["CMD", "st2", "action", "list", "--limit=1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - poundcake
    command: /opt/stackstorm/st2/bin/st2api --config-file=/etc/st2/st2.conf

  # StackStorm Auth
  st2auth:
    image: stackstorm/st2:3.9.0
    container_name: stackstorm-auth
    environment:
      # Authentication
      ST2_USER: ${ST2_USER:-st2admin}
      ST2_PASSWORD: ${ST2_PASSWORD:-Ch@ngeMe}
      
      ST2_AUTH_URL: http://st2auth:9100
      ST2_API_URL: http://st2api:9101
      
      # Database
      ST2_DATABASE: mongodb
      ST2_DATABASE_HOST: mongodb
      ST2_DATABASE_PORT: 27017
      ST2_DATABASE_NAME: st2
      ST2_DATABASE_USERNAME: stackstorm
      ST2_DATABASE_PASSWORD: stackstorm
      
      # RabbitMQ
      ST2_RABBITMQ_HOST: rabbitmq
      ST2_RABBITMQ_USERNAME: stackstorm
      ST2_RABBITMQ_PASSWORD: stackstorm
      
      # Redis
      ST2_REDIS_HOST: redis
      ST2_REDIS_PORT: 6379
    ports:
      - "127.0.0.1:9100:9100"  # ST2 Auth - localhost only for security
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - st2-packs:/opt/stackstorm/packs
      - ./docker/st2-config/st2.conf:/etc/st2/st2.conf:ro
    networks:
      - poundcake
    command: /opt/stackstorm/st2/bin/st2auth --config-file=/etc/st2/st2.conf

  # StackStorm Stream
  st2stream:
    image: stackstorm/st2:3.9.0
    container_name: stackstorm-stream
    environment:
      # Authentication
      ST2_USER: ${ST2_USER:-st2admin}
      ST2_PASSWORD: ${ST2_PASSWORD:-Ch@ngeMe}
      
      ST2_AUTH_URL: http://st2auth:9100
      ST2_API_URL: http://st2api:9101
      ST2_STREAM_URL: http://st2stream:9102
      
      # Database
      ST2_DATABASE: mongodb
      ST2_DATABASE_HOST: mongodb
      ST2_DATABASE_NAME: st2
      ST2_DATABASE_USERNAME: stackstorm
      ST2_DATABASE_PASSWORD: stackstorm
      
      # RabbitMQ
      ST2_RABBITMQ_HOST: rabbitmq
      ST2_RABBITMQ_USERNAME: stackstorm
      ST2_RABBITMQ_PASSWORD: stackstorm
      
      # Redis
      ST2_REDIS_HOST: redis
      ST2_REDIS_PORT: 6379
    ports:
      - "127.0.0.1:9102:9102"  # ST2 Stream - localhost only for security
    depends_on:
      - mongodb
      - rabbitmq
      - redis
    volumes:
      - ./docker/st2-config/st2.conf:/etc/st2/st2.conf:ro
    networks:
      - poundcake
    command: /opt/stackstorm/st2/bin/st2stream --config-file=/etc/st2/st2.conf

  # StackStorm Rules Engine
  st2rulesengine:
    image: stackstorm/st2:3.9.0
    container_name: stackstorm-rulesengine
    environment:
      # Authentication
      ST2_USER: ${ST2_USER:-st2admin}
      ST2_PASSWORD: ${ST2_PASSWORD:-Ch@ngeMe}
      
      ST2_AUTH_URL: http://st2auth:9100
      ST2_API_URL: http://st2api:9101
      
      # Database
      ST2_DATABASE: mongodb
      ST2_DATABASE_HOST: mongodb
      ST2_DATABASE_NAME: st2
      ST2_DATABASE_USERNAME: stackstorm
      ST2_DATABASE_PASSWORD: stackstorm
      
      # RabbitMQ
      ST2_RABBITMQ_HOST: rabbitmq
      ST2_RABBITMQ_USERNAME: stackstorm
      ST2_RABBITMQ_PASSWORD: stackstorm
      
      # Redis
      ST2_REDIS_HOST: redis
      ST2_REDIS_PORT: 6379
    depends_on:
      - mongodb
      - rabbitmq
      - redis
    volumes:
      - st2-packs:/opt/stackstorm/packs
      - ./docker/st2-config/st2.conf:/etc/st2/st2.conf:ro
    networks:
      - poundcake
    command: /opt/stackstorm/st2/bin/st2rulesengine --config-file=/etc/st2/st2.conf

  # StackStorm Action Runner
  st2actionrunner:
    image: stackstorm/st2:3.9.0
    container_name: stackstorm-actionrunner
    environment:
      # Authentication
      ST2_USER: ${ST2_USER:-st2admin}
      ST2_PASSWORD: ${ST2_PASSWORD:-Ch@ngeMe}
      
      ST2_AUTH_URL: http://st2auth:9100
      ST2_API_URL: http://st2api:9101
      
      # Database
      ST2_DATABASE: mongodb
      ST2_DATABASE_HOST: mongodb
      ST2_DATABASE_NAME: st2
      ST2_DATABASE_USERNAME: stackstorm
      ST2_DATABASE_PASSWORD: stackstorm
      
      # RabbitMQ
      ST2_RABBITMQ_HOST: rabbitmq
      ST2_RABBITMQ_USERNAME: stackstorm
      ST2_RABBITMQ_PASSWORD: stackstorm
      
      # Redis
      ST2_REDIS_HOST: redis
      ST2_REDIS_PORT: 6379
    depends_on:
      - mongodb
      - rabbitmq
      - redis
      - st2api
    volumes:
      - st2-packs:/opt/stackstorm/packs
      - st2-virtualenvs:/opt/stackstorm/virtualenvs
      - ./docker/st2-config/st2.conf:/etc/st2/st2.conf:ro
    networks:
      - poundcake
    command: /opt/stackstorm/st2/bin/st2actionrunner --config-file=/etc/st2/st2.conf

  # StackStorm Scheduler
  st2scheduler:
    image: stackstorm/st2:3.9.0
    container_name: stackstorm-scheduler
    environment:
      # Authentication
      ST2_USER: ${ST2_USER:-st2admin}
      ST2_PASSWORD: ${ST2_PASSWORD:-Ch@ngeMe}
      
      ST2_AUTH_URL: http://st2auth:9100
      ST2_API_URL: http://st2api:9101
      
      # Database
      ST2_DATABASE: mongodb
      ST2_DATABASE_HOST: mongodb
      ST2_DATABASE_NAME: st2
      ST2_DATABASE_USERNAME: stackstorm
      ST2_DATABASE_PASSWORD: stackstorm
      
      # RabbitMQ
      ST2_RABBITMQ_HOST: rabbitmq
      ST2_RABBITMQ_USERNAME: stackstorm
      ST2_RABBITMQ_PASSWORD: stackstorm
      
      # Redis
      ST2_REDIS_HOST: redis
      ST2_REDIS_PORT: 6379
    depends_on:
      - mongodb
      - rabbitmq
      - redis
    volumes:
      - ./docker/st2-config/st2.conf:/etc/st2/st2.conf:ro
    networks:
      - poundcake
    command: /opt/stackstorm/st2/bin/st2scheduler --config-file=/etc/st2/st2.conf

  # StackStorm Notifier
  st2notifier:
    image: stackstorm/st2:3.9.0
    container_name: stackstorm-notifier
    environment:
      # Authentication
      ST2_USER: ${ST2_USER:-st2admin}
      ST2_PASSWORD: ${ST2_PASSWORD:-Ch@ngeMe}
      
      ST2_AUTH_URL: http://st2auth:9100
      ST2_API_URL: http://st2api:9101
      
      # Database
      ST2_DATABASE: mongodb
      ST2_DATABASE_HOST: mongodb
      ST2_DATABASE_NAME: st2
      ST2_DATABASE_USERNAME: stackstorm
      ST2_DATABASE_PASSWORD: stackstorm
      
      # RabbitMQ
      ST2_RABBITMQ_HOST: rabbitmq
      ST2_RABBITMQ_USERNAME: stackstorm
      ST2_RABBITMQ_PASSWORD: stackstorm
      
      # Redis
      ST2_REDIS_HOST: redis
      ST2_REDIS_PORT: 6379
    depends_on:
      - mongodb
      - rabbitmq
      - redis
    volumes:
      - ./docker/st2-config/st2.conf:/etc/st2/st2.conf:ro
    networks:
      - poundcake
    command: /opt/stackstorm/st2/bin/st2notifier --config-file=/etc/st2/st2.conf

  # ============================================================================
  # POUNDCAKE SERVICE
  # ============================================================================

  # PoundCake API - FastAPI application
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: poundcake-api
    environment:
      # Database
      DATABASE_URL: mysql+pymysql://poundcake:poundcake@mariadb:3306/poundcake
      
      # StackStorm
      ST2_API_URL: http://st2api:9101/v1
      ST2_API_KEY: ${ST2_API_KEY:-}
      
      # App settings
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"  # API - Exposed for webhooks. Use reverse proxy in production.
    depends_on:
      mongodb:
        condition: service_healthy
      st2api:
        condition: service_healthy
    volumes:
      - ./api:/app/api
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - poundcake
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload

  # PoundCake Oven Scheduler - Scheduled alert crawler
  oven:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: poundcake-oven
    environment:
      # PoundCake API
      POUNDCAKE_API_URL: http://api:8000
      OVEN_CRAWLER_INTERVAL: ${OVEN_CRAWLER_INTERVAL:-60}
      
      # Logging
      LOG_LEVEL: INFO
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - ./api:/app/api
      - ./scripts:/app/scripts
      - ./logs:/app/logs
    networks:
      - poundcake
    command: python scripts/oven_scheduler.py --interval ${OVEN_CRAWLER_INTERVAL:-60}
    restart: unless-stopped

volumes:
  mariadb_data:
    driver: local
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
  redis_data:
    driver: local
  st2-packs:
    driver: local
  st2-virtualenvs:
    driver: local
  st2-configs:
    driver: local

networks:
  poundcake:
    driver: bridge

services:
  # --- POUNDCAKE INFRASTRUCTURE ---
  mariadb:
    image: mariadb:11.6
    container_name: poundcake-mariadb
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-poundcake}
      MYSQL_USER: ${DB_USER:-poundcake}
      MYSQL_PASSWORD: ${DB_PASSWORD:-poundcake}
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./docker/mariadb-init:/docker-entrypoint-initdb.d
    ports:
      - "127.0.0.1:3306:3306"
    networks:
      - poundcake
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # --- POUNDCAKE SERVICES ---
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: poundcake-api
    working_dir: /app
    entrypoint: /app/api/scripts/entrypoint-auto-migrate.sh
    environment:
      PYTHONPATH: /app
      POUNDCAKE_DATABASE_URL: mysql+pymysql://${DB_USER:-poundcake}:${DB_PASSWORD:-poundcake}@mariadb:3306/${DB_NAME:-poundcake}
      POUNDCAKE_STACKSTORM_URL: http://stackstorm-api:9101
      POUNDCAKE_STACKSTORM_VERIFY_SSL: "False"
      POUNDCAKE_LOG_LEVEL: DEBUG
      POUNDCAKE_APP_VERSION: ${APP_VERSION:-1.0.0}
      # The API reads the key generated by automated-setup.sh
      ST2_API_KEY_FILE: /app/config/st2_api_key
    depends_on:
      mariadb:
        condition: service_healthy
      stackstorm-api:
        condition: service_healthy
    volumes:
      - .:/app
      - ./logs:/app/logs
      - ./config:/app/config
    ports:
      - "8000:8000"
    networks:
      - poundcake
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: poundcake-worker
    working_dir: /app
    environment:
      PYTHONPATH: /app
      POUNDCAKE_API_URL: http://api:8000
      OVEN_POLL_INTERVAL: ${OVEN_INTERVAL:-5}
      LOG_LEVEL: INFO
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - .:/app
      - ./logs:/app/logs
    networks:
      - poundcake
    command: python3 workers/executor.py
    restart: unless-stopped

  dispatcher:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: poundcake-dispatcher
    working_dir: /app
    environment:
      PYTHONPATH: /app
      POUNDCAKE_API_URL: http://api:8000
      OVEN_INTERVAL: ${OVEN_INTERVAL:-5}
      LOG_LEVEL: INFO
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - .:/app
      - ./logs:/app/logs
    networks:
      - poundcake
    command: python3 workers/dispatcher.py
    restart: unless-stopped

  timer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: poundcake-timer
    working_dir: /app
    environment:
      PYTHONPATH: /app
      POUNDCAKE_API_URL: http://api:8000/api/v1
      ST2_API_URL: http://stackstorm-api:9101/v1
      TIMER_INTERVAL: ${TIMER_INTERVAL:-10}
      SLA_BUFFER_PERCENT: 0.2
      LOG_LEVEL: INFO
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - .:/app
      - ./logs:/app/logs
      - ./config:/app/config:ro
    networks:
      - poundcake
    command: python3 workers/timer.py
    restart: unless-stopped

  # --- STACKSTORM BACKEND ---
  stackstorm-mongodb:
    image: mongo:7.0
    container_name: stackstorm-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-password}
    volumes:
      - mongo_data:/data/db
      # Uses the user creation script for the 'st2' database
      - ./docker/mongodb-init/01-create-st2-user.sh:/docker-entrypoint-initdb.d/01-create-st2-user.sh:ro
    networks:
      - poundcake
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  stackstorm-rabbitmq:
    image: rabbitmq:3.13-management
    container_name: stackstorm-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: stackstorm
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-password}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - poundcake
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  stackstorm-redis:
    image: redis:7.4-alpine
    container_name: stackstorm-redis
    volumes:
      - redis_data:/data
    networks:
      - poundcake
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  stackstorm-api:
    image: stackstorm/st2:3.9.0
    container_name: stackstorm-api
    environment:
      MONGO_PASSWORD: ${MONGO_PASSWORD:-password}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-password}
    depends_on:
      stackstorm-mongodb:
        condition: service_healthy
      stackstorm-rabbitmq:
        condition: service_healthy
      stackstorm-redis:
        condition: service_healthy
    volumes:
      # Mounts the template and entrypoint to enable runtime configuration templating
      - ./docker/st2-config/st2.conf.template:/etc/st2/st2.conf.template:ro
      - ./docker/st2-init/st2-entrypoint.sh:/st2-entrypoint.sh:ro
    ports:
      - "127.0.0.1:9101:9101"
    networks:
      - poundcake
    entrypoint: ["/bin/bash", "/st2-entrypoint.sh"]
    command: ["/opt/stackstorm/st2/bin/st2api", "--config-file", "/etc/st2/st2.conf"]
    healthcheck:
      test: ["CMD", "pgrep", "-f", "st2api"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
    restart: unless-stopped

  stackstorm-auth:
    image: stackstorm/st2:3.9.0
    container_name: stackstorm-auth
    environment:
      MONGO_PASSWORD: ${MONGO_PASSWORD:-password}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-password}
    depends_on:
      stackstorm-mongodb:
        condition: service_healthy
    volumes:
      - ./docker/st2-config/st2.conf.template:/etc/st2/st2.conf.template:ro
      - ./docker/st2-init/st2-entrypoint.sh:/st2-entrypoint.sh:ro
      - ./docker/st2-config/htpasswd:/etc/st2/htpasswd:ro
    ports:
      - "127.0.0.1:9100:9100"
    networks:
      - poundcake
    entrypoint: ["/bin/bash", "/st2-entrypoint.sh"]
    command: ["/opt/stackstorm/st2/bin/st2auth", "--config-file", "/etc/st2/st2.conf"]
    restart: unless-stopped

  stackstorm-actionrunner:
    image: stackstorm/st2:3.9.0
    container_name: stackstorm-actionrunner
    environment:
      MONGO_PASSWORD: ${MONGO_PASSWORD:-password}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-password}
    depends_on:
      - stackstorm-api
    volumes:
      - ./docker/st2-config/st2.conf.template:/etc/st2/st2.conf.template:ro
      - ./docker/st2-init/st2-entrypoint.sh:/st2-entrypoint.sh:ro
    networks:
      - poundcake
    entrypoint: ["/bin/bash", "/st2-entrypoint.sh"]
    command: ["/opt/stackstorm/st2/bin/st2actionrunner", "--config-file", "/etc/st2/st2.conf"]
    restart: unless-stopped

  stackstorm-bootstrap:
    image: stackstorm/st2:3.9.0
    container_name: stackstorm-bootstrap
    depends_on:
      stackstorm-api:
        condition: service_healthy
      stackstorm-auth:
        condition: service_started
    environment:
      MONGO_PASSWORD: ${MONGO_PASSWORD:-password}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-password}
      ST2_AUTH_URL: http://stackstorm-auth:9100
      ST2_API_URL: http://stackstorm-api:9101
      ST2_AUTH_USER: ${ST2_AUTH_USER:-st2admin}
      ST2_AUTH_PASSWORD: ${ST2_AUTH_PASSWORD:-Ch@ngeMe}
    volumes:
      - ./docker/st2-config/st2.conf.template:/etc/st2/st2.conf.template:ro
      - ./docker/st2-init/st2-entrypoint.sh:/st2-entrypoint.sh:ro
      - ./scripts/automated-setup.sh:/automated-setup.sh:ro
      - ./config:/app/config
      - ./.env:/app/.env
    networks:
      - poundcake
    entrypoint: ["/bin/bash", "/st2-entrypoint.sh"]
    # Bootstrap runs once: registers content, installs packs, generates API keys, then exits
    command: ["/automated-setup.sh"]
    restart: on-failure

  st2client:
    image: stackstorm/st2:3.9.0
    container_name: st2client
    depends_on:
      stackstorm-bootstrap:
        condition: service_completed_successfully
      stackstorm-api:
        condition: service_healthy
    environment:
      MONGO_PASSWORD: ${MONGO_PASSWORD:-password}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-password}
      ST2_AUTH_URL: http://stackstorm-auth:9100
      ST2_API_URL: http://stackstorm-api:9101
      ST2_AUTH_USER: ${ST2_AUTH_USER:-st2admin}
      ST2_AUTH_PASSWORD: ${ST2_AUTH_PASSWORD:-Ch@ngeMe}
    volumes:
      - ./docker/st2-config/st2.conf.template:/etc/st2/st2.conf.template:ro
      - ./docker/st2-init/st2-entrypoint.sh:/st2-entrypoint.sh:ro
      - ./config:/app/config:ro
    networks:
      - poundcake
    entrypoint: ["/bin/bash", "/st2-entrypoint.sh"]
    # Client stays alive for interactive troubleshooting and debugging
    command: ["sh", "-c", "echo 'ST2 Client ready for troubleshooting' && tail -f /dev/null"]
    restart: unless-stopped

networks:
  poundcake:
    driver: bridge

volumes:
  mariadb_data:
  mongo_data:
  rabbitmq_data:
  redis_data:

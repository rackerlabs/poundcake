services:
  # --- POUNDCAKE INFRASTRUCTURE ---
  mariadb:
    image: mariadb:11.6
    container_name: poundcake-mariadb
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-poundcake}
      MYSQL_USER: ${DB_USER:-poundcake}
      MYSQL_PASSWORD: ${DB_PASSWORD:-poundcake}
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./docker/mariadb-init:/docker-entrypoint-initdb.d
    ports:
      - "127.0.0.1:3306:3306"
    networks:
      - poundcake
    healthcheck:
      # Standard MariaDB healthcheck script
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # --- POUNDCAKE SERVICES ---
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: poundcake-api
    # Use auto-migrate entrypoint (safety net if migrations missing)
    entrypoint: /app/api/scripts/entrypoint-auto-migrate.sh
    environment:
      # Mapping to the POUNDCAKE_ prefix used in config.py
      POUNDCAKE_DATABASE_URL: mysql+pymysql://${DB_USER:-poundcake}:${DB_PASSWORD:-poundcake}@mariadb:3306/${DB_NAME:-poundcake}
      POUNDCAKE_STACKSTORM_URL: http://stackstorm-api:9101
      POUNDCAKE_STACKSTORM_VERIFY_SSL: "False"
      POUNDCAKE_LOG_LEVEL: DEBUG
      POUNDCAKE_APP_VERSION: ${APP_VERSION:-1.0.0}
    depends_on:
      mariadb:
        condition: service_healthy
      stackstorm-api:
        condition: service_healthy  # Wait for ST2 to be ready
    volumes:
      - ./api:/app/api
      - ./tests:/app/tests
      - ./logs:/app/logs
      - ./config:/app/config  # Shared config for runtime API key
    ports:
      - "8000:8000"
    networks:
      - poundcake
    healthcheck:
      # Check if API is ready to accept requests
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  oven:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: poundcake-oven
    environment:
      POUNDCAKE_API_URL: http://api:8000/api/v1
      OVEN_POLL_INTERVAL: ${OVEN_INTERVAL:-5}
      LOG_LEVEL: INFO
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - ./oven:/app/oven
      - ./logs:/app/logs
    networks:
      - poundcake
    # Explicitly call python to skip the api entrypoint script
    command: python oven/oven.py
    restart: unless-stopped

  oven-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: poundcake-oven-service
    environment:
      POUNDCAKE_API_URL: http://api:8000
      OVEN_INTERVAL: ${OVEN_INTERVAL:-5}
      LOG_LEVEL: INFO
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - ./oven:/app/oven
      - ./logs:/app/logs
    networks:
      - poundcake
    # Run the dispatcher that converts alerts to ovens
    command: python oven/oven_service.py
    restart: unless-stopped

  timer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: poundcake-timer
    environment:
      POUNDCAKE_API_URL: http://api:8000/api/v1
      TIMER_INTERVAL: ${TIMER_INTERVAL:-10}
      LOG_LEVEL: INFO
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - ./timer:/app/timer
      - ./logs:/app/logs
    networks:
      - poundcake
    # Explicitly call python to skip the api entrypoint script
    command: python timer/timer.py
    restart: unless-stopped

  # --- STACKSTORM BACKEND ---
  # ... (stackstorm-mongodb, rabbitmq, redis sections remain unchanged) ...
  stackstorm-mongodb:
    image: mongo:7.0
    container_name: stackstorm-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-password}
    volumes:
      - mongo_data:/data/db
      - ./docker/mongodb-init:/docker-entrypoint-initdb.d
    networks:
      - poundcake
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  stackstorm-rabbitmq:
    image: rabbitmq:3.13-management
    container_name: stackstorm-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: stackstorm
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-password}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - poundcake
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  stackstorm-redis:
    image: redis:7.4-alpine
    container_name: stackstorm-redis
    volumes:
      - redis_data:/data
    networks:
      - poundcake
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  stackstorm-api:
    image: stackstorm/st2:3.9.0
    container_name: stackstorm-api
    environment:
      # These are used by the entrypoint script to template st2.conf
      MONGO_PASSWORD: ${MONGO_PASSWORD:-password}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-password}
    depends_on:
      stackstorm-mongodb:
        condition: service_healthy
      stackstorm-rabbitmq:
        condition: service_healthy
      stackstorm-redis:
        condition: service_healthy
    volumes:
      - ./docker/st2-config/st2.conf.template:/etc/st2/st2.conf.template:ro
      - ./docker/st2-init/st2-entrypoint.sh:/st2-entrypoint.sh:ro
    ports:
      - "127.0.0.1:9101:9101"
    networks:
      - poundcake
    entrypoint: ["/bin/bash", "/st2-entrypoint.sh"]
    command: ["/opt/stackstorm/st2/bin/st2api", "--config-file", "/etc/st2/st2.conf"]
    healthcheck:
      test: ["CMD", "curl", "-s", "http://localhost:9101/v1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
    restart: unless-stopped


  stackstorm-auth:
    image: stackstorm/st2:3.9.0
    container_name: stackstorm-auth
    environment:
      MONGO_PASSWORD: ${MONGO_PASSWORD:-password}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-password}
    depends_on:
      stackstorm-mongodb:
        condition: service_healthy
    volumes:
      - ./docker/st2-config/st2.conf.template:/etc/st2/st2.conf.template:ro
      - ./docker/st2-init/st2-entrypoint.sh:/st2-entrypoint.sh:ro
      - ./docker/st2-config/htpasswd:/etc/st2/htpasswd:ro
    ports:
      - "127.0.0.1:9100:9100"
    networks:
      - poundcake
    entrypoint: ["/bin/bash", "/st2-entrypoint.sh"]
    command: ["/opt/stackstorm/st2/bin/st2auth", "--config-file", "/etc/st2/st2.conf"]
    restart: unless-stopped

  stackstorm-stream:
    image: stackstorm/st2:3.9.0
    container_name: stackstorm-stream
    environment:
      MONGO_PASSWORD: ${MONGO_PASSWORD:-password}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-password}
    depends_on:
      - stackstorm-api
    volumes:
      - ./docker/st2-config/st2.conf.template:/etc/st2/st2.conf.template:ro
      - ./docker/st2-init/st2-entrypoint.sh:/st2-entrypoint.sh:ro
    networks:
      - poundcake
    entrypoint: ["/bin/bash", "/st2-entrypoint.sh"]
    command: ["/opt/stackstorm/st2/bin/st2stream", "--config-file", "/etc/st2/st2.conf"]
    restart: unless-stopped

  stackstorm-actionrunner:
    image: stackstorm/st2:3.9.0
    container_name: stackstorm-actionrunner
    environment:
      MONGO_PASSWORD: ${MONGO_PASSWORD:-password}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-password}
    depends_on:
      - stackstorm-api
    volumes:
      - ./docker/st2-config/st2.conf.template:/etc/st2/st2.conf.template:ro
      - ./docker/st2-init/st2-entrypoint.sh:/st2-entrypoint.sh:ro
    networks:
      - poundcake
    entrypoint: ["/bin/bash", "/st2-entrypoint.sh"]
    command: ["/opt/stackstorm/st2/bin/st2actionrunner", "--config-file", "/etc/st2/st2.conf"]
    restart: unless-stopped

  stackstorm-scheduler:
    image: stackstorm/st2:3.9.0
    container_name: stackstorm-scheduler
    environment:
      MONGO_PASSWORD: ${MONGO_PASSWORD:-password}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-password}
    depends_on:
      - stackstorm-api
    volumes:
      - ./docker/st2-config/st2.conf.template:/etc/st2/st2.conf.template:ro
      - ./docker/st2-init/st2-entrypoint.sh:/st2-entrypoint.sh:ro
    networks:
      - poundcake
    entrypoint: ["/bin/bash", "/st2-entrypoint.sh"]
    command: ["/opt/stackstorm/st2/bin/st2scheduler", "--config-file", "/etc/st2/st2.conf"]
    restart: unless-stopped

  stackstorm-rulesengine:
    image: stackstorm/st2:3.9.0
    container_name: stackstorm-rulesengine
    environment:
      MONGO_PASSWORD: ${MONGO_PASSWORD:-password}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-password}
    depends_on:
      - stackstorm-api
    volumes:
      - ./docker/st2-config/st2.conf.template:/etc/st2/st2.conf.template:ro
      - ./docker/st2-init/st2-entrypoint.sh:/st2-entrypoint.sh:ro
    networks:
      - poundcake
    entrypoint: ["/bin/bash", "/st2-entrypoint.sh"]
    command: ["/opt/stackstorm/st2/bin/st2rulesengine", "--config-file", "/etc/st2/st2.conf"]
    restart: unless-stopped

  stackstorm-notifier:
    image: stackstorm/st2:3.9.0
    container_name: stackstorm-notifier
    environment:
      MONGO_PASSWORD: ${MONGO_PASSWORD:-password}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-password}
    depends_on:
      - stackstorm-api
    volumes:
      - ./docker/st2-config/st2.conf.template:/etc/st2/st2.conf.template:ro
      - ./docker/st2-init/st2-entrypoint.sh:/st2-entrypoint.sh:ro
    networks:
      - poundcake
    entrypoint: ["/bin/bash", "/st2-entrypoint.sh"]
    command: ["/opt/stackstorm/st2/bin/st2notifier", "--config-file", "/etc/st2/st2.conf"]
    restart: unless-stopped

  st2client:
    image: stackstorm/st2:3.9.0
    container_name: st2client
    depends_on:
      stackstorm-api:
        condition: service_healthy  # Wait for API to be actually ready
      stackstorm-auth:
        condition: service_started
    environment:
      MONGO_PASSWORD: ${MONGO_PASSWORD:-password}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-password}
      ST2_AUTH_URL: http://stackstorm-auth:9100
      ST2_API_URL: http://stackstorm-api:9101
    volumes:
      - ./docker/st2-config/st2.conf.template:/etc/st2/st2.conf.template:ro
      - ./docker/st2-init/st2-entrypoint.sh:/st2-entrypoint.sh:ro
      - ./scripts/automated-setup.sh:/automated-setup.sh:ro
      - ./config:/app/config  # Shared config directory
      - ./.env:/app/.env      # For updating .env as reference
    networks:
      - poundcake
    entrypoint: ["/bin/bash", "/st2-entrypoint.sh"]
    command: ["sh", "-c", "/automated-setup.sh && tail -f /dev/null"]  # Run setup then stay alive
    restart: unless-stopped  # Keep running for troubleshooting


networks:
  poundcake:
    driver: bridge

volumes:
  mariadb_data:
  mongo_data:
  rabbitmq_data:
  redis_data:

services:
  mariadb:
    image: mariadb:11.6
    container_name: poundcake-mariadb
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: poundcake
      MYSQL_USER: poundcake
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-poundcake}
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./docker/mariadb-init:/docker-entrypoint-initdb.d
    ports:
      - "127.0.0.1:3306:3306"
    networks:
      - poundcake
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: poundcake-api
    environment:
      DATABASE_URL: mysql+pymysql://poundcake:${MYSQL_PASSWORD:-poundcake}@mariadb:3306/poundcake
      ST2_API_URL: http://st2api:9101/v1
      ST2_API_KEY: ${ST2_API_KEY:-}
      LOG_LEVEL: INFO
    depends_on:
      mariadb:
        condition: service_healthy
    volumes:
      - ./api:/app/api
      - ./tests:/app/tests
      - ./logs:/app/logs
    ports:
      - "8000:8000"
    networks:
      - poundcake
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  oven:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: poundcake-oven
    environment:
      POUNDCAKE_API_URL: http://api:8000
      OVEN_INTERVAL: ${OVEN_INTERVAL:-5}
      ST2_API_URL: http://st2api:9101/v1
      ST2_API_KEY: ${ST2_API_KEY:-}
      LOG_LEVEL: INFO
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - ./scripts:/app/scripts
      - ./logs:/app/logs
    networks:
      - poundcake
    command: python scripts/oven.py
    restart: unless-stopped

  timer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: poundcake-timer
    environment:
      POUNDCAKE_API_URL: http://api:8000
      TIMER_INTERVAL: ${TIMER_INTERVAL:-10}
      ST2_API_URL: http://st2api:9101/v1
      ST2_API_KEY: ${ST2_API_KEY:-}
      LOG_LEVEL: INFO
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - ./scripts:/app/scripts
      - ./logs:/app/logs
    networks:
      - poundcake
    command: python scripts/timer.py
    restart: unless-stopped

  stackstorm-mongodb:
    image: mongo:7.0.28
    container_name: stackstorm-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-password}
    volumes:
      - mongo_data:/data/db
      - ./docker/mongodb-init:/docker-entrypoint-initdb.d
    ports:
      - "127.0.0.1:27017:27017"
    networks:
      - poundcake
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  stackstorm-rabbitmq:
    image: rabbitmq:3.13-management
    container_name: stackstorm-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: stackstorm
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-password}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672"
    networks:
      - poundcake
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  stackstorm-redis:
    image: redis:7.4-alpine
    container_name: stackstorm-redis
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - poundcake
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  stackstorm-api:
    image: stackstorm/st2:3.9.0
    container_name: stackstorm-api
    environment:
      ST2_AUTH_URL: http://stackstorm-auth:9100
      ST2_API_URL: http://stackstorm-api:9101
    depends_on:
      stackstorm-mongodb:
        condition: service_healthy
      stackstorm-rabbitmq:
        condition: service_healthy
      stackstorm-redis:
        condition: service_healthy
    volumes:
      - ./docker/st2-config/st2.conf:/etc/st2/st2.conf:ro
    ports:
      - "127.0.0.1:9101:9101"
    networks:
      - poundcake
    command: /opt/stackstorm/st2/bin/st2api --config-file /etc/st2/st2.conf
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9101/v1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  stackstorm-auth:
    image: stackstorm/st2:3.9.0
    container_name: stackstorm-auth
    depends_on:
      stackstorm-mongodb:
        condition: service_healthy
    volumes:
      - ./docker/st2-config/st2.conf:/etc/st2/st2.conf:ro
    ports:
      - "127.0.0.1:9100:9100"
    networks:
      - poundcake
    command: /opt/stackstorm/st2/bin/st2auth --config-file /etc/st2/st2.conf
    restart: unless-stopped

  stackstorm-stream:
    image: stackstorm/st2:3.9.0
    container_name: stackstorm-stream
    depends_on:
      stackstorm-api:
        condition: service_healthy
    volumes:
      - ./docker/st2-config/st2.conf:/etc/st2/st2.conf:ro
    ports:
      - "127.0.0.1:9102:9102"
    networks:
      - poundcake
    command: /opt/stackstorm/st2/bin/st2stream --config-file /etc/st2/st2.conf
    restart: unless-stopped

  stackstorm-actionrunner:
    image: stackstorm/st2:3.9.0
    container_name: stackstorm-actionrunner
    depends_on:
      stackstorm-api:
        condition: service_healthy
    volumes:
      - ./docker/st2-config/st2.conf:/etc/st2/st2.conf:ro
    networks:
      - poundcake
    command: /opt/stackstorm/st2/bin/st2actionrunner --config-file /etc/st2/st2.conf
    restart: unless-stopped

  stackstorm-scheduler:
    image: stackstorm/st2:3.9.0
    container_name: stackstorm-scheduler
    depends_on:
      stackstorm-api:
        condition: service_healthy
    volumes:
      - ./docker/st2-config/st2.conf:/etc/st2/st2.conf:ro
    networks:
      - poundcake
    command: /opt/stackstorm/st2/bin/st2scheduler --config-file /etc/st2/st2.conf
    restart: unless-stopped

  stackstorm-rulesengine:
    image: stackstorm/st2:3.9.0
    container_name: stackstorm-rulesengine
    depends_on:
      stackstorm-api:
        condition: service_healthy
    volumes:
      - ./docker/st2-config/st2.conf:/etc/st2/st2.conf:ro
    networks:
      - poundcake
    command: /opt/stackstorm/st2/bin/st2rulesengine --config-file /etc/st2/st2.conf
    restart: unless-stopped

  stackstorm-notifier:
    image: stackstorm/st2:3.9.0
    container_name: stackstorm-notifier
    depends_on:
      stackstorm-api:
        condition: service_healthy
    volumes:
      - ./docker/st2-config/st2.conf:/etc/st2/st2.conf:ro
    networks:
      - poundcake
    command: /opt/stackstorm/st2/bin/st2notifier --config-file /etc/st2/st2.conf
    restart: unless-stopped

networks:
  poundcake:
    driver: bridge

volumes:
  mariadb_data:
  mongo_data:
  rabbitmq_data:
  redis_data:

[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "poundcake"
version = "1.3.0"
description = "Lightweight tracking layer for Alertmanager webhooks with StackStorm integration, including CLI and UI"
readme = "README.md"
requires-python = ">=3.11"
license = {text = "MIT"}
authors = [
    {name = "Chris Breu"},
    {name = "Jake Briggs"}
]
dependencies = [
    # Core API dependencies
    "fastapi>=0.109.0",
    "uvicorn[standard]>=0.27.0",
    "sqlalchemy>=2.0.25",
    "alembic>=1.13.1",
    "pymysql>=1.1.0",
    "cryptography>=41.0.0",
    "celery[redis]>=5.3.6",
    "flower>=2.0.1",
    "redis>=5.0.1",
    "requests>=2.31.0",
    "httpx>=0.26.0",
    "pydantic>=2.6.0",
    "pydantic-settings>=2.1.0",
    "python-json-logger>=2.0.7",
    # CLI dependencies
    "click>=8.1.0",
    "pyyaml>=6.0",
    # Additional features
    "structlog>=23.2.0",
    "prometheus-client>=0.19.0",
    "kubernetes>=28.1.0",
    "GitPython>=3.1.0",
    "python-multipart>=0.0.6",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.4.4",
    "pytest-asyncio>=0.23.3",
    "pytest-cov>=4.1.0",
    "httpx>=0.26.0",
    "black>=24.1.1",
    "ruff>=0.1.14",
    "mypy>=1.8.0",
    "types-PyYAML>=6.0.0",
    "types-redis>=4.6.0",
]

[project.scripts]
pcake = "cli.main:main"

[tool.setuptools.packages.find]
where = ["src"]
include = ["api", "api.*", "cli", "cli.*", "ui", "ui.*"]

[tool.black]
line-length = 100
target-version = ['py311']

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
ignore_missing_imports = true

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
